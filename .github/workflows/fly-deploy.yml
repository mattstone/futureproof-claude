# Merge to master deploys to STAGING (futureproof-staging.fly.dev).
# Production is a deliberate, manual promotion — see fly-promote.yml.
# (docs/OPERATING_MODEL.md: "test, then deploy" is structural.)

name: Deploy Staging
on:
  push:
    branches:
      - master
jobs:
  deploy:
    name: Deploy to staging
    runs-on: ubuntu-latest
    concurrency: deploy-staging
    steps:
      - uses: actions/checkout@v6
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only -a futureproof-staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_STAGING_API_TOKEN }}
