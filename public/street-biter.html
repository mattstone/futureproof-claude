        // Thrust both hands forward together — classic fireball pose
        armRUpper = 0.2; armRFore = 0.1; armRExtend = 16;
        armLUpper = 0.15; armLFore = 0.05; armLExtend = 14;
      } else {
        const ep = Math.min(1, atkProg * 2);
        armRUpper = 0.2 * (1-ep); armRFore = 0.1 * (1-ep) - 0.6 * ep;
        armLUpper = 0.15 * (1-ep) - 0.4 * ep;
      }
    }
  }

  if (isKick && !isPunch && !spinning) {
    // During kicks, arms counterbalance
    if (isStandAtk) {
      if (atkStrength === 'L') {
        armLUpper = -0.5; armLFore = -0.8; armRUpper = -0.3; armRFore = -1.0;
      } else if (atkStrength === 'M') {
        armLUpper = -0.7; armLFore = -0.5; armRUpper = 0.2; armRFore = -0.3;
      } else {
        // Heavy kick: arms go wide for balance, like a real roundhouse
        if (atkPhase <= 1) {
          armLUpper = -1.0; armLFore = -0.3; armRUpper = 0.5; armRFore = -0.2;
        }
      }
    }
    if (isCrouchAtk && atkStrength === 'H') {
      // Sweep: one hand on ground for support
      armLUpper = 0.8; armLFore = 0.2; armRUpper = -0.6; armRFore = -0.4;
      fistClenchL = false;
    }
  }

  const upperArmW = isChunLi ? 8 : 11;
  const upperArmLen = 16;
  const baseForeLen = 14;

  function drawArm(xBase, upperAng, foreAng, ext, clench, isLeft) {
    ctx.save();
    ctx.translate(xBase, armY);
    ctx.rotate(upperAng);
    const dir = isLeft ? -1 : 1;
    // Upper arm
    ctx.fillStyle = P.skin;
    ctx.beginPath();
    ctx.ellipse(dir*upperArmLen/2, 0, upperArmLen/2, upperArmW/2, 0, 0, Math.PI*2);
    ctx.fill();
    // Bicep highlight
    ctx.fillStyle = P.skinHi;
    ctx.beginPath();
    ctx.ellipse(dir*upperArmLen/2, -upperArmW/4, upperArmLen/3, upperArmW/4, 0, -Math.PI, 0);
    ctx.fill();
    // Elbow joint
    ctx.save();
    ctx.translate(dir * upperArmLen, 0);
    ctx.rotate(foreAng);
    // Forearm
    const fLen = baseForeLen + ext;
    ctx.fillStyle = P.skin;
    ctx.fillRect(0, -4, dir * fLen, 9);
    // Wrist wraps (Ryu/Ken)
    if (!isChunLi) {
      const wrapX = dir > 0 ? fLen - 6 : -fLen + 2;
      ctx.fillStyle = '#EEE'; ctx.fillRect(wrapX, -5, 5, 10);
    }
    // Fist/Hand
    const gw = clench ? 12 : 9, gh = clench ? 14 : 11;
    const gx = dir > 0 ? fLen - 3 : -fLen - gw + 3;
    ctx.fillStyle = P.gloves;
    ctx.beginPath();
    ctx.roundRect(gx, -gh/2, gw, gh, 3);
    ctx.fill();
    ctx.fillStyle = P.glovesHi;
    ctx.fillRect(gx+1, -gh/2, gw-2, 3);
    // Knuckle detail when clenched
    if (clench) {
      ctx.fillStyle = P.glovesHi;
      for (let k = 0; k < 3; k++) ctx.fillRect(gx+2+k*3, -gh/2+3, 2, 2);
    }
    // Impact flash on heavy punch during active frames
    if (isPunch && atkStrength === 'H' && !isLeft && atkPhase === 1 && atkProg < 0.6) {
      ctx.fillStyle = 'rgba(255,255,200,0.7)';
      ctx.beginPath(); ctx.arc(gx + gw/2, 0, 14, 0, Math.PI*2); ctx.fill();
      // Impact lines
      ctx.strokeStyle = 'rgba(255,255,100,0.5)'; ctx.lineWidth = 2;
      for (let i = 0; i < 4; i++) {
        const a = i * Math.PI/2 + frame * 0.3;
        ctx.beginPath();
        ctx.moveTo(gx+gw/2+Math.cos(a)*10, Math.sin(a)*10);
        ctx.lineTo(gx+gw/2+Math.cos(a)*18, Math.sin(a)*18);
        ctx.stroke();
      }
    }
    ctx.restore(); // forearm rotation
    ctx.restore(); // arm base
  }
  // Draw back arm first, then front arm (front arm = right = punching arm)
  drawArm(-shoulderW, armLUpper, armLFore, armLExtend, fistClenchL, true);
  drawArm(shoulderW, armRUpper, armRFore, armRExtend, fistClenchR, false);

  // === NECK ===
  const neckW = isChunLi ? 6 : 9;
  ctx.fillStyle = P.skin;
  ctx.fillRect(-neckW/2, torsoY-torsoH-6, neckW, 8);
  if (!isChunLi) {
    ctx.fillStyle = P.skinSh;
    ctx.beginPath();
    ctx.moveTo(-neckW/2, torsoY-torsoH); ctx.lineTo(-shoulderW+2, torsoY-torsoH);
    ctx.lineTo(-neckW/2, torsoY-torsoH-4); ctx.fill();
    ctx.beginPath();
    ctx.moveTo(neckW/2, torsoY-torsoH); ctx.lineTo(shoulderW-2, torsoY-torsoH);
    ctx.lineTo(neckW/2, torsoY-torsoH-4); ctx.fill();
  }

  // === HEAD ===
  const headY = torsoY - torsoH - 6;
  const headR = 18;
  ctx.fillStyle = P.skin;
  ctx.beginPath(); ctx.arc(0, headY-headR+3, headR, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = P.skinSh;
  if (isChunLi) {
    ctx.beginPath(); ctx.arc(0, headY-4, 12, 0.2, Math.PI-0.2); ctx.fill();
  } else {
    ctx.beginPath();
    ctx.moveTo(-13, headY-8); ctx.lineTo(-10, headY); ctx.lineTo(10, headY); ctx.lineTo(13, headY-8);
    ctx.fill();
    ctx.beginPath(); ctx.arc(0, headY-1, 2, 0, Math.PI*2); ctx.fill();
  }

  // === HAIR ===
  ctx.fillStyle = P.hair;
  if (charId === 'ryu') {
    ctx.beginPath();
    ctx.moveTo(-16,headY-14); ctx.lineTo(-14,headY-32); ctx.lineTo(-8,headY-26);
    ctx.lineTo(-4,headY-34); ctx.lineTo(2,headY-28); ctx.lineTo(6,headY-33);
    ctx.lineTo(10,headY-27); ctx.lineTo(14,headY-30); ctx.lineTo(16,headY-14);
    ctx.fill();
    ctx.fillRect(-16, headY-20, 32, 8);
    ctx.fillStyle = P.headband;
    ctx.fillRect(-20, headY-16, 40, 6);
    ctx.fillStyle = P.headbandHi;
    ctx.fillRect(-18, headY-16, 36, 2);
    ctx.fillStyle = P.headband;
    ctx.save(); ctx.translate(-20, headY-12);
    ctx.rotate(Math.sin(frame*0.08)*0.2);
    ctx.fillRect(-2, 0, 4, 16);
    ctx.save(); ctx.translate(0,14); ctx.rotate(Math.sin(frame*0.08)*0.15);
    ctx.fillRect(-2, 0, 3, 10); ctx.restore(); ctx.restore();
  } else if (charId === 'ken') {
    ctx.beginPath(); ctx.arc(0, headY-18, 18, -Math.PI, 0); ctx.fill();
    ctx.fillStyle = P.hairHi;
    ctx.beginPath(); ctx.arc(-2, headY-20, 14, -Math.PI, -0.2); ctx.fill();
    const sw = Math.sin(frame*0.07)*3;
    ctx.fillStyle = P.hair;
    ctx.beginPath();
    ctx.moveTo(10,headY-24); ctx.quadraticCurveTo(24+sw,headY-14,20+sw,headY);
    ctx.quadraticCurveTo(18+sw,headY+6,14,headY+2); ctx.lineTo(12,headY-18);
    ctx.fill();
    ctx.fillStyle = P.hairHi;
    ctx.beginPath();
    ctx.moveTo(14,headY-8); ctx.quadraticCurveTo(22+sw*0.5,headY-2,18+sw,headY+8);
    ctx.lineTo(14,headY+4); ctx.fill();
  } else {
    ctx.fillRect(-16, headY-24, 32, 10);
    ctx.fillStyle = P.hairHi;
    ctx.beginPath();
    ctx.moveTo(-12,headY-24); ctx.lineTo(0,headY-18); ctx.lineTo(12,headY-24);
    ctx.lineTo(12,headY-20); ctx.lineTo(0,headY-15); ctx.lineTo(-12,headY-20);
    ctx.fill();
    [[-16,1],[16,-1]].forEach(([bx]) => {
      ctx.fillStyle = P.hair;
      ctx.beginPath(); ctx.arc(bx, headY-24, 12, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = P.bunCover;
      ctx.beginPath(); ctx.arc(bx, headY-24, 7, 0, Math.PI*2); ctx.fill();
      ctx.strokeStyle = '#DDD'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(bx, headY-31); ctx.lineTo(bx, headY-17); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(bx-7, headY-24); ctx.lineTo(bx+7, headY-24); ctx.stroke();
    });
    const rs = Math.sin(frame*0.07)*4;
    ctx.fillStyle = '#FFF';
    [-18,18].forEach(rx => {
      ctx.save(); ctx.translate(rx, headY-34);
      ctx.rotate(Math.sin(frame*0.06)*0.12*(rx>0?-1:1));
      ctx.fillRect(-2,0,4,14);
      ctx.save(); ctx.translate(rs*0.2*(rx>0?-1:1),12);
      ctx.fillRect(-2,0,3,12); ctx.restore(); ctx.restore();
    });
  }

  // === FACE ===
  if (hurt) {
    const hi = hurtImpact;
    // White flash overlay on face at moment of impact
    if (frame < 2) {
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath(); ctx.arc(0, headY-headR+3, headR, 0, Math.PI*2); ctx.fill();
    }
    if (isBlock) {
      // Blocking face: squinting, gritting teeth
      ctx.fillStyle = '#FFF';
      ctx.fillRect(-9, headY-14, 6, 2 + hi*2); // narrow eyes
      ctx.fillRect(3, headY-14, 6, 2 + hi*2);
      ctx.fillStyle = '#000';
      ctx.fillRect(-8, headY-13, 4, 1.5); ctx.fillRect(4, headY-13, 4, 1.5);
      // Gritted teeth
      ctx.fillStyle = '#FFF'; ctx.fillRect(-5, headY-3, 10, 4);
      ctx.strokeStyle = '#888'; ctx.lineWidth = 0.8;
      for (let i = -4; i <= 4; i += 2) {
        ctx.beginPath(); ctx.moveTo(i, headY-3); ctx.lineTo(i, headY+1); ctx.stroke();
      }
    } else {
      // HITSTUN face: much more dramatic on impact
      // Eyes: spiral/X on impact, squinting during recovery
      if (hi > 0.5) {
        // Spiral eyes on big impact
        ctx.strokeStyle = '#222'; ctx.lineWidth = 2;
        [-6, 6].forEach(ox => {
          ctx.beginPath();
          for (let a = 0; a < Math.PI * 3; a += 0.3) {
            const r = a * 1.2;
            const px = ox + Math.cos(a + frame * 0.15) * r;
            const py = headY - 13 + Math.sin(a + frame * 0.15) * r;
            if (a === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
          }
          ctx.stroke();
        });
      } else {
        // X eyes during recovery
        ctx.strokeStyle = '#222'; ctx.lineWidth = 2.5;
        [-6, 6].forEach(ox => {
          ctx.beginPath(); ctx.moveTo(ox-3,headY-16); ctx.lineTo(ox+3,headY-10); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(ox+3,headY-16); ctx.lineTo(ox-3,headY-10); ctx.stroke();
        });
      }
      // Mouth: huge on impact, shrinks during recovery
      const mouthW = 4 + 5 * hi, mouthH = 3 + 5 * hi;
      ctx.fillStyle = '#411';
      ctx.beginPath(); ctx.ellipse(1 + hi*3, headY - 1, mouthW, mouthH, 0.1, 0, Math.PI*2); ctx.fill();
      // Teeth flying out on big hits
      if (hi > 0.7) {
        ctx.fillStyle = '#FFF';
        ctx.fillRect(mouthW + 3, headY - 5 - frame*0.5, 3, 3);
        ctx.fillRect(mouthW + 6, headY - 2 - frame*0.3, 2, 3);
      } else if (hi > 0.3) {
        ctx.fillStyle = '#FFF';
        ctx.fillRect(-mouthW + 1, headY - 3, mouthW*2 - 2, 2); // top teeth
      }
      // Tongue visible on big impacts
      if (hi > 0.5) {
        ctx.fillStyle = '#E55';
        ctx.beginPath(); ctx.ellipse(2 + hi*2, headY + 2, 3, 2.5, 0.2, 0, Math.PI); ctx.fill();
      }
      // Saliva/spit droplets
      if (hi > 0.4) {
        ctx.fillStyle = 'rgba(200,220,255,0.7)';
        const spitX = 10 + frame * 1.5, spitY = headY - 2 + frame * 0.3;
        ctx.beginPath(); ctx.arc(spitX, spitY, 2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(spitX + 4, spitY - 3, 1.5, 0, Math.PI*2); ctx.fill();
      }
    }
    // Sweat drops (both block and hitstun)
    ctx.fillStyle = '#88CCFF';
    const swX = -14 + Math.sin(frame*0.1)*2;
    ctx.beginPath(); ctx.moveTo(swX,headY-12); ctx.lineTo(swX-2,headY-6); ctx.lineTo(swX+2,headY-6); ctx.fill();
    // Extra sweat on heavy hits
    if (hi > 0.3) {
      const sw2 = 12 + Math.cos(frame*0.12)*3;
      ctx.beginPath(); ctx.moveTo(sw2, headY-16); ctx.lineTo(sw2-2, headY-10); ctx.lineTo(sw2+2, headY-10); ctx.fill();
    }
  } else {
    // Eyes — more expressive based on state
    const eyeSquint = attacking && atkPhase === 1 ? 0.7 : 1.0;
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.ellipse(-6, headY-13, 5, 4.5 * eyeSquint, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(6, headY-13, 5, 4.5 * eyeSquint, 0, 0, Math.PI*2); ctx.fill();
    const ic = isChunLi ? '#664422' : charId==='ken' ? '#224488' : '#332211';
    // Iris tracks opponent direction during attacks
    const irisOff = attacking ? 1.5 : 0;
    ctx.fillStyle = ic;
    ctx.beginPath(); ctx.arc(-5 + irisOff, headY-12, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7 + irisOff, headY-12, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-5 + irisOff, headY-12, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(7 + irisOff, headY-12, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.fillRect(-6, headY-14, 2, 2); ctx.fillRect(6, headY-14, 2, 2);

    // Eyebrows — angle down aggressively during attacks
    const browAnger = attacking ? 0.15 : 0;
    if (charId === 'ryu') {
      ctx.fillStyle = P.hair;
      ctx.save(); ctx.translate(-6, headY-18); ctx.rotate(-browAnger);
      ctx.fillRect(-5, 0, 10, 3.5); ctx.restore();
      ctx.save(); ctx.translate(6, headY-18); ctx.rotate(browAnger);
      ctx.fillRect(-5, 0, 10, 3.5); ctx.restore();
    } else if (charId === 'ken') {
      ctx.fillStyle = P.hair;
      ctx.save(); ctx.translate(-6, headY-18); ctx.rotate(-browAnger);
      ctx.fillRect(-5, 0, 10, 3); ctx.restore();
      ctx.save(); ctx.translate(6, headY-18); ctx.rotate(browAnger);
      ctx.fillRect(-5, 0, 10, 3); ctx.restore();
    } else {
      ctx.strokeStyle = P.hair; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(-6, headY-21, 7, 0.3, Math.PI-0.3); ctx.stroke();
      ctx.beginPath(); ctx.arc(6, headY-21, 7, 0.3, Math.PI-0.3); ctx.stroke();
    }

    ctx.fillStyle = P.skinSh;
    ctx.beginPath(); ctx.moveTo(-1,headY-8); ctx.lineTo(0,headY-4); ctx.lineTo(1,headY-8); ctx.fill();

    // Mouth — MUCH more expressive
    if (isWin) {
      ctx.fillStyle = '#FFF';
      ctx.beginPath(); ctx.ellipse(0, headY-1, 7, 4, 0, 0, Math.PI); ctx.fill();
      ctx.strokeStyle = '#A55'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.ellipse(0, headY-1, 7, 4, 0, 0, Math.PI); ctx.stroke();
    } else if (attacking) {
      if (atkPhase === 0) {
        // Wind-up: teeth gritted
        ctx.fillStyle = '#611'; ctx.fillRect(-5, headY-3, 10, 4);
        ctx.fillStyle = '#FFF'; ctx.fillRect(-4, headY-3, 8, 2);
        ctx.fillStyle = '#FFF'; ctx.fillRect(-4, headY-1, 8, 1);
      } else if (atkPhase === 1) {
        // STRIKE: wide open mouth yelling — bigger for heavier attacks
        const mw = atkStrength === 'H' ? 9 : atkStrength === 'M' ? 7 : 5;
        const mh = atkStrength === 'H' ? 7 : atkStrength === 'M' ? 5 : 3;
        ctx.fillStyle = '#411';
        ctx.beginPath(); ctx.ellipse(0, headY, mw, mh, 0, 0, Math.PI*2); ctx.fill();
        // Teeth
        ctx.fillStyle = '#FFF';
        ctx.fillRect(-mw+2, headY-mh+1, mw*2-4, 2); // top teeth
        if (atkStrength !== 'L') {
          ctx.fillRect(-mw+3, headY+mh-3, mw*2-6, 2); // bottom teeth for M/H
        }
        // Tongue for heavy
        if (atkStrength === 'H') {
          ctx.fillStyle = '#E55';
          ctx.beginPath(); ctx.ellipse(0, headY+2, 3, 2, 0, 0, Math.PI); ctx.fill();
        }
      } else {
        // Recovery: closed/neutral
        ctx.strokeStyle = '#855'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(-4,headY-2); ctx.quadraticCurveTo(0,headY+1,4,headY-2); ctx.stroke();
      }
    } else {
      ctx.strokeStyle = '#855'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-4,headY-2); ctx.quadraticCurveTo(0,headY,4,headY-2); ctx.stroke();
    }

    if (isChunLi) {
      ctx.fillStyle = '#FFDD00';
      ctx.beginPath(); ctx.arc(-15, headY-5, 3, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(15, headY-5, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = 'rgba(255,120,120,0.3)';
      ctx.beginPath(); ctx.ellipse(-9, headY-5, 4, 2, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(9, headY-5, 4, 2, 0, 0, Math.PI*2); ctx.fill();
    }
    if (charId === 'ken' && !attacking && !isWin) {
      ctx.fillStyle = '#FFF'; ctx.fillRect(2, headY-2, 2, 2);
    }
  }

  // === ATTACK VFX ===
  if (attacking && (isPunch || isKick) && atkPhase === 1) {
    // Speed lines trailing behind the striking limb
    ctx.save();
    ctx.globalAlpha = 0.35;
    if (isPunch) {
      const sx = 20 + armRExtend * 0.7, sy = armY;
      ctx.strokeStyle = '#FFF'; ctx.lineWidth = 1.5;
      for (let i = 0; i < 4; i++) {
        const lx = sx - 8 - i * 10, ly = sy - 8 + i * 5;
        ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx - 8 - i*3, ly); ctx.stroke();
      }
    }
    if (isKick) {
      const ky = atkStrength === 'H' ? -50 : atkStrength === 'M' ? -30 : -15;
      ctx.strokeStyle = '#FFF'; ctx.lineWidth = 1.5;
      for (let i = 0; i < 4; i++) {
        const lx = 20 + i * 6, ly = ky - 5 + i * 8;
        ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx - 12, ly + 4); ctx.stroke();
      }
    }
    ctx.restore();

    // Impact burst for heavy attacks
    if (atkStrength === 'H' && atkProg < 0.5) {
      ctx.save();
      ctx.globalAlpha = 0.5 * (1 - atkProg * 2);
      const bx = isKick ? 35 : 45 + armRExtend * 0.5;
      const by = isKick ? (atkName.includes('c.') ? -5 : -50) : armY;
      ctx.strokeStyle = '#FFDD44'; ctx.lineWidth = 2.5;
      for (let i = 0; i < 6; i++) {
        const a = i * Math.PI / 3 + frame * 0.3;
        const r1 = 8 + atkProg * 12, r2 = r1 + 10;
        ctx.beginPath();
        ctx.moveTo(bx + Math.cos(a)*r1, by + Math.sin(a)*r1);
        ctx.lineTo(bx + Math.cos(a)*r2, by + Math.sin(a)*r2);
        ctx.stroke();
      }
      ctx.restore();
    }
    // Medium attacks: motion blur lines
    if (atkStrength === 'M' && atkProg < 0.7) {
      ctx.save();
      ctx.globalAlpha = 0.25;
      ctx.strokeStyle = 'rgba(200,220,255,0.6)'; ctx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        const lx = (isPunch ? 30 : 25) + i * 7;
        const ly = (isPunch ? armY - 5 : -25) + i * 10;
        ctx.beginPath(); ctx.moveTo(lx, ly); ctx.lineTo(lx + 14, ly); ctx.stroke();
      }
      ctx.restore();
    }
  }

  ctx.restore();
  if (spinning) ctx.restore();
}


// ============================================================================
// SECTION 8: FIGHTER CLASS
// ============================================================================

class Fighter {
  constructor(charId, playerIndex, x) {
    const data = CHARACTER_DATA[charId];
    this.charId = charId;
    this.data = data;
    this.name = data.name;
    this.playerIndex = playerIndex;
    this.x = x; this.y = GROUND_Y; this.vx = 0; this.vy = 0;
    this.facing = playerIndex === 0 ? 1 : -1;
    this.health = data.stats.health; this.maxHealth = data.stats.health;
    this.superMeter = 0; this.stun = 0; this.maxStun = 800;
    this.state = FS.IDLE; this.stateFrame = 0; this.prevState = FS.IDLE;
    this.currentAttack = null; this.attackFrame = 0;
    this.attackHit = false; this.hitCount = 0; this.lastHitFrame = -100;
    this.stunTimer = 0; this.knockdownTimer = 0; this.wakeupTimer = 0;
    this.invincible = 0; this.juggleCount = 0; this.airborne = false;
    this.specialVx = 0; this.specialVy = 0; this.spinAngle = 0;
    this.breathOffset = 0; this.coyoteTimer = 0;
    this.wins = 0; this.roundWon = false;
    this.inputRef = null;
  }

  get grounded() { return this.y >= GROUND_Y; }

  resetForRound(x) {
    this.x = x; this.y = GROUND_Y; this.vx = 0; this.vy = 0;
    this.health = this.maxHealth; this.superMeter = 0; this.stun = 0;
    this.state = FS.IDLE; this.stateFrame = 0;
    this.currentAttack = null; this.stunTimer = 0;
    this.knockdownTimer = 0; this.wakeupTimer = 0;
    this.invincible = 0; this.juggleCount = 0; this.airborne = false;
    this.specialVx = 0; this.specialVy = 0; this.spinAngle = 0;
    this.roundWon = false;
    this._ghostPct = 1;
  }

  setState(ns) {
    if (this.state === ns) return;
    this.prevState = this.state; this.state = ns;
    this.stateFrame = 0;
  }

  getAttackName(btn, input) {
    const jumping = !this.grounded || this.state === FS.JUMP || this.state === FS.JUMP_FWD || this.state === FS.JUMP_BACK;
    const crouching = input.isHoldingDown();
    if (jumping) {
      if (btn === 'LP' || btn === 'MP') return 'j.LP';
      if (btn === 'HP') return 'j.HP';
      if (btn === 'LK' || btn === 'MK') return 'j.MK';
      return 'j.HK';
    }
    return (crouching ? 'c.' : 's.') + btn;
  }

  update(input, opponent, game) {
    this.stateFrame++;
    this.breathOffset = Math.sin(this.stateFrame * 0.05) * 2;
    if (this.invincible > 0) this.invincible--;

    if (this.grounded) {
      this.coyoteTimer = COYOTE_FRAMES; this.juggleCount = 0; this.airborne = false;
    } else { if (this.coyoteTimer > 0) this.coyoteTimer--; }

    // Auto-face opponent
    if (![FS.ATTACK,FS.SPECIAL,FS.SUPER,FS.HITSTUN,FS.BLOCKSTUN,FS.KNOCKDOWN].includes(this.state)) {
      if (opponent) this.facing = this.x < opponent.x ? 1 : -1;
    }
    input.facing = this.facing;

    if (this.stun > 0 && this.state === FS.IDLE) this.stun = Math.max(0, this.stun - 2);

    switch (this.state) {
      case FS.IDLE: case FS.WALK_FWD: case FS.WALK_BACK:
        this._groundState(input, game); break;
      case FS.CROUCH:
        this._crouchState(input, game); break;
      case FS.JUMP_SQUAT:
        if (this.stateFrame >= JUMP_SQUAT) {
          this.vy = this.data.stats.jumpForce;
          this.y -= 1; // Lift off ground so !grounded allows physics to apply vy
          if (input.isHoldingFwd()) { this.vx = this.data.stats.jumpFwdVx * this.facing; this.setState(FS.JUMP_FWD); }
          else if (input.isHoldingBack()) { this.vx = this.data.stats.jumpBackVx * this.facing; this.setState(FS.JUMP_BACK); }
          else { this.vx = 0; this.setState(FS.JUMP); }
        }
        break;
      case FS.JUMP: case FS.JUMP_FWD: case FS.JUMP_BACK:
        this._airState(input, game); break;
      case FS.ATTACK:
        this._attackState(input, game); break;
      case FS.SPECIAL:
        this._specialState(input, game); break;
      case FS.SUPER:
        this._superState(input, game); break;
      case FS.HITSTUN: case FS.LAUNCH:
        this.stunTimer--;
        if (this.stunTimer <= 0 && this.grounded) this.setState(FS.IDLE);
        break;
      case FS.BLOCKSTUN:
        this.stunTimer--;
        if (this.stunTimer <= 0) this.setState(FS.IDLE);
        break;
      case FS.KNOCKDOWN:
        this.knockdownTimer--;
        if (this.knockdownTimer <= 0 && this.grounded) {
          this.setState(FS.WAKEUP); this.wakeupTimer = this.data.stats.wakeupFrames;
        }
        break;
      case FS.WAKEUP:
        this.wakeupTimer--;
        if (this.wakeupTimer <= 0) this.setState(FS.IDLE);
        break;
    }

    this._physics();
  }

  _groundState(input, game) {
    // Super
    if (this.data.super && this.superMeter >= this.data.super.cost) {
      const sb = input.checkMotion(this.data.super.motion, this.data.super.button);
      if (sb) { this._startSuper(game); return; }
    }
    // Specials (DP first for priority)
    for (const sn of ['shoryuken','hadouken','tatsumaki','kikoken','spinningBirdKick','lightningLegs']) {
      const sp = this.data.specials[sn];
      if (!sp) continue;
      const btn = input.checkMotion(sp.motion, sp.button);
      if (btn) { this._startSpecial(sn, btn, game); return; }
    }
    // Normals
    const btn = input.getButtonPress();
    if (btn) {
      const an = this.getAttackName(btn, input);
      const ad = this.data.normals[an];
      if (ad) { this._startAttack(an, ad); return; }
    }
    // Jump
    if (input.rawUp && this.coyoteTimer > 0) { this.setState(FS.JUMP_SQUAT); return; }
    // Crouch
    if (input.isHoldingDown()) { this.setState(FS.CROUCH); this.vx = 0; return; }
    // Walk
    if (input.isHoldingFwd()) { this.setState(FS.WALK_FWD); this.vx = this.data.stats.walkSpeed * this.facing; }
    else if (input.isHoldingBack()) { this.setState(FS.WALK_BACK); this.vx = -this.data.stats.backSpeed * this.facing; }
    else { this.setState(FS.IDLE); this.vx = 0; }
  }

  _crouchState(input, game) {
    this.vx = 0;
    if (this.data.super && this.superMeter >= this.data.super.cost) {
      const sb = input.checkMotion(this.data.super.motion, this.data.super.button);
      if (sb) { this._startSuper(game); return; }
    }
    for (const sn of ['shoryuken','hadouken','tatsumaki','kikoken','spinningBirdKick','lightningLegs']) {
      const sp = this.data.specials[sn]; if (!sp) continue;
      const btn = input.checkMotion(sp.motion, sp.button);
      if (btn) { this._startSpecial(sn, btn, game); return; }
    }
    const btn = input.getButtonPress();
    if (btn) {
      const an = this.getAttackName(btn, input);
      const ad = this.data.normals[an];
      if (ad) { this._startAttack(an, ad); return; }
    }
    if (!input.isHoldingDown()) { this.setState(FS.IDLE); return; }
    if (input.rawUp) this.setState(FS.JUMP_SQUAT);
  }

  _airState(input, game) {
    const btn = input.getButtonPress();
    if (btn && !this.currentAttack) {
      const an = this.getAttackName(btn, input);
      const ad = this.data.normals[an];
      if (ad) this._startAttack(an, ad);
    }
    if (!this.currentAttack) {
      for (const sn of ['tatsumaki','spinningBirdKick']) {
        const sp = this.data.specials[sn]; if (!sp) continue;
        const btn2 = input.checkMotion(sp.motion, sp.button);
        if (btn2) { this._startSpecial(sn, btn2, game); return; }
      }
    }
    if (this.state !== FS.ATTACK && this.state !== FS.SPECIAL) {
      if (input.isHoldingFwd()) this.vx += this.facing * 0.15;
      else if (input.isHoldingBack()) this.vx -= this.facing * 0.15;
    }
  }

  _attackState(input, game) {
    this.attackFrame++;
    const atk = this.currentAttack;
    if (!atk) { this.setState(FS.IDLE); return; }
    const total = atk.startup + atk.active + atk.recovery;

    // Cancel window
    if (this.attackHit && this.attackFrame > atk.startup && this.attackFrame < total) {
      if (atk.cancelInto && atk.cancelInto.includes('special')) {
        for (const sn of ['shoryuken','hadouken','tatsumaki','kikoken','spinningBirdKick','lightningLegs']) {
          const sp = this.data.specials[sn]; if (!sp) continue;
          const btn = input.checkMotion(sp.motion, sp.button);
          if (btn) { this._startSpecial(sn, btn, game); return; }
        }
      }
      if (atk.cancelInto && atk.cancelInto.includes('super') && this.data.super && this.superMeter >= this.data.super.cost) {
        const sb = input.checkMotion(this.data.super.motion, this.data.super.button);
        if (sb) { this._startSuper(game); return; }
      }
      if (atk.chainInto && atk.chainInto.length) {
        const btn = input.getButtonPress();
        if (btn) {
          const an = this.getAttackName(btn, input);
          if (atk.chainInto.includes(an)) {
            const ad = this.data.normals[an];
            if (ad) { this._startAttack(an, ad); return; }
          }
        }
      }
    }

    if (this.attackFrame >= total) {
      this.currentAttack = null;
      this.setState(this.grounded ? FS.IDLE : FS.JUMP);
    }
  }

  _specialState(input, game) {
    this.attackFrame++;
    const atk = this.currentAttack;
    if (!atk) { this.setState(FS.IDLE); return; }
    if (atk.spinning) this.spinAngle += 0.4;
    if (atk.fire && this.attackFrame <= atk.active && this.attackFrame % 2 === 0) {
      game.particles.spawnFireTrail(this.x, this.y - 40, this.facing);
    }
    const total = atk.startup + atk.active + atk.recovery;
    // Super cancel
    if (this.attackHit && this.attackFrame > atk.startup && this.data.super && this.superMeter >= this.data.super.cost) {
      const sb = input.checkMotion(this.data.super.motion, this.data.super.button);
      if (sb) { this._startSuper(game); return; }
    }
    if (this.attackFrame >= total) {
      this.currentAttack = null; this.specialVx = 0; this.specialVy = 0;
      this.setState(this.grounded ? FS.IDLE : FS.JUMP);
    }
  }

  _superState(input, game) {
    this.attackFrame++;
    const atk = this.currentAttack;
    if (!atk) { this.setState(FS.IDLE); return; }
    if (atk.fire && this.attackFrame % 2 === 0 && this.attackFrame <= atk.active + atk.startup) {
      game.particles.spawnFireTrail(this.x, this.y - 50, this.facing);
      game.particles.spawnFireTrail(this.x + this.facing*10, this.y - 60, this.facing);
    }
    const total = atk.startup + atk.active + atk.recovery;
    if (this.attackFrame >= total) {
      this.currentAttack = null; this.specialVx = 0; this.specialVy = 0;
      this.setState(this.grounded ? FS.IDLE : FS.JUMP);
    }
  }

  _startAttack(name, atkData) {
    this.setState(FS.ATTACK);
    this.currentAttack = {...atkData, name};
    this.attackFrame = 0; this.attackHit = false;
    this.hitCount = 0; this.lastHitFrame = -100;
  }

  _startSpecial(sn, btnStr, game) {
    const sp = this.data.specials[sn];
    let version = sp.versions[btnStr];
    if (!version || (version.exCost && this.superMeter < version.exCost)) {
      const fb = sp.button === 'kick' ? (btnStr.startsWith('L')?'LK':btnStr.startsWith('M')?'MK':'HK') :
                                         (btnStr.startsWith('L')?'LP':btnStr.startsWith('M')?'MP':'HP');
      version = sp.versions[fb];
      if (!version) return;
    } else if (version.exCost) {
      this.superMeter -= version.exCost;
    }

    this.setState(FS.SPECIAL);
    this.currentAttack = {...version, name:sp.name, specialName:sn, btnStrength:btnStr, isSpecial:true};
    this.attackFrame = 0; this.attackHit = false;
    this.hitCount = 0; this.lastHitFrame = -100;
    this.superMeter = Math.min(MAX_SUPER_METER, this.superMeter + METER_GAIN_SPECIAL);

    if (version.projectile) game.spawnProjectile(this, version);
    if (version.vx !== undefined) {
      this.specialVx = version.vx * this.facing;
      if (version.vy !== undefined) { this.vy = version.vy; this.specialVy = version.vy; }
    }
    if (version.invincible) this.invincible = version.invincible;

    const voiceMap = { hadouken:'hadouken', shoryuken:'shoryuken', tatsumaki:'tatsumaki',
      kikoken:'kikoken', lightningLegs:'hyakuretsu', spinningBirdKick:'tatsumaki' };
    if (voiceMap[sn]) game.audio.playVoice(voiceMap[sn]);
  }

  _startSuper(game) {
    const sd = this.data.super;
    this.superMeter -= sd.cost;
    this.setState(FS.SUPER);
    this.currentAttack = {...sd, name:sd.name, isSuper:true};
    this.attackFrame = 0; this.attackHit = false;
    this.hitCount = 0; this.lastHitFrame = -100;
    game.startSuperFlash(this);
    if (sd.vx !== undefined) { this.specialVx = sd.vx * this.facing; if (sd.vy !== undefined) this.vy = sd.vy; }
    if (sd.projectile) game.spawnProjectile(this, sd);
    if (sd.invincible) this.invincible = sd.invincible;
    const vm = { 'Shinku Hadouken':'shinku', 'Shinryuken':'shinryu', 'Hosenka':'hosenka' };
    if (vm[sd.name]) game.audio.playVoice(vm[sd.name]);
  }

  _physics() {
    if (this.state === FS.SPECIAL && this.currentAttack) {
      if (this.currentAttack.spinning) {
        this.x += this.specialVx || (this.currentAttack.vx * this.facing);
        if (!this.grounded || this.currentAttack.vy) this.vy += GRAVITY * (this.data.stats.weight||1);
      } else if (this.currentAttack.juggle) {
        this.x += this.specialVx; this.vy += GRAVITY * 0.8;
      } else { this.x += this.vx; }
    } else if (this.state === FS.SUPER && this.currentAttack) {
      if (this.currentAttack.vx !== undefined) { this.x += this.specialVx; this.vy += GRAVITY * 0.7; }
      else this.x += this.vx;
    } else { this.x += this.vx; }

    if (!this.grounded) { this.vy += GRAVITY * (this.data.stats.weight||1); this.y += this.vy; }

    if (this.y >= GROUND_Y) {
      this.y = GROUND_Y;
      if (this.vy > 0) {
        this.vy = 0;
        if ([FS.JUMP,FS.JUMP_FWD,FS.JUMP_BACK].includes(this.state)) { this.vx = 0; this.setState(FS.IDLE); }
        if (this.state === FS.HITSTUN || this.state === FS.LAUNCH) { this.setState(FS.KNOCKDOWN); this.knockdownTimer = 30; }
        if (this.state === FS.SPECIAL && this.specialVy) { this.specialVx = 0; this.specialVy = 0; }
        if (this.state === FS.SUPER && this.currentAttack && this.currentAttack.vy !== undefined) this.specialVx = 0;
      }
    }

    if ([FS.HITSTUN,FS.BLOCKSTUN,FS.KNOCKDOWN].includes(this.state)) {
      this.vx *= 0.9; if (Math.abs(this.vx) < 0.1) this.vx = 0;
    }

    this.x = Math.max(STAGE_LEFT + 20, Math.min(STAGE_RIGHT - 20, this.x));
  }

  getAttackHitbox() {
    if (!this.currentAttack) return null;
    const atk = this.currentAttack;
    if (this.attackFrame < atk.startup || this.attackFrame >= atk.startup + atk.active) return null;
    if (atk.projectile) return null;
    const hb = atk.hitbox;
    if (!hb) return null;
    return { x: this.x + hb.x * this.facing - (this.facing === -1 ? hb.w : 0), y: this.y + hb.y, w: hb.w, h: hb.h };
  }

  getHurtbox() {
    const hb = this.data.hurtbox;
    let yO = 0, hM = 0;
    if (this.state === FS.CROUCH) { yO = 20; hM = -20; }
    return { x: this.x + hb.x, y: this.y + hb.y + yO, w: hb.w, h: hb.h + hM };
  }

  getPushbox() {
    const pb = this.data.pushbox;
    return { x: this.x + pb.x, y: this.y + pb.y, w: pb.w, h: pb.h };
  }

  takeDamage(dmg, hitstun, pushback, attacker, knockdown, launcher, isSuper) {
    this.health = Math.max(0, this.health - dmg);
    this.superMeter = Math.min(MAX_SUPER_METER, this.superMeter + METER_GAIN_HURT);
    if (knockdown || this.health <= 0) {
      this.setState(FS.KNOCKDOWN);
      this.knockdownTimer = this.health <= 0 ? 120 : 40;
      this.vx = -this.facing * pushback * 0.5; this.vy = -6;
    } else if (launcher && this.grounded) {
      this.setState(FS.LAUNCH); this.stunTimer = hitstun + 10;
      this.vy = -10; this.vx = -this.facing * pushback * 0.3; this.juggleCount = 0;
    } else if (!this.grounded) {
      this.setState(FS.HITSTUN); this.stunTimer = hitstun;
      this.vx = -this.facing * pushback * 0.6; this.vy = Math.min(this.vy, -3);
      this.juggleCount++;
    } else {
      this.setState(FS.HITSTUN); this.stunTimer = hitstun;
      this.vx = -this.facing * pushback;
    }
  }

  takeBlock(blockstun, pushback) {
    this.setState(FS.BLOCKSTUN); this.stunTimer = blockstun;
    this.vx = -this.facing * pushback * 0.6;
    this.superMeter = Math.min(MAX_SUPER_METER, this.superMeter + METER_GAIN_BLOCKED);
  }

  isBlocking(attackType) {
    if ([FS.HITSTUN,FS.KNOCKDOWN,FS.ATTACK,FS.SPECIAL,FS.SUPER].includes(this.state)) return false;
    if (!this.grounded) return false;
    const holdBack = (this.facing === 1 && this.inputRef && this.inputRef.rawLeft) ||
                     (this.facing === -1 && this.inputRef && this.inputRef.rawRight);
    if (!holdBack) return false;
    const crouch = this.inputRef && this.inputRef.isHoldingDown();
    if (attackType === 'low' && !crouch) return false;
    if (attackType === 'overhead' && crouch) return false;
    return true;
  }

  render(ctx, showHB) {
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.scale(this.facing, 1);

    // Shadow — squashes on hit
    const shadowScale = (this.state === FS.HITSTUN && this.stateFrame < 4) ? 1.3 : 1;
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath(); ctx.ellipse(0, 0, 25*shadowScale, 6, 0, 0, Math.PI*2); ctx.fill();

    renderCharacter(ctx, this);

    // White flash overlay on the entire character at moment of heavy hit
    if (this.state === FS.HITSTUN && this.stateFrame < 2) {
      ctx.globalCompositeOperation = 'source-atop';
      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.fillRect(-40, -120, 80, 120);
      ctx.globalCompositeOperation = 'source-over';
    }

    ctx.restore();

    if (showHB) this._drawHitboxes(ctx);
  }

  _drawHitboxes(ctx) {
    const hb = this.getHurtbox();
    ctx.strokeStyle = 'rgba(0,255,0,0.6)'; ctx.lineWidth = 1;
    ctx.strokeRect(hb.x, hb.y, hb.w, hb.h);
    const pb = this.getPushbox();
    ctx.strokeStyle = 'rgba(255,255,0,0.4)'; ctx.setLineDash([4,4]);
    ctx.strokeRect(pb.x, pb.y, pb.w, pb.h); ctx.setLineDash([]);
    const ab = this.getAttackHitbox();
    if (ab) {
      ctx.strokeStyle = 'rgba(255,0,0,0.8)'; ctx.lineWidth = 2;
      ctx.strokeRect(ab.x, ab.y, ab.w, ab.h);
      ctx.fillStyle = 'rgba(255,0,0,0.15)'; ctx.fillRect(ab.x, ab.y, ab.w, ab.h);
    }
  }
}


// ============================================================================
// SECTION 9: STAGE
// ============================================================================

// Stage: renders one of three themed backgrounds picked by character.
// Each stage has its own palette, parallax layers, crowd, and ambient particles.
class Stage {
  constructor(themeId) {
    this.theme = themeId || 'castle';
    this._seed(this.theme);
  }

  setTheme(themeId) { this.theme = themeId; this._seed(themeId); }

  _seed(theme) {
    // Deterministic-ish decorations per theme
    this.petals = [];
    this.lanterns = [];
    this.crowd = [];
    this.palms = [];
    this.clouds = [];
    this.birds = [];
    this.waves = [];
    this.mountains = [];
    this.shimmer = [];

    // Shared: bobbing crowd silhouettes along the back
    for (let i = 0; i < 22; i++) {
      this.crowd.push({
        x: i * 48 + (i%3)*10,
        h: 28 + (i%4)*5,
        w: 14 + (i%3)*3,
        phase: i * 0.7,
        speed: 0.06 + (i%5)*0.01,
        hue: i % 7,
      });
    }
    // Clouds (reused by all)
    for (let i = 0; i < 6; i++) {
      this.clouds.push({ x: i*220+40, y: 40+(i%3)*30, w: 90+(i%3)*40, speed: 0.3+(i%3)*0.1 });
    }
    // Birds
    for (let i = 0; i < 5; i++) {
      this.birds.push({ x: Math.random()*CANVAS_W, y: 80+Math.random()*120, speed: 0.8+Math.random()*0.5, phase: Math.random()*Math.PI*2 });
    }

    if (theme === 'castle') {
      // Cherry blossom petals
      for (let i = 0; i < 40; i++) {
        this.petals.push({
          x: Math.random()*CANVAS_W,
          y: Math.random()*GROUND_Y,
          vx: -0.4 - Math.random()*0.6,
          vy: 0.5 + Math.random()*0.7,
          rot: Math.random()*Math.PI*2,
          rs: (Math.random()-0.5)*0.1,
          sz: 3 + Math.random()*3,
        });
      }
      // Mountain silhouettes
      for (let i = 0; i < 6; i++) {
        this.mountains.push({ x: i*220-60, h: 120+(i%3)*40, w: 260+(i%3)*40 });
      }
    } else if (theme === 'resort') {
      // Palm tree positions
      for (let i = 0; i < 5; i++) {
        this.palms.push({ x: 120+i*220, h: 200+(i%3)*30, lean: (i%2?1:-1)*0.06 });
      }
      // Ocean shimmer
      for (let i = 0; i < 40; i++) {
        this.shimmer.push({ x: Math.random()*CANVAS_W, y: 340+Math.random()*80, phase: Math.random()*Math.PI*2 });
      }
      // Waves
      for (let i = 0; i < 3; i++) {
        this.waves.push({ y: 380+i*15, phase: i*1.5, amp: 3-i*0.5 });
      }
    } else if (theme === 'wall') {
      // Red lanterns hanging
      for (let i = 0; i < 7; i++) {
        this.lanterns.push({ x: 80+i*140, y: 70+(i%2)*30, phase: i*0.8 });
      }
      // Great wall segment mountains
      for (let i = 0; i < 7; i++) {
        this.mountains.push({ x: i*180-40, h: 160+(i%3)*50, w: 220+(i%3)*30 });
      }
    }
  }

  render(ctx, frame, camX) {
    if (this.theme === 'castle') return this._renderCastle(ctx, frame, camX);
    if (this.theme === 'resort') return this._renderResort(ctx, frame, camX);
    return this._renderWall(ctx, frame, camX);
  }

  // ---------- SUZAKU CASTLE (Ryu) — pink dawn, cherry blossoms, pagoda ----------
  _renderCastle(ctx, frame, camX) {
    const p1 = camX*0.04, p2 = camX*0.12, p3 = camX*0.22, p4 = camX*0.35;

    // Sky — dawn gradient
    const sg = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    sg.addColorStop(0,    '#2B1B4E');
    sg.addColorStop(0.25, '#7A3D6E');
    sg.addColorStop(0.55, '#E08B6B');
    sg.addColorStop(0.85, '#F5C188');
    sg.addColorStop(1,    '#F9DDB0');
    ctx.fillStyle = sg; ctx.fillRect(0, 0, CANVAS_W, GROUND_Y);

    // Sun — rising, soft radial
    const sx = 780-p1, sy = 180;
    const sunG = ctx.createRadialGradient(sx, sy, 0, sx, sy, 220);
    sunG.addColorStop(0,   'rgba(255,230,180,0.9)');
    sunG.addColorStop(0.15,'rgba(255,190,140,0.6)');
    sunG.addColorStop(0.5, 'rgba(255,130,100,0.15)');
    sunG.addColorStop(1,   'rgba(255,100,80,0)');
    ctx.fillStyle = sunG; ctx.fillRect(sx-240, sy-240, 480, 480);
    ctx.fillStyle = '#FFF0D0';
    ctx.beginPath(); ctx.arc(sx, sy, 42, 0, Math.PI*2); ctx.fill();

    // Distant mountains
    ctx.fillStyle = '#4A2E4F';
    this.mountains.forEach(m => {
      const mx = m.x - p2;
      ctx.beginPath();
      ctx.moveTo(mx, GROUND_Y-30);
      ctx.lineTo(mx+m.w*0.5, GROUND_Y-30-m.h);
      ctx.lineTo(mx+m.w, GROUND_Y-30);
      ctx.closePath(); ctx.fill();
      // Snow cap
      ctx.fillStyle = 'rgba(255,220,200,0.5)';
      ctx.beginPath();
      ctx.moveTo(mx+m.w*0.5, GROUND_Y-30-m.h);
      ctx.lineTo(mx+m.w*0.42, GROUND_Y-30-m.h*0.8);
      ctx.lineTo(mx+m.w*0.58, GROUND_Y-30-m.h*0.8);
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = '#4A2E4F';
    });

    // Clouds (mid layer)
    this.clouds.forEach(c => {
      const cx = ((c.x - frame*c.speed - p2) % (CANVAS_W+200) + CANVAS_W+200) % (CANVAS_W+200) - 100;
      ctx.fillStyle = 'rgba(255,230,210,0.65)';
      ctx.beginPath();
      ctx.ellipse(cx, c.y, c.w*0.5, c.w*0.15, 0, 0, Math.PI*2);
      ctx.ellipse(cx+c.w*0.3, c.y-6, c.w*0.35, c.w*0.12, 0, 0, Math.PI*2);
      ctx.ellipse(cx-c.w*0.25, c.y+3, c.w*0.3, c.w*0.1, 0, 0, Math.PI*2);
      ctx.fill();
    });

    // Pagoda silhouette in distance
    const pgx = 200-p3, pgy = GROUND_Y-140;
    ctx.fillStyle = '#2A1836';
    // 3 roof tiers
    for (let t = 0; t < 3; t++) {
      const ty = pgy + t*30;
      const tw = 90 - t*15;
      ctx.beginPath();
      ctx.moveTo(pgx-tw/2-8, ty);
      ctx.lineTo(pgx+tw/2+8, ty);
      ctx.lineTo(pgx+tw/2-5, ty-10);
      ctx.lineTo(pgx-tw/2+5, ty-10);
      ctx.closePath(); ctx.fill();
      // body
      ctx.fillRect(pgx-tw/2+5, ty, tw-10, 25);
    }

    // Bamboo forest mid-ground (simple stripes)
    for (let i = 0; i < 16; i++) {
      const bx = (i*70 - p3) % (CANVAS_W+140) - 20;
      ctx.fillStyle = '#2A3D24';
      ctx.fillRect(bx, GROUND_Y-80, 3, 80);
      ctx.fillStyle = '#3A5530';
      ctx.fillRect(bx+1, GROUND_Y-80, 1, 80);
    }

    // Torii gate — near parallax
    const tgx = 860-p4;
    ctx.fillStyle = '#8B2020';
    ctx.fillRect(tgx-50, GROUND_Y-150, 8, 120);
    ctx.fillRect(tgx+42, GROUND_Y-150, 8, 120);
    ctx.fillRect(tgx-60, GROUND_Y-155, 120, 10); // top beam
    ctx.fillRect(tgx-52, GROUND_Y-140, 104, 6);  // secondary beam
    ctx.fillStyle = '#4A1010';
    ctx.fillRect(tgx-62, GROUND_Y-155, 122, 3); // top shadow
    // Tiny roof overhang
    ctx.fillStyle = '#6B1818';
    ctx.beginPath();
    ctx.moveTo(tgx-66, GROUND_Y-155);
    ctx.lineTo(tgx+66, GROUND_Y-155);
    ctx.lineTo(tgx+62, GROUND_Y-160);
    ctx.lineTo(tgx-62, GROUND_Y-160);
    ctx.closePath(); ctx.fill();

    // Crowd silhouettes along the back wall
    this._renderCrowd(ctx, frame, p3, '#1A0E24', '#3A1E30');

    // Ground — wooden dojo planks with warm tint
    const gg = ctx.createLinearGradient(0, GROUND_Y, 0, CANVAS_H);
    gg.addColorStop(0, '#6A3A28'); gg.addColorStop(0.3, '#4A2A1A'); gg.addColorStop(1, '#2E1A10');
    ctx.fillStyle = gg; ctx.fillRect(0, GROUND_Y, CANVAS_W, CANVAS_H-GROUND_Y);
    // Plank lines
    ctx.strokeStyle = 'rgba(30,15,5,0.5)'; ctx.lineWidth = 1;
    for (let i = 0; i < 18; i++) {
      const gx = (i*68-(p4)%68 + CANVAS_W)%(CANVAS_W+68)-30;
      ctx.beginPath(); ctx.moveTo(gx, GROUND_Y); ctx.lineTo(gx-15, CANVAS_H); ctx.stroke();
    }
    ctx.strokeStyle = 'rgba(140,90,60,0.4)';
    ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(CANVAS_W, GROUND_Y); ctx.stroke();

    // Cherry blossom petals — foreground
    this.petals.forEach(p => {
      p.x += p.vx; p.y += p.vy; p.rot += p.rs;
      if (p.y > GROUND_Y+20) { p.y = -10; p.x = Math.random()*CANVAS_W + 100; }
      if (p.x < -20) p.x = CANVAS_W + 20;
      ctx.save();
      ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = 'rgba(255,180,210,0.85)';
      ctx.beginPath();
      ctx.ellipse(0, 0, p.sz, p.sz*0.5, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,220,230,0.7)';
      ctx.fillRect(-0.5, -p.sz*0.3, 1, p.sz*0.6);
      ctx.restore();
    });
  }

  // ---------- MASTERS RESORT (Ken) — California beach sunset ----------
  _renderResort(ctx, frame, camX) {
    const p1 = camX*0.05, p2 = camX*0.15, p3 = camX*0.3, p4 = camX*0.5;

    // Sunset sky
    const sg = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    sg.addColorStop(0,    '#1D1A4A');
    sg.addColorStop(0.2,  '#5B2D7A');
    sg.addColorStop(0.45, '#D96848');
    sg.addColorStop(0.7,  '#F5A25B');
    sg.addColorStop(0.9,  '#FCD38A');
    sg.addColorStop(1,    '#7FB0D4'); // ocean horizon
    ctx.fillStyle = sg; ctx.fillRect(0, 0, CANVAS_W, GROUND_Y);

    // Setting sun — low on horizon
    const sx = 600-p1, sy = GROUND_Y-180;
    const sunG = ctx.createRadialGradient(sx, sy, 0, sx, sy, 260);
    sunG.addColorStop(0,   'rgba(255,240,200,1)');
    sunG.addColorStop(0.1, 'rgba(255,210,150,0.85)');
    sunG.addColorStop(0.4, 'rgba(255,140,90,0.3)');
    sunG.addColorStop(1,   'rgba(200,60,40,0)');
    ctx.fillStyle = sunG; ctx.fillRect(sx-280, sy-280, 560, 560);
    ctx.fillStyle = '#FFEFC8';
    ctx.beginPath(); ctx.arc(sx, sy, 50, 0, Math.PI*2); ctx.fill();

    // Clouds — warm sunset tint
    this.clouds.forEach(c => {
      const cx = ((c.x - frame*c.speed - p1) % (CANVAS_W+200) + CANVAS_W+200) % (CANVAS_W+200) - 100;
      ctx.fillStyle = 'rgba(255,150,110,0.55)';
      ctx.beginPath();
      ctx.ellipse(cx, c.y, c.w*0.55, c.w*0.14, 0, 0, Math.PI*2);
      ctx.ellipse(cx+c.w*0.3, c.y-5, c.w*0.38, c.w*0.11, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,220,180,0.6)';
      ctx.beginPath();
      ctx.ellipse(cx, c.y-3, c.w*0.5, c.w*0.08, 0, 0, Math.PI*2);
      ctx.fill();
    });

    // Ocean band — slightly below horizon, with shimmer + waves
    const oceanTop = GROUND_Y - 120;
    const og = ctx.createLinearGradient(0, oceanTop, 0, GROUND_Y);
    og.addColorStop(0, '#2E4A6B');
    og.addColorStop(0.5, '#3E6A8B');
    og.addColorStop(1, '#5A8FA8');
    ctx.fillStyle = og; ctx.fillRect(0, oceanTop, CANVAS_W, 120);

    // Sun reflection on water
    ctx.fillStyle = 'rgba(255,220,160,0.35)';
    for (let i = 0; i < 12; i++) {
      const ry = oceanTop + i*10;
      const w = 100 + i*8 + Math.sin(frame*0.05+i)*10;
      ctx.fillRect(sx - w/2, ry, w, 3);
    }

    // Ocean shimmer sparkles
    this.shimmer.forEach(s => {
      const tw = Math.sin(frame*0.15 + s.phase);
      if (tw > 0.5) {
        ctx.fillStyle = `rgba(255,240,200,${tw*0.8})`;
        ctx.fillRect(s.x - p2*0.3, s.y, 2, 2);
      }
    });

    // Wave lines
    this.waves.forEach(w => {
      ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let x = 0; x < CANVAS_W; x += 6) {
        const y = w.y + Math.sin(x*0.04 + frame*0.06 + w.phase)*w.amp;
        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    });

    // Seagulls (use shared birds)
    this.birds.forEach(b => {
      b.x = ((b.x + b.speed) % (CANVAS_W+80));
      const bx = b.x - p2*0.2;
      const wing = Math.sin(frame*0.3 + b.phase) > 0 ? 4 : -2;
      ctx.strokeStyle = 'rgba(40,20,30,0.7)'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(bx-6, b.y+wing); ctx.lineTo(bx, b.y); ctx.lineTo(bx+6, b.y+wing);
      ctx.stroke();
    });

    // Palm trees — mid parallax
    this.palms.forEach(pa => {
      const px = pa.x - p3;
      // trunk
      ctx.fillStyle = '#2A1810';
      for (let i = 0; i < 12; i++) {
        const yy = GROUND_Y - 30 - i*(pa.h/12);
        const xx = px + Math.sin(i*0.3)*pa.lean*8 + i*pa.lean*2;
        ctx.fillRect(xx-4, yy, 8, pa.h/12+2);
      }
      // trunk rings
      ctx.fillStyle = '#1A0E08';
      for (let i = 0; i < 6; i++) {
        ctx.fillRect(px-4 + i*pa.lean*4, GROUND_Y-30-i*(pa.h/6), 8, 2);
      }
      // fronds (6 per tree, flopping in breeze)
      const top = GROUND_Y - 30 - pa.h;
      for (let f = 0; f < 7; f++) {
        const fa = (f/7)*Math.PI*2 + Math.sin(frame*0.02+f)*0.08;
        ctx.strokeStyle = '#1A3820'; ctx.lineWidth = 5;
        ctx.beginPath();
        ctx.moveTo(px, top);
        const fx = px + Math.cos(fa)*55;
        const fy = top + Math.sin(fa)*35 + 15;
        ctx.quadraticCurveTo(px+Math.cos(fa)*25, top-8, fx, fy);
        ctx.stroke();
        // Frond detail
        ctx.strokeStyle = '#2A5830'; ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(px, top);
        ctx.quadraticCurveTo(px+Math.cos(fa)*25, top-8, fx, fy);
        ctx.stroke();
      }
      // coconuts
      ctx.fillStyle = '#3A1C0C';
      ctx.beginPath(); ctx.arc(px-3, top+5, 4, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(px+4, top+7, 4, 0, Math.PI*2); ctx.fill();
    });

    // Crowd on boardwalk
    this._renderCrowd(ctx, frame, p3, '#2A1020', '#5A3040');

    // Sand ground
    const gg = ctx.createLinearGradient(0, GROUND_Y, 0, CANVAS_H);
    gg.addColorStop(0, '#E6C290');
    gg.addColorStop(0.3, '#C89D6A');
    gg.addColorStop(1, '#8E6A3E');
    ctx.fillStyle = gg; ctx.fillRect(0, GROUND_Y, CANVAS_W, CANVAS_H-GROUND_Y);
    // Boardwalk edge
    ctx.fillStyle = '#6B4728';
    ctx.fillRect(0, GROUND_Y-4, CANVAS_W, 4);
    ctx.fillStyle = '#8B6038';
    ctx.fillRect(0, GROUND_Y-8, CANVAS_W, 4);
    // Sand speckle
    ctx.fillStyle = 'rgba(255,240,200,0.4)';
    for (let i = 0; i < 50; i++) {
      const sx2 = (i*37 - p4) % (CANVAS_W+60) - 30;
      const sy2 = GROUND_Y + 8 + (i%6)*14;
      ctx.fillRect(sx2, sy2, 2, 2);
    }
    // Plank shadows
    ctx.strokeStyle = 'rgba(80,45,20,0.4)'; ctx.lineWidth = 1;
    for (let i = 0; i < 20; i++) {
      const gx = (i*60-p4%60 + CANVAS_W)%(CANVAS_W+60)-30;
      ctx.beginPath(); ctx.moveTo(gx, GROUND_Y); ctx.lineTo(gx-20, CANVAS_H); ctx.stroke();
    }
  }

  // ---------- GREAT WALL (Chun-Li) — golden hour, red lanterns ----------
  _renderWall(ctx, frame, camX) {
    const p1 = camX*0.05, p2 = camX*0.14, p3 = camX*0.25, p4 = camX*0.4;

    // Golden hour sky
    const sg = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
    sg.addColorStop(0,    '#3A2060');
    sg.addColorStop(0.3,  '#8C4A5A');
    sg.addColorStop(0.6,  '#E89248');
    sg.addColorStop(0.85, '#F5C970');
    sg.addColorStop(1,    '#F0D490');
    ctx.fillStyle = sg; ctx.fillRect(0, 0, CANVAS_W, GROUND_Y);

    // Sun — high golden
    const sx = 200-p1, sy = 140;
    const sunG = ctx.createRadialGradient(sx, sy, 0, sx, sy, 240);
    sunG.addColorStop(0,   'rgba(255,245,210,1)');
    sunG.addColorStop(0.15,'rgba(255,215,140,0.7)');
    sunG.addColorStop(0.5, 'rgba(255,140,80,0.2)');
    sunG.addColorStop(1,   'rgba(180,60,40,0)');
    ctx.fillStyle = sunG; ctx.fillRect(sx-260, sy-260, 520, 520);
    ctx.fillStyle = '#FFF5D5';
    ctx.beginPath(); ctx.arc(sx, sy, 46, 0, Math.PI*2); ctx.fill();

    // Clouds streaked across
    this.clouds.forEach(c => {
      const cx = ((c.x - frame*c.speed - p1) % (CANVAS_W+200) + CANVAS_W+200) % (CANVAS_W+200) - 100;
      ctx.fillStyle = 'rgba(255,220,180,0.55)';
      ctx.beginPath();
      ctx.ellipse(cx, c.y, c.w*0.6, c.w*0.12, 0, 0, Math.PI*2);
      ctx.ellipse(cx+c.w*0.25, c.y-3, c.w*0.4, c.w*0.09, 0, 0, Math.PI*2);
      ctx.fill();
    });

    // Far mountains (layered — 3 passes for depth)
    ctx.fillStyle = '#5A3A5A';
    this.mountains.forEach((m, i) => {
      if (i >= 4) return;
      const mx = m.x - p2;
      ctx.beginPath();
      ctx.moveTo(mx, GROUND_Y);
      ctx.lineTo(mx+m.w*0.4, GROUND_Y-m.h*0.9);
      ctx.lineTo(mx+m.w*0.55, GROUND_Y-m.h*0.75);
      ctx.lineTo(mx+m.w, GROUND_Y);
      ctx.closePath(); ctx.fill();
    });
    ctx.fillStyle = '#3A2848';
    this.mountains.forEach((m, i) => {
      if (i < 2) return;
      const mx = m.x*1.3 - p3;
      ctx.beginPath();
      ctx.moveTo(mx, GROUND_Y);
      ctx.lineTo(mx+m.w*0.45, GROUND_Y-m.h);
      ctx.lineTo(mx+m.w, GROUND_Y);
      ctx.closePath(); ctx.fill();
    });

    // Cranes flying
    this.birds.forEach(b => {
      b.x = ((b.x + b.speed) % (CANVAS_W+80));
      const bx = b.x - p2*0.2;
      const wing = Math.sin(frame*0.2 + b.phase);
      ctx.strokeStyle = 'rgba(50,20,30,0.75)'; ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(bx-8, b.y+wing*3); ctx.lineTo(bx-2, b.y);
      ctx.lineTo(bx+2, b.y); ctx.lineTo(bx+8, b.y+wing*3);
      ctx.stroke();
    });

    // Great Wall segment — zigzagging along mountain ridge
    ctx.fillStyle = '#6A5040';
    ctx.strokeStyle = '#3A2820'; ctx.lineWidth = 2;
    const wallY = GROUND_Y - 80;
    for (let i = 0; i < 10; i++) {
      const wx = i*120 - p3 - 40;
      const wh = 32 + (i%3)*6;
      ctx.fillRect(wx, wallY-wh, 100, wh);
      // Battlements
      for (let b = 0; b < 5; b++) {
        ctx.fillRect(wx + b*20, wallY-wh-6, 12, 6);
      }
      ctx.strokeRect(wx, wallY-wh, 100, wh);
    }

    // Watchtowers on wall
    for (let i = 0; i < 3; i++) {
      const tx = i*380+140 - p3;
      ctx.fillStyle = '#4A3028';
      ctx.fillRect(tx-20, wallY-100, 40, 100);
      ctx.fillStyle = '#5A3830';
      // Pagoda roof
      ctx.beginPath();
      ctx.moveTo(tx-30, wallY-100);
      ctx.lineTo(tx+30, wallY-100);
      ctx.lineTo(tx+20, wallY-115);
      ctx.lineTo(tx-20, wallY-115);
      ctx.closePath(); ctx.fill();
      // Little window
      ctx.fillStyle = '#FFAA44';
      ctx.fillRect(tx-5, wallY-70, 10, 15);
    }

    // Red lanterns — foreground, swaying
    this.lanterns.forEach(l => {
      const lx = l.x - p4;
      const sway = Math.sin(frame*0.04 + l.phase)*8;
      // Cord
      ctx.strokeStyle = '#1A0E08'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(l.x-p4, 0); ctx.lineTo(lx+sway, l.y); ctx.stroke();
      // Lantern body
      ctx.save();
      ctx.translate(lx+sway, l.y);
      const glow = ctx.createRadialGradient(0, 0, 0, 0, 0, 30);
      glow.addColorStop(0, 'rgba(255,180,80,0.6)');
      glow.addColorStop(1, 'rgba(255,60,40,0)');
      ctx.fillStyle = glow;
      ctx.fillRect(-35, -35, 70, 70);
      ctx.fillStyle = '#C82020';
      ctx.beginPath(); ctx.ellipse(0, 0, 14, 18, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#8A1010';
      ctx.fillRect(-10, -20, 20, 3);
      ctx.fillRect(-10, 17, 20, 3);
      ctx.fillStyle = '#FFCC44';
      ctx.fillRect(-8, -2, 16, 4); // character stripe
      ctx.restore();
    });

    // Crowd silhouettes
    this._renderCrowd(ctx, frame, p3, '#2A1020', '#5A2A30');

    // Stone wall ground — classic arena
    const gg = ctx.createLinearGradient(0, GROUND_Y, 0, CANVAS_H);
    gg.addColorStop(0, '#8A7A68'); gg.addColorStop(0.3, '#6A5848'); gg.addColorStop(1, '#3E2E22');
    ctx.fillStyle = gg; ctx.fillRect(0, GROUND_Y, CANVAS_W, CANVAS_H-GROUND_Y);
    // Stone tile pattern
    ctx.strokeStyle = 'rgba(50,35,25,0.5)'; ctx.lineWidth = 1;
    for (let row = 0; row < 3; row++) {
      const y = GROUND_Y + row*32;
      const off = row*24;
      for (let i = -2; i < 22; i++) {
        const gx = (i*48+off - p4%48 + CANVAS_W)%(CANVAS_W+48)-24;
        ctx.strokeRect(gx, y, 48, 32);
      }
    }
    ctx.strokeStyle = 'rgba(180,150,120,0.5)';
    ctx.beginPath(); ctx.moveTo(0, GROUND_Y); ctx.lineTo(CANVAS_W, GROUND_Y); ctx.stroke();
  }

  _renderCrowd(ctx, frame, parallax, darkCol, hlCol) {
    // Bobbing silhouettes sitting on a ledge in the mid-back
    const baseY = GROUND_Y - 60;
    this.crowd.forEach((c, i) => {
      const bob = Math.sin(frame*c.speed + c.phase) * 2;
      const cx = ((c.x - parallax*0.6) % (CANVAS_W+60) + CANVAS_W+60) % (CANVAS_W+60) - 30;
      const cy = baseY + bob;
      // body
      ctx.fillStyle = darkCol;
      ctx.fillRect(cx-c.w/2, cy-c.h, c.w, c.h);
      // head
      ctx.beginPath(); ctx.arc(cx, cy-c.h-3, c.w*0.4, 0, Math.PI*2); ctx.fill();
      // cheer — arms up on punch frame
      if ((frame + i*7) % 180 < 20) {
        ctx.fillStyle = hlCol;
        ctx.fillRect(cx-c.w/2-2, cy-c.h-10, 3, 14);
        ctx.fillRect(cx+c.w/2-1, cy-c.h-10, 3, 14);
      }
    });
  }
}


// ============================================================================
// SECTION 10: COLLISION & COMBO
// ============================================================================

class CollisionSystem {
  static aabb(a, b) {
    return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y;
  }
  static resolvePushboxes(f1, f2) {
    const p1 = f1.getPushbox(), p2 = f2.getPushbox();
    if (!this.aabb(p1, p2)) return;
    const ov = Math.min(p1.x+p1.w-p2.x, p2.x+p2.w-p1.x);
    if (ov <= 0) return;
    const push = ov/2+0.5;
    if (f1.x < f2.x) { f1.x -= push; f2.x += push; }
    else { f1.x += push; f2.x -= push; }
    f1.x = Math.max(STAGE_LEFT+20, Math.min(STAGE_RIGHT-20, f1.x));
    f2.x = Math.max(STAGE_LEFT+20, Math.min(STAGE_RIGHT-20, f2.x));
  }
}

class ComboSystem {
  constructor() {
    this.combos = [{ count:0, damage:0, timer:0, display:0 }, { count:0, damage:0, timer:0, display:0 }];
  }
  addHit(pi, dmg) { const c = this.combos[pi]; c.count++; c.damage += dmg; c.timer = 60; c.display = 45; }
  getScaling(pi) { return DAMAGE_SCALING[Math.min(this.combos[pi].count, DAMAGE_SCALING.length-1)]; }
  reset(pi) { this.combos[pi] = { count:0, damage:0, timer:0, display:0 }; }
  update() {
    this.combos.forEach(c => {
      if (c.timer > 0) { c.timer--; if (c.display > 0) c.display--; if (c.timer <= 0) { c.count = 0; c.damage = 0; } }
    });
  }
}
