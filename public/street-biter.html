<!--
╔══════════════════════════════════════════════════════════════════════════════╗
║                          S T R E E T   B I T E R                           ║
║                    A Single-File HTML5 Fighting Game                        ║
║                     Inspired by Street Fighter II                          ║
╠══════════════════════════════════════════════════════════════════════════════╣
║                                                                            ║
║  CONTROLS:                                                                 ║
║  ─────────                                                                 ║
║  Player 1 (Left Side):                                                     ║
║    Movement:  Arrow Keys                                                   ║
║    Light P:   Z          Light K:   V                                      ║
║    Medium P:  X          Medium K:  B                                      ║
║    Heavy P:   C          Heavy K:   N                                      ║
║                                                                            ║
║  Player 2 (Right Side / VS mode):                                          ║
║    Movement:  W/A/S/D                                                      ║
║    Light P:   U          Light K:   J                                      ║
║    Medium P:  I          Medium K:  K                                      ║
║    Heavy P:   O          Heavy K:   L                                      ║
║                                                                            ║
║  System:                                                                   ║
║    Escape:    Pause                                                        ║
║    Enter:     Confirm                                                      ║
║                                                                            ║
║  MOTION INPUTS (relative to facing right):                                 ║
║  ─────────────────────────────────────────                                 ║
║    Quarter Circle Forward (QCF):  ↓ ↘ →  + Punch/Kick                     ║
║    Quarter Circle Back (QCB):     ↓ ↙ ←  + Punch/Kick                     ║
║    Dragon Punch (DP / Z-motion):  → ↓ ↘  + Punch                          ║
║    Half Circle Forward (HCF):     ← ↙ ↓ ↘ → + Punch/Kick                 ║
║    Double QCF (Super):            ↓ ↘ → ↓ ↘ → + Punch                     ║
║    Charge (hold ← 40f, then →):  [← hold] → + Punch/Kick                 ║
║                                                                            ║
║  ARCHITECTURE:                                                             ║
║  ─────────────                                                             ║
║  Game           — Main loop, state machine, orchestration                  ║
║  Fighter        — Character state machine, physics, rendering              ║
║  InputManager   — Per-player input buffer, motion detection, neg. edge     ║
║  CollisionSystem— AABB hitbox/hurtbox testing, pushbox overlap             ║
║  ComboSystem    — Combo counting, damage scaling, juggle tracking          ║
║  ParticleSystem — Spark, dust, fire, super flash particles                 ║
║  AudioEngine    — Web Audio API: impacts, voices, music                    ║
║  Projectile     — Fireballs with hitboxes and lifecycle                    ║
║  Stage          — Multi-layer parallax background rendering                ║
║  UI             — Health bars, super meter, timer, menus, combo display    ║
║                                                                            ║
║  ADDING NEW CHARACTERS:                                                    ║
║  ──────────────────────                                                    ║
║  1. Add entry to CHARACTER_DATA with: name, color, stats, normals,         ║
║     specials, super, and a draw function                                   ║
║  2. Each normal needs: startup, active, recovery, damage, hitstun,         ║
║     blockstun, hitbox {x,y,w,h}, type (high/mid/low), pushback,           ║
║     cancelInto array                                                       ║
║  3. Each special needs: motion (qcf/qcb/dp/hcf/charge), button filter,    ║
║     versions keyed by strength, each with frames/damage/properties         ║
║  4. Draw function receives (ctx, x, y, facing, frame, state, color) and   ║
║     renders the character on canvas                                        ║
║                                                                            ║
║  CONVERTING TO SPRITE SHEETS:                                              ║
║  ────────────────────────────                                              ║
║  1. Replace each character's draw() with a spritesheet-based renderer      ║
║  2. Create a sprite atlas PNG per character (rows=states, cols=frames)      ║
║  3. In Fighter.render(), calculate source rect from state+frame index      ║
║  4. Use ctx.drawImage(sheet, sx, sy, sw, sh, dx, dy, dw, dh)              ║
║  5. Flip with ctx.scale(-1,1) when facing left                             ║
║  6. Keep hitbox data in CHARACTER_DATA (it's already separate from draw)   ║
║                                                                            ║
╚══════════════════════════════════════════════════════════════════════════════╝
-->

// ============================================================================
// SECTION 3: AUDIO ENGINE
// ============================================================================

class AudioEngine {
  constructor() {
    this.ctx = null;
    this.masterGain = null;
    this.sfxGain = null;
    this.voiceGain = null;
    this.musicGain = null;
    this.initialized = false;
    this.musicPlaying = false;
    this.currentMusic = null;
  }

  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 0.5;
      this.masterGain.connect(this.ctx.destination);
      this.sfxGain = this.ctx.createGain();
      this.sfxGain.gain.value = 0.6;
      this.sfxGain.connect(this.masterGain);
      this.voiceGain = this.ctx.createGain();
      this.voiceGain.gain.value = 0.7;
      this.voiceGain.connect(this.masterGain);
      this.musicGain = this.ctx.createGain();
      this.musicGain.gain.value = 0.12;
      this.musicGain.connect(this.masterGain);
      this.initialized = true;
    } catch(e) {}
  }

  resume() {
    if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume();
  }

  playHit(strength) {
    if (!this.initialized) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const noise = this._noise(strength === 'heavy' ? 0.18 : strength === 'medium' ? 0.12 : 0.08);
    const gain = this.ctx.createGain();
    const filter = this.ctx.createBiquadFilter();
    filter.type = 'lowpass';
    const base = strength === 'heavy' ? 110 : strength === 'medium' ? 170 : 240;
    filter.frequency.setValueAtTime(base + Math.random() * 80, t);
    filter.frequency.exponentialRampToValueAtTime(50, t + 0.18);
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(base * 0.7 + Math.random() * 20, t);
    osc.frequency.exponentialRampToValueAtTime(35, t + 0.15);
    const vol = strength === 'heavy' ? 0.9 : strength === 'medium' ? 0.55 : 0.3;
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + (strength === 'heavy' ? 0.22 : 0.14));
    osc.connect(filter); noise.connect(filter);
    filter.connect(gain); gain.connect(this.sfxGain);
    osc.start(t); osc.stop(t + 0.3);
    noise.start(t); noise.stop(t + 0.3);
  }

  playBlock() {
    if (!this.initialized) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(900, t);
    osc.frequency.exponentialRampToValueAtTime(200, t + 0.07);
    gain.gain.setValueAtTime(0.25, t);
    gain.gain.exponentialRampToValueAtTime(0.01, t + 0.09);
    osc.connect(gain); gain.connect(this.sfxGain);
    osc.start(t); osc.stop(t + 0.12);
  }

  playVoice(name) {
    if (!this.initialized) return;
    const t = this.ctx.currentTime;
    // Announcer-style: 2-stage syllables with pitch envelope for dramatic delivery
    const ann = {
      'round1':  { syllables:[[420,380,0.18],[520,500,0.25]] }, // "rou-und"
      'round2':  { syllables:[[420,380,0.18],[520,500,0.22],[640,600,0.22]] },
      'roundF':  { syllables:[[320,340,0.22],[380,360,0.18],[260,220,0.35]] }, // "fi-nal round"
      'fight':   { syllables:[[380,420,0.12],[560,480,0.25]] }, // "FI-GHT"
      'ko':      { syllables:[[340,380,0.16],[320,160,0.42]] }, // "K-O!"
      'perfect': { syllables:[[380,420,0.14],[480,440,0.18],[380,300,0.22]] }, // "per-fe-ct"
      'win':     { syllables:[[360,400,0.14],[480,420,0.18]] },
      'round':   { syllables:[[420,520,0.22]] },
    };
    if (ann[name]) return this._playAnnouncer(ann[name]);

    // Character attack grunts — multi-oscillator formant vocal
    const voices = {
      'hadouken':  { freqs:[220,440,660,880], dur:0.5,  type:'sawtooth', sweep:0.88 },
      'shoryuken': { freqs:[320,640,960],     dur:0.42, type:'sawtooth', sweep:1.1 },
      'tatsumaki': { freqs:[200,400,600],     dur:0.55, type:'square',   sweep:0.9 },
      'kikoken':   { freqs:[300,600,900],     dur:0.4,  type:'triangle', sweep:0.92 },
      'hyakuretsu':{ freqs:[380,760,1140],    dur:0.35, type:'sawtooth', sweep:1.05 },
      'shinku':    { freqs:[180,360,540,720], dur:0.7,  type:'sawtooth', sweep:0.85 },
      'shinryu':   { freqs:[280,560,840,1120],dur:0.6,  type:'sawtooth', sweep:1.15 },
      'hosenka':   { freqs:[260,520,780,1040],dur:0.6,  type:'triangle', sweep:0.95 },
    };
    const v = voices[name];
    if (!v) return;
    v.freqs.forEach((freq, i) => {
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      const f = this.ctx.createBiquadFilter();
      o.type = v.type;
      o.frequency.setValueAtTime(freq, t);
      o.frequency.linearRampToValueAtTime(freq * v.sweep, t + v.dur * 0.6);
      o.frequency.linearRampToValueAtTime(freq * v.sweep * 0.9, t + v.dur);
      f.type = 'bandpass'; f.frequency.value = freq * 1.1; f.Q.value = 5;
      const vol = 0.14 / (i + 1);
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(vol*1.3, t + 0.025);
      g.gain.setValueAtTime(vol, t + v.dur * 0.4);
      g.gain.exponentialRampToValueAtTime(0.005, t + v.dur);
      o.connect(f); f.connect(g); g.connect(this.voiceGain);
      o.start(t); o.stop(t + v.dur + 0.05);
    });
    // Noise layer — breathy attack for rasp
    const breath = this._noise(v.dur*0.3);
    const bg = this.ctx.createGain();
    const bf = this.ctx.createBiquadFilter();
    bf.type = 'bandpass'; bf.frequency.value = v.freqs[0]*2; bf.Q.value = 3;
    bg.gain.setValueAtTime(0.08, t);
    bg.gain.exponentialRampToValueAtTime(0.005, t + v.dur*0.3);
    breath.connect(bf); bf.connect(bg); bg.connect(this.voiceGain);
    breath.start(t); breath.stop(t + v.dur*0.3 + 0.05);
  }

  _playAnnouncer(cfg) {
    // Multi-syllable announcer: deep, reverb-ish via detuned layers + slap delay
    const base = this.ctx.currentTime + 0.02;
    let offset = 0;
    cfg.syllables.forEach(([f0, f1, dur]) => {
      const start = base + offset;
      // 3 detuned oscillators for a thicker voice
      [0, -12, 7].forEach((detune, idx) => {
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        const f = this.ctx.createBiquadFilter();
        o.type = idx === 0 ? 'sawtooth' : 'square';
        o.frequency.setValueAtTime(f0, start);
        o.frequency.linearRampToValueAtTime(f1, start + dur * 0.7);
        o.detune.value = detune;
        f.type = 'bandpass'; f.frequency.value = (f0+f1)/2; f.Q.value = 4;
        const vol = idx === 0 ? 0.22 : 0.08;
        g.gain.setValueAtTime(0, start);
        g.gain.linearRampToValueAtTime(vol, start + 0.02);
        g.gain.setValueAtTime(vol, start + dur*0.7);
        g.gain.exponentialRampToValueAtTime(0.005, start + dur);
        o.connect(f); f.connect(g); g.connect(this.voiceGain);
        o.start(start); o.stop(start + dur + 0.05);
      });
      // Slap delay echo (once, quieter)
      const echoStart = start + 0.09;
      const eo = this.ctx.createOscillator();
      const eg = this.ctx.createGain();
      eo.type = 'sawtooth';
      eo.frequency.setValueAtTime(f0*0.95, echoStart);
      eo.frequency.linearRampToValueAtTime(f1*0.95, echoStart + dur*0.6);
      eg.gain.setValueAtTime(0.06, echoStart);
      eg.gain.exponentialRampToValueAtTime(0.003, echoStart + dur*0.7);
      eo.connect(eg); eg.connect(this.voiceGain);
      eo.start(echoStart); eo.stop(echoStart + dur*0.7 + 0.05);
      offset += dur + 0.05;
    });
  }

  playEffect(type) {
    if (!this.initialized) return;
    const t = this.ctx.currentTime;
    if (type === 'superFlash') {
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(70, t);
      o.frequency.linearRampToValueAtTime(420, t + 0.18);
      o.frequency.linearRampToValueAtTime(50, t + 0.55);
      g.gain.setValueAtTime(0.45, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.65);
      o.connect(g); g.connect(this.sfxGain);
      o.start(t); o.stop(t + 0.7);
    } else if (type === 'ko') {
      this.playVoice('ko');
    } else if (type === 'menuSelect') {
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(620, t);
      g.gain.setValueAtTime(0.15, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.08);
      o.connect(g); g.connect(this.sfxGain);
      o.start(t); o.stop(t + 0.1);
    } else if (type === 'menuMove') {
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = 'square'; o.frequency.value = 400;
      g.gain.setValueAtTime(0.08, t);
      g.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
      o.connect(g); g.connect(this.sfxGain);
      o.start(t); o.stop(t + 0.06);
    }
  }

  setTheme(theme) { this.musicTheme = theme || 'castle'; }

  startMusic() {
    if (!this.initialized || this.musicPlaying) return;
    this.musicPlaying = true;
    this._musicTimeout = null;
    this._musicLoop();
  }

  stopMusic() {
    this.musicPlaying = false;
    if (this._musicTimeout) { clearTimeout(this._musicTimeout); this._musicTimeout = null; }
    if (this.currentMusic) {
      try { this.currentMusic.forEach(n => { try { n.stop(); } catch(_){} }); } catch(e) {}
      this.currentMusic = null;
    }
  }

  // Theme-driven BGM: bass line + lead melody + kick/hat percussion.
  _musicLoop() {
    if (!this.musicPlaying || !this.initialized) return;
    const theme = this.musicTheme || 'castle';
    const tracks = this._tracks();
    const tr = tracks[theme] || tracks.castle;
    const beat = tr.beat, bars = tr.bars, beatsPerBar = 8;
    const total = bars * beatsPerBar;
    const t0 = this.ctx.currentTime + 0.02;
    const nodes = [];

    // --- BASS ---
    for (let i = 0; i < total; i++) {
      const freq = tr.bass[i % tr.bass.length];
      if (!freq) continue;
      const ts = t0 + i*beat;
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      const f = this.ctx.createBiquadFilter();
      o.type = 'triangle'; o.frequency.value = freq;
      f.type = 'lowpass'; f.frequency.value = 600; f.Q.value = 4;
      g.gain.setValueAtTime(0, ts);
      g.gain.linearRampToValueAtTime(0.35, ts + 0.015);
      g.gain.exponentialRampToValueAtTime(0.04, ts + beat*0.9);
      g.gain.linearRampToValueAtTime(0, ts + beat*0.98);
      o.connect(f); f.connect(g); g.connect(this.musicGain);
      o.start(ts); o.stop(ts + beat + 0.05);
      nodes.push(o);
    }

    // --- LEAD ---
    for (let i = 0; i < total; i++) {
      const freq = tr.lead[i % tr.lead.length];
      if (!freq) continue;
      const ts = t0 + i*beat;
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = tr.leadWave || 'square';
      o.frequency.setValueAtTime(freq, ts);
      // tiny vibrato via detune offset
      o.frequency.setValueAtTime(freq*1.003, ts + beat*0.4);
      o.frequency.setValueAtTime(freq, ts + beat*0.7);
      g.gain.setValueAtTime(0, ts);
      g.gain.linearRampToValueAtTime(0.15, ts + 0.015);
      g.gain.setValueAtTime(0.15, ts + beat*0.75);
      g.gain.linearRampToValueAtTime(0, ts + beat*0.95);
      o.connect(g); g.connect(this.musicGain);
      o.start(ts); o.stop(ts + beat + 0.05);
      nodes.push(o);
    }

    // --- HARMONY (mirrors lead a fifth down, quieter) ---
    if (tr.harmony) {
      for (let i = 0; i < total; i++) {
        const freq = tr.harmony[i % tr.harmony.length];
        if (!freq) continue;
        const ts = t0 + i*beat;
        const o = this.ctx.createOscillator();
        const g = this.ctx.createGain();
        o.type = 'triangle'; o.frequency.value = freq;
        g.gain.setValueAtTime(0, ts);
        g.gain.linearRampToValueAtTime(0.08, ts + 0.02);
        g.gain.linearRampToValueAtTime(0, ts + beat*0.9);
        o.connect(g); g.connect(this.musicGain);
        o.start(ts); o.stop(ts + beat + 0.05);
        nodes.push(o);
      }
    }

    // --- KICK (on downbeats) ---
    for (let i = 0; i < total; i++) {
      if (!tr.kick[i % tr.kick.length]) continue;
      const ts = t0 + i*beat;
      const o = this.ctx.createOscillator();
      const g = this.ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(110, ts);
      o.frequency.exponentialRampToValueAtTime(36, ts + 0.08);
      g.gain.setValueAtTime(0.5, ts);
      g.gain.exponentialRampToValueAtTime(0.01, ts + 0.14);
      o.connect(g); g.connect(this.musicGain);
      o.start(ts); o.stop(ts + 0.16);
      nodes.push(o);
    }

    // --- HAT (off-beats, short noise burst) ---
    for (let i = 0; i < total; i++) {
      if (!tr.hat[i % tr.hat.length]) continue;
      const ts = t0 + i*beat;
      const src = this._noise(0.04);
      const g = this.ctx.createGain();
      const f = this.ctx.createBiquadFilter();
      f.type = 'highpass'; f.frequency.value = 6000;
      g.gain.setValueAtTime(0.08, ts);
      g.gain.exponentialRampToValueAtTime(0.005, ts + 0.04);
      src.connect(f); f.connect(g); g.connect(this.musicGain);
      src.start(ts); src.stop(ts + 0.05);
      nodes.push(src);
    }

    this.currentMusic = nodes;
    const dur = total * beat;
    this._musicTimeout = setTimeout(() => { this._musicTimeout = null; this._musicLoop(); }, dur*1000 - 40);
  }

  _tracks() {
    // Frequencies in Hz. null = rest.
    // Notes: C3=130.81, D3=146.83, E3=164.81, F3=174.61, G3=196, A3=220, Bb3=233.08, B3=246.94

        lead: [N.D4,N.F4,N.A4,N.F4, N.D5,N.A4,N.F4,N.A4,  N.C5,N.A4,N.G4,N.A4, N.F4,N.A4,N.D4,N.A4],
        harmony: [N.A3,null,N.D4,null, N.A3,null,N.D4,null,  N.Bb3,null,N.D4,null, N.A3,null,N.F4,null],

        hat:  [0,0,1,0,0,0,1,0, 0,0,1,0,0,1,1,0],
      },
    };
  }

  _noise(dur) {
    const sz = this.ctx.sampleRate * dur;
    const buf = this.ctx.createBuffer(1, sz, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
    const src = this.ctx.createBufferSource();
    src.buffer = buf;
    return src;
  }
}

class InputManager {
  constructor(playerIndex) {
    this.playerIndex = playerIndex;
    this.dirBuffer = [];
    this.btnPressed = {};
    this.btnReleased = {};
    this.btnHeld = {};
    this.prevBtnHeld = {};
    this.chargeFrames = { back: 0, down: 0 };
    this.frame = 0;
    this.facing = playerIndex === 0 ? 1 : -1;
    this.inputHistory = [];
    this.currentDir = 5;
    this.rawUp = false; this.rawDown = false;
    this.rawLeft = false; this.rawRight = false;
    this.fwd = false; this.back = false;
    this.gameMode = 'cpu'; // Default to single-player (arrows work for P1)
  }

  // P1: Arrow keys for movement. Attacks: Z/X/C (punch L/M/H), V/B/N (kick L/M/H)
  //     In single-player: A/S/D also work as kick alternatives
  // P2 (VS mode): WASD movement, U/I/O (punch), J/K/L (kick)
  // gameMode is set externally by Game before update() — 'vs','cpu','training'
  getKeyMap() {
    if (this.playerIndex === 0) {
      const singlePlayer = this.gameMode !== 'vs';
      return {
        up:    ['ArrowUp'],
        down:  ['ArrowDown'],
        left:  ['ArrowLeft'],
        right: ['ArrowRight'],
        LP: ['KeyZ'],  MP: ['KeyX'],  HP: ['KeyC'],
        LK: singlePlayer ? ['KeyV', 'KeyA'] : ['KeyV'],
        MK: singlePlayer ? ['KeyB', 'KeyS'] : ['KeyB'],
        HK: singlePlayer ? ['KeyN', 'KeyD'] : ['KeyN'],
      };
    }
    return {
      up:    ['KeyW', 'Numpad8'],
      down:  ['KeyS', 'Numpad5', 'Numpad2'],
      left:  ['KeyA', 'Numpad4'],
      right: ['KeyD', 'Numpad6'],
      LP: ['KeyU', 'Numpad7'],  MP: ['KeyI', 'Numpad8'],  HP: ['KeyO', 'Numpad9'],
      LK: ['KeyJ', 'Numpad1'],  MK: ['KeyK', 'Numpad2'],  HK: ['KeyL', 'Numpad3'],
    };
  }

  // Check if any key in a key array is pressed
  _anyKey(keys, keyArr) {
    for (let i = 0; i < keyArr.length; i++) {
      if (keys[keyArr[i]]) return true;
    }
    return false;
  }

  update(keys, frame) {
    this.frame = frame;
    const km = this.getKeyMap();
    this.prevBtnHeld = {...this.btnHeld};

    this.rawUp = this._anyKey(keys, km.up);
    this.rawDown = this._anyKey(keys, km.down);
    this.rawLeft = this._anyKey(keys, km.left);
    this.rawRight = this._anyKey(keys, km.right);

    this.fwd = this.facing === 1 ? this.rawRight : this.rawLeft;
    this.back = this.facing === 1 ? this.rawLeft : this.rawRight;

    let dir = 5;
    if (this.rawUp && this.fwd) dir = 9;
    else if (this.rawUp && this.back) dir = 7;
    else if (this.rawUp) dir = 8;
    else if (this.rawDown && this.fwd) dir = 3;
    else if (this.rawDown && this.back) dir = 1;
    else if (this.rawDown) dir = 2;
    else if (this.fwd) dir = 6;
    else if (this.back) dir = 4;

    if (!this.dirBuffer.length || this.dirBuffer[this.dirBuffer.length-1].dir !== dir) {
      this.dirBuffer.push({ dir, frame });
      this.inputHistory.push({ type:'dir', dir, frame });
    }
    while (this.dirBuffer.length > INPUT_BUFFER_SIZE) this.dirBuffer.shift();

    // Charge tracking
    if (this.back || dir === 1 || dir === 4 || dir === 7) this.chargeFrames.back++;
    else this.chargeFrames.back = 0;
    if (this.rawDown || dir === 1 || dir === 2 || dir === 3) this.chargeFrames.down++;
    else this.chargeFrames.down = 0;

    // Buttons
    this.btnPressed = {};
    this.btnReleased = {};
    for (const btn of ['LP','MP','HP','LK','MK','HK']) {
      const held = this._anyKey(keys, km[btn]);
      this.btnHeld[btn] = held;
      if (held && !this.prevBtnHeld[btn]) {
        this.btnPressed[btn] = true;
        this.inputHistory.push({ type:'press', btn, frame, dir });
      }
      if (!held && this.prevBtnHeld[btn]) {
        this.btnReleased[btn] = true;
        this.inputHistory.push({ type:'release', btn, frame, dir });
      }
    }
    while (this.inputHistory.length > 120) this.inputHistory.shift();
    this.currentDir = dir;
  }

  checkMotion(motionType, buttonFilter) {
    const buf = this.dirBuffer;
    const f = this.frame;
    const punchBtns = ['LP','MP','HP'];
    const kickBtns = ['LK','MK','HK'];
    const filterBtns = buttonFilter === 'punch' ? punchBtns : buttonFilter === 'kick' ? kickBtns : [...punchBtns, ...kickBtns];

    let pressedBtn = null;
    // Check presses
    for (const btn of filterBtns) { if (this.btnPressed[btn]) { pressedBtn = btn; break; } }
    // Negative edge
    if (!pressedBtn) {
      for (const btn of filterBtns) { if (this.btnReleased[btn]) { pressedBtn = btn; break; } }
    }
    if (!pressedBtn) return null;

    // EX detection
    let btnStrength = pressedBtn;
    const pressedP = punchBtns.filter(b => this.btnPressed[b]);
    const pressedK = kickBtns.filter(b => this.btnPressed[b]);
    if (buttonFilter === 'punch' && pressedP.length >= 2) btnStrength = 'EX';
    if (buttonFilter === 'kick' && pressedK.length >= 2) btnStrength = 'EX';

    // Extract recent directions
    const recent = [];
    for (let i = buf.length - 1; i >= 0; i--) {
      if (f - buf[i].frame > MOTION_LENIENCY * 2.5) break;
      recent.unshift(buf[i].dir);
    }

    const match = (pattern) => {
      let pi = 0;
      for (let i = 0; i < recent.length && pi < pattern.length; i++) {
        if (recent[i] === pattern[pi]) pi++;
      }
      return pi >= pattern.length;
    };

    switch (motionType) {
      case 'qcf':
        if (match([2,3,6]) || match([2,6]) || match([1,2,3,6])) return btnStrength;
        break;
      case 'qcb':
        if (match([2,1,4]) || match([2,4]) || match([3,2,1,4])) return btnStrength;
        break;
      case 'dp':
        if (match([6,2,3]) || match([6,2,6]) || match([6,3]) || match([6,2,3,6]) || match([6,3,6])) return btnStrength;
        break;
      case 'hcf':
        if (match([4,1,2,3,6]) || match([4,2,6]) || match([4,2,3,6])) return btnStrength;
        break;
      case 'hcb':
        if (match([6,3,2,1,4]) || match([6,2,4]) || match([6,2,1,4])) return btnStrength;
        break;
      case 'dqcf':
        if (match([2,3,6,2,3,6]) || match([2,6,2,6]) || match([2,3,6,2,6]) || match([2,6,2,3,6])) return btnStrength;
        break;
      case 'charge':
        if (this.chargeFrames.back >= 40 && (this.currentDir === 6 || this.currentDir === 3)) return btnStrength;
        break;
    }
    return null;
  }

  getButtonPress() {
    for (const btn of ['HP','HK','MP','MK','LP','LK']) {
      if (this.btnPressed[btn]) return btn;
    }
    return null;
  }

  isHoldingDown() { return this.currentDir === 1 || this.currentDir === 2 || this.currentDir === 3; }
  isHoldingBack() { return this.currentDir === 1 || this.currentDir === 4 || this.currentDir === 7; }
  isHoldingFwd() { return this.currentDir === 3 || this.currentDir === 6 || this.currentDir === 9; }
}

class Particle {
  constructor(x, y, vx, vy, life, color, size, type) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.life = life; this.maxLife = life;
    this.color = color; this.size = size;
    this.type = type || 'spark';
    this.gravity = type === 'dust' ? 0.05 : type === 'fire' ? -0.15 : 0.1;
    this.friction = 0.98;
    this.rotation = Math.random() * Math.PI * 2;
    this.rotSpeed = (Math.random() - 0.5) * 0.3;
  }

  update() {
    this.x += this.vx; this.y += this.vy;
    this.vy += this.gravity; this.vx *= this.friction;
    this.life--; this.rotation += this.rotSpeed;
    return this.life > 0;
  }

  render(ctx) {
    const a = Math.max(0, this.life / this.maxLife);
    const sz = this.size * (0.5 + a * 0.5);
    ctx.save();
    ctx.globalAlpha = a;
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rotation);
    if (this.type === 'spark') {
      ctx.fillStyle = this.color;
      ctx.fillRect(-sz/2, -sz/2, sz, sz);
    } else if (this.type === 'fire') {
      const g = ctx.createRadialGradient(0, 0, 0, 0, 0, sz);
      g.addColorStop(0, '#FFF'); g.addColorStop(0.3, this.color); g.addColorStop(1, 'transparent');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(0, 0, sz, 0, Math.PI*2); ctx.fill();
    } else if (this.type === 'dust') {
      ctx.fillStyle = this.color; ctx.globalAlpha = a * 0.6;
      ctx.beginPath(); ctx.arc(0, 0, sz, 0, Math.PI*2); ctx.fill();
    } else if (this.type === 'superSpark') {
      ctx.fillStyle = '#FFF';
      ctx.fillRect(-sz*2, -1, sz*4, 2); ctx.fillRect(-1, -sz*2, 2, sz*4);
      ctx.fillStyle = this.color; ctx.globalAlpha = a * 0.8;
      ctx.beginPath(); ctx.arc(0, 0, sz*0.7, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }
}

class ParticleSystem {
  constructor() { this.particles = []; }
  update() { this.particles = this.particles.filter(p => p.update()); }
  render(ctx) { this.particles.forEach(p => p.render(ctx)); }

  spawnHitSparks(x, y, str, color) {
    const n = str === 'heavy' ? 28 : str === 'medium' ? 16 : 10;
    const spd = str === 'heavy' ? 11 : str === 'medium' ? 7 : 4;
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = Math.random() * spd + 1.5;
      const sz = Math.random() * 5 + (str === 'heavy' ? 5 : 2);
      const c = i % 3 === 0 ? '#FFF' : i % 3 === 1 ? (color||'#FFDD44') : '#FFAA22';
      this.particles.push(new Particle(
        x+(Math.random()-0.5)*14, y+(Math.random()-0.5)*14,
        Math.cos(a)*s, Math.sin(a)*s, 12+Math.random()*18, c, sz, 'spark'
      ));
    }
    // Central flash — bigger and brighter
    this.particles.push(new Particle(x, y, 0, 0, 8, '#FFF', str==='heavy'?40:str==='medium'?28:18, 'fire'));
    // Secondary flash ring for heavy hits
    if (str === 'heavy') {
      for (let i = 0; i < 8; i++) {
        const a = i * Math.PI / 4;
        this.particles.push(new Particle(x, y, Math.cos(a)*3, Math.sin(a)*3, 5, '#FFEE88', 20, 'fire'));
      }
      // Fire sparks for extra drama
      for (let i = 0; i < 6; i++) {
        const a = Math.random() * Math.PI * 2;
        this.particles.push(new Particle(x, y, Math.cos(a)*4, Math.sin(a)*4-2, 14+Math.random()*8, '#FF4400', 6+Math.random()*4, 'fire'));
      }
    }
    if (str === 'medium') {
      this.particles.push(new Particle(x, y, 0, 0, 5, color||'#FFDD44', 24, 'fire'));
    }
  }

  spawnBlockSparks(x, y) {
    for (let i = 0; i < 10; i++) {
      const a = -Math.PI/2 + (Math.random()-0.5)*1.5;
      const s = Math.random()*5.5+2;
      const c = i % 2 === 0 ? '#88CCFF' : '#AADDFF';
      this.particles.push(new Particle(x,y, Math.cos(a)*s, Math.sin(a)*s, 10+Math.random()*10, c, 3+Math.random()*2, 'spark'));
    }
    // Shield flash effect
    this.particles.push(new Particle(x, y, 0, 0, 5, '#88CCFF', 22, 'fire'));
  }

  spawnDust(x, y, dir) {
    for (let i = 0; i < 5; i++) {
      this.particles.push(new Particle(
        x+(Math.random()-0.5)*20, y, (Math.random()-0.5)*2+dir, -Math.random()*2,
        15+Math.random()*10, '#CCAA77', 4+Math.random()*4, 'dust'));
    }
  }

  spawnFireTrail(x, y, facing) {
    for (let i = 0; i < 3; i++) {
      this.particles.push(new Particle(
        x+(Math.random()-0.5)*15, y+(Math.random()-0.5)*15,
        facing*(-1+Math.random()), -Math.random()*2,
        10+Math.random()*8, '#FF6622', 5+Math.random()*5, 'fire'));
    }
  }

  spawnSuperFlash(x, y) {
    for (let i = 0; i < 32; i++) {
      const a = Math.random()*Math.PI*2;
      const s = Math.random()*11+3;
      this.particles.push(new Particle(
        x, y, Math.cos(a)*s, Math.sin(a)*s,
        20+Math.random()*15, ['#FFDD00','#FF4400','#FFF','#44AAFF'][i%4],
        5+Math.random()*6, 'superSpark'));
    }
  }

  clear() { this.particles = []; }
}

class Projectile {
  constructor(x, y, vx, owner, data, facing) {
    this.x = x; this.y = y; this.vx = vx; this.vy = 0;
    this.owner = owner; this.data = data; this.facing = facing;
    this.active = true;
    this.hitbox = { x:-15, y:-15, w:30, h:30 };
    this.life = 180;
    this.hits = data.hits || 1;
    this.hitCount = 0;
    this.hitInterval = 8;
    this.lastHitFrame = -100;
    this.frame = 0;
    this.isSuper = (data.hits || 1) >= 4;
    this.isEX = (data.exCost || 0) > 0;
    this.charId = owner.charId;
  }

  update(gameFrame) {
    this.x += this.vx; this.y += this.vy; this.frame++; this.life--;
    if (this.x < -50 || this.x > CANVAS_W + 50 || this.life <= 0) this.active = false;
    return this.active;
  }

  canHit(gf) { return this.hitCount < this.hits && (gf - this.lastHitFrame) >= this.hitInterval; }
  onHit(gf) { this.hitCount++; this.lastHitFrame = gf; if (this.hitCount >= this.hits) this.active = false; }

  getWorldHitbox() {
    return { x:this.x+this.hitbox.x, y:this.y+this.hitbox.y, w:this.hitbox.w, h:this.hitbox.h };
  }

  render(ctx) {
    ctx.save();
    ctx.translate(this.x, this.y);
    const pulse = Math.sin(this.frame * 0.3) * 0.2 + 0.8;
    const sz = this.isSuper ? 28 : this.isEX ? 22 : 16;
    const g = ctx.createRadialGradient(0, 0, 0, 0, 0, sz*1.5);
    const colors = {
      ryu: ['100,180,255', '60,120,220'],
      ken: ['255,120,40', '220,80,20'],
      chunli: ['180,100,255', '120,60,220'],
    };
    const c = colors[this.charId] || colors.ryu;
    g.addColorStop(0, `rgba(${c[0]},${0.8*pulse})`);
    g.addColorStop(0.5, `rgba(${c[1]},${0.4*pulse})`);
    g.addColorStop(1, 'transparent');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(0, 0, sz*1.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(0, 0, sz*0.4*pulse, 0, Math.PI*2); ctx.fill();
    const strokeColors = { ryu:'#66BBFF', ken:'#FF8844', chunli:'#BB77FF' };
    ctx.strokeStyle = strokeColors[this.charId] || '#66BBFF';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(0, 0, sz*pulse, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}



// ============================================================================
// SECTION 7: CHARACTER RENDERER
// ============================================================================

function renderCharacter(ctx, fighter) {
  const { charId, state, stateFrame, breathOffset, facing, currentAttack, attackFrame, spinAngle } = fighter;
  const frame = stateFrame;

  const crouching = state === FS.CROUCH;
  const attacking = state === FS.ATTACK || state === FS.SPECIAL || state === FS.SUPER;
  const hurt = state === FS.HITSTUN || state === FS.BLOCKSTUN || state === FS.KNOCKDOWN;
  const walking = state === FS.WALK_FWD || state === FS.WALK_BACK;
  const jumping = state === FS.JUMP || state === FS.JUMP_FWD || state === FS.JUMP_BACK;
  const spinning = attacking && currentAttack && currentAttack.spinning;
  const isBlock = state === FS.BLOCKSTUN;
  const isWin = state === FS.WIN;
  const isKD = state === FS.KNOCKDOWN;
  const isChunLi = charId === 'chunli';

  // Determine current attack info for pose variations
  let atkName = '', atkStrength = '', isPunch = false, isKick = false;
  let isCrouchAtk = false, isJumpAtk = false, isStandAtk = false;
  if (attacking && currentAttack) {
    atkName = currentAttack.name || '';
    if (atkName.includes('LP') || atkName.includes('s.LP') || atkName.includes('c.LP') || atkName.includes('j.LP')) { atkStrength = 'L'; isPunch = true; }
    else if (atkName.includes('MP') || atkName.includes('s.MP') || atkName.includes('c.MP')) { atkStrength = 'M'; isPunch = true; }
    else if (atkName.includes('HP') || atkName.includes('s.HP') || atkName.includes('c.HP') || atkName.includes('j.HP')) { atkStrength = 'H'; isPunch = true; }
    else if (atkName.includes('LK') || atkName.includes('s.LK') || atkName.includes('c.LK')) { atkStrength = 'L'; isKick = true; }
    else if (atkName.includes('MK') || atkName.includes('s.MK') || atkName.includes('c.MK') || atkName.includes('j.MK')) { atkStrength = 'M'; isKick = true; }
    else if (atkName.includes('HK') || atkName.includes('s.HK') || atkName.includes('c.HK') || atkName.includes('j.HK')) { atkStrength = 'H'; isKick = true; }
    else if (atkName.includes('Hadouken') || atkName.includes('Kikoken') || atkName.includes('Shoryuken') || atkName.includes('Shinku') || atkName.includes('Shinryuken') || atkName.includes('Hosenka')) isPunch = true;
    else if (atkName.includes('Tatsumaki') || atkName.includes('Spinning') || atkName.includes('Hyakuretsu')) isKick = true;
    isCrouchAtk = atkName.startsWith('c.');
    isJumpAtk = atkName.startsWith('j.');
    isStandAtk = atkName.startsWith('s.');
  }

  // Attack phase calculation: 0=windup, 1=active, 2=recovery
  let atkPhase = 0, atkProg = 0;
  if (attacking && currentAttack) {
    const su = currentAttack.startup || 0;
