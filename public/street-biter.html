class SimpleAI {
  constructor(diff) {
    this.diff = diff || 'medium';
    this.actionTimer = 0;
    this.action = 'idle';
    // Per-difficulty tuning
    const tuning = {
      easy:   { aggro: 0.32, block: 0.28, reactWindow: 4, reactChance: 0.35, dpChance: 0.15, readDelay: 12 },
      medium: { aggro: 0.55, block: 0.60, reactWindow: 6, reactChance: 0.7,  dpChance: 0.45, readDelay: 6 },
      hard:   { aggro: 0.8,  block: 0.90, reactWindow: 9, reactChance: 0.95, dpChance: 0.8,  readDelay: 2 },
    };
    const t = tuning[this.diff] || tuning.medium;
    this.aggro = t.aggro; this.blockChance = t.block;
    this.reactWindow = t.reactWindow; this.reactChance = t.reactChance;
    this.dpChance = t.dpChance; this.readDelay = t.readDelay;
    this.reactDelay = 0; // Frames to delay reaction (simulates human response time)
    this.lastOppState = null;
  }

  getKeys(fighter, opp, frame) {
    const keys = {};
    const km = new InputManager(fighter.playerIndex).getKeyMap();
    const dist = Math.abs(fighter.x - opp.x);
    const fwdKey = fighter.facing === 1 ? km.right[0] : km.left[0];
    const backKey = fighter.facing === 1 ? km.left[0] : km.right[0];
    const downKey = km.down[0];
    const upKey = km.up[0];

    // REACTIONS — triggered when opponent changes state
    if (this.reactDelay > 0) this.reactDelay--;
    const oppStateChanged = opp.state !== this.lastOppState;
    this.lastOppState = opp.state;

    // REACT: anti-air DP when opponent is airborne, within range, falling toward us
    const oppJumping = [FS.JUMP, FS.JUMP_FWD, FS.JUMP_BACK].includes(opp.state);
    if (oppJumping && dist < 180 && fighter.grounded &&
        ![FS.ATTACK,FS.SPECIAL,FS.SUPER,FS.HITSTUN,FS.BLOCKSTUN,FS.KNOCKDOWN].includes(fighter.state)) {
      if (Math.random() < this.dpChance && (opp.x - fighter.x) * opp.vx <= 0) {
        this.action = 'dp';
        this.actionTimer = 12;
        this.reactDelay = this.readDelay;
      }
    }

    // REACT: whiff punish — opponent just whiffed a heavy attack into recovery
    if (oppStateChanged && opp.state === FS.ATTACK && dist < 140 &&
        Math.random() < this.reactChance && fighter.grounded) {
      // Hit them back before they recover
      this.action = 'poke';
      this.actionTimer = 10;
    }

    // REACT: block incoming projectile
    if (oppStateChanged && opp.state === FS.SPECIAL && opp.currentAttack && opp.currentAttack.projectile &&
        Math.random() < this.blockChance) {
      this.action = 'block';
      this.actionTimer = 25;
    }

    this.actionTimer--;
    if (this.actionTimer <= 0) {
      const r = Math.random();
      if (opp.state === FS.ATTACK && dist < 180) {
        // Attack reaction: block, jump out, or DP
        if (Math.random() < this.dpChance && dist < 100) this.action = 'dp';
        else if (Math.random() < this.blockChance) this.action = 'block';
        else this.action = 'retreat';
        this.actionTimer = 18;
      } else if (opp.state === FS.KNOCKDOWN || opp.state === FS.WAKEUP) {
        // Okizeme: get close for meaty
        this.action = dist > 120 ? 'approach' : (Math.random() < this.aggro ? 'poke' : 'idle');
        this.actionTimer = 16;
      } else if (dist > 320) {
        this.action = r < 0.5 ? 'approach' : r < 0.75 ? 'fireball' : 'idle';
        this.actionTimer = 24 + Math.random()*20;
      } else if (dist > 150) {
        this.action = r < this.aggro ? 'approach' : r < this.aggro+0.15 ? 'poke' : r < 0.75 ? 'fireball' : 'block';
        this.actionTimer = 14 + Math.random()*20;
      } else {
        // Close range
        this.action = r < this.aggro*0.7 ? 'combo' :
                      r < this.aggro*0.9 ? 'poke' :
                      r < this.aggro+this.blockChance*0.3 ? 'dp' :
                      r < this.aggro+this.blockChance*0.5 ? 'block' : 'retreat';
        this.actionTimer = 10 + Math.random()*15;
      }
    }

    switch (this.action) {
      case 'approach': keys[fwdKey] = true; break;
      case 'retreat': keys[backKey] = true; break;
      case 'block': keys[backKey] = true; if (Math.random()<0.4) keys[downKey]=true; break;
      case 'poke':
        // Walk into range then poke
        if (dist > 110) keys[fwdKey] = true;
        if (this.actionTimer < 6) {
          // Mix of light/medium pokes, lower strikes possible
          if (Math.random() < 0.4) keys[downKey] = true;
          keys[[km.LP[0], km.MK[0], km.MP[0], km.LK[0]][Math.floor(Math.random()*4)]] = true;
        }
        break;
      case 'combo':
        if (this.actionTimer > 15) { keys[km.LP[0]] = true; if (dist > 70) keys[fwdKey] = true; }
        else if (this.actionTimer > 10) keys[km.MP[0]] = true;
        else if (this.actionTimer > 5) { keys[downKey]=true; keys[fwdKey]=true; }
        else keys[km.HP[0]] = true;
        break;
      case 'fireball':
        if (this.actionTimer > 12) keys[downKey] = true;
        else if (this.actionTimer > 8) { keys[downKey]=true; keys[fwdKey]=true; }
        else if (this.actionTimer > 4) keys[fwdKey] = true;
        else keys[Math.random()<0.5?km.HP[0]:km.MP[0]] = true;
        break;
      case 'dp':
        if (this.actionTimer > 10) keys[fwdKey] = true;
        else if (this.actionTimer > 6) keys[downKey] = true;
        else if (this.actionTimer > 2) { keys[downKey]=true; keys[fwdKey]=true; }
        else keys[km.HP[0]] = true;
        break;
    }
    return keys;
  }
}


// ============================================================================
// SECTION 12: UI
// ============================================================================

class UIRenderer {
  constructor() {
    this.announceText = ''; this.announceTimer = 0; this.announceScale = 1;
    this.menuBolts = [];      // {x, segs:[{dx,dy}], age, maxAge}
    this.menuSparks = [];     // {x,y,vx,vy,life,color,size}
    this.menuTicker = 0;      // horizontal offset for marquee
    this.menuCharIdx = 0;     // which character spotlight
    this.menuCharTimer = 0;   // frame counter for char cycle
    this.menuFlash = 0;       // full-screen white flash (lightning strike)
    this.menuTitleKick = 0;   // extra title scale when bolt just hit
  }

  announce(text, dur) { this.announceText = text; this.announceTimer = dur||90; this.announceScale = 2.0; }
  update() { if (this.announceTimer > 0) { this.announceTimer--; this.announceScale = Math.max(1, this.announceScale*0.92); } }

  updateMenu(frame) {
    // Lightning bolts — rare, dramatic
    if (Math.random() < 0.018 && this.menuBolts.length < 3) {
      this.menuBolts.push({
        x: 120 + Math.random()*(CANVAS_W-240),
        segs: this._genBoltSegs(260 + Math.random()*160),
        age: 0, maxAge: 10 + Math.floor(Math.random()*6),
      });
      this.menuFlash = 0.28;
      this.menuTitleKick = 1;
    }
    for (let i = this.menuBolts.length - 1; i >= 0; i--) {
      this.menuBolts[i].age++;
      if (this.menuBolts[i].age > this.menuBolts[i].maxAge) this.menuBolts.splice(i, 1);
    }
    // Electric sparks from behind title
    if (frame % 3 === 0) {
      const a = Math.random()*Math.PI*2;
      const r = 150 + Math.random()*80;
      this.menuSparks.push({
        x: CANVAS_W/2 + Math.cos(a)*r*0.9,
        y: 150 + Math.sin(a)*40,
        vx: Math.cos(a)*(1+Math.random()*1.5),
        vy: Math.sin(a)*1.5 - 0.5,
        life: 25+Math.random()*20, maxLife: 45,
        color: Math.random()<0.4 ? '#FFF' : Math.random()<0.5 ? '#FFDD00' : '#FF6622',
        size: 1.5+Math.random()*2,
      });
    }
    for (let i = this.menuSparks.length - 1; i >= 0; i--) {
      const s = this.menuSparks[i];
      s.x += s.vx; s.y += s.vy; s.vy += 0.06; s.vx *= 0.98;
      s.life--;
      if (s.life <= 0) this.menuSparks.splice(i, 1);
    }
    // Cycle character spotlight every ~3s
    this.menuCharTimer++;
    if (this.menuCharTimer >= 150) {
      this.menuCharTimer = 0;
      const cc = Object.keys(CHARACTER_DATA).length;
      this.menuCharIdx = (this.menuCharIdx + 1) % cc;
    }
    // Marquee ticker
    this.menuTicker -= 1.8;
    if (this.menuFlash > 0) this.menuFlash = Math.max(0, this.menuFlash - 0.025);
    if (this.menuTitleKick > 0) this.menuTitleKick = Math.max(0, this.menuTitleKick - 0.06);
  }

  _genBoltSegs(height) {
    const segs = [];
    let rem = height;
    while (rem > 0) {
      const dy = 8 + Math.random()*18;
      const dx = (Math.random()-0.5)*28;
      segs.push({ dx, dy });
      rem -= dy;
    }
    return segs;
  }

  renderHUD(ctx, fighters, timer, combo) {
    const [f1, f2] = fighters;
    ctx.fillStyle = 'rgba(0,0,0,0.75)';
    ctx.fillRect(0, 0, CANVAS_W, 54);

    // Timer
    ctx.fillStyle = '#FFF'; ctx.font = 'bold 28px "Courier New",monospace'; ctx.textAlign = 'center';
    ctx.fillText(Math.ceil(timer).toString().padStart(2,'0'), CANVAS_W/2, 37);

    // Health bars
    this._healthBar(ctx, f1, true); this._healthBar(ctx, f2, false);
    // Super meters
    this._superMeter(ctx, f1, true); this._superMeter(ctx, f2, false);
    // Round indicators
    this._roundDots(ctx, f1, f2);
    // Names
    ctx.font = 'bold 12px "Courier New",monospace';
    ctx.fillStyle = f1.data.color; ctx.textAlign = 'left'; ctx.fillText(f1.name.toUpperCase(), 30, 14);
    ctx.fillStyle = f2.data.color; ctx.textAlign = 'right'; ctx.fillText(f2.name.toUpperCase(), CANVAS_W-30, 14);
    // Combos
    this._combo(ctx, combo, 0, true); this._combo(ctx, combo, 1, false);
    // Announcement
    if (this.announceTimer > 0) {
      ctx.save();
      ctx.translate(CANVAS_W/2, CANVAS_H/2-40); ctx.scale(this.announceScale, this.announceScale);
      ctx.font = 'bold 48px "Courier New",monospace'; ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(0,0,0,0.8)'; ctx.fillText(this.announceText, 3, 3);
      ctx.shadowColor = '#FFDD00'; ctx.shadowBlur = 15;
      ctx.fillStyle = '#FFF'; ctx.fillText(this.announceText, 0, 0);
      ctx.shadowBlur = 0; ctx.restore();
    }

    // Subtle controls bar at bottom
    this._controlsBar(ctx, fighters);
  }

  _controlsBar(ctx, fighters) {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, CANVAS_H - 22, CANVAS_W, 22);

    ctx.font = '10px "Courier New",monospace';
    ctx.fillStyle = 'rgba(180,180,220,0.7)';

    // P1 controls (left side)
    ctx.textAlign = 'left';
    ctx.fillText('P1  MOVE: ←↑↓→   PUNCH: Z X C   KICK: V B N   |   ESC: Pause', 12, CANVAS_H - 8);

    // P2 / system controls (right side)
    ctx.textAlign = 'right';
    ctx.fillText('↓↘→+P = Fireball   →↓↘+P = Dragon Punch   ↓↙←+K = Hurricane', CANVAS_W - 12, CANVAS_H - 8);
  }

  _healthBar(ctx, f, left) {
    const bw = 380, bh = 18;
    const x = left ? 28 : CANVAS_W-28-bw, y = 18;
    const pct = Math.max(0, f.health/f.maxHealth);

    // Track the "ghost" (slowly retreating) bar per fighter
    if (f._ghostPct === undefined) f._ghostPct = pct;
    if (f._ghostPct > pct) f._ghostPct = Math.max(pct, f._ghostPct - 0.004);
    else f._ghostPct = pct;

    // Frame (gold when full, white otherwise)
    ctx.strokeStyle = pct >= 0.999 ? '#FFDD44' : '#888';
    ctx.lineWidth = 2;
    ctx.strokeRect(x-1, y-1, bw+2, bh+2);

    // Empty track
    ctx.fillStyle = '#2A0A0A'; ctx.fillRect(x, y, bw, bh);

    // Ghost (damage) bar — white behind the real bar
    const gw = bw * f._ghostPct;
    const gx = left ? x : x+bw-gw;
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.fillRect(gx, y, gw, bh);

    // Real health bar
    const hw = bw * pct;
    const hx = left ? x : x+bw-hw;
    const danger = pct <= 0.25;
    const flash = danger ? (Math.sin(Date.now()*0.02) > 0 ? 1.0 : 0.55) : 1.0;
    let hc = pct > 0.6 ? '#22CC44' : pct > 0.35 ? '#CCCC22' : '#CC2222';
    const g = ctx.createLinearGradient(hx, y, hx, y+bh);
    g.addColorStop(0, this._lighten(hc, flash));
    g.addColorStop(0.4, hc);
    g.addColorStop(1, this._darken(hc, 0.55));
    ctx.fillStyle = g; ctx.fillRect(hx, y, hw, bh);
    // Top specular sheen
    ctx.fillStyle = 'rgba(255,255,255,0.3)'; ctx.fillRect(hx, y+1, hw, bh/3);
    // Danger: pulse edge
    if (danger && pct > 0) {
      ctx.strokeStyle = `rgba(255,60,60,${Math.sin(Date.now()*0.015)*0.5+0.5})`;
      ctx.lineWidth = 2; ctx.strokeRect(x-1, y-1, bw+2, bh+2);
    }

    // Tick marks (every 25%)
    ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth = 1;
    for (let tIdx = 1; tIdx < 4; tIdx++) {
      const tx = x + bw*(tIdx/4);
      ctx.beginPath(); ctx.moveTo(tx, y+2); ctx.lineTo(tx, y+bh-2); ctx.stroke();
    }
  }

  _superMeter(ctx, f, left) {
    const bw = 200, bh = 8;
    const x = left ? 28 : CANVAS_W-28-bw, y = 42;
    const pct = f.superMeter / MAX_SUPER_METER;
    // Base
    ctx.fillStyle = '#0A0A22'; ctx.fillRect(x, y, bw, bh);
    // Fill gradient
    if (pct > 0) {
      const fg = ctx.createLinearGradient(x, y, x, y+bh);
      if (pct >= 1) {
        const pulse = Math.sin(Date.now()*0.012)*0.3+0.7;
        fg.addColorStop(0, `rgba(255,240,120,${pulse})`);
        fg.addColorStop(0.5, '#FFDD00');
        fg.addColorStop(1, '#CC9900');
      } else if (pct >= 0.5) {
        fg.addColorStop(0, '#66BBFF'); fg.addColorStop(1, '#2266BB');
      } else {
        fg.addColorStop(0, '#3377BB'); fg.addColorStop(1, '#112255');
      }
      ctx.fillStyle = fg; ctx.fillRect(x, y, bw*pct, bh);
    }
    // Quarter marks
    ctx.strokeStyle = 'rgba(255,255,255,0.25)'; ctx.lineWidth = 1;
    for (let i = 1; i < 4; i++) {
      const tx = x + bw*(i/4);
      ctx.beginPath(); ctx.moveTo(tx, y); ctx.lineTo(tx, y+bh); ctx.stroke();
    }
    // Full-meter radiance
    if (pct >= 1) {
      const rg = Math.sin(Date.now()*0.012)*0.3+0.5;
      ctx.strokeStyle = `rgba(255,220,60,${rg})`;
      ctx.lineWidth = 2; ctx.strokeRect(x-1, y-1, bw+2, bh+2);
      // Tiny star on the right end
      const stx = left ? x+bw+6 : x-10;
      ctx.fillStyle = '#FFEE66';
      ctx.font = 'bold 11px "Courier New",monospace';
      ctx.textAlign = 'left';
      ctx.fillText('★', stx, y+bh-1);
    } else {
      ctx.strokeStyle = '#333355'; ctx.lineWidth = 1; ctx.strokeRect(x, y, bw, bh);
    }
    ctx.font = '8px "Courier New",monospace';
    ctx.fillStyle = pct >= 1 ? '#FFDD00' : '#8888AA';
    ctx.textAlign = left ? 'left' : 'right';
    ctx.fillText(pct >= 1 ? 'SUPER READY' : 'SUPER', left ? x : x+bw, y-1);
  }

  _lighten(hex, factor) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    const lr = Math.min(255, r + (255-r)*(1-factor)*0.5);
    const lg = Math.min(255, g + (255-g)*(1-factor)*0.5);
    const lb = Math.min(255, b + (255-b)*(1-factor)*0.5);
    return `rgb(${Math.floor(lr)},${Math.floor(lg)},${Math.floor(lb)})`;
  }

  _roundDots(ctx, f1, f2) {
    const cx = CANVAS_W/2;
    for (let i = 0; i < ROUNDS_TO_WIN; i++) {
      ctx.beginPath(); ctx.arc(cx-30-i*16, 28, 5, 0, Math.PI*2);
      ctx.fillStyle = i < f1.wins ? '#FFDD00' : '#333'; ctx.fill();
      ctx.strokeStyle = '#666'; ctx.lineWidth = 1; ctx.stroke();
    }
    for (let i = 0; i < ROUNDS_TO_WIN; i++) {
      ctx.beginPath(); ctx.arc(cx+30+i*16, 28, 5, 0, Math.PI*2);
      ctx.fillStyle = i < f2.wins ? '#FFDD00' : '#333'; ctx.fill();
      ctx.strokeStyle = '#666'; ctx.lineWidth = 1; ctx.stroke();
    }
  }

  _combo(ctx, cs, pi, left) {
    const c = cs.combos[pi];
    if (c.count < 2 || c.timer <= 0) return;
    const x = left ? 80 : CANVAS_W-80, y = 120;
    const a = Math.min(1, c.timer/30);
    const bounce = c.display > 0 ? Math.sin(c.display*0.3)*5 : 0;
    ctx.save(); ctx.globalAlpha = a; ctx.translate(x, y+bounce); ctx.textAlign = 'center';
    ctx.font = 'bold 32px "Courier New",monospace';
    ctx.fillStyle = c.count >= 5 ? '#FF4444' : c.count >= 3 ? '#FFAA00' : '#FFF';
    ctx.fillText(`${c.count}`, 0, 0);
    ctx.font = 'bold 14px "Courier New",monospace'; ctx.fillText('HIT COMBO', 0, 18);
    ctx.font = '11px "Courier New",monospace'; ctx.fillStyle = '#AAA'; ctx.fillText(`${c.damage} DMG`, 0, 34);
    ctx.restore();
  }

  renderMenu(ctx, sel, frame) {
    // --- 1. SUNSET SKY ---
    const sky = ctx.createLinearGradient(0, 0, 0, CANVAS_H);
    sky.addColorStop(0,    '#1B0338');
    sky.addColorStop(0.35, '#5C1055');
    sky.addColorStop(0.55, '#B83A3A');
    sky.addColorStop(0.75, '#E87A2B');
    sky.addColorStop(1,    '#FFC04A');
    ctx.fillStyle = sky; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    // Giant sun disc
    const sunY = 330, sunR = 110;
    const sunGrad = ctx.createRadialGradient(CANVAS_W/2, sunY, 10, CANVAS_W/2, sunY, sunR);
    sunGrad.addColorStop(0,   '#FFF2B0');
    sunGrad.addColorStop(0.4, '#FFB648');
    sunGrad.addColorStop(0.8, '#FF5A1E');
    sunGrad.addColorStop(1,   'rgba(200,40,20,0)');
    ctx.fillStyle = sunGrad;
    ctx.beginPath(); ctx.arc(CANVAS_W/2, sunY, sunR, 0, Math.PI*2); ctx.fill();

    // Sun horizontal stripes (classic 80s / SF2 vibe)
    ctx.save(); ctx.globalCompositeOperation = 'destination-out';
    for (let i = 0; i < 6; i++) {
      const sy = sunY + 14 + i*14;
      ctx.fillStyle = 'rgba(0,0,0,1)';
      ctx.fillRect(CANVAS_W/2 - sunR, sy, sunR*2, 4 + i*0.8);
    }
    ctx.restore();

    // --- 2. ROTATING RADIAL RAYS ---
    ctx.save();
    ctx.translate(CANVAS_W/2, sunY);
    ctx.rotate(frame * 0.004);
    ctx.globalAlpha = 0.22;
    for (let r = 0; r < 18; r++) {
      ctx.fillStyle = r % 2 === 0 ? '#FFE090' : '#FF8030';
      ctx.beginPath();
      ctx.moveTo(0, 0);
      const a1 = (r / 18) * Math.PI * 2;
      const a2 = ((r + 0.5) / 18) * Math.PI * 2;
      ctx.arc(0, 0, 700, a1, a2);
      ctx.closePath(); ctx.fill();
    }
    ctx.restore();

    // --- 3. CITY SILHOUETTE (parallax, drifts slowly) ---
    const drift = (frame * 0.15) % 120;
    ctx.fillStyle = '#1A0826';
    // Distant mountains
    ctx.beginPath();
    ctx.moveTo(0, 430);
    for (let x = 0; x <= CANVAS_W + 40; x += 40) {
      const h = 380 + Math.sin((x + drift*0.3) * 0.017) * 30 + Math.sin(x * 0.041) * 18;
      ctx.lineTo(x, h);
    }
    ctx.lineTo(CANVAS_W, CANVAS_H); ctx.lineTo(0, CANVAS_H);
    ctx.closePath(); ctx.fill();

    // Building silhouettes
    let bx = -drift*0.5;
    let safety = 0;
    while (bx < CANVAS_W + 40 && safety++ < 200) {
      const key = Math.floor(bx * 13);
      const bw = 24 + Math.abs(key) % 40;       // guaranteed 24..63
      const bh = 40 + Math.abs(Math.floor(bx * 7)) % 120;
      ctx.fillStyle = '#08021A';
      ctx.fillRect(bx, 460 - bh, bw, bh);
      // windows
      ctx.fillStyle = '#FFD060';
      for (let wy = 465 - bh + 6; wy < 455; wy += 8) {
        for (let wx = bx + 3; wx < bx + bw - 3; wx += 6) {
          if ((Math.abs(Math.floor(wx * wy)) % 5) === 0) ctx.fillRect(wx, wy, 2, 3);
        }
      }
      bx += bw + 2;
    }

    // Ground plane + perspective grid (Outrun style)
    ctx.fillStyle = '#2A0830'; ctx.fillRect(0, 460, CANVAS_W, CANVAS_H - 460);
    ctx.save();
    ctx.strokeStyle = 'rgba(255,64,180,0.45)';
    ctx.lineWidth = 1;
    // horizontal lines (receding)
    for (let i = 0; i < 14; i++) {
      const t = i / 14;
      const gy = 460 + t * t * (CANVAS_H - 460);
      ctx.globalAlpha = 0.15 + t * 0.5;
      ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(CANVAS_W, gy); ctx.stroke();
    }
    // vanishing perspective lines
    ctx.globalAlpha = 0.55;
    const vx = CANVAS_W/2, vy = 460;
    for (let k = -10; k <= 10; k++) {
      ctx.beginPath(); ctx.moveTo(vx, vy);
      ctx.lineTo(vx + k * 80, CANVAS_H); ctx.stroke();
    }
    ctx.restore();

    // --- 4. ELECTRIC SPARKS (behind title) ---
    for (const s of this.menuSparks) {
      const a = Math.max(0, s.life / s.maxLife);
      ctx.globalAlpha = a;
      ctx.fillStyle = s.color;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // --- 5. LIGHTNING BOLTS (dramatic strikes) ---
    for (const b of this.menuBolts) {
      const fade = 1 - (b.age / b.maxAge);
      ctx.save();
      ctx.strokeStyle = 'rgba(255,255,255,' + (fade * 0.95) + ')';
      ctx.lineWidth = 3;
      ctx.shadowColor = '#9FD6FF';
      ctx.shadowBlur = 16;
      ctx.beginPath();
      let cx = b.x, cy = 0;
      ctx.moveTo(cx, cy);
      for (const seg of b.segs) { cx += seg.dx; cy += seg.dy; ctx.lineTo(cx, cy); }
      ctx.stroke();
      // inner hot core
      ctx.strokeStyle = 'rgba(220,240,255,' + fade + ')';
      ctx.lineWidth = 1;
      ctx.shadowBlur = 0;
      ctx.stroke();
      ctx.restore();
    }

    // --- 6. TITLE with 3D extrusion + glow pulse + kick shake ---
    const kick = this.menuTitleKick;
    const pulse = 1 + Math.sin(frame * 0.08) * 0.02 + kick * 0.08;
    const shakeX = (Math.random() - 0.5) * kick * 6;
    const shakeY = (Math.random() - 0.5) * kick * 6;
    ctx.save();
    ctx.translate(CANVAS_W/2 + shakeX, 140 + shakeY);
    ctx.scale(pulse, pulse);
    ctx.textAlign = 'center';
    ctx.font = 'bold 84px "Impact","Arial Black","Courier New",monospace';
    // deep shadow / extrusion stack
    for (let d = 10; d >= 1; d--) {
      const t = d / 10;
      ctx.fillStyle = `rgba(${80 + (1-t)*60}, ${10 + (1-t)*20}, ${10 + (1-t)*10}, 1)`;
      ctx.fillText('STREET BITER', d * 0.9, d * 0.9);
    }
    // main fill (gradient)
    const tGrad = ctx.createLinearGradient(0, -50, 0, 40);
    tGrad.addColorStop(0,   '#FFF4AE');
    tGrad.addColorStop(0.4, '#FFC946');
    tGrad.addColorStop(0.7, '#FF6A20');
    tGrad.addColorStop(1,   '#B8260A');
    ctx.fillStyle = tGrad;
    ctx.shadowColor = '#FF8040'; ctx.shadowBlur = 28;
    ctx.fillText('STREET BITER', 0, 0);
    ctx.shadowBlur = 0;
    // outline
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#2A0000';
    ctx.strokeText('STREET BITER', 0, 0);
    // flash highlight
    ctx.fillStyle = 'rgba(255,255,255,' + (0.25 + Math.sin(frame*0.15)*0.1) + ')';
    ctx.fillText('STREET BITER', 0, -2);
    ctx.restore();

    // Subtitle ribbon
    ctx.save();
    ctx.translate(CANVAS_W/2, 188);
    ctx.textAlign = 'center';
    const ribbonW = 420, ribbonH = 30;
    ctx.fillStyle = '#1A0030';
    ctx.beginPath();
    ctx.moveTo(-ribbonW/2, -ribbonH/2);
    ctx.lineTo(ribbonW/2, -ribbonH/2);
    ctx.lineTo(ribbonW/2 + 12, 0);
    ctx.lineTo(ribbonW/2, ribbonH/2);
    ctx.lineTo(-ribbonW/2, ribbonH/2);
    ctx.lineTo(-ribbonW/2 - 12, 0);
    ctx.closePath(); ctx.fill();
    ctx.strokeStyle = '#FFD048'; ctx.lineWidth = 2; ctx.stroke();
    ctx.fillStyle = '#FFD048';
    ctx.font = 'bold 18px "Impact","Arial Black",sans-serif';
    ctx.fillText('★  CHAMPION EDITION  ★', 0, 6);
    ctx.restore();

    // --- 7. CYCLING CHARACTER SPOTLIGHT ---
    const charIds = Object.keys(CHARACTER_DATA);
    const spotId = charIds[this.menuCharIdx % charIds.length];
    const spotData = CHARACTER_DATA[spotId];
    const spotT = this.menuCharTimer / 150;
    const slideIn = spotT < 0.15 ? spotT/0.15 : (spotT > 0.85 ? (1 - spotT)/0.15 : 1);

    ctx.save();
    ctx.globalAlpha = slideIn;
    // Side panel frame (right side)
    const panelX = CANVAS_W - 210, panelY = 225, panelW = 190, panelH = 210;
    // glow backdrop
    const pg = ctx.createRadialGradient(panelX + panelW/2, panelY + panelH/2, 10,
                                         panelX + panelW/2, panelY + panelH/2, 150);
    pg.addColorStop(0, this._hexToRgba(spotData.color, 0.35));
    pg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = pg;
    ctx.fillRect(panelX - 40, panelY - 40, panelW + 80, panelH + 80);
    // panel bg
    ctx.fillStyle = 'rgba(12,4,28,0.85)';
    ctx.fillRect(panelX, panelY, panelW, panelH);
    ctx.strokeStyle = spotData.color; ctx.lineWidth = 3;
    ctx.strokeRect(panelX, panelY, panelW, panelH);
    // "NEW CHALLENGER" blinking badge
    if (Math.floor(frame / 10) % 2 === 0) {
      ctx.fillStyle = '#FFD048';
      ctx.fillRect(panelX + 10, panelY - 16, panelW - 20, 22);
      ctx.fillStyle = '#2A0000';
      ctx.font = 'bold 12px "Impact",sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('◆ NEW CHALLENGER ◆', panelX + panelW/2, panelY - 1);
    }
    // render character
    ctx.save();
    ctx.translate(panelX + panelW/2, panelY + panelH - 20);
    ctx.scale(1.2, 1.2);
    const prev = { charId: spotId, state: FS.IDLE, stateFrame: frame,
                   breathOffset: Math.sin(frame*0.05)*2, facing: -1,
                   currentAttack: null, attackFrame: 0, spinAngle: 0, grounded: true };
    renderCharacter(ctx, prev);
    ctx.restore();
    // name
    ctx.fillStyle = spotData.color;
    ctx.font = 'bold 20px "Impact","Arial Black",sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(spotData.name.toUpperCase(), panelX + panelW/2, panelY + 28);
    ctx.fillStyle = '#FFD8A0';
    ctx.font = 'italic 10px "Courier New",monospace';
    ctx.fillText(spotData.subtitle, panelX + panelW/2, panelY + 44);
    ctx.restore();

    // --- 8. MENU ITEMS ---
    const items = ['VS PLAYER', 'VS CPU', 'TRAINING'];
    items.forEach((item, i) => {
      const y = 280 + i * 48;
      const active = i === sel;
      const panelX2 = 120;
      const panelW2 = 340;
      if (active) {
        // glowing highlight
        const glow = 0.55 + Math.sin(frame * 0.2) * 0.15;
        ctx.fillStyle = `rgba(255,80,40,${glow * 0.55})`;
        ctx.fillRect(panelX2 - 4, y - 20, panelW2 + 8, 40);
        ctx.fillStyle = `rgba(255,200,80,${glow})`;
        ctx.fillRect(panelX2, y - 16, panelW2, 32);
        // arrow cursors
        const ab = Math.sin(frame * 0.2) * 4;
        ctx.fillStyle = '#2A0000';
        ctx.font = 'bold 24px "Impact",sans-serif';
        ctx.textAlign = 'left';
        ctx.fillText('▶', panelX2 + 8 + ab, y + 8);
        ctx.textAlign = 'right';
        ctx.fillText('◀', panelX2 + panelW2 - 8 - ab, y + 8);
        ctx.fillStyle = '#2A0000';
      } else {
        ctx.fillStyle = 'rgba(20,5,40,0.55)';
        ctx.fillRect(panelX2, y - 16, panelW2, 32);
        ctx.strokeStyle = 'rgba(180,120,80,0.4)'; ctx.lineWidth = 1;
        ctx.strokeRect(panelX2, y - 16, panelW2, 32);
        ctx.fillStyle = '#B8A078';
      }
      ctx.font = 'bold 22px "Impact","Arial Black",sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(item, panelX2 + panelW2/2, y + 7);
    });

    // --- 9. PRESS START blinker ---
    if (Math.floor(frame / 25) % 2 === 0) {
      ctx.save();
      ctx.textAlign = 'center';
      ctx.font = 'bold 26px "Impact","Arial Black",sans-serif';
      ctx.fillStyle = '#1A0000';
      ctx.fillText('PRESS  ENTER  TO  START', CANVAS_W/2 + 2, 478);
      ctx.fillStyle = '#FFE040';
      ctx.shadowColor = '#FF6020'; ctx.shadowBlur = 14;
      ctx.fillText('PRESS  ENTER  TO  START', CANVAS_W/2, 476);
      ctx.restore();
    }

    // --- 10. SCROLLING MARQUEE TICKER ---
    const tickerY = CANVAS_H - 26;
    ctx.fillStyle = '#0A0014';
    ctx.fillRect(0, tickerY - 12, CANVAS_W, 28);
    ctx.fillStyle = '#FFD048';
    ctx.fillRect(0, tickerY - 12, CANVAS_W, 2);
    ctx.fillRect(0, tickerY + 14, CANVAS_W, 2);
    // text
    const tickerMsg = '★  INSERT COIN  ★  THE WORLD BITER TOURNAMENT  ★  1 OR 2 PLAYERS  ★  DEFEAT ALL CHALLENGERS  ★  FIGHT FOR THE TITLE  ★  ';
    ctx.save();
    ctx.font = 'bold 14px "Courier New",monospace';
    ctx.fillStyle = '#FFD048';
    ctx.textAlign = 'left';
    const tickerWidth = Math.max(50, ctx.measureText(tickerMsg).width);
    let tx = this.menuTicker % tickerWidth;
    if (tx > 0) tx -= tickerWidth;
    let safetyT = 0;
    while (tx < CANVAS_W && safetyT++ < 100) {
      ctx.fillText(tickerMsg, tx, tickerY + 6);
      tx += tickerWidth;
    }
    ctx.restore();

    // --- 11. CONTROL HINTS (tiny, corners) ---
    ctx.save();
    ctx.font = '10px "Courier New",monospace';
    ctx.fillStyle = 'rgba(255,220,140,0.55)';
    ctx.textAlign = 'left';
    ctx.fillText('↑/↓ SELECT   ENTER CONFIRM', 20, 455);
    ctx.textAlign = 'right';
    ctx.fillText('P1: ←↑↓→ / ZXC / VBN', CANVAS_W - 20, 455);
    ctx.restore();

    // --- 12. CRT SCAN LINES + VIGNETTE ---
    ctx.save();
    ctx.globalAlpha = 0.08;
    ctx.fillStyle = '#000';
    for (let y = 0; y < CANVAS_H; y += 3) ctx.fillRect(0, y, CANVAS_W, 1);
    ctx.restore();
    // vignette
    const vg = ctx.createRadialGradient(CANVAS_W/2, CANVAS_H/2, CANVAS_W*0.3,
                                         CANVAS_W/2, CANVAS_H/2, CANVAS_W*0.75);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.55)');
    ctx.fillStyle = vg; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    // --- 13. LIGHTNING FLASH OVERLAY ---
    if (this.menuFlash > 0) {
      ctx.fillStyle = `rgba(255,255,255,${this.menuFlash})`;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    }
  }

  _hexToRgba(hex, a) {
    const h = hex.replace('#', '');
    const r = parseInt(h.substring(0,2), 16);
    const g = parseInt(h.substring(2,4), 16);
    const b = parseInt(h.substring(4,6), 16);
    return `rgba(${r},${g},${b},${a})`;
  }

  renderCharSelect(ctx, sels, frame, conf) {
    ctx.fillStyle = '#0A0A2E'; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.textAlign = 'center'; ctx.font = 'bold 28px "Courier New",monospace';
    ctx.fillStyle = '#FF4422'; ctx.fillText('SELECT YOUR FIGHTER', CANVAS_W/2, 50);

    const chars = Object.keys(CHARACTER_DATA);
    const cw = 200, ch = 280;
    const sx = (CANVAS_W-chars.length*(cw+20))/2+cw/2;

    chars.forEach((cid, i) => {
      const d = CHARACTER_DATA[cid];
      const cx = sx+i*(cw+20), cy = 100;
      ctx.fillStyle = '#111122'; ctx.fillRect(cx-cw/2, cy, cw, ch);
      if (sels[0]===i) {
        ctx.strokeStyle = '#FF4444'; ctx.lineWidth = 3;
        ctx.strokeRect(cx-cw/2-2, cy-2, cw+4, ch+4);
        if (conf[0]) { ctx.fillStyle = 'rgba(255,68,68,0.15)'; ctx.fillRect(cx-cw/2, cy, cw, ch); }
      }
      if (sels[1]===i) {
        ctx.strokeStyle = '#4444FF'; ctx.lineWidth = 3;
        ctx.strokeRect(cx-cw/2+2, cy+2, cw-4, ch-4);
        if (conf[1]) { ctx.fillStyle = 'rgba(68,68,255,0.15)'; ctx.fillRect(cx-cw/2, cy, cw, ch); }
      }
      // Preview character
      ctx.save(); ctx.translate(cx, cy+180);
      const pf = { charId:cid, state:FS.IDLE, stateFrame:frame, breathOffset:Math.sin(frame*0.05)*2,
        facing:1, currentAttack:null, attackFrame:0, spinAngle:0, grounded:true };
      renderCharacter(ctx, pf);
      ctx.restore();

      ctx.font = 'bold 20px "Courier New",monospace'; ctx.fillStyle = d.color; ctx.textAlign = 'center';
      ctx.fillText(d.name.toUpperCase(), cx, cy+ch-40);
      ctx.font = '11px "Courier New",monospace'; ctx.fillStyle = '#888899';
      ctx.fillText(d.subtitle, cx, cy+ch-22);
    });

    ctx.font = 'bold 14px "Courier New",monospace'; ctx.textAlign = 'left';
    ctx.fillStyle = '#FF4444'; ctx.fillText('P1: ←/→ to select', 30, CANVAS_H-50);
    ctx.fillStyle = conf[0] ? '#44FF44' : '#FF4444';
    ctx.fillText(conf[0] ? '✓ READY' : 'Z / SPACE / ENTER to confirm', 30, CANVAS_H-30);
    ctx.textAlign = 'right';
    ctx.fillStyle = '#4444FF'; ctx.fillText('P2: A/D to select', CANVAS_W-30, CANVAS_H-50);
    ctx.fillStyle = conf[1] ? '#44FF44' : '#4444FF';
    ctx.fillText(conf[1] ? '✓ READY' : 'ENTER to confirm', CANVAS_W-30, CANVAS_H-30);
  }

  renderTrainingHUD(ctx, fighters, inputs, showHB, dummyMode) {
    const f1 = fighters[0];
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(5, CANVAS_H-130, 220, 125);
    ctx.font = '11px "Courier New",monospace'; ctx.fillStyle = '#AAFFAA'; ctx.textAlign = 'left';
    let y = CANVAS_H-118;
    ctx.fillText(`State: ${f1.state}`, 10, y); y += 14;
    ctx.fillText(`Frame: ${f1.stateFrame}`, 10, y); y += 14;
    if (f1.currentAttack) {
      ctx.fillText(`Attack: ${f1.currentAttack.name}`, 10, y); y += 14;
      ctx.fillText(`A.Frame: ${f1.attackFrame}/${f1.currentAttack.startup}+${f1.currentAttack.active}+${f1.currentAttack.recovery}`, 10, y); y += 14;
    } else y += 28;
    ctx.fillText(`Hitboxes: ${showHB?'ON':'OFF'} [H]`, 10, y); y += 14;
    ctx.fillText(`Dummy: ${dummyMode} [1-5]`, 10, y); y += 14;
    ctx.fillText(`Meter: ${f1.superMeter}/${MAX_SUPER_METER}`, 10, y);

    // Input history
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(CANVAS_W-175, CANVAS_H-200, 170, 195);
    ctx.font = '10px "Courier New",monospace'; ctx.fillStyle = '#FFDD88';
    ctx.fillText('INPUT HISTORY', CANVAS_W-168, CANVAS_H-186);
    const hist = inputs[0].inputHistory;
    const start = Math.max(0, hist.length-12);
    for (let i = start; i < hist.length; i++) {
      const e = hist[i], ey = CANVAS_H-170+(i-start)*14;
      const ds = ['','↙','↓','↘','←','·','→','↖','↑','↗'][e.dir]||'·';
      if (e.type==='press') { ctx.fillStyle='#FFFF88'; ctx.fillText(`${ds} + ${e.btn}`, CANVAS_W-168, ey); }
      else if (e.type==='release') { ctx.fillStyle='#886666'; ctx.fillText(`${ds} ~ ${e.btn}`, CANVAS_W-168, ey); }
      else { ctx.fillStyle='#88AACC'; ctx.fillText(ds, CANVAS_W-168, ey); }
    }
    ctx.restore();
  }

  renderPause(ctx, sel) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)'; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    ctx.textAlign = 'center'; ctx.font = 'bold 36px "Courier New",monospace';
    ctx.fillStyle = '#FFF'; ctx.fillText('PAUSED', CANVAS_W/2, 180);
    const items = ['RESUME','CHARACTER SELECT','MAIN MENU'];
    items.forEach((item, i) => {
      const y = 250+i*45;
      ctx.font = 'bold 20px "Courier New",monospace';
      ctx.fillStyle = i===sel ? '#FF4422' : '#666688';
      ctx.fillText(i===sel ? `▶ ${item} ◀` : item, CANVAS_W/2, y);
    });
    // Controls column
    ctx.font = 'bold 12px "Courier New",monospace'; ctx.fillStyle = '#FFDD44'; ctx.textAlign = 'left';
    ctx.fillText('P1 CONTROLS', 40, 370);
    ctx.font = '11px "Courier New",monospace'; ctx.fillStyle = '#8888AA';
    ctx.fillText('Move: Arrow Keys', 40, 388);
    ctx.fillText('Punch: Z (L)  X (M)  C (H)', 40, 404);
    ctx.fillText('Kick:  V (L)  B (M)  N (H)', 40, 420);
    ctx.font = 'bold 12px "Courier New",monospace'; ctx.fillStyle = '#FFDD44';
    ctx.fillText('P2 CONTROLS', 340, 370);
    ctx.font = '11px "Courier New",monospace'; ctx.fillStyle = '#8888AA';
    ctx.fillText('Move: W/A/S/D', 340, 388);
    ctx.fillText('Punch: U (L)  I (M)  O (H)', 340, 404);
    ctx.fillText('Kick:  J (L)  K (M)  L (H)', 340, 420);
    // Special moves
    ctx.font = 'bold 12px "Courier New",monospace'; ctx.fillStyle = '#FF6644'; ctx.textAlign = 'center';
    ctx.fillText('SPECIAL MOVES (facing right)', CANVAS_W/2, 450);
    ctx.font = '11px "Courier New",monospace'; ctx.fillStyle = '#8888AA';
    const moves = [
      ['Fireball (QCF)',     '↓ ↘ →  + Punch',       'Ryu/Ken: Hadouken  Chun-Li: Kikoken'],
      ['Dragon Punch (DP)',  '→ ↓ ↘  + Punch',       'Invincible rising uppercut!'],
      ['Hurricane (QCB)',    '↓ ↙ ←  + Kick',        'Ryu/Ken: Tatsumaki  Chun-Li: Spinning Bird'],
      ['Lightning Legs',     '↓ ↘ →  + Kick',        'Chun-Li only — rapid kicks'],
      ['SUPER (full meter)', '↓↘→ ↓↘→ + P/K',       'Devastating finisher!'],
      ['EX Move (¼ meter)',  'Press 2 buttons',       'Powered-up special move'],
    ];
    moves.forEach((m, i) => {
      const y = 470 + i * 16;
      ctx.fillStyle = '#AAAACC'; ctx.textAlign = 'left';
      ctx.fillText(m[0], 40, y);
      ctx.fillStyle = '#FFDD44'; ctx.textAlign = 'center';
      ctx.fillText(m[1], CANVAS_W/2, y);
      ctx.fillStyle = '#666688'; ctx.textAlign = 'right';
      ctx.fillText(m[2], CANVAS_W - 40, y);
    });
  }

  _darken(hex, f) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgb(${Math.floor(r*f)},${Math.floor(g*f)},${Math.floor(b*f)})`;
  }
}


// ============================================================================
// SECTION 13: GAME CONTROLLER
// ============================================================================

class Game {
  constructor(canvas) {
    this.canvas = canvas;
    this.ctx = canvas.getContext('2d');
    canvas.width = CANVAS_W; canvas.height = CANVAS_H;

    this.audio = new AudioEngine();
    this.particles = new ParticleSystem();
    this.ui = new UIRenderer();
    this.combo = new ComboSystem();
    this.stage = new Stage('castle');

    this.keys = {}; this.prevKeys = {};
    this.inputs = [new InputManager(0), new InputManager(1)];

    this.state = STATE.MENU; this.frame = 0;
    this.menuSelection = 1; // Default to CPU mode (vs=0, cpu=1, training=2)
    this.charSelections = [0, 1]; this.charConfirm = [false, false];
    this.fighters = [null, null]; this.projectiles = [];
    this.roundTimer = ROUND_TIME; this.roundNumber = 0;
    this.gameMode = 'vs'; this.ai = null;
    this.hitstopTimer = 0; this.superFlashTimer = 0;
    this.shakeX = 0; this.shakeY = 0; this.shakeIntensity = 0;
    this.cameraX = 0; this.cameraZoom = 1; this.targetZoom = 1;
    this.pauseSelection = 0; this.prevState = null;
    this.showHitboxes = false; this.dummyMode = 'stand';
    this.matchEndTimer = 0; this.winQuoteIndex = 0;
    this.introTimer = 0; this.roundEndTimer = 0;
    this.damageFlashes = []; // [{x,y,dmg,life,color,isHeavy}]
    this.hitFlash = 0; // Full-screen impact flash alpha (0–1)
    this.hitFlashColor = 'rgba(255,255,255,';
    this.hitPop = null; // { text, life, color, scale }
    this.koFreezeTimer = 0;
    this.roundPerfect = false; this.roundPerfectShown = false;

    this._setupInput();
    this._resize();
    window.addEventListener('resize', () => this._resize());
  }

  _setupInput() {
    // Track whether we've received any input (for "click to start" prompt)
    this.hasInput = false;

    window.addEventListener('keydown', e => {
      // Don't prevent F5/F12/DevTools shortcuts
      if (e.code === 'F5' || e.code === 'F12' || (e.ctrlKey || e.metaKey)) return;
      e.preventDefault();
      this.keys[e.code] = true;
      this.hasInput = true;
      this.audio.init(); this.audio.resume();
    });
    window.addEventListener('keyup', e => {
      if (e.code === 'F5' || e.code === 'F12' || (e.ctrlKey || e.metaKey)) return;
      e.preventDefault();
      this.keys[e.code] = false;
    });

    // Click/touch to ensure focus and start audio
    const clickHandler = () => {
      this.hasInput = true;
      this.audio.init(); this.audio.resume();
      this.canvas.focus();
    };
    this.canvas.addEventListener('click', clickHandler);
    this.canvas.addEventListener('touchstart', clickHandler);

    // Make canvas focusable
    this.canvas.setAttribute('tabindex', '0');
    this.canvas.focus();
  }

  _resize() {
    const r = CANVAS_W/CANVAS_H;
    let w = window.innerWidth, h = window.innerHeight;
    if (w/h > r) w = h*r; else h = w/r;
    this.canvas.style.width = w+'px'; this.canvas.style.height = h+'px';
    this.canvas.style.marginTop = ((window.innerHeight-h)/2)+'px';
  }

  _kp(code) { return this.keys[code] && !this.prevKeys[code]; }

  start() {
    let last = performance.now();
    const tick = 1000/60;
    const loop = (now) => {
      requestAnimationFrame(loop);
      if (now - last < tick * 0.8) return;
      last = now;
      this.update(); this.render();
      this.prevKeys = {...this.keys}; this.frame++;
    };
    requestAnimationFrame(loop);
  }

  update() {
    this.ui.update();
    switch (this.state) {
      case STATE.MENU: this._updateMenu(); break;
      case STATE.CHAR_SELECT: this._updateCharSel(); break;
      case STATE.INTRO: this._updateIntro(); break;
      case STATE.FIGHT: case STATE.TRAINING: this._updateFight(); break;
      case STATE.ROUND_END: this._updateRoundEnd(); break;
      case STATE.MATCH_END: this._updateMatchEnd(); break;
      case STATE.PAUSE: this._updatePause(); break;
    }
  }

  _updateMenu() {
    this.ui.updateMenu(this.frame);
    if (this._kp('ArrowUp') || this._kp('KeyW')) { this.menuSelection = (this.menuSelection+2)%3; this.audio.playEffect('menuMove'); }
    if (this._kp('ArrowDown') || this._kp('KeyS')) { this.menuSelection = (this.menuSelection+1)%3; this.audio.playEffect('menuMove'); }
    if (this._kp('KeyZ')) { // Z also confirms in menu
      this.audio.playEffect('menuSelect');
      this.gameMode = ['vs','cpu','training'][this.menuSelection];
      this.state = STATE.CHAR_SELECT; this.charConfirm = [false, false];
      document.body.className = 'playing';
      return;
    }
    if (this._kp('Enter') || this._kp('Space')) {
      this.audio.playEffect('menuSelect');
      this.gameMode = ['vs','cpu','training'][this.menuSelection];
      this.state = STATE.CHAR_SELECT; this.charConfirm = [false, false];
      document.body.className = 'playing';
    }
  }

  _updateCharSel() {
    const cc = Object.keys(CHARACTER_DATA).length;
    const singlePlayer = this.gameMode !== 'vs';

    // P1 character selection — Arrow keys
    if (!this.charConfirm[0]) {
      const p1Left = this._kp('ArrowLeft');
      const p1Right = this._kp('ArrowRight');
      if (p1Left) { this.charSelections[0] = (this.charSelections[0]+cc-1)%cc; this.audio.playEffect('menuMove'); }
      if (p1Right) { this.charSelections[0] = (this.charSelections[0]+1)%cc; this.audio.playEffect('menuMove'); }
      if (this._kp('KeyZ') || this._kp('KeyX') || this._kp('Space') ||
          (this._kp('Enter') && !this.charConfirm[1])) {
        this.charConfirm[0] = true; this.audio.playEffect('menuSelect');
      }
    }

    // P2 character selection
    if (this.gameMode === 'vs') {
      if (!this.charConfirm[1]) {
        if (this._kp('KeyA')) { this.charSelections[1]=(this.charSelections[1]+cc-1)%cc; this.audio.playEffect('menuMove'); }
        if (this._kp('KeyD')) { this.charSelections[1]=(this.charSelections[1]+1)%cc; this.audio.playEffect('menuMove'); }
        if (this._kp('KeyU') || this._kp('KeyJ') || this._kp('Numpad4') ||
            (this._kp('Enter') && this.charConfirm[0])) {
          this.charConfirm[1] = true; this.audio.playEffect('menuSelect');
        }
      }
    } else if (this.charConfirm[0]) {
      // In single-player, P1 picks the opponent too
      if (this._kp('ArrowLeft') || this._kp('KeyA')) { this.charSelections[1]=(this.charSelections[1]+cc-1)%cc; this.audio.playEffect('menuMove'); }
      if (this._kp('ArrowRight') || this._kp('KeyD')) { this.charSelections[1]=(this.charSelections[1]+1)%cc; this.audio.playEffect('menuMove'); }
      if (this._kp('Enter') || this._kp('Space') || this._kp('KeyZ')) {
        this.charConfirm[1] = true; this.audio.playEffect('menuSelect');
      }
    }

    if (this._kp('Escape')) { this.state = STATE.MENU; this.charConfirm=[false,false]; document.body.className='menu'; return; }
    if (this.charConfirm[0] && this.charConfirm[1]) this._startMatch();
  }

  _startMatch() {
    const cids = Object.keys(CHARACTER_DATA);
    this.fighters[0] = new Fighter(cids[this.charSelections[0]], 0, 280);
    this.fighters[1] = new Fighter(cids[this.charSelections[1]], 1, CANVAS_W-280);
    this.fighters[0].inputRef = this.inputs[0];
    this.fighters[1].inputRef = this.inputs[1];
    // Tell input managers the game mode so P1 knows whether arrows are available
    this.inputs[0].gameMode = this.gameMode;
    this.inputs[1].gameMode = this.gameMode;
    this.projectiles = []; this.roundNumber = 1;
    this.fighters[0].wins = 0; this.fighters[1].wins = 0;
    this.ai = (this.gameMode==='cpu'||this.gameMode==='training') ? new SimpleAI(this.gameMode==='training'?'easy':'hard') : null;
    // Pick stage based on the right-side fighter (classic SF2: defender's home)
    const stageMap = { ryu:'castle', ken:'resort', chunli:'wall' };
    const stageTheme = stageMap[this.fighters[1].charId] || 'castle';
    this.stage.setTheme(stageTheme);
    this.audio.setTheme(stageTheme);
    this.state = STATE.INTRO; this.introTimer = 120;
    this.audio.startMusic();
  }

  _startRound() {
    this.fighters[0].resetForRound(280);
    this.fighters[1].resetForRound(CANVAS_W-280);
    this.projectiles = []; this.particles.clear();
    this.combo.reset(0); this.combo.reset(1);
    this.roundTimer = ROUND_TIME; this.hitstopTimer = 0;
    this.superFlashTimer = 0; this.shakeIntensity = 0;
    this.damageFlashes = []; this.hitFlash = 0; this.hitPop = null;
    this.koFreezeTimer = 0; this.targetZoom = 1;
    this.state = STATE.INTRO; this.introTimer = 90;
  }

  _updateIntro() {
    this.introTimer--;
    if (this.introTimer === 60) {
      const isFinal = (this.fighters[0].wins === ROUNDS_TO_WIN-1) && (this.fighters[1].wins === ROUNDS_TO_WIN-1);
      const label = isFinal ? 'FINAL ROUND' : `ROUND ${this.roundNumber}`;
      const voice = isFinal ? 'roundF' : (this.roundNumber === 1 ? 'round1' : 'round2');
      this.ui.announce(label, 50);
      this.audio.playVoice(voice);
    }
    if (this.introTimer === 10) { this.ui.announce('FIGHT!', 40); this.audio.playVoice('fight'); }
    if (this.introTimer <= 0) this.state = this.gameMode === 'training' ? STATE.TRAINING : STATE.FIGHT;
  }

  _updateFight() {
    if (this._kp('Escape')) { this.prevState = this.state; this.state = STATE.PAUSE; this.pauseSelection = 0; return; }
    // Update cosmetic overlays regardless of hitstop
    this._updateOverlays();
    if (this.hitstopTimer > 0) { this.hitstopTimer--; this._shake(); return; }
    if (this.superFlashTimer > 0) { this.superFlashTimer--; return; }

    const aiKeys = this.ai ? this.ai.getKeys(this.fighters[1], this.fighters[0], this.frame) : this.keys;
    let p2Keys = aiKeys;
    if (this.state === STATE.TRAINING) {
      p2Keys = this._dummyKeys();
      if (this._kp('KeyH')) this.showHitboxes = !this.showHitboxes;
      if (this._kp('Digit1')) this.dummyMode = 'stand';
      if (this._kp('Digit2')) this.dummyMode = 'crouch';
      if (this._kp('Digit3')) this.dummyMode = 'jump';
      if (this._kp('Digit4')) this.dummyMode = 'block';
      if (this._kp('Digit5')) this.dummyMode = 'counter';
      this.fighters[1].health = this.fighters[1].maxHealth;
      this.fighters[0].superMeter = MAX_SUPER_METER;
    }

    this.inputs[0].update(this.keys, this.frame);
    this.inputs[1].update(p2Keys, this.frame);
    this.fighters[0].update(this.inputs[0], this.fighters[1], this);
    this.fighters[1].update(this.inputs[1], this.fighters[0], this);
    CollisionSystem.resolvePushboxes(this.fighters[0], this.fighters[1]);
    this._checkAttacks();
    this.projectiles = this.projectiles.filter(p => p.update(this.frame));
    this._checkProjectiles();
    this.particles.update(); this.combo.update();

    if (this.state !== STATE.TRAINING) {
      this.roundTimer -= 1/60;
      if (this.roundTimer <= 0) { this.roundTimer = 0; this._endRoundTimeout(); }
      if (this.fighters[0].health <= 0 || this.fighters[1].health <= 0) this._endRound();
    }

    this._camera(); this._shake();
    this.cameraZoom += (this.targetZoom - this.cameraZoom) * 0.1;
  }

  _dummyKeys() {
    const d = {}, f2 = this.fighters[1], km = new InputManager(1).getKeyMap();
    const backKey = f2.facing === 1 ? km.left[0] : km.right[0];
    switch (this.dummyMode) {
      case 'crouch': d[km.down[0]]=true; break;
      case 'jump': if (f2.grounded && this.frame%120===0) d[km.up[0]]=true; break;
      case 'block': d[backKey]=true; if (Math.random()<0.5) d[km.down[0]]=true; break;
      case 'counter': d[backKey]=true; if (f2.state===FS.BLOCKSTUN && f2.stunTimer<=2) d[km.LP[0]]=true; break;
    }
    return d;
  }

  _checkAttacks() {
    for (let i = 0; i < 2; i++) {
      const atk = this.fighters[i], def = this.fighters[1-i];
      if (!atk.currentAttack || atk.currentAttack.projectile) continue;
      const hb = atk.getAttackHitbox();
      if (!hb) continue;
      const a = atk.currentAttack;
      const maxH = a.hits || 1;
      const interval = a.rapid ? Math.floor(a.active / maxH) : 8;
      if (atk.hitCount >= maxH) continue;
      if (this.frame - atk.lastHitFrame < interval) continue;
      if (!CollisionSystem.aabb(hb, def.getHurtbox())) continue;
      if (def.invincible > 0) continue;
      if (!def.grounded && def.juggleCount >= MAX_JUGGLE) continue;

      atk.attackHit = true; atk.hitCount++; atk.lastHitFrame = this.frame;
      if (def.isBlocking(a.type)) this._block(atk, def, a);
      else this._hit(atk, def, a, i);
    }
  }

  _checkProjectiles() {
    for (const proj of this.projectiles) {
      if (!proj.active || !proj.canHit(this.frame)) continue;
      const di = proj.owner.playerIndex === 0 ? 1 : 0;
      const def = this.fighters[di];
      if (!CollisionSystem.aabb(proj.getWorldHitbox(), def.getHurtbox())) continue;
      if (def.invincible > 0) continue;
      proj.onHit(this.frame);
      if (def.isBlocking(proj.data.type)) this._block(proj.owner, def, proj.data);
      else this._hit(proj.owner, def, proj.data, proj.owner.playerIndex);
    }
    // Projectile vs projectile
    for (let i = 0; i < this.projectiles.length; i++) {
      for (let j = i+1; j < this.projectiles.length; j++) {
        const p1 = this.projectiles[i], p2 = this.projectiles[j];
        if (!p1.active || !p2.active || p1.owner.playerIndex === p2.owner.playerIndex) continue;
        if (CollisionSystem.aabb(p1.getWorldHitbox(), p2.getWorldHitbox())) {
          if (p1.isSuper && !p2.isSuper) { p2.active=false; this.particles.spawnHitSparks(p2.x,p2.y,'medium','#FFDD44'); }
          else if (p2.isSuper && !p1.isSuper) { p1.active=false; this.particles.spawnHitSparks(p1.x,p1.y,'medium','#FFDD44'); }
          else { p1.active=false; p2.active=false; this.particles.spawnHitSparks((p1.x+p2.x)/2,(p1.y+p2.y)/2,'heavy','#FFF'); }
        }
      }
    }
  }

  _block(atk, def, a) {
    def.takeBlock(a.blockstun, a.pushback);
    this.audio.playBlock();
    this.particles.spawnBlockSparks((atk.x+def.x)/2, def.y-40);
    this.hitstopTimer = 3;
    atk.superMeter = Math.min(MAX_SUPER_METER, atk.superMeter + METER_GAIN_BLOCKED);
  }

  _hit(atk, def, a, ai) {
    const sc = this.combo.getScaling(ai);
    const dmg = Math.round(a.damage * sc);
    def.takeDamage(dmg, a.hitstun, a.pushback, atk, a.knockdown, a.launcher, a.isSuper);
    atk.superMeter = Math.min(MAX_SUPER_METER, atk.superMeter + METER_GAIN_HIT);
    this.combo.addHit(ai, dmg);
    const cx = (atk.x+def.x)/2, cy = def.y-45;
    const str = a.damage >= 100 ? 'heavy' : a.damage >= 60 ? 'medium' : 'light';
    this.audio.playHit(str);
    this.particles.spawnHitSparks(cx, cy, str, atk.data.accentColor);
    this.hitstopTimer = a.isSuper ? HITSTOP_SUPER : a.isSpecial ? HITSTOP_SPECIAL :
      str==='heavy' ? HITSTOP_HEAVY : str==='medium' ? HITSTOP_MEDIUM : HITSTOP_LIGHT;
    this.shakeIntensity = str==='heavy' ? 12 : str==='medium' ? 6 : 3;
    if (a.isSuper) this.shakeIntensity = 20;
    if (str==='heavy' && def.grounded) this.particles.spawnDust(def.x, GROUND_Y, atk.facing);

    // Damage number flyout
    this.damageFlashes.push({
      x: cx + (Math.random()-0.5)*20, y: cy - 10,
      vy: -2.2 - Math.random()*0.6,
      vx: atk.facing * (0.5 + Math.random()*0.8),
      dmg, life: 55, maxLife: 55,
      color: str==='heavy' ? '#FF4422' : str==='medium' ? '#FFAA22' : '#FFFFFF',
      size: str==='heavy' ? 30 : str==='medium' ? 22 : 16,
    });

    // Screen flash on heavy hits / supers
    if (a.isSuper) {
      this.hitFlash = 0.55;
      this.hitFlashColor = 'rgba(255,230,150,';
      this.hitPop = { text: this._hitWord(a, 'super'), life: 30, color: '#FFDD00', scale: 2.4 };
    } else if (str === 'heavy') {
      this.hitFlash = 0.32;
      this.hitFlashColor = 'rgba(255,240,220,';
      this.hitPop = { text: this._hitWord(a, 'heavy'), life: 22, color: atk.data.accentColor, scale: 1.8 };
    } else if (a.isSpecial) {
      this.hitFlash = 0.22;
      this.hitFlashColor = 'rgba(255,220,180,';
    }
    // Counter-hit flash during opponent's startup
    if (def.state === FS.ATTACK && def.currentAttack && def.attackFrame < def.currentAttack.startup) {
      this.hitFlash = Math.max(this.hitFlash, 0.45);
      this.hitFlashColor = 'rgba(255,120,120,';
      this.hitPop = { text: 'COUNTER!', life: 28, color: '#FF4444', scale: 1.6 };
    }
  }

  _hitWord(a, kind) {
    if (kind === 'super') return ['SMASH!','CRUSH!','DEVASTATE!'][Math.floor(Math.random()*3)];
    const words = a.projectile ? ['ZAP!','BLAST!','BOOM!'] :
                  a.name && a.name.includes('K') ? ['WHACK!','THUD!','KRAK!'] :
                  ['POW!','BAM!','SOCK!'];
    return words[Math.floor(Math.random()*words.length)];
  }

  _endRound() {
    const d1 = this.fighters[0].health <= 0, d2 = this.fighters[1].health <= 0;
    this.roundWinner = null;
    this.roundPerfect = false;
    if (d1 && !d2) {
      this.fighters[1].wins++; this.fighters[1].setState(FS.WIN); this.fighters[0].setState(FS.LOSE); this.roundWinner = 1;
      this.roundPerfect = this.fighters[1].health >= this.fighters[1].maxHealth - 0.5;
    } else if (d2 && !d1) {
      this.fighters[0].wins++; this.fighters[0].setState(FS.WIN); this.fighters[1].setState(FS.LOSE); this.roundWinner = 0;
      this.roundPerfect = this.fighters[0].health >= this.fighters[0].maxHealth - 0.5;
    } else if (d1 && d2) { this.roundWinner = -1; /* double KO */ }
    this.ui.announce('K.O.!', 80); this.audio.playVoice('ko');
    // Cinematic KO freeze — extended hitstop + zoom + flash
    this.hitstopTimer = 45;
    this.koFreezeTimer = 45;
    this.shakeIntensity = 22;
    this.targetZoom = 1.15;
    setTimeout(() => { this.targetZoom = 1; }, 900);
    this.state = STATE.ROUND_END; this.roundEndTimer = 210;
    this.roundWinnerShown = false;
    this.roundPerfectShown = false;
  }

  _endRoundTimeout() {
    const h1 = this.fighters[0].health/this.fighters[0].maxHealth;
    const h2 = this.fighters[1].health/this.fighters[1].maxHealth;
    this.roundWinner = null;
    if (h1 > h2) { this.fighters[0].wins++; this.fighters[0].setState(FS.WIN); this.fighters[1].setState(FS.LOSE); this.roundWinner = 0; }
    else if (h2 > h1) { this.fighters[1].wins++; this.fighters[1].setState(FS.WIN); this.fighters[0].setState(FS.LOSE); this.roundWinner = 1; }
    else this.roundWinner = -1;
    this.ui.announce('TIME!', 80); this.state = STATE.ROUND_END; this.roundEndTimer = 180;
    this.roundWinnerShown = false;
  }

  _updateRoundEnd() {
    this.roundEndTimer--; this.particles.update();
    this._updateOverlays(); this._shake();
    this.cameraZoom += (this.targetZoom - this.cameraZoom) * 0.08;
    if (this.koFreezeTimer > 0) this.koFreezeTimer--;
    // PERFECT announce (before winner name)
    if (this.roundPerfect && !this.roundPerfectShown && this.roundEndTimer < 150) {
      this.roundPerfectShown = true;
      this.ui.announce('P E R F E C T !', 80);
      this.audio.playVoice('perfect');
    }
    // Show winner name after K.O./TIME text fades
    if (!this.roundWinnerShown && this.roundEndTimer < (this.roundPerfect ? 70 : 110)) {
      this.roundWinnerShown = true;
      if (this.roundWinner === -1) {
        this.ui.announce('DOUBLE K.O.!', 90);
      } else if (this.roundWinner != null) {
        const winner = this.fighters[this.roundWinner];
        this.ui.announce(`${winner.name.toUpperCase()} WINS!`, 90);
        this.audio.playVoice('win');
      }
    }
    if (this.roundEndTimer <= 0) {
      if (this.fighters[0].wins >= ROUNDS_TO_WIN || this.fighters[1].wins >= ROUNDS_TO_WIN) {
        this.state = STATE.MATCH_END; this.matchEndTimer = 300;
        const w = this.fighters[0].wins >= ROUNDS_TO_WIN ? this.fighters[0] : this.fighters[1];
        this.winQuoteIndex = Math.floor(Math.random()*w.data.winQuotes.length);
      } else { this.roundNumber++; this._startRound(); }
    }
  }

  _updateMatchEnd() {
    this.matchEndTimer--; this.particles.update();
    if (this.matchEndTimer <= 0 || this._kp('Enter') || this._kp('Space')) {
      this.state = STATE.CHAR_SELECT; this.charConfirm=[false,false]; this.audio.stopMusic();
    }
  }

  _updatePause() {
    if (this._kp('Escape')) { this.state = this.prevState||STATE.FIGHT; return; }
    if (this._kp('ArrowUp')||this._kp('KeyW')) { this.pauseSelection=(this.pauseSelection+2)%3; this.audio.playEffect('menuMove'); }
    if (this._kp('ArrowDown')||this._kp('KeyS')) { this.pauseSelection=(this.pauseSelection+1)%3; this.audio.playEffect('menuMove'); }
    if (this._kp('Enter')||this._kp('Space')) {
      this.audio.playEffect('menuSelect');
      if (this.pauseSelection===0) this.state = this.prevState||STATE.FIGHT;
      else if (this.pauseSelection===1) { this.state=STATE.CHAR_SELECT; this.charConfirm=[false,false]; this.audio.stopMusic(); }
      else { this.state=STATE.MENU; this.audio.stopMusic(); document.body.className='menu'; }
    }
  }

  _camera() {
    if (this.fighters[0] && this.fighters[1]) this.cameraX = (this.fighters[0].x+this.fighters[1].x)/2-CANVAS_W/2;
  }

  _updateOverlays() {
    if (this.hitFlash > 0) this.hitFlash = Math.max(0, this.hitFlash - 0.045);
    if (this.hitPop && this.hitPop.life > 0) { this.hitPop.life--; this.hitPop.scale = Math.max(1, this.hitPop.scale*0.93); }
    for (let i = this.damageFlashes.length - 1; i >= 0; i--) {
      const d = this.damageFlashes[i];
      d.x += d.vx; d.y += d.vy; d.vy += 0.06; d.life--;
      if (d.life <= 0) this.damageFlashes.splice(i, 1);
    }
  }

  _renderOverlays(ctx) {
    // Damage numbers
    ctx.save();
    this.damageFlashes.forEach(d => {
      const a = Math.min(1, d.life/20);
      ctx.globalAlpha = a;
      ctx.textAlign = 'center';
      ctx.font = `bold ${d.size}px "Courier New",monospace`;
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillText(d.dmg, d.x+2, d.y+2);
      ctx.fillStyle = d.color;
      ctx.shadowColor = d.color; ctx.shadowBlur = 8;
      ctx.fillText(d.dmg, d.x, d.y);
      ctx.shadowBlur = 0;
    });
    ctx.restore();

    // Big hit text pop
    if (this.hitPop && this.hitPop.life > 0) {
      const a = Math.min(1, this.hitPop.life/18);
      ctx.save();
      ctx.globalAlpha = a;
      ctx.translate(CANVAS_W/2, CANVAS_H/2-80);
      ctx.rotate((Math.sin(this.frame*0.5)*0.08));
      ctx.scale(this.hitPop.scale, this.hitPop.scale);
      ctx.textAlign = 'center';
      ctx.font = 'bold 44px "Impact","Arial Black",sans-serif';
      ctx.fillStyle = 'rgba(0,0,0,0.85)';
      ctx.fillText(this.hitPop.text, 4, 4);
      ctx.fillStyle = this.hitPop.color;
      ctx.shadowColor = this.hitPop.color; ctx.shadowBlur = 18;
      ctx.fillText(this.hitPop.text, 0, 0);
      ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2;
      ctx.strokeText(this.hitPop.text, 0, 0);
      ctx.restore();
    }
  }

  _shake() {
    if (this.shakeIntensity > 0) {
      this.shakeX = (Math.random()-0.5)*this.shakeIntensity;
      this.shakeY = (Math.random()-0.5)*this.shakeIntensity;
      this.shakeIntensity *= 0.85;
      if (this.shakeIntensity < 0.5) { this.shakeIntensity=0; this.shakeX=0; this.shakeY=0; }
    }
  }

  spawnProjectile(owner, data) {
    this.projectiles.push(new Projectile(
      owner.x+owner.facing*40, owner.y-45,
      (data.speed||5)*owner.facing, owner, data, owner.facing));
  }

  startSuperFlash(owner) {
    this.superFlashTimer = owner.currentAttack.superFlash || 30;
    this.particles.spawnSuperFlash(owner.x, owner.y-40);
    this.audio.playEffect('superFlash');
    this.targetZoom = 1.1;
    setTimeout(() => { this.targetZoom = 1; }, 500);
  }

  render() {
    const ctx = this.ctx;
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
    switch (this.state) {
      case STATE.MENU: this.ui.renderMenu(ctx, this.menuSelection, this.frame); break;
      case STATE.CHAR_SELECT: this.ui.renderCharSelect(ctx, this.charSelections, this.frame, this.charConfirm); break;
      default: this._renderFight(ctx); break;
    }
    if (this.state === STATE.PAUSE) this.ui.renderPause(ctx, this.pauseSelection);

    // "Click or press any key" overlay if no input received yet
    if (!this.hasInput && this.state === STATE.MENU) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
      ctx.textAlign = 'center';
      ctx.font = 'bold 28px "Courier New",monospace';
      ctx.fillStyle = '#FFF';
      const blink = Math.sin(this.frame * 0.08) > 0;
      if (blink) ctx.fillText('CLICK OR PRESS ANY KEY TO START', CANVAS_W/2, CANVAS_H/2);
      ctx.font = '14px "Courier New",monospace';
      ctx.fillStyle = '#888';
      ctx.fillText('This activates keyboard input and audio', CANVAS_W/2, CANVAS_H/2 + 30);
    }
  }

  _renderFight(ctx) {
    ctx.save();
    ctx.translate(this.shakeX, this.shakeY);
    if (this.cameraZoom !== 1) {
      ctx.translate(CANVAS_W/2, CANVAS_H/2);
      ctx.scale(this.cameraZoom, this.cameraZoom);
      ctx.translate(-CANVAS_W/2, -CANVAS_H/2);
    }

    this.stage.render(ctx, this.frame, this.cameraX);
    this.projectiles.forEach(p => p.render(ctx));

    if (this.superFlashTimer > 0) {
      ctx.fillStyle = `rgba(255,255,200,${Math.min(0.6, this.superFlashTimer/15)})`;
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    }

    const shb = this.state === STATE.TRAINING && this.showHitboxes;
    const order = this.fighters[0].y <= this.fighters[1].y ? [0,1] : [1,0];
    order.forEach(i => { if (this.fighters[i]) this.fighters[i].render(ctx, shb); });
    this.particles.render(ctx);

    // Hit-flash over the shaken/zoomed scene
    if (this.hitFlash > 0) {
      ctx.fillStyle = this.hitFlashColor + this.hitFlash + ')';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    }
    // Cinematic KO vignette
    if (this.koFreezeTimer > 0) {
      const v = Math.min(1, this.koFreezeTimer/45);
      const vg = ctx.createRadialGradient(CANVAS_W/2, CANVAS_H/2, 100, CANVAS_W/2, CANVAS_H/2, 600);
      vg.addColorStop(0, 'rgba(0,0,0,0)');
      vg.addColorStop(1, `rgba(0,0,0,${0.65*v})`);
      ctx.fillStyle = vg; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    }
    ctx.restore();

    // Damage numbers + hit text pops — drawn in screen space, on top of everything
    this._renderOverlays(ctx);

    this.ui.renderHUD(ctx, this.fighters, this.roundTimer, this.combo);
    if (this.state === STATE.TRAINING) this.ui.renderTrainingHUD(ctx, this.fighters, this.inputs, this.showHitboxes, this.dummyMode);
    if (this.state === STATE.MATCH_END) this._renderMatchEnd(ctx);
  }

  _renderMatchEnd(ctx) {
    const a = Math.min(1, (300-this.matchEndTimer)/60);
    // Animated dark curtain drop
    ctx.fillStyle = `rgba(0,0,0,${a*0.75})`; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
    if (a <= 0.3) return;
    const w = this.fighters[0].wins >= ROUNDS_TO_WIN ? this.fighters[0] : this.fighters[1];
    const t = (300 - this.matchEndTimer) / 60;

    // Radial accent-color glow behind winner
    const glowRad = 280 + Math.sin(this.frame*0.05)*10;
    const gg = ctx.createRadialGradient(CANVAS_W/2, CANVAS_H/2+40, 20, CANVAS_W/2, CANVAS_H/2+40, glowRad);
    gg.addColorStop(0, this._hexToRgba(w.data.accentColor, 0.35*a));
    gg.addColorStop(0.5, this._hexToRgba(w.data.accentColor, 0.12*a));
    gg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gg; ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    // Rotating radial rays
    ctx.save();
    ctx.globalAlpha = 0.15 * a;
    ctx.translate(CANVAS_W/2, CANVAS_H/2+40);
    ctx.rotate(this.frame*0.008);
    for (let i = 0; i < 12; i++) {
      ctx.rotate(Math.PI*2/12);
      ctx.fillStyle = w.data.accentColor;
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(400, 30); ctx.lineTo(400,-30); ctx.closePath(); ctx.fill();
    }
    ctx.restore();

    // Render the winner character, scaled up, centered
    ctx.save();
    ctx.translate(CANVAS_W/2, CANVAS_H/2 + 80);
    const scale = 2.2 + Math.sin(this.frame*0.04)*0.05;
    ctx.scale(scale, scale);
    const pose = {
      charId: w.charId, state: FS.WIN, stateFrame: this.frame,
      breathOffset: Math.sin(this.frame*0.05)*2,
      facing: 1, currentAttack: null, attackFrame: 0, spinAngle: 0, grounded: true,
    };
    if (typeof renderCharacter === 'function') renderCharacter(ctx, pose);
    ctx.restore();

    // "WINS!" banner — slides in from left
    const bannerY = 110;
    const bannerT = Math.min(1, t*1.5);
    ctx.save();
    ctx.translate(CANVAS_W/2 + (1-bannerT)*(-800), bannerY);
    ctx.textAlign = 'center';
    ctx.font = 'bold 56px "Impact","Arial Black",sans-serif';
    ctx.fillStyle = 'rgba(0,0,0,0.85)';
    ctx.fillText(`${w.name.toUpperCase()} WINS!`, 4, 4);
    ctx.fillStyle = w.data.accentColor;
    ctx.shadowColor = w.data.accentColor; ctx.shadowBlur = 25;
    ctx.fillText(`${w.name.toUpperCase()} WINS!`, 0, 0);
    ctx.shadowBlur = 0;
    ctx.strokeStyle = '#FFF'; ctx.lineWidth = 2;
    ctx.strokeText(`${w.name.toUpperCase()} WINS!`, 0, 0);
    ctx.restore();

    // Subtitle (character tagline)
    if (t > 0.6) {
      ctx.textAlign = 'center';
      ctx.font = 'italic bold 18px "Courier New",monospace';
      ctx.fillStyle = '#FFDD99';
      ctx.fillText(w.data.subtitle, CANVAS_W/2, 145);
    }

    // Win quote — typewriter in
    if (t > 1.2) {
      const quote = w.data.winQuotes[this.winQuoteIndex];
      const charCount = Math.min(quote.length, Math.floor((t-1.2)*40));
      ctx.font = '18px "Courier New",monospace';
      ctx.fillStyle = '#FFF'; ctx.textAlign = 'center';
      ctx.fillText(`"${quote.slice(0, charCount)}"`, CANVAS_W/2, CANVAS_H - 90);
    }

    // Press-to-continue prompt
    if (t > 2.5) {
      const blink = Math.sin(this.frame*0.12) > 0;
      if (blink) {
        ctx.font = 'bold 14px "Courier New",monospace';
        ctx.fillStyle = '#AAAACC'; ctx.textAlign = 'center';
        ctx.fillText('Press ENTER or SPACE to continue', CANVAS_W/2, CANVAS_H - 30);
      }
    }
  }

  _hexToRgba(hex, a) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${a})`;
  }
}


// ============================================================================
// SECTION 14: BOOTSTRAP
// ============================================================================

window.addEventListener('DOMContentLoaded', () => {
  const game = new Game(document.getElementById('gameCanvas'));
  game.start();
});

</script>
