    for(let c=56;c<=57;c++){map[13][c]=T.LAVA;map[14][c]=T.LAVA;}
    for(let c=86;c<=87;c++){map[13][c]=T.LAVA;map[14][c]=T.LAVA;}
    for(let c=111;c<=112;c++){map[13][c]=T.LAVA;map[14][c]=T.LAVA;}
    for(let c=10;c<=18;c++)map[9][c]=T.HARD;
    for(let c=22;c<=25;c++)map[7][c]=T.HARD;
    for(let c=32;c<=40;c++)map[9][c]=T.HARD;
    for(let c=45;c<=50;c++)map[6][c]=T.HARD;
    for(let c=55;c<=58;c++)map[9][c]=T.HARD;
    for(let c=65;c<=72;c++)map[9][c]=T.HARD;
    for(let c=78;c<=85;c++)map[5][c]=T.HARD;
    for(let c=120;c<=130;c++)map[9][c]=T.BRIDGE;
    map[9][132]=T.AXE;
    for(let r=2;r<=8;r++)map[r][118]=T.HARD;
    for(let r=2;r<=8;r++)map[r][133]=T.HARD;
    return { map, width:W, height:H, startX:2*TILE, startY:11*TILE, bgColor:COL.skyNight, theme:'castle', time:300, flagCol:null, worldName:'1-4', hasBowser:true,
      entities:[
        {type:ENT.GOOMBA,x:15*TILE,y:12*TILE},{type:ENT.GOOMBA,x:35*TILE,y:12*TILE},
        {type:ENT.KOOPA,x:50*TILE,y:12*TILE},{type:ENT.GOOMBA,x:70*TILE,y:8*TILE},
        {type:ENT.GOOMBA,x:80*TILE,y:12*TILE},{type:ENT.GOOMBA,x:95*TILE,y:12*TILE},
        {type:ENT.BOWSER,x:125*TILE,y:7*TILE},
      ]
    };
  }
}

// ======================== ENTITY CLASSES ========================
class Entity {
  constructor(x,y,w,h) {
    this.x=x;this.y=y;this.w=w;this.h=h;this.vx=0;this.vy=0;
    this.alive=true;this.onGround=false;this.facingRight=false;
    this.animTimer=0;this.animFrame=0;
  }
  get left(){return this.x;} get right(){return this.x+this.w;}
  get top(){return this.y;} get bottom(){return this.y+this.h;}
  get centerX(){return this.x+this.w/2;} get centerY(){return this.y+this.h/2;}
  overlaps(o){return this.left<o.right&&this.right>o.left&&this.top<o.bottom&&this.bottom>o.top;}
}

function isSolidTile(t) {
  return t===T.GROUND||t===T.BRICK||t===T.QUESTION||t===T.QMUSH||t===T.QSTAR||
    t===T.Q1UP||t===T.EMPTY||t===T.HARD||t===T.PIPE_TL||t===T.PIPE_TR||
    t===T.PIPE_BL||t===T.PIPE_BR||t===T.PIPE_ENTER||t===T.PIPE_ENTER_R||
    t===T.CASTLE_WALL||t===T.CASTLE_TOP||t===T.BRIDGE||t===T.HIDDEN_COIN||
    t===T.MUSHROOM_L||t===T.MUSHROOM_M||t===T.MUSHROOM_R;
}
function isDeadlyTile(t){return t===T.LAVA;}

// ======================== ENEMY ========================
class Enemy extends Entity {
  constructor(type,x,y) {
    const sizes={goomba:[14,14],koopa:[14,22],koopa_fly:[14,22],piranha:[14,22],bowser:[24,30]};
    const[w,h]=sizes[type]||[16,16];
    super(x,y,w,h);
    this.type=type; this.state='walk'; this.shellTimer=0;
    this.squishTimer=0; this.deadTimer=0;
    switch(type){
      case'goomba':this.vx=-30;break;
      case'koopa':case'koopa_fly':this.vx=-25;break;
      case'piranha':this.vx=0;this.piranhaTimer=0;this.piranhaUp=false;this.baseY=y;break;
      case'bowser':this.vx=0;this.bowserTimer=0;this.bowserJumpTimer=0;break;
    }
  }
  update(dt,level){
    if(!this.alive&&this.state!=='squished'&&this.state!=='dead')return;
    this.animTimer+=dt;
    if(this.animTimer>0.15){this.animTimer=0;this.animFrame=(this.animFrame+1)%2;}
    if(this.state==='squished'){this.squishTimer+=dt;if(this.squishTimer>0.5)this.alive=false;return;}
    if(this.state==='dead'){this.vy+=GRAVITY_FULL*dt;this.y+=this.vy*dt;if(this.y>NES_H*2)this.alive=false;return;}
    if(this.type==='piranha'){
      this.piranhaTimer+=dt;
      if(this.piranhaTimer>2){this.piranhaTimer=0;this.piranhaUp=!this.piranhaUp;}
      this.y+=(this.piranhaUp?-30:30)*dt;
      this.y=this.piranhaUp?Math.max(this.baseY-24,this.y):Math.min(this.baseY,this.y);
      return;
    }
    if(this.type==='bowser'){
      this.bowserTimer+=dt;this.bowserJumpTimer+=dt;
      if(this.bowserTimer>2){this.bowserTimer=0;this.vx=this.vx===0?(Math.random()>0.5?20:-20):0;}
      if(this.bowserJumpTimer>3&&this.onGround){this.bowserJumpTimer=0;this.vy=JUMP_VEL*0.6;this.onGround=false;}
    }
    this.vy+=GRAVITY_FULL*dt;if(this.vy>MAX_FALL)this.vy=MAX_FALL;
    this.x+=this.vx*dt;this.facingRight=this.vx>0;
    this._colX(level);
    this.y+=this.vy*dt;this.onGround=false;this._colY(level);
  }
  _colX(level){
    const m=level.map;
    const tl=Math.floor(this.left/TILE),tr=Math.floor(this.right/TILE);
    const tt=Math.floor(this.top/TILE),tb=Math.floor((this.bottom-1)/TILE);
    for(let ty=tt;ty<=tb;ty++)for(let tx=tl;tx<=tr;tx++){
      if(ty<0||ty>=level.height||tx<0||tx>=level.width)continue;
      if(!isSolidTile(m[ty][tx]))continue;
      if(this.vx>0&&this.right>tx*TILE&&this.left<tx*TILE){this.x=tx*TILE-this.w;this.vx=-this.vx;}
      else if(this.vx<0&&this.left<(tx+1)*TILE&&this.right>(tx+1)*TILE){this.x=(tx+1)*TILE;this.vx=-this.vx;}
    }
  }
  _colY(level){
    const m=level.map;
    const tl=Math.floor(this.left/TILE),tr=Math.floor((this.right-1)/TILE);
    const tt=Math.floor(this.top/TILE),tb=Math.floor((this.bottom-1)/TILE);
    for(let ty=tt;ty<=tb;ty++)for(let tx=tl;tx<=tr;tx++){
      if(ty<0||ty>=level.height||tx<0||tx>=level.width)continue;
      if(!isSolidTile(m[ty][tx]))continue;
      if(this.vy>0&&this.bottom>ty*TILE&&this.top<ty*TILE){this.y=ty*TILE-this.h;this.vy=0;this.onGround=true;}
      else if(this.vy<0&&this.top<(ty+1)*TILE&&this.bottom>(ty+1)*TILE){this.y=(ty+1)*TILE;this.vy=0;}
    }
  }
  stomp(){
    if(this.type==='goomba'){this.state='squished';this.h=8;this.y+=6;this.vx=0;sound.stomp();return true;}
    if(this.type==='koopa'||this.type==='koopa_fly'){
      if(this.state==='walk'){this.state='shell';this.h=14;this.w=14;this.vx=0;sound.stomp();return true;}
      if(this.state==='shell_moving'){this.state='shell';this.vx=0;sound.stomp();return true;}
      if(this.state==='shell'){return false;} // Will be kicked via collision check
      return false;
    }
    return true;
  }
  kill(fromRight=false){this.state='dead';this.vy=-150;this.vx=fromRight?-50:50;sound.kick();}
  render(ctx,camX,camY,scale,animFrame){
    if(!this.alive&&this.state!=='squished'&&this.state!=='dead')return;
    const sx=this.x-camX,sy=this.y-camY;
    if(sx<-32||sx>NES_W+32||sy<-32||sy>NES_H+32)return;
    const s=scale;
    if(this.type==='goomba'){
      if(this.state==='squished')ProceduralSprites.drawGoomba(ctx,sx-1,sy-4,s,'walk1',true);
      else if(this.state==='dead'){ctx.save();ctx.translate(0,(sy+16)*s);ctx.scale(1,-1);ProceduralSprites.drawGoomba(ctx,sx-1,0,s,'walk1');ctx.restore();}
      else ProceduralSprites.drawGoomba(ctx,sx-1,sy-2,s,this.animFrame===0?'walk1':'walk2');
    }else if(this.type==='koopa'||this.type==='koopa_fly'){
      if(this.state==='shell'||this.state==='shell_moving')ProceduralSprites.drawShell(ctx,sx-1,sy-1,s);
      else if(this.state==='dead'){ctx.save();ctx.translate(0,(sy+16)*s);ctx.scale(1,-1);ProceduralSprites.drawShell(ctx,sx-1,0,s);ctx.restore();}
      else ProceduralSprites.drawKoopa(ctx,sx-1,sy-10,s,this.animFrame===0?'walk1':'walk2',this.facingRight);
    }else if(this.type==='piranha'){
      ProceduralSprites.drawPiranha(ctx,sx-1,sy,s,this.animFrame===0?'open':'closed');
    }else if(this.type==='bowser'){
      ctx.fillStyle='#00A800';ctx.fillRect(sx*s,sy*s,this.w*s,this.h*s);
      ctx.fillStyle='#FCA044';ctx.fillRect((sx+4)*s,(sy+4)*s,8*s,8*s);
      ctx.fillStyle='#005800';
      for(let i=0;i<4;i++)ctx.fillRect((sx+2+i*5)*s,(sy-3)*s,3*s,5*s);
      ctx.fillStyle=COL.white;ctx.fillRect((sx+16)*s,(sy+6)*s,4*s,4*s);
      ctx.fillStyle=COL.black;ctx.fillRect((sx+18)*s,(sy+7)*s,2*s,2*s);
    }
  }
}

class PowerUp extends Entity {
  constructor(type,x,y){
    super(x,y,14,14);this.type=type;this.emerging=true;this.emergeY=y;this.startY=y;
    if(type==='mushroom'||type==='oneup')this.vx=40;
    else if(type==='star'){this.vx=40;this.bounceVy=-180;}
  }
  update(dt,level){
    if(this.emerging){this.y-=30*dt;if(this.startY-this.y>=TILE){this.y=this.startY-TILE;this.emerging=false;}return;}
    if(this.type==='fire_flower')return;
    this.vy+=GRAVITY_FULL*dt;if(this.vy>MAX_FALL)this.vy=MAX_FALL;
    if(this.type==='star'&&this.onGround){this.vy=this.bounceVy;this.onGround=false;}
    this.x+=this.vx*dt;this._cX(level);this.y+=this.vy*dt;this.onGround=false;this._cY(level);
    if(this.y>level.height*TILE+32)this.alive=false;
  }
  _cX(l){const tl=Math.floor(this.left/TILE),tr=Math.floor(this.right/TILE),tt=Math.floor(this.top/TILE),tb=Math.floor((this.bottom-1)/TILE);for(let ty=tt;ty<=tb;ty++)for(let tx=tl;tx<=tr;tx++){if(ty<0||ty>=l.height||tx<0||tx>=l.width)continue;if(!isSolidTile(l.map[ty][tx]))continue;if(this.vx>0){this.x=tx*TILE-this.w;this.vx=-this.vx;}else{this.x=(tx+1)*TILE;this.vx=-this.vx;}}}
  _cY(l){const tl=Math.floor(this.left/TILE),tr=Math.floor((this.right-1)/TILE),tt=Math.floor(this.top/TILE),tb=Math.floor((this.bottom-1)/TILE);for(let ty=tt;ty<=tb;ty++)for(let tx=tl;tx<=tr;tx++){if(ty<0||ty>=l.height||tx<0||tx>=l.width)continue;if(!isSolidTile(l.map[ty][tx]))continue;if(this.vy>0){this.y=ty*TILE-this.h;this.vy=0;this.onGround=true;}else{this.y=(ty+1)*TILE;this.vy=0;}}}
  render(ctx,camX,camY,scale,animFrame){
    if(!this.alive)return;const sx=this.x-camX,sy=this.y-camY;if(sx<-20||sx>NES_W+20)return;
    if(this.type==='mushroom')ProceduralSprites.drawMushroom(ctx,sx-1,sy-1,scale,false);
    else if(this.type==='oneup')ProceduralSprites.drawMushroom(ctx,sx-1,sy-1,scale,true);
    else if(this.type==='fire_flower')ProceduralSprites.drawFireFlower(ctx,sx-1,sy-1,scale,animFrame);
    else if(this.type==='star')ProceduralSprites.drawStar(ctx,sx-1,sy-1,scale,animFrame);
  }
}

class Fireball extends Entity {
  constructor(x,y,dir){super(x,y,6,6);this.vx=dir*FIREBALL_SPEED;this.vy=0;this.bounceCount=0;this.trailTimer=0;}
  update(dt,level){
    this.vy+=GRAVITY_FULL*0.5*dt;this.x+=this.vx*dt;this.y+=this.vy*dt;
    const ty=Math.floor(this.bottom/TILE),tx=Math.floor(this.centerX/TILE);
    if(ty>=0&&ty<level.height&&tx>=0&&tx<level.width&&isSolidTile(level.map[ty][tx])){this.y=ty*TILE-this.h;this.vy=-120;this.bounceCount++;}
    const txr=this.vx>0?Math.floor(this.right/TILE):Math.floor(this.left/TILE);
    const tyr=Math.floor(this.centerY/TILE);
    if(tyr>=0&&tyr<level.height&&txr>=0&&txr<level.width&&isSolidTile(level.map[tyr][txr]))this.alive=false;
    if(this.bounceCount>4||this.y>level.height*TILE+32)this.alive=false;
  }
  render(ctx,camX,camY,scale,animFrame){
    if(!this.alive)return;
    ProceduralSprites.drawFireball(ctx,this.x-camX,this.y-camY,scale,animFrame);
  }
}

class BlockCoin extends Entity {
  constructor(x,y){super(x,y,8,14);this.vy=-250;this.startY=y;this.timer=0;}
  update(dt){this.timer+=dt;this.vy+=500*dt;this.y+=this.vy*dt;if(this.timer>0.6)this.alive=false;}
  render(ctx,camX,camY,scale,animFrame){
    if(!this.alive)return;
    const sx=this.x-camX+4,sy=this.y-camY,s=scale;
    const cf=Math.floor(animFrame/2)%4;const cw=cf===0?8:cf===2?8:cf===1?2:6;
    ctx.fillStyle=COL.coin;ctx.fillRect(Math.round((sx+(4-cw/2))*s),Math.round(sy*s),Math.round(cw*s),12*s);
    ctx.fillStyle=COL.coinShine;ctx.fillRect(Math.round((sx+(4-cw/2)+1)*s),Math.round((sy+1)*s),Math.max(s,Math.round((cw-2)*s)),3*s);
  }
}

// ======================== MARIO (v2 — responsive controls) ========================
class Mario extends Entity {
  constructor(x,y) {
    super(x,y,12,14);
    this.state='small'; this.facing=1;
    this.runFrame=0; this.runTimer=0;
    this.canJump=true;
    this.skidding=false;
    this.invincibleTimer=0; this.starTimer=0;
    this.growTimer=0; this.shrinkTimer=0;
    this.dead=false; this.deathTimer=0; this.deathBounced=false;
    this.sliding=false; this.slideTimer=0;
    this.pipeTimer=0;
    this.pipeTarget=null;
    this.walkingToCastle=false;
    // v3: Enhanced jump buffering + coyote time + 3-tier gravity
    this.coyoteFrames=0;        // Frames since leaving ground
    this.jumpBufferFrames=0;    // Frames since jump pressed
    this.jumpHeld=false;        // Is jump button being held? (for variable height)
    this.wasOnGround=false;     // Previous frame ground state
    this.landingSpeed=0;        // For landing particles
    this.dustTimer=0;           // Running dust cooldown
    this.skidTimer=0;           // Skid spark cooldown
    this.score=0; this.coins=0; this.lives=3;
    this.fireballCooldown=0;
    this.stompCombo=0; this.stompComboTimer=0;
    // Squash/stretch for juicy animation
    this.scaleX=1; this.scaleY=1;
  }

  get isBig(){return this.state==='big'||this.state==='fire';}

  updateHitbox(){
    if(this.isBig){this.w=12;this.h=28;}else{this.w=12;this.h=14;}
  }

  update(dt,level,game) {
    if(this.dead){
      this.deathTimer+=dt;
      // Phase 1: freeze pose (0 → 0.4s)
      if(this.deathTimer<0.4)return;
      // Phase 2: pop up into the air (once)
      if(!this.deathBounced){this.vy=JUMP_VEL*0.95;this.deathBounced=true;}
      // Phase 3 (ascent): reduced gravity → slow, floaty rise (angel effect)
      // Phase 4 (descent): gentle fall so angel drifts off the bottom of the screen
      const g = this.vy < 0 ? GRAVITY_FULL * 0.55 : GRAVITY_FULL * 0.35;
      this.vy += g * dt;
      if(this.vy > 120) this.vy = 120; // keep the drift slow
      this.y += this.vy * dt;
      return;
    }
    if(this.sliding){
      this.slideTimer+=dt;this.y+=100*dt;
      if(this.y>=12*TILE-this.h){this.y=12*TILE-this.h;this.sliding=false;this.walkingToCastle=true;this.onGround=true;}
      return;
    }
    if(this.walkingToCastle){
      this.x+=50*dt;this.facing=1;this.runTimer+=dt;
      if(this.runTimer>0.1){this.runTimer=0;this.runFrame=(this.runFrame+1)%3;}
      return;
    }
    if(this.growTimer>0){this.growTimer-=dt;return;}
    if(this.shrinkTimer>0){this.shrinkTimer-=dt;return;}
    if(this.pipeTimer>0){this.pipeTimer-=dt;this.y+=50*dt;
      if(this.pipeTimer<=0&&this.pipeTarget&&game){game.loadLevel(this.pipeTarget);return;}
      return;}
    if(this.invincibleTimer>0)this.invincibleTimer-=dt;
    if(this.starTimer>0){
      this.starTimer-=dt;
      if(this.starTimer<=0&&game){
        if(game.levelData.theme==='overworld')sound.playOverworldTheme();
        else if(game.levelData.theme==='underground')sound.playUndergroundTheme();
        else if(game.levelData.theme==='castle')sound.playCastleTheme();
      }
    }
    if(this.fireballCooldown>0)this.fireballCooldown-=dt;
    if(this.stompComboTimer>0){this.stompComboTimer-=dt;if(this.stompComboTimer<=0)this.stompCombo=0;}

    // Squash/stretch decay
    this.scaleX += (1 - this.scaleX) * 12 * dt;
    this.scaleY += (1 - this.scaleY) * 12 * dt;

    // --- Horizontal movement (v4: continuous accel + layered skid drag) ---
    const running = kRun();
    const maxSpd = running ? RUN_MAX : WALK_MAX;
    const accel = this.onGround ? (running ? RUN_ACCEL : WALK_ACCEL) : AIR_ACCEL;

    let inputDir = 0;
    if (kLeft() && !kRight()) inputDir = -1;
    else if (kRight() && !kLeft()) inputDir = 1;

    if (inputDir !== 0) {
      this.facing = inputDir;
      // Are we currently moving opposite to input on ground? That's skidding.
      const reversing = this.onGround && (this.vx * inputDir < 0) && Math.abs(this.vx) > 10;
      this.skidding = reversing && Math.abs(this.vx) > WALK_MAX * 0.3;

      // Always apply input acceleration (prevents velocity-snap on zero-crossing)
      this.vx += inputDir * accel * dt;

      // Stack skid drag while reversing on the ground — snaps turnaround fast
      if (reversing) {
        const skidDelta = FRICTION_SKID * dt;
        if (Math.abs(this.vx) > skidDelta) this.vx -= Math.sign(this.vx) * skidDelta;
        else this.vx = 0;
      }

      // Clamp to max speed in the input direction (allows post-skid overshoot to decay naturally)
      if (inputDir > 0 && this.vx > maxSpd) this.vx = maxSpd;
      if (inputDir < 0 && this.vx < -maxSpd) this.vx = -maxSpd;

      // Skid sparks while visibly skidding
      if (this.skidding && game) {
        this.skidTimer -= dt;
        if (this.skidTimer <= 0) {
          game.particles.skidSparks(this.centerX, this.bottom, inputDir);
          this.skidTimer = 0.06;
        }
      }
    } else {
      this.skidding = false;
      if (this.onGround) {
        const fDelta = FRICTION_GROUND * dt;
        if (Math.abs(this.vx) < fDelta) this.vx = 0;
        else this.vx -= Math.sign(this.vx) * fDelta;
      }
    }

    // --- Jump (v2: jump buffering + coyote time) ---
    // Track jump buffer: if jump was pressed within last JUMP_BUFFER_FRAMES frames, it counts
    if (kJumpJust()) {
      this.jumpBufferFrames = JUMP_BUFFER_FRAMES;
    } else {
      this.jumpBufferFrames = Math.max(0, this.jumpBufferFrames - 1);
    }

    // Track coyote time: frames since last grounded
    if (this.onGround) {
      this.coyoteFrames = COYOTE_FRAMES;
    } else {
      this.coyoteFrames = Math.max(0, this.coyoteFrames - 1);
    }

    // Execute jump if buffer AND coyote both allow it
    if (this.jumpBufferFrames > 0 && this.coyoteFrames > 0) {
      const speed = Math.abs(this.vx);
      // Continuous scaling: base → running arc as speed approaches RUN_MAX
      const speedRatio = Math.min(1, speed / RUN_MAX);
      const jv = JUMP_VEL + (JUMP_VEL_RUN - JUMP_VEL) * speedRatio;
      this.vy = jv;
      this.onGround = false;
      this.coyoteFrames = 0;
      this.jumpBufferFrames = 0;
      this.jumpHeld = true;
      // Jump squash
      this.scaleX = 0.85; this.scaleY = 1.2;
      if (this.isBig) sound.jumpBig(); else sound.jumpSmall();
    }

    // Variable jump height — NES-accurate 3-tier gravity system
    // Tap jump: release early → full gravity kills ascent quickly (short hop)
    // Medium jump: hold briefly → reduced gravity extends arc
    // Full jump: hold throughout → floaty gravity at peak for max height
    if (!kJump()) this.jumpHeld = false;  // Released = commit to fall

    if (this.vy < 0 && this.jumpHeld) {
      // Ascending while holding jump — slightly reduced gravity for higher arc
      this.vy += GRAVITY_HOLD * dt;
    } else {
      // Falling, or jump released — full gravity for snappy descent
      this.vy += GRAVITY_FULL * dt;
    }
    if (this.vy > MAX_FALL) this.vy = MAX_FALL;

    // Pipe entry — press Down on enterable pipe tops
    if (kDown() && this.onGround && game && this.pipeTimer <= 0) {
      const footTx = Math.floor(this.centerX / TILE);
      const footTy = Math.floor(this.bottom / TILE);
      if (footTy > 0) {
        const tileAbove = game.levelData.map[footTy - 1] ? game.levelData.map[footTy - 1][footTx] : 0;
        if (tileAbove === T.PIPE_ENTER || tileAbove === T.PIPE_ENTER_R) {
          // Check Mario is roughly centered on the pipe
          const pipeCX = (footTx + 0.5) * TILE;
          if (Math.abs(this.centerX - pipeCX) < 8) {
            this.pipeTimer = 1.0;
            this.vx = 0;
            sound.pipe();
            this.pipeTarget = game.currentLevel === '1-1' ? '1-2' : null;
          }
        }
      }
    }

    // Fireball
    if (this.state === 'fire' && kRun() && kJumpJust() === false && this.fireballCooldown <= 0 && game) {
      // Fire on run button when fire mario, but only if not buffering jump
      if (game.fireballs.length < 2 && keyJustDown['ShiftLeft'] || keyJustDown['ShiftRight'] || keyJustDown['KeyX']) {
        const fbx = this.facing > 0 ? this.right : this.left - 6;
        game.fireballs.push(new Fireball(fbx, this.centerY - 3, this.facing));
        this.fireballCooldown = 0.25;
        sound.fireball();
      }
    }

    // Move X
    this.x += this.vx * dt;
    if (game && this.x < game.camera.x) { this.x = game.camera.x; this.vx = Math.max(0, this.vx); }
    this._colX(level);

    // Move Y
    this.wasOnGround = this.onGround;
    this.landingSpeed = this.vy;
    this.y += this.vy * dt;
    this.onGround = false;
    this._colY(level, game);

    // Landing detection — particles + squash
    if (this.onGround && !this.wasOnGround && this.landingSpeed > 50) {
      if (game) game.particles.landingImpact(this.centerX, this.bottom, this.landingSpeed);
      this.scaleX = 1.15; this.scaleY = 0.85; // Landing squash
    }

    // Running dust
    if (this.onGround && Math.abs(this.vx) > WALK_MAX * 0.8 && game) {
      this.dustTimer -= dt;
      if (this.dustTimer <= 0) {
        game.particles.runDust(this.centerX, this.bottom, this.vx > 0 ? -1 : 1);
        this.dustTimer = 0.08;
      }
    }

    // Star sparkles
    if (this.starTimer > 0 && game) {
      game.particles.starSparkle(this.centerX, this.centerY);
    }

    // Animation
    if (this.onGround && Math.abs(this.vx) > 5) {
      const animSpd = Math.max(0.03, 0.12 - Math.abs(this.vx) / 2000);
      this.runTimer += dt;
      if (this.runTimer > animSpd) { this.runTimer = 0; this.runFrame = (this.runFrame + 1) % 3; }
    } else if (this.onGround) { this.runFrame = 0; this.runTimer = 0; }

    if (this.y > level.height * TILE + 32) this.die(game);
  }

  _colX(level) {
    const m=level.map;
    const tl=Math.floor(this.left/TILE),tr=Math.floor(this.right/TILE);
    const tt=Math.floor(this.top/TILE),tb=Math.floor((this.bottom-1)/TILE);
    for(let ty=tt;ty<=tb;ty++)for(let tx=tl;tx<=tr;tx++){
      if(ty<0||ty>=level.height||tx<0||tx>=level.width)continue;
      if(!isSolidTile(m[ty][tx]))continue;
      if(this.vx>0&&this.right>tx*TILE&&this.left<tx*TILE){this.x=tx*TILE-this.w;this.vx=0;}
      else if(this.vx<0&&this.left<(tx+1)*TILE&&this.right>(tx+1)*TILE){this.x=(tx+1)*TILE;this.vx=0;}
    }
  }

  _colY(level,game) {
    const m=level.map;
    const tl=Math.floor(this.left/TILE),tr=Math.floor((this.right-1)/TILE);
    const tt=Math.floor(this.top/TILE),tb=Math.floor(this.bottom/TILE);
    for(let ty=tt;ty<=tb;ty++)for(let tx=tl;tx<=tr;tx++){
      if(ty<0||ty>=level.height||tx<0||tx>=level.width)continue;
      const tile=m[ty][tx];
      if(isDeadlyTile(tile)){this.die(game);return;}
      if(tile===T.COIN){m[ty][tx]=T.AIR;this.collectCoin(game);continue;}
      if(!isSolidTile(tile))continue;
      const tileT=ty*TILE,tileB=(ty+1)*TILE;
      if(this.vy>0&&this.bottom>tileT&&this.top<tileT){this.y=tileT-this.h;this.vy=0;this.onGround=true;}
      else if(this.vy<0&&this.top<tileB&&this.bottom>tileB){this.y=tileB;this.vy=1;this._hitBlock(tx,ty,level,game);}
    }
    // Corner correction — nudge onto platform edges when barely missing
    if(this.vy>0&&!this.onGround){
      const footTy=Math.floor(this.bottom/TILE);
      if(footTy>=0&&footTy<level.height){
        // Check if left edge barely overhangs a solid tile
        const leftTx=Math.floor(this.left/TILE);
        const rightTx=Math.floor((this.right-1)/TILE);
        // Right edge correction: right foot just past a platform's right side
        if(rightTx+1<level.width&&isSolidTile(m[footTy][rightTx+1])&&!isSolidTile(m[footTy][rightTx])){
          const overlap=this.right-(rightTx+1)*TILE;
          if(overlap>0&&overlap<=CORNER_NUDGE){this.x=(rightTx+1)*TILE-this.w+CORNER_NUDGE;}
        }
        // Left edge correction: left foot just past a platform's left side
        if(leftTx-1>=0&&isSolidTile(m[footTy][leftTx-1])&&!isSolidTile(m[footTy][leftTx])){
          const overlap=leftTx*TILE-this.left;
          if(overlap>0&&overlap<=CORNER_NUDGE){this.x=leftTx*TILE-CORNER_NUDGE;}
        }
      }
    }
  }

  _hitBlock(tx,ty,level,game) {
    const tile=level.map[ty][tx];
    if(tile===T.QUESTION||tile===T.HIDDEN_COIN){
      level.map[ty][tx]=T.EMPTY;
      if(game){game.blockCoins.push(new BlockCoin(tx*TILE+4,ty*TILE-TILE));game.particles.coinSparkle(tx*TILE+8,ty*TILE);}
      this.collectCoin(game);sound.coin();
    }else if(tile===T.QMUSH){
      level.map[ty][tx]=T.EMPTY;
      if(game){game.powerUps.push(new PowerUp(this.state==='small'?'mushroom':'fire_flower',tx*TILE+1,ty*TILE));sound.powerUpAppear();}
    }else if(tile===T.QSTAR){
      level.map[ty][tx]=T.EMPTY;
      if(game){game.powerUps.push(new PowerUp('star',tx*TILE+1,ty*TILE));sound.powerUpAppear();}
    }else if(tile===T.Q1UP){
      level.map[ty][tx]=T.EMPTY;
      if(game){game.powerUps.push(new PowerUp('oneup',tx*TILE+1,ty*TILE));sound.powerUpAppear();}
    }else if(tile===T.BRICK){
      if(this.isBig){level.map[ty][tx]=T.AIR;if(game)game.particles.brickBreak(tx*TILE+8,ty*TILE+8);sound.breakBrick();}
      else sound.bump();
    }else{sound.bump();}
    if(game&&level.map[ty][tx]!==T.AIR)game.bumpedBlocks.push({tx,ty,timer:0});
    // Block bump kills enemies standing on the block above
    if(game){
      const bumpX=tx*TILE,bumpR=(tx+1)*TILE,bumpTop=(ty-1)*TILE,bumpBot=ty*TILE;
      for(const e of game.enemies){
        if(!e.alive||e.state==='dead'||e.state==='squished')continue;
        if(e.bottom>=bumpTop&&e.bottom<=bumpBot+2&&e.right>bumpX&&e.left<bumpR){
          e.kill(this.facing>0);this.score+=100;
          game.scorePopups.push(new ScorePopup(e.x,e.y-10,'100'));
          game.particles.stompPuff(e.centerX,e.centerY);
        }
      }
    }
  }

  collectCoin(game){
    this.coins++;
    if(this.coins>=100){this.coins-=100;this.lives++;sound.oneUp();}
    else sound.coin();
    this.score+=200;
  }

  powerUp(type,game){
    if(type==='mushroom'){
      if(this.state==='small'){this.state='big';this.y-=14;this.updateHitbox();this.growTimer=0.5;sound.powerUp();this.scaleX=0.8;this.scaleY=1.3;}
      this.score+=1000;
    }else if(type==='fire_flower'){
      if(this.state==='small'){this.state='big';this.y-=14;this.updateHitbox();this.growTimer=0.5;}
      this.state='fire';sound.powerUp();this.score+=1000;
    }else if(type==='star'){
      this.starTimer=STAR_DURATION;sound.playStarTheme();this.score+=1000;
    }else if(type==='oneup'){
      this.lives++;sound.oneUp();if(game)game.scorePopups.push(new ScorePopup(this.x,this.y-10,'1UP'));
    }
  }

  hurt(game){
    if(this.invincibleTimer>0||this.starTimer>0||this.dead)return;
    if(this.state==='fire'){this.state='big';this.invincibleTimer=HURT_BLINK_TIME;}
    else if(this.state==='big'){this.state='small';this.y+=14;this.updateHitbox();this.invincibleTimer=HURT_BLINK_TIME;this.shrinkTimer=0.5;this.scaleX=1.3;this.scaleY=0.7;}
    else this.die(game);
  }

  die(game){
    if(this.dead)return;
    this.dead=true;this.deathTimer=0;this.deathBounced=false;
    this.vx=0;this.vy=0;this.lives--;sound.death();
  }

  stompEnemy(){
    this.vy=JUMP_VEL*0.55;
    this.stompCombo++;this.stompComboTimer=0.5;
    const scores=[100,200,400,500,800,1000,2000,4000,8000];
    const idx=Math.min(this.stompCombo-1,scores.length-1);
    this.score+=scores[idx];
    this.scaleX=0.85;this.scaleY=1.2;
    return scores[idx];
  }

  render(ctx,camX,camY,scale){
    // Sprite draw offsets chosen so the sprite bottom aligns with the hitbox bottom
    // (small Mario sprite is ~10 tall, hitbox is 14 → offset +3)
    // (big Mario sprite is ~15 tall, hitbox is 28 → offset +13)
    const SM_OFFSET = 3;
    const BG_OFFSET = 13;

    if(this.dead){
      const sx=this.x-camX,sy=this.y-camY;
      // Phase 1 — frozen pose before the pop (shows dead sprite)
      if(this.deathTimer < 0.4){
        ProceduralSprites.drawSmallMario(ctx,sx-2,sy+SM_OFFSET,scale,'dead',false,this.state);
        return;
      }
      // Phase 2+ — angel float
      const wingFrame = Math.floor(this.deathTimer * 10) % 2;
      // Soft glow behind the angel
      ctx.save();
      ctx.globalAlpha = 0.25;
      ctx.fillStyle = '#FCE060';
      const gx = (sx - 2 + 6) * scale, gy = (sy + SM_OFFSET + 8) * scale;
      ctx.beginPath();
      ctx.arc(gx, gy, 14 * scale, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      ProceduralSprites.drawAngel(ctx, sx - 2, sy + SM_OFFSET - 4, scale, wingFrame);
      return;
    }
    if(this.invincibleTimer>0&&Math.floor(this.invincibleTimer*10)%2===0)return;

    const sx=this.x-camX,sy=this.y-camY;
    const flipX=this.facing<0;

    // Growing/shrinking animation with flash
    if(this.growTimer>0||this.shrinkTimer>0){
      const phase=Math.floor((this.growTimer>0?this.growTimer:this.shrinkTimer)*14);
      if(phase%3===0){
        ProceduralSprites.drawSmallMario(ctx,sx-2,sy+(this.isBig?14:0)+SM_OFFSET,scale,'idle',flipX,this.state);
      }else if(phase%3===1){
        ProceduralSprites.drawBigMario(ctx,sx-2,sy+BG_OFFSET,scale,'idle',flipX,this.state);
      }else{
        ctx.globalAlpha=0.5;
        ProceduralSprites.drawBigMario(ctx,sx-2,sy+BG_OFFSET,scale,'idle',flipX,this.state);
        ctx.globalAlpha=1;
      }
      return;
    }

    let frame='idle';
    if(!this.onGround)frame='jump';
    else if(this.skidding)frame='skid';
    else if(Math.abs(this.vx)>5)frame=['run1','run2','run3'][this.runFrame];

    if(this.isBig){
      if(kDown()&&this.onGround&&Math.abs(this.vx)<5)frame='crouch';
      ProceduralSprites.drawBigMario(ctx,sx-2,sy+BG_OFFSET,scale,frame,flipX,this.state);
    }else{
      ProceduralSprites.drawSmallMario(ctx,sx-2,sy+SM_OFFSET,scale,frame,flipX,this.state);
    }
  }
}

// ======================== CAMERA ========================
class Camera {
  constructor(){this.x=0;this.y=0;this.targetX=0;}
  update(mario,levelWidth,dt){
    const cx=this.x+NES_W/2-16;
    if(mario.x>cx)this.targetX=mario.x-NES_W/2+16;
    if(this.targetX<this.x)this.targetX=this.x;
    // Snappier camera follow
    this.x+=(this.targetX-this.x)*10*dt;
    const maxX=levelWidth*TILE-NES_W;
    if(this.x>maxX)this.x=maxX;
    if(this.x<0)this.x=0;
  }
}

// ======================== GAME ========================
class Game {
  constructor(){
    this.state='title';this.mario=null;this.camera=new Camera();
    this.particles=new ParticleSystem();
    this.enemies=[];this.powerUps=[];this.fireballs=[];
    this.blockCoins=[];this.scorePopups=[];this.bumpedBlocks=[];
    this.levelData=null;this.time=0;this.timeWarning=false;
    this.globalAnimFrame=0;this.globalAnimTimer=0;
    this.flagY=0;this.levelClearTimer=0;this.deathTimer=0;
    this.loadingTimer=0;this.currentLevel='1-1';
    this.highScore=parseInt(localStorage.getItem('smb_highscore')||'0');
    this.titleBlink=0;this._levelClearMusicPlayed=false;
  }

  loadLevel(name){
    this.state='loading';this.loadingTimer=1.5;this.currentLevel=name;
    let data;
    switch(name){
      case'1-1':data=LevelData.world1_1();break;case'1-2':data=LevelData.world1_2();break;
      case'1-3':data=LevelData.world1_3();break;case'1-4':data=LevelData.world1_4();break;
      default:data=LevelData.world1_1();break;
    }
    this.levelData=data;this.time=data.time;this.timeWarning=false;
    const oL=this.mario?this.mario.lives:3,oS=this.mario?this.mario.score:0,oC=this.mario?this.mario.coins:0;
    this.mario=new Mario(data.startX,data.startY);
    this.mario.lives=oL;this.mario.score=oS;this.mario.coins=oC;this.mario.updateHitbox();
    this.camera=new Camera();
    this.enemies=data.entities.map(e=>new Enemy(e.type,e.x,e.y));
    this.powerUps=[];this.fireballs=[];this.blockCoins=[];this.scorePopups=[];
    this.bumpedBlocks=[];this.particles=new ParticleSystem();
    this.flagY=0;this.levelClearTimer=0;this._levelClearMusicPlayed=false;
    sound.stopMusic();
  }

  startGame(){sound.init();sound.resume();this.loadLevel('1-1');}

  update(dt){
    this.globalAnimTimer+=dt;
    if(this.globalAnimTimer>0.1){this.globalAnimTimer=0;this.globalAnimFrame++;}
    if(kMuteJust())sound.toggleMute();
    updateShake();

    switch(this.state){
      case'title':
        this.titleBlink+=dt;
        if(kStartJust()){sound.init();sound.resume();this.startGame();}
        break;
      case'loading':
        this.loadingTimer-=dt;
        if(this.loadingTimer<=0){
          this.state='playing';
          if(this.levelData.theme==='overworld')sound.playOverworldTheme();
          else if(this.levelData.theme==='underground')sound.playUndergroundTheme();
          else if(this.levelData.theme==='castle')sound.playCastleTheme();
        }
        break;
      case'playing':
        if(kStartJust()){this.state='paused';sound.stopMusic();break;}
        this._updatePlaying(dt);break;
      case'paused':
        if(kStartJust()){this.state='playing';
          if(this.levelData.theme==='overworld')sound.playOverworldTheme();
          else if(this.levelData.theme==='underground')sound.playUndergroundTheme();
          else if(this.levelData.theme==='castle')sound.playCastleTheme();
        }break;
      case'dead':
        this.deathTimer+=dt;this.mario.update(dt,this.levelData,this);
        if(this.deathTimer>3){
          if(this.mario.lives<=0){this.state='gameover';this.deathTimer=0;sound.gameOver();
            if(this.mario.score>this.highScore){this.highScore=this.mario.score;localStorage.setItem('smb_highscore',this.highScore.toString());}
          }else this.loadLevel(this.currentLevel);
        }break;
      case'gameover':
        this.deathTimer+=dt;
        if(this.deathTimer>5){this.state='title';this.mario=null;}
        break;
      case'levelclear':this._updateLevelClear(dt);break;
    }
    clearFrameInput();
  }

  _updatePlaying(dt){
    const level=this.levelData,mario=this.mario;
    mario.update(dt,level,this);
    if(mario.dead&&this.state==='playing'){this.state='dead';this.deathTimer=0;sound.stopMusic();return;}
    this.time-=dt;
    if(this.time<=100&&!this.timeWarning){this.timeWarning=true;sound.hurryUp();}
    if(this.time<=0){this.time=0;mario.die(this);}
    this.camera.update(mario,level.width,dt);
    for(const e of this.enemies){
      if(!e.alive&&e.state!=='squished'&&e.state!=='dead')continue;
      if(e.x>this.camera.x-32&&e.x<this.camera.x+NES_W+64)e.update(dt,level);
    }
    for(const p of this.powerUps)if(p.alive)p.update(dt,level);
    for(const f of this.fireballs){
      if(f.alive){f.update(dt,level);f.trailTimer-=dt;
        if(f.trailTimer<=0){this.particles.fireballTrail(f.centerX,f.centerY);f.trailTimer=0.04;}
      }
    }
    for(const c of this.blockCoins)if(c.alive)c.update(dt);
    for(let i=this.bumpedBlocks.length-1;i>=0;i--){this.bumpedBlocks[i].timer+=dt;if(this.bumpedBlocks[i].timer>0.2)this.bumpedBlocks.splice(i,1);}
    this.particles.update(dt);
    for(let i=this.scorePopups.length-1;i>=0;i--){const sp=this.scorePopups[i];sp.y+=sp.vy*dt;sp.life-=dt;if(sp.life<=0)this.scorePopups.splice(i,1);}
    this.powerUps=this.powerUps.filter(p=>p.alive);
    this.fireballs=this.fireballs.filter(f=>f.alive);
    this.blockCoins=this.blockCoins.filter(c=>c.alive);
    this._checkMarioEnemyCollisions();
    this._checkMarioPowerUpCollisions();
    this._checkFireballEnemyCollisions();
    this._checkShellEnemyCollisions();
    this._checkFlagpole();
    this._checkAxe();
  }

  _checkMarioEnemyCollisions(){
    const m=this.mario;if(m.dead||m.pipeTimer>0)return;
    for(const e of this.enemies){
      if(!e.alive||e.state==='squished'||e.state==='dead')continue;
      if(!m.overlaps(e))continue;
      // Star power — kill anything on contact
      if(m.starTimer>0){e.kill(m.x<e.x);m.score+=200;this.scorePopups.push(new ScorePopup(e.x,e.y-10,'200'));this.particles.stompPuff(e.centerX,e.centerY);continue;}
      // Stopped shell — kick it
      if(e.state==='shell'&&e.vx===0&&e.type!=='bowser'){
        e.state='shell_moving';e.vx=m.centerX<e.centerX?200:-200;sound.kick();m.score+=400;
        // Brief invincibility to avoid getting hit by the shell you just kicked
        if(m.invincibleTimer<=0)m.invincibleTimer=0.15;
        continue;
      }
      // Stomp detection — improved: Mario must be descending AND feet near enemy top
      // Use velocity check (vy > 30) instead of just positive, prevents side-walk stomps
      const stompZone = m.bottom - e.top;
      if(m.vy>30&&stompZone>0&&stompZone<14&&e.type!=='piranha'){
        const stomped=e.stomp();
        if(stomped){const sc=m.stompEnemy();this.scorePopups.push(new ScorePopup(e.x,e.y-10,sc.toString()));this.particles.stompPuff(e.centerX,e.top);}
      }else{
        // Moving shell hurts Mario, stopped shell gets kicked (handled above)
        if(e.state==='shell'&&e.vx===0)continue; // Shouldn't reach here, but safety
        m.hurt(this);
      }
    }
  }

  _checkMarioPowerUpCollisions(){
    const m=this.mario;if(m.dead)return;
    for(const p of this.powerUps){
      if(!p.alive||p.emerging)continue;if(!m.overlaps(p))continue;
      m.powerUp(p.type,this);this.scorePopups.push(new ScorePopup(p.x,p.y-10,p.type==='oneup'?'1UP':'1000'));p.alive=false;
    }
  }

  _checkFireballEnemyCollisions(){
    for(const f of this.fireballs){if(!f.alive)continue;
      for(const e of this.enemies){if(!e.alive||e.state==='squished'||e.state==='dead')continue;
        if(f.overlaps(e)){e.kill(f.vx>0);f.alive=false;this.particles.fireballBurst(f.x,f.y);this.mario.score+=200;this.scorePopups.push(new ScorePopup(e.x,e.y-10,'200'));break;}
      }
    }
  }

  _checkShellEnemyCollisions(){
    for(const sh of this.enemies){if(sh.state!=='shell_moving')continue;
      for(const e of this.enemies){if(e===sh||!e.alive||e.state==='dead'||e.state==='squished')continue;
        if(sh.overlaps(e)){
          if(e.state==='shell_moving'){
            // Two moving shells collide — both die
            sh.kill(e.vx>0);e.kill(sh.vx>0);
            this.mario.score+=500;
            this.particles.stompPuff(sh.centerX,sh.centerY);
            this.particles.stompPuff(e.centerX,e.centerY);
          } else {
            e.kill(sh.vx>0);this.mario.score+=500;
            this.scorePopups.push(new ScorePopup(e.x,e.y-10,'500'));
            this.particles.stompPuff(e.centerX,e.centerY);
          }
        }
      }
    }
  }

  _checkFlagpole(){
    if(!this.levelData.flagCol||this.mario.sliding||this.mario.walkingToCastle)return;
    const fx=this.levelData.flagCol*TILE;
    if(this.mario.right>=fx&&this.mario.right<=fx+TILE){
      this.state='levelclear';this.mario.sliding=true;this.mario.vx=0;this.mario.vy=0;
      this.mario.x=fx-this.mario.w+4;this.mario.facing=1;this.levelClearTimer=0;this.flagY=this.mario.y;
      sound.stopMusic();sound.flagpole();
      this.mario.score+=Math.floor((12*TILE-this.mario.y)/TILE)*100;
    }
  }

  _checkAxe(){
    if(!this.levelData.hasBowser)return;
    for(let ty=0;ty<this.levelData.height;ty++)for(let tx=0;tx<this.levelData.width;tx++){
      if(this.levelData.map[ty][tx]===T.AXE){
        const ax=tx*TILE,ay=ty*TILE;
        if(this.mario.right>=ax&&this.mario.left<=ax+TILE&&this.mario.bottom>=ay&&this.mario.top<=ay+TILE){
          for(let c=0;c<this.levelData.width;c++)for(let r=0;r<this.levelData.height;r++)
            if(this.levelData.map[r][c]===T.BRIDGE)this.levelData.map[r][c]=T.AIR;
          this.levelData.map[ty][tx]=T.AIR;
          for(const e of this.enemies)if(e.type==='bowser')e.kill(false);
          this.state='levelclear';this.levelClearTimer=0;this.mario.vx=0;sound.stopMusic();sound.levelClear();
        }
      }
    }
  }

  _updateLevelClear(dt){
    this.mario.update(dt,this.levelData,this);this.levelClearTimer+=dt;
    if(this.mario.sliding)this.flagY+=100*dt;
    if(this.mario.walkingToCastle&&this.time>0){const ts=Math.min(10,Math.ceil(this.time));this.time-=ts;this.mario.score+=ts*50;if(this.time<0)this.time=0;}
    if(this.levelClearTimer>2&&!this._levelClearMusicPlayed){this._levelClearMusicPlayed=true;sound.levelClear();}
    if(this.levelClearTimer>7){
      this._levelClearMusicPlayed=false;
      const levels=['1-1','1-2','1-3','1-4'];const idx=levels.indexOf(this.currentLevel);
      if(idx<levels.length-1)this.loadLevel(levels[idx+1]);
      else{this.state='title';if(this.mario.score>this.highScore){this.highScore=this.mario.score;localStorage.setItem('smb_highscore',this.highScore.toString());}}
    }
  }

  // ======================== RENDERING (v2 — richer visuals) ========================
  render(){
    ctx.fillStyle='#000';ctx.fillRect(0,0,canvasW,canvasH);
    const s=gameScale;
    switch(this.state){
      case'title':this._renderTitle(s);break;
      case'loading':this._renderLoading(s);break;
      case'playing':case'paused':case'levelclear':
        ctx.save();
        ctx.translate(Math.round(shake.x*s), Math.round(shake.y*s));
        this._renderGame(s);
        ctx.restore();
        if(this.state==='paused')this._renderPause(s);
        break;
      case'dead':
        ctx.save();ctx.translate(Math.round(shake.x*s),Math.round(shake.y*s));
        this._renderGame(s);ctx.restore();break;
      case'gameover':this._renderGameOver(s);break;
    }
  }

  _renderTitle(s){
    ctx.fillStyle=COL.sky;ctx.fillRect(0,0,canvasW,canvasH);
    // Animated hills
    ctx.fillStyle='#80D010';
    ctx.beginPath();ctx.moveTo(0,210*s);ctx.lineTo(60*s,170*s);ctx.lineTo(120*s,210*s);ctx.fill();
    ctx.beginPath();ctx.moveTo(180*s,210*s);ctx.lineTo(220*s,185*s);ctx.lineTo(260*s,210*s);ctx.fill();
    // Ground
    ctx.fillStyle=COL.ground;ctx.fillRect(0,208*s,canvasW,32*s);
    // Ground pattern
    ctx.fillStyle=COL.groundDark;
    for(let i=0;i<20;i++){ctx.fillRect(i*16*s,208*s,16*s,s);ctx.fillRect(i*16*s,216*s,16*s,s);}
    // Clouds
    ctx.fillStyle='#FCF8FC';
    [[30,35,40],[180,25,32],[100,45,36]].forEach(([cx,cy,cw])=>{
      ctx.beginPath();ctx.ellipse((cx+cw/2)*s,cy*s,(cw/2)*s,10*s,0,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.ellipse((cx+cw/3)*s,(cy-6)*s,(cw/3)*s,7*s,0,0,Math.PI*2);ctx.fill();
    });
    // Title
    ctx.textAlign='center';
    ctx.font=`bold ${12*s}px monospace`;
    ctx.fillStyle=COL.marioRed;
    ctx.fillText('SUPER HONKEY BROS.',NES_W*s/2,55*s);
    ctx.fillStyle='#FCA044';
    ctx.fillText('SUPER HONKEY BROS.',NES_W*s/2-s,54*s);
    ctx.font=`${8*s}px monospace`;ctx.fillStyle=COL.text;
    ctx.fillText('©2026 FUTUREPROOF ARCADE',NES_W*s/2,75*s);
    ctx.fillText('1 PLAYER GAME',NES_W*s/2,115*s);
    ctx.fillText(`TOP- ${String(this.highScore).padStart(6,'0')}`,NES_W*s/2,140*s);
    if(Math.floor(this.titleBlink*2)%2===0)ctx.fillText('PRESS ENTER TO START',NES_W*s/2,165*s);
    ProceduralSprites.drawSmallMario(ctx,120,190,s,'idle',false,'small');
    ctx.font=`${5*s}px monospace`;ctx.fillStyle='#FCA044';
    ctx.fillText('ARROWS: MOVE  SPACE: JUMP  SHIFT: RUN  M: MUTE',NES_W*s/2,225*s);
  }

  _renderLoading(s){
    ctx.fillStyle='#000';ctx.fillRect(0,0,canvasW,canvasH);
    ctx.fillStyle=COL.text;ctx.font=`${8*s}px monospace`;ctx.textAlign='center';
    ctx.fillText(`WORLD ${this.levelData.worldName}`,NES_W*s/2,90*s);
    ProceduralSprites.drawSmallMario(ctx,100,115,s,'idle',false,'small');
    ctx.fillText(`× ${this.mario.lives}`,NES_W*s/2+20*s,125*s);
  }

  _renderGame(s){
    const cam=this.camera,level=this.levelData;
    ctx.fillStyle=level.bgColor;ctx.fillRect(0,0,canvasW,canvasH);
    this._renderBackground(s,cam);
    const startCol=Math.max(0,Math.floor(cam.x/TILE)-1);
    const endCol=Math.min(level.width-1,Math.floor((cam.x+NES_W)/TILE)+1);
    for(let ty=0;ty<level.height;ty++)for(let tx=startCol;tx<=endCol;tx++){
      const tile=level.map[ty][tx];if(tile===T.AIR||tile===T.INVIS)continue;
      let dy=ty*TILE;
      for(const b of this.bumpedBlocks)if(b.tx===tx&&b.ty===ty)dy-=Math.sin(b.timer/0.2*Math.PI)*4;
      ProceduralSprites.drawTile(ctx,tx*TILE-cam.x,dy-cam.y,s,tile,this.globalAnimFrame);
    }
    if(level.flagCol){
      const fx=level.flagCol*TILE-cam.x-8;
      const fy=this.state==='levelclear'?Math.min(this.flagY,12*TILE-16):4*TILE;
      ProceduralSprites.drawFlag(ctx,fx,fy-cam.y,s);
    }
    for(const p of this.powerUps)p.render(ctx,cam.x,cam.y,s,this.globalAnimFrame);
    for(const c of this.blockCoins)c.render(ctx,cam.x,cam.y,s,this.globalAnimFrame);
    for(const e of this.enemies)e.render(ctx,cam.x,cam.y,s,this.globalAnimFrame);
    for(const f of this.fireballs)f.render(ctx,cam.x,cam.y,s,this.globalAnimFrame);
    this.mario.render(ctx,cam.x,cam.y,s);
    this.particles.render(ctx,cam.x,cam.y,s);
    for(const sp of this.scorePopups){
      const sx=(sp.x-cam.x)*s,sy=(sp.y-cam.y)*s;
      ctx.globalAlpha=Math.max(0,sp.life/0.9);
      // Drop shadow
      ctx.fillStyle='#000000';ctx.font=`bold ${6*s}px monospace`;ctx.textAlign='center';
      ctx.fillText(sp.text,sx+s,sy+s);
      ctx.fillStyle=COL.text;ctx.fillText(sp.text,sx,sy);
      ctx.globalAlpha=1;
    }
    this._renderHUD(s);
  }

  _renderBackground(s,cam){
    const level=this.levelData;
    const t = this.globalAnimFrame || 0;

    if(level.bgColor===COL.skyNight){
      if(level.theme==='castle'){
        // Castle — smoky dim gradient with flickering orange glow hints
        const grd=ctx.createLinearGradient(0,0,0,canvasH);
        grd.addColorStop(0,'#120606');grd.addColorStop(0.6,'#1F0808');grd.addColorStop(1,'#000000');
        ctx.fillStyle=grd;ctx.fillRect(0,0,canvasW,canvasH);
        // Soft ember glow near floor
        const flicker = 0.12 + Math.sin(t*0.3)*0.04;
        ctx.fillStyle=`rgba(200,60,20,${flicker.toFixed(3)})`;
        ctx.fillRect(0,Math.floor(canvasH*0.75),canvasW,Math.floor(canvasH*0.25));
      } else {
        // Underground — tighter dark cave gradient with faint rock shimmer
        const grd=ctx.createLinearGradient(0,0,0,canvasH);
        grd.addColorStop(0,'#000000');grd.addColorStop(1,'#0A0A1A');
        ctx.fillStyle=grd;ctx.fillRect(0,0,canvasW,canvasH);
      }
      return;
    }

    // ========= Overworld — multi-layer parallax =========

    // Sky — richer multi-stop gradient with warm horizon
    const grd=ctx.createLinearGradient(0,0,0,canvasH);
    grd.addColorStop(0,  '#1E5CB8');
    grd.addColorStop(0.35,'#3878C8');
    grd.addColorStop(0.7, '#70A8F4');
    grd.addColorStop(0.92,'#BCD8FC');
    grd.addColorStop(1,   '#FFD4A0'); // warm horizon glow
    ctx.fillStyle=grd;ctx.fillRect(0,0,canvasW,canvasH);

    // Sun — soft disc low in the sky (parallax 0.05x)
    const sunX = (320 - cam.x * 0.05) % 1200;
    if (sunX > -40 && sunX < canvasW / s + 40) {
      ctx.save();
      const sgrad = ctx.createRadialGradient(sunX*s, 50*s, 4*s, sunX*s, 50*s, 26*s);
      sgrad.addColorStop(0, 'rgba(255,240,200,0.9)');
      sgrad.addColorStop(0.5, 'rgba(255,220,140,0.35)');
      sgrad.addColorStop(1, 'rgba(255,220,140,0)');
      ctx.fillStyle = sgrad;
      ctx.beginPath(); ctx.arc(sunX*s, 50*s, 26*s, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#FFF4C8';
      ctx.beginPath(); ctx.arc(sunX*s, 50*s, 10*s, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }

    // Layer 1: Far mountains (parallax 0.1x) — hazy blue with snow caps
    const farMtnOff = cam.x * 0.1;
    for (let i = -1; i < 6; i++) {
      const mx = i * 420 - (farMtnOff % 420);
      // Base mountain silhouette
      ctx.fillStyle = '#9CC0F0';
      ctx.beginPath();
      ctx.moveTo(mx*s, 205*s);
      ctx.lineTo((mx+90)*s, 135*s);
      ctx.lineTo((mx+170)*s, 160*s);
      ctx.lineTo((mx+240)*s, 120*s);
      ctx.lineTo((mx+330)*s, 155*s);
      ctx.lineTo((mx+420)*s, 205*s);
      ctx.fill();
      // Snow caps on peaks
      ctx.fillStyle = '#F0F8FF';
      ctx.beginPath();
      ctx.moveTo((mx+78)*s, 148*s);
      ctx.lineTo((mx+90)*s, 135*s);
      ctx.lineTo((mx+102)*s, 148*s);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo((mx+228)*s, 133*s);
      ctx.lineTo((mx+240)*s, 120*s);
      ctx.lineTo((mx+252)*s, 133*s);
      ctx.closePath(); ctx.fill();
    }

    // Layer 2: Mid mountains (parallax 0.2x) — saturated blue
    const midMtnOff = cam.x * 0.2;
    ctx.fillStyle = '#6890D0';
    for (let i = -1; i < 6; i++) {
      const mx = i * 300 - (midMtnOff % 300);
      ctx.beginPath();
      ctx.moveTo(mx*s, 208*s);
      ctx.lineTo((mx+60)*s, 155*s);
      ctx.lineTo((mx+130)*s, 175*s);
      ctx.lineTo((mx+200)*s, 148*s);
      ctx.lineTo((mx+260)*s, 180*s);
      ctx.lineTo((mx+300)*s, 208*s);
      ctx.fill();
    }

    // Layer 3: Hills (parallax 0.3x) — green
    const hillOff = cam.x * 0.3;
    for (let i = -1; i < 6; i++) {
      const hx = i * 280 - (hillOff % 280);
      // Large hill
      ctx.fillStyle = '#80D010';
      ctx.beginPath();
      ctx.moveTo(hx*s, 208*s);
      ctx.quadraticCurveTo((hx+55)*s, 140*s, (hx+110)*s, 208*s);
      ctx.fill();
      // Inner shading
      ctx.fillStyle = '#60B000';
      ctx.beginPath();
      ctx.moveTo((hx+25)*s, 208*s);
      ctx.quadraticCurveTo((hx+55)*s, 158*s, (hx+85)*s, 208*s);
      ctx.fill();
      // Tiny secondary hill
      ctx.fillStyle = '#80D010';
      ctx.beginPath();
      ctx.moveTo((hx+160)*s, 208*s);
      ctx.quadraticCurveTo((hx+190)*s, 170*s, (hx+220)*s, 208*s);
      ctx.fill();
      // Flowers dotted on hills
      ctx.fillStyle = '#FCF8FC';
      for (let f = 0; f < 3; f++) {
        const fx = hx + 40 + f * 18;
        const fy = 198 + ((hx + f) % 3);
        ctx.fillRect(fx*s, fy*s, s, s);
      }
      ctx.fillStyle = '#FC8080';
      ctx.fillRect((hx + 175)*s, 200*s, s, s);
    }

    // Layer 4: Tree silhouettes (parallax 0.4x) — dark green
    const treeOff = cam.x * 0.4;
    ctx.fillStyle = '#1E7028';
    for (let i = -1; i < 10; i++) {
      const tx = i * 180 + 30 - (treeOff % 180);
      // Trunk
      ctx.fillStyle = '#5A3820';
      ctx.fillRect(tx*s, 195*s, 4*s, 14*s);
      // Canopy — layered triangles for pine feel
      ctx.fillStyle = '#1E7028';
      ctx.beginPath();
      ctx.moveTo((tx-8)*s, 200*s);
      ctx.lineTo((tx+2)*s, 175*s);
      ctx.lineTo((tx+12)*s, 200*s);
      ctx.closePath(); ctx.fill();
      ctx.beginPath();
      ctx.moveTo((tx-6)*s, 188*s);
      ctx.lineTo((tx+2)*s, 168*s);
      ctx.lineTo((tx+10)*s, 188*s);
      ctx.closePath(); ctx.fill();
    }

    // Layer 5: Bushes (parallax 0.55x)
    const bushOff = cam.x * 0.55;
    for (let i = -1; i < 10; i++) {
      const bx = i * 200 + 40 - (bushOff % 200);
      const bw = (i % 3 === 0) ? 48 : (i % 3 === 1) ? 32 : 24;
      ctx.fillStyle = '#00A800';
      ctx.beginPath(); ctx.ellipse((bx+bw/2)*s, 208*s, (bw/2)*s, 11*s, 0, Math.PI, 0); ctx.fill();
      ctx.fillStyle = '#50D050';
      ctx.beginPath(); ctx.ellipse((bx+bw/2-3)*s, 204*s, (bw/4)*s, 5*s, 0, Math.PI, 0); ctx.fill();
      // Tiny bush flower
      if (i % 2 === 0) {
        ctx.fillStyle = '#FCE060';
        ctx.fillRect((bx + bw/2 + 4)*s, 203*s, s, s);
      }
    }

    // Layer 6: Clouds (parallax 0.08x) — soft drifting
    const cloudOff = cam.x * 0.08;
    const cloudPositions = [
      [80,30,44],[210,22,36],[380,38,50],[550,26,40],[700,34,46],
      [900,28,38],[1100,32,42],[1300,20,36],[1500,36,48],
      [200,58,54],[620,70,40]
    ];
    for (const [cx, cy, cw] of cloudPositions) {
      const drawX = cx - (cloudOff % 1700);
      // Soft shadow underneath
      ctx.fillStyle = 'rgba(100,140,200,0.15)';
      ctx.beginPath(); ctx.ellipse((drawX+cw*0.5)*s, (cy+3)*s, (cw*0.55)*s, 8*s, 0, 0, Math.PI*2); ctx.fill();
      // Main cloud body — three overlapping puffs
      ctx.fillStyle = '#FCF8FC';
      ctx.beginPath(); ctx.ellipse((drawX+cw*0.5)*s, cy*s, (cw*0.5)*s, 10*s, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse((drawX+cw*0.25)*s, (cy-6)*s, (cw*0.3)*s, 8*s, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse((drawX+cw*0.7)*s, (cy-4)*s, (cw*0.3)*s, 8*s, 0, 0, Math.PI*2); ctx.fill();
      // Highlight rim
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath(); ctx.ellipse((drawX+cw*0.45)*s, (cy-3)*s, (cw*0.35)*s, 4*s, 0, 0, Math.PI*2); ctx.fill();
    }

    // Layer 7: Flying birds — tiny animated M-silhouettes (parallax 0.25x, self-animated)
    const birdOff = cam.x * 0.25;
    const birdFlap = Math.floor(t / 8) % 2;
    const birdPositions = [[240, 60], [880, 45], [1400, 75], [560, 85]];
    ctx.fillStyle = '#2A2A2A';
    for (const [bx, by] of birdPositions) {
      const drawX = bx - (birdOff % 1600) + (t * 0.2) % 80; // slow drift across
      if (drawX < -20 || drawX > canvasW/s + 20) continue;
      // M-shape bird — 2-frame flap
      if (birdFlap === 0) {
        ctx.fillRect(drawX*s, by*s, s, s);
        ctx.fillRect((drawX+1)*s, (by-1)*s, s, s);
        ctx.fillRect((drawX+2)*s, by*s, s, s);
        ctx.fillRect((drawX+3)*s, (by+1)*s, s, s);
        ctx.fillRect((drawX+4)*s, by*s, s, s);
        ctx.fillRect((drawX+5)*s, (by-1)*s, s, s);
        ctx.fillRect((drawX+6)*s, by*s, s, s);
      } else {
        ctx.fillRect(drawX*s, (by+1)*s, s, s);
        ctx.fillRect((drawX+1)*s, by*s, s, s);
        ctx.fillRect((drawX+2)*s, (by+1)*s, s, s);
        ctx.fillRect((drawX+3)*s, by*s, s, s);
        ctx.fillRect((drawX+4)*s, (by+1)*s, s, s);
        ctx.fillRect((drawX+5)*s, by*s, s, s);
        ctx.fillRect((drawX+6)*s, (by+1)*s, s, s);
      }
    }
  }

  _renderHUD(s){
    const m=this.mario;
    // HUD background strip for readability
    ctx.fillStyle='rgba(0,0,0,0.15)';
    ctx.fillRect(0,0,canvasW,22*s);

    ctx.fillStyle=COL.text;ctx.font=`${7*s}px monospace`;ctx.textAlign='left';
    const hy=8;
    ctx.fillText('MARIO',16*s,hy*s);
    ctx.fillText(String(m.score).padStart(6,'0'),16*s,(hy+10)*s);
    ctx.fillStyle=COL.coin;
    // Coin icon
    ctx.fillRect(86*s,(hy+7)*s,4*s,6*s);
    ctx.fillStyle=COL.text;
    ctx.fillText(`×${String(m.coins).padStart(2,'0')}`,92*s,(hy+10)*s);
    ctx.fillText('WORLD',140*s,hy*s);
    ctx.fillText(this.levelData?this.levelData.worldName:'1-1',148*s,(hy+10)*s);
    ctx.fillText('TIME',200*s,hy*s);
    const timeStr=String(Math.max(0,Math.ceil(this.time))).padStart(3,'0');
    // Flash time when low
    if(this.time<=100&&Math.floor(this.time*4)%2===0)ctx.fillStyle='#FC4848';
    ctx.fillText(timeStr,204*s,(hy+10)*s);
  }

  _renderPause(s){
    ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,0,canvasW,canvasH);
    ctx.fillStyle=COL.text;ctx.font=`bold ${12*s}px monospace`;ctx.textAlign='center';
    ctx.fillText('PAUSED',NES_W*s/2,NES_H*s/2-5*s);
    ctx.font=`${6*s}px monospace`;
    ctx.fillText('PRESS ENTER TO RESUME',NES_W*s/2,NES_H*s/2+15*s);
  }

  _renderGameOver(s){
    ctx.fillStyle='#000';ctx.fillRect(0,0,canvasW,canvasH);
    ctx.fillStyle=COL.text;ctx.font=`bold ${12*s}px monospace`;ctx.textAlign='center';
    ctx.fillText('GAME OVER',NES_W*s/2,NES_H*s/2-10*s);
    if(this.mario){
      ctx.font=`${7*s}px monospace`;
      ctx.fillText(`SCORE: ${this.mario.score}`,NES_W*s/2,NES_H*s/2+15*s);
      if(this.mario.score>=this.highScore){ctx.fillStyle=COL.coin;ctx.fillText('NEW HIGH SCORE!',NES_W*s/2,NES_H*s/2+30*s);}
    }
  }
}

// ======================== GAME LOOP ========================
const game = new Game();
let lastTime = performance.now();
let accumulator = 0;

function gameLoop(now) {
  requestAnimationFrame(gameLoop);
  const dt = Math.min((now - lastTime) / 1000, 0.05);
  lastTime = now;
  accumulator += dt;
  while (accumulator >= DT_FIXED) {
    game.update(DT_FIXED);
    accumulator -= DT_FIXED;
  }
  game.render();
}

requestAnimationFrame(gameLoop);
</script>
</body>
