// ======================== CANVAS SETUP ========================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let canvasW, canvasH, gameScale;

function resizeCanvas() {
  const maxW = window.innerWidth;
  const maxH = window.innerHeight;
  // Use fractional scaling to fill the window, then round up to nearest 0.5
  // This makes the game much larger on big screens
  const rawScale = Math.min(maxW / NES_W, maxH / NES_H);
  gameScale = Math.max(1, Math.floor(rawScale * 2) / 2); // Round to nearest 0.5
  canvasW = Math.round(NES_W * gameScale);
  canvasH = Math.round(NES_H * gameScale);
  canvas.width = canvasW;
  canvas.height = canvasH;
  canvas.style.width = canvasW + 'px';
  canvas.style.height = canvasH + 'px';
  ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ======================== INPUT SYSTEM (v2 — zero-lag) ========================
// Direct key state polling every frame — no buffering, no event delay
const keyState = {};        // Currently held keys (true/false)
const keyJustDown = {};     // Keys pressed THIS frame (cleared each tick)
const keyJustUp = {};       // Keys released THIS frame

window.addEventListener('keydown', e => {
  if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
  if (!keyState[e.code]) keyJustDown[e.code] = true;
  keyState[e.code] = true;
});
window.addEventListener('keyup', e => {
  keyState[e.code] = false;
  keyJustUp[e.code] = true;
});

// Polled every physics tick — zero lag
function kLeft()   { return keyState['ArrowLeft']  || keyState['KeyA']; }
function kRight()  { return keyState['ArrowRight'] || keyState['KeyD']; }
function kJump()   { return keyState['ArrowUp']    || keyState['KeyW'] || keyState['Space']; }
function kDown()   { return keyState['ArrowDown']  || keyState['KeyS']; }
function kRun()    { return keyState['ShiftLeft']  || keyState['ShiftRight'] || keyState['KeyX']; }
function kStartJust() { return keyJustDown['Enter'] || keyJustDown['Return']; }
function kMuteJust()  { return keyJustDown['KeyM']; }
// Jump was JUST pressed this frame
function kJumpJust() {
  return keyJustDown['ArrowUp'] || keyJustDown['KeyW'] || keyJustDown['Space'];
}
function clearFrameInput() {
  for (const k in keyJustDown) delete keyJustDown[k];
  for (const k in keyJustUp) delete keyJustUp[k];
}

// ======================== SCREEN SHAKE ========================
const shake = { x: 0, y: 0, intensity: 0, decay: 0.88 };
function addShake(amount) { shake.intensity = Math.max(shake.intensity, amount); }
function updateShake() {
  if (shake.intensity > 0.3) {
    shake.x = (Math.random() - 0.5) * shake.intensity * 2;
    shake.y = (Math.random() - 0.5) * shake.intensity * 2;
    shake.intensity *= shake.decay;
  } else {
    shake.x = 0; shake.y = 0; shake.intensity = 0;
  }
}

// ======================== SOUND ENGINE ========================
class SoundEngine {
  constructor() {
    this.ctx = null; this.muted = false; this.musicPlaying = false;
    this.musicNodes = []; this.currentTheme = null; this.initialized = false;
  }
  init() {
    if (this.initialized) return;
    try {
      this.ctx = new (window.AudioContext || window.webkitAudioContext)();
      this.masterGain = this.ctx.createGain();
      this.masterGain.gain.value = 0.7;
      this.masterGain.connect(this.ctx.destination);
      this.sfxGain = this.ctx.createGain();
      this.sfxGain.gain.value = 0.8;
      this.sfxGain.connect(this.masterGain);
      this.musicGain = this.ctx.createGain();
      this.musicGain.gain.value = 0.5;
      this.musicGain.connect(this.masterGain);
      this.initialized = true;
    } catch(e) { console.warn('Web Audio not available:', e); }
  }
  resume() { if (this.ctx && this.ctx.state === 'suspended') this.ctx.resume(); }
  toggleMute() { this.muted = !this.muted; if (this.masterGain) this.masterGain.gain.value = this.muted ? 0 : 0.7; }

  pulse(freq, duration, volume = 0.3) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = 'square'; osc.frequency.value = freq;
    gain.gain.setValueAtTime(volume, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    osc.connect(gain); gain.connect(this.sfxGain);
    osc.start(t); osc.stop(t + duration);
  }
  noise(duration, volume = 0.15) {
    if (!this.ctx || this.muted) return;
    const t = this.ctx.currentTime;
    const bufSz = this.ctx.sampleRate * duration;
    const buffer = this.ctx.createBuffer(1, bufSz, this.ctx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufSz; i++) data[i] = Math.random() * 2 - 1;
    const src = this.ctx.createBufferSource(); src.buffer = buffer;
    const gain = this.ctx.createGain();
    gain.gain.setValueAtTime(volume, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
    src.connect(gain); gain.connect(this.sfxGain); src.start(t);
  }

  jumpSmall() {
    if (!this.ctx) return; const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(350, t); osc.frequency.linearRampToValueAtTime(900, t + 0.15);
    gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
    osc.connect(gain); gain.connect(this.sfxGain); osc.start(t); osc.stop(t + 0.2);
  }
  jumpBig() {
    if (!this.ctx) return; const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(250, t); osc.frequency.linearRampToValueAtTime(700, t + 0.2);
    gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.connect(gain); gain.connect(this.sfxGain); osc.start(t); osc.stop(t + 0.25);
  }
  coin() {
    if (!this.ctx) return; const t = this.ctx.currentTime;
    this.pulse(988, 0.05, 0.2);
    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
    osc.type = 'square'; osc.frequency.value = 1319;
    gain.gain.setValueAtTime(0, t); gain.gain.setValueAtTime(0.2, t + 0.06);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.connect(gain); gain.connect(this.sfxGain); osc.start(t); osc.stop(t + 0.35);
  }
  bump() {
    if (!this.ctx) return; const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(200, t); osc.frequency.linearRampToValueAtTime(80, t + 0.08);
    gain.gain.setValueAtTime(0.3, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.1);
    osc.connect(gain); gain.connect(this.sfxGain); osc.start(t); osc.stop(t + 0.1);
  }
  breakBrick() { if (!this.ctx) return; this.noise(0.15, 0.25); this.pulse(200, 0.06, 0.15); }
  stomp() {
    if (!this.ctx) return; const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(500, t); osc.frequency.linearRampToValueAtTime(150, t + 0.1);
    gain.gain.setValueAtTime(0.25, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    osc.connect(gain); gain.connect(this.sfxGain); osc.start(t); osc.stop(t + 0.12);
  }
  kick() {
    if (!this.ctx) return; const t = this.ctx.currentTime;
    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(600, t); osc.frequency.linearRampToValueAtTime(200, t + 0.06);
    gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
    osc.connect(gain); gain.connect(this.sfxGain); osc.start(t); osc.stop(t + 0.08);
  }
  powerUpAppear() {
    if (!this.ctx) return; const t = this.ctx.currentTime;
    [523,659,784,1047].forEach((f, i) => {
      const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
      osc.type = 'square'; osc.frequency.value = f;
      const s = t + i * 0.06;
      gain.gain.setValueAtTime(0, s - 0.001); gain.gain.setValueAtTime(0.15, s);
      gain.gain.exponentialRampToValueAtTime(0.001, s + 0.1);
      osc.connect(gain); gain.connect(this.sfxGain); osc.start(s); osc.stop(s + 0.1);
    });
  }

// ======================== PARTICLE SYSTEM (v2 — much richer) ========================
class Particle {
  constructor(x, y, vx, vy, color, life, size = 2, gravity = true) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color; this.life = this.maxLife = life;
    this.size = size; this.gravity = gravity;
    this.rotation = 0; this.rotSpeed = 0;
    this.shape = 'rect'; // rect, circle, triangle
    this.scaleX = 1; this.scaleY = 1;
    this.fadeStart = 0.3; // start fading at this fraction of life remaining
  }
}

class ParticleSystem {
  constructor() { this.particles = []; }

  // Brick break — 4 triangular shards with rotation and NES-accurate colors
  brickBreak(x, y) {
    const colors = [COL.brick, COL.brickShade, COL.brickLine, COL.brickHighlight];
    for (let i = 0; i < 8; i++) {
      const vx = (i < 4 ? -1 : 1) * (30 + Math.random() * 80);
      const vy = -(100 + Math.random() * 150) + (i % 2 === 0 ? 0 : 40);
      const p = new Particle(x + (Math.random()-0.5)*8, y + (Math.random()-0.5)*4,
        vx, vy, colors[i % 4], 1.0 + Math.random()*0.3, 3 + Math.random()*2);
      p.rotation = Math.random() * Math.PI * 2;
      p.rotSpeed = (Math.random() - 0.5) * 15;
      p.shape = 'triangle';
      this.particles.push(p);
    }
    addShake(3);
  }

  // Coin sparkle — starburst pattern with shimmer
  coinSparkle(x, y) {
    for (let i = 0; i < 10; i++) {
      const angle = (i / 10) * Math.PI * 2 + Math.random() * 0.3;
      const speed = 20 + Math.random() * 50;
      const p = new Particle(x, y,
        Math.cos(angle) * speed, Math.sin(angle) * speed - 40,
        Math.random() > 0.3 ? COL.coin : COL.coinShine,
        0.5 + Math.random() * 0.2, 1 + Math.random() * 2, false);
      p.shape = 'circle';
      this.particles.push(p);
    }
  }

  // Enemy stomp — satisfying puff cloud
  stompPuff(x, y) {
    for (let i = 0; i < 8; i++) {
      const angle = (i / 8) * Math.PI * 2;
      const speed = 15 + Math.random() * 35;
      const p = new Particle(x, y - 2,
        Math.cos(angle) * speed, Math.sin(angle) * speed * 0.6 - 20,
        '#FCF8FC', 0.35 + Math.random() * 0.15, 2 + Math.random() * 2, false);
      p.shape = 'circle';
      p.fadeStart = 0.5;
      this.particles.push(p);
    }
    addShake(1.5);
  }

  // Running dust — kicked up from feet
  runDust(x, y, dir) {
    for (let i = 0; i < 2; i++) {
      const p = new Particle(x, y,
        dir * (8 + Math.random() * 25), -(5 + Math.random() * 15),
        '#C8A878', 0.2 + Math.random() * 0.1, 1.5 + Math.random(), false);
      p.shape = 'circle';
      this.particles.push(p);
    }
  }

  // Skid sparks — bright yellow/white sparks
  skidSparks(x, y, dir) {
    for (let i = 0; i < 4; i++) {
      const p = new Particle(x, y - 2,
        dir * (20 + Math.random() * 40), -(15 + Math.random() * 30),
        Math.random() > 0.5 ? '#FCF800' : '#FCF8FC',
        0.15 + Math.random() * 0.1, 1 + Math.random(), false);
      p.shape = 'circle';
      this.particles.push(p);
    }
  }

  // Landing impact — dust cloud
  landingImpact(x, y, speed) {
    const intensity = Math.min(1, Math.abs(speed) / 200);
    const count = Math.floor(3 + intensity * 6);
    for (let i = 0; i < count; i++) {
      const vx = (Math.random() - 0.5) * 60 * intensity;
      const p = new Particle(x + (Math.random()-0.5)*8, y,
        vx, -(5 + Math.random() * 10),
        '#C8A878', 0.25 + Math.random() * 0.15, 1.5 + Math.random() * 1.5, false);
      p.shape = 'circle';
      this.particles.push(p);
    }
    if (intensity > 0.6) addShake(1.5 * intensity);
  }

  // Fireball explosion — fiery burst
  fireballBurst(x, y) {
    for (let i = 0; i < 12; i++) {
      const angle = (i / 12) * Math.PI * 2;
      const speed = 25 + Math.random() * 35;
      const p = new Particle(x, y,
        Math.cos(angle) * speed, Math.sin(angle) * speed,
        ['#FC7800','#FCA800','#FCF800','#D82800'][i%4],
        0.3 + Math.random() * 0.15, 1.5 + Math.random() * 1.5, false);
      p.shape = 'circle';
      this.particles.push(p);
    }
  }

  // Fireball trail
  fireballTrail(x, y) {
    const p = new Particle(x + (Math.random()-0.5)*3, y + (Math.random()-0.5)*3,
      (Math.random()-0.5)*8, (Math.random()-0.5)*8 - 10,
      Math.random() > 0.5 ? '#FC7800' : '#FCA800',
      0.15, 1 + Math.random(), false);
    p.shape = 'circle';
    this.particles.push(p);
  }

  // Star power sparkles around Mario
  starSparkle(x, y) {
    const colors = ['#FCF800','#00F800','#FC0000','#5C94FC','#FCF8FC'];
    const p = new Particle(
      x + (Math.random()-0.5)*14, y + (Math.random()-0.5)*20,
      (Math.random()-0.5)*30, (Math.random()-0.5)*30 - 15,
      colors[Math.floor(Math.random()*colors.length)],
      0.3, 1.5 + Math.random(), false);
    p.shape = 'circle';
    this.particles.push(p);
  }

  update(dt) {
    for (let i = this.particles.length - 1; i >= 0; i--) {
      const p = this.particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if (p.gravity) p.vy += 350 * dt;
      if (p.rotSpeed) p.rotation += p.rotSpeed * dt;
      p.life -= dt;
      if (p.life <= 0) this.particles.splice(i, 1);
    }
  }

  render(ctx, camX, camY, scale) {
    for (const p of this.particles) {
      const frac = p.life / p.maxLife;
      const alpha = frac < p.fadeStart ? frac / p.fadeStart : 1;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = p.color;
      const sx = (p.x - camX) * scale;
      const sy = (p.y - camY) * scale;
      const sz = p.size * scale;

      if (p.shape === 'circle') {
        ctx.beginPath();
        ctx.arc(sx, sy, sz * 0.5, 0, Math.PI * 2);
        ctx.fill();
      } else if (p.shape === 'triangle') {
        ctx.save();
        ctx.translate(sx, sy);
        ctx.rotate(p.rotation);
        ctx.beginPath();
        ctx.moveTo(0, -sz);
        ctx.lineTo(-sz * 0.7, sz * 0.5);
        ctx.lineTo(sz * 0.7, sz * 0.5);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      } else {
        ctx.fillRect(sx - sz*0.5, sy - sz*0.5, sz, sz);
      }
    }
    ctx.globalAlpha = 1;
  }
}

class ProceduralSprites {
  // Helper: draw outlined pixel rect for crisper look
  static px(ctx, x, y, color, s) {
    ctx.fillStyle = color;
    ctx.fillRect(Math.round(x * s), Math.round(y * s), s, s);
  }
  // Block of pixels
  static pxRow(ctx, x, y, colors, s) {
    for (let i = 0; i < colors.length; i++) {
      if (colors[i]) { ctx.fillStyle = colors[i]; ctx.fillRect(Math.round((x+i)*s), Math.round(y*s), s, s); }
    }
  }

  // Small Mario — 16x16 with richer detail
  static drawSmallMario(ctx, x, y, s, frame, flipX, powerState) {

    P(6, 3, skinL); P(7, 3, hair); P(8, 3, skin);
    P(2, 4, skin); P(3, 4, hair); P(4, 4, skin);

    P(8, 4, skin); P(9, 4, skin);
    P(3, 5, skin); P(4, 5, skin); P(5, 5, skin);
    P(6, 5, skin);

    // Body
    if (frame === 'jump') {
      P(2, 6, shirt); P(3, 6, shirt); P(4, 6, pants);
      P(5, 6, pants); P(6, 6, pants); P(7, 6, shirt);
      P(8, 6, shirt); P(9, 6, skin);
      P(3, 7, pants); P(4, 7, shirt); P(5, 7, pants);
      P(6, 7, pants); P(7, 7, pants);
      P(3, 8, pants); P(4, 8, pants); P(5, 8, pants);
      P(6, 8, pants);
      P(2, 9, boot); P(3, 9, boot);
      P(8, 9, boot); P(9, 9, boot);
      P(1, 10, boot); P(2, 10, boot);
      P(9, 10, boot); P(10, 10, boot);
    } else if (frame === 'skid') {
      P(3, 6, shirt); P(4, 6, shirt); P(5, 6, shirt);

      P(2, 7, pants); P(3, 7, pants); P(4, 7, shirt);
      P(5, 7, pants); P(6, 7, pants); P(7, 7, pants);
      P(3, 8, skin); P(4, 8, skin); P(8, 8, skin);
      P(7, 9, boot); P(8, 9, boot); P(3, 9, boot); P(4, 9, boot);
      P(2, 10, boot); P(8, 10, boot); P(9, 10, boot);
    } else if (frame === 'dead') {
      P(3, 6, shirt); P(4, 6, shirt); P(5, 6, shirt);
      P(2, 7, shirt); P(3, 7, pants); P(4, 7, pants);
      P(5, 7, pants); P(6, 7, pants);
      P(3, 8, pants); P(4, 8, pants); P(5, 8, pants);
      P(2, 9, skin); P(3, 9, boot); P(6, 9, boot); P(7, 9, skin);
      P(2, 10, boot); P(7, 10, boot);
    } else {
      // Idle / run
      P(3, 6, shirt); P(4, 6, shirt); P(5, 6, shirt);
      P(6, 6, pants); P(7, 6, pants); P(8, 6, shirt);
      P(2, 7, pants); P(3, 7, pants); P(4, 7, shirt);
      P(5, 7, pants); P(6, 7, pants); P(7, 7, pants); P(8, 7, pants);
      P(2, 8, pants); P(3, 8, pants); P(4, 8, pants);

  // Tile rendering — v2 with richer patterns and shading
  static drawTile(ctx, x, y, s, type, animFrame = 0) {
    const rx = Math.round(x*s);
    const ry = Math.round(y*s);
    const sz = Math.round(16*s);

    switch (type) {
      case T.GROUND:
      case T.HARD: {
        ctx.fillStyle = COL.ground; ctx.fillRect(rx, ry, sz, sz);
        ctx.fillStyle = COL.groundDark;
        ctx.fillRect(rx, ry, sz, s);
        ctx.fillRect(rx, ry + 8*s, sz, s);
        ctx.fillRect(rx + 8*s, ry, s, 8*s);
        ctx.fillRect(rx + 4*s, ry + 8*s, s, 8*s);
        ctx.fillRect(rx + 12*s, ry + 8*s, s, 8*s);
        // Highlight edge
        ctx.fillStyle = COL.groundLight;
        ctx.fillRect(rx, ry + s, s, 7*s);
        ctx.fillRect(rx, ry + 9*s, 4*s, s);
        break;
      }
      case T.BRICK: {
        ctx.fillStyle = COL.brick; ctx.fillRect(rx, ry, sz, sz);
        // Mortar
        ctx.fillStyle = COL.brickLine;
        ctx.fillRect(rx, ry, sz, s);
        ctx.fillRect(rx, ry + 8*s, sz, s);
        ctx.fillRect(rx + 8*s, ry + s, s, 7*s);
        ctx.fillRect(rx + 4*s, ry + 9*s, s, 7*s);
        ctx.fillRect(rx + 12*s, ry + 9*s, s, 7*s);
        // Highlight
        ctx.fillStyle = COL.brickHighlight;
        ctx.fillRect(rx + s, ry + s, 2*s, s);
        ctx.fillRect(rx + 9*s, ry + s, 2*s, s);
        // Shadow edge
        ctx.fillStyle = COL.brickShade;
        ctx.fillRect(rx + 15*s, ry, s, sz);
        ctx.fillRect(rx, ry + 15*s, sz, s);
        break;
      }
      case T.QUESTION: case T.QMUSH: case T.QSTAR: case T.Q1UP: case T.HIDDEN_COIN: {
        // Animated pulsing question block
        const pulse = Math.sin(animFrame * 0.3) * 0.15;
        ctx.fillStyle = COL.question; ctx.fillRect(rx, ry, sz, sz);
        // Dark border
        ctx.fillStyle = COL.questionShade;
        ctx.fillRect(rx, ry, sz, s); ctx.fillRect(rx, ry+15*s, sz, s);
        ctx.fillRect(rx, ry, s, sz); ctx.fillRect(rx+15*s, ry, s, sz);
        // Inner highlight
        ctx.fillStyle = COL.questionBright;
        ctx.fillRect(rx+s, ry+s, 14*s, s);
        ctx.fillRect(rx+s, ry+s, s, 14*s);
        // Inner shadow
        ctx.fillStyle = COL.questionDark;
        ctx.fillRect(rx+14*s, ry+s, s, 14*s);
        ctx.fillRect(rx+s, ry+14*s, 14*s, s);
        // Question mark
        const P = (px,py,c) => { ctx.fillStyle = c; ctx.fillRect(rx+Math.round(px*s), ry+Math.round(py*s), s, s); };
        const bounce = Math.floor(animFrame / 4) % 2;
        const qc = COL.questionDark;
        P(6,3+bounce,qc);P(7,3+bounce,qc);P(8,3+bounce,qc);P(9,3+bounce,qc);P(10,3+bounce,qc);
        P(10,4+bounce,qc);P(10,5+bounce,qc);
        P(9,6+bounce,qc);P(8,7+bounce,qc);P(8,8+bounce,qc);
        P(8,10+bounce,qc);
        break;
      }
      case T.EMPTY: {
        ctx.fillStyle = COL.empty; ctx.fillRect(rx, ry, sz, sz);
        ctx.fillStyle = COL.emptyShade;
        ctx.fillRect(rx, ry, sz, s); ctx.fillRect(rx, ry+15*s, sz, s);
        ctx.fillRect(rx, ry, s, sz); ctx.fillRect(rx+15*s, ry, s, sz);
        ctx.fillStyle = COL.emptyLight;
        ctx.fillRect(rx+s, ry+s, 14*s, s);
        ctx.fillRect(rx+s, ry+s, s, 14*s);
        break;
      }
      case T.PIPE_TL: case T.PIPE_ENTER: {
        ctx.fillStyle = COL.pipe; ctx.fillRect(rx, ry, sz, sz);
        ctx.fillStyle = COL.pipeHighlight; ctx.fillRect(rx+s, ry, 3*s, sz);
        ctx.fillStyle = COL.pipeBright; ctx.fillRect(rx+2*s, ry, s, sz);
        ctx.fillStyle = COL.pipeDark; ctx.fillRect(rx+14*s, ry, 2*s, sz);
        // Lip
        ctx.fillStyle = COL.pipe; ctx.fillRect(rx-2*s, ry, 18*s, 4*s);
        ctx.fillStyle = COL.pipeHighlight; ctx.fillRect(rx-s, ry, 3*s, 4*s);
        ctx.fillStyle = COL.pipeBright; ctx.fillRect(rx, ry, s, 4*s);
        ctx.fillStyle = COL.pipeDark; ctx.fillRect(rx+14*s, ry, 2*s, 4*s);
        // Top edge line
        ctx.fillStyle = COL.pipeDark; ctx.fillRect(rx-2*s, ry, 18*s, s);
        break;
      }
      case T.PIPE_TR: case T.PIPE_ENTER_R: {
        ctx.fillStyle = COL.pipe; ctx.fillRect(rx, ry, sz, sz);
        ctx.fillStyle = COL.pipeHighlight; ctx.fillRect(rx+s, ry, 3*s, sz);
        ctx.fillStyle = COL.pipeDark; ctx.fillRect(rx+14*s, ry, 2*s, sz);
        ctx.fillStyle = COL.pipe; ctx.fillRect(rx, ry, 18*s, 4*s);
        ctx.fillStyle = COL.pipeDark; ctx.fillRect(rx+16*s, ry, 2*s, 4*s);
        ctx.fillStyle = COL.pipeDark; ctx.fillRect(rx, ry, 18*s, s);
        break;
      }
      case T.PIPE_BL: case T.PIPE_BR: {
        ctx.fillStyle = COL.pipe; ctx.fillRect(rx, ry, sz, sz);
        ctx.fillStyle = COL.pipeHighlight; ctx.fillRect(rx+s, ry, 3*s, sz);
        ctx.fillStyle = COL.pipeBright; ctx.fillRect(rx+2*s, ry, s, sz);
        ctx.fillStyle = COL.pipeDark; ctx.fillRect(rx+14*s, ry, 2*s, sz);
        break;
      }
      case T.FLAG_TOP: {
        ctx.fillStyle = COL.flagpole; ctx.fillRect(rx+7*s, ry, 2*s, sz);
        // Shiny ball
        ctx.fillStyle = COL.coin; ctx.fillRect(rx+5*s, ry+s, 6*s, 6*s);
        ctx.fillStyle = COL.coinShine; ctx.fillRect(rx+6*s, ry+2*s, 2*s, 2*s);
        ctx.fillStyle = COL.coinDark; ctx.fillRect(rx+9*s, ry+5*s, 2*s, 2*s);
        break;
      }
      case T.FLAG_POLE: {
        ctx.fillStyle = COL.flagpoleDark; ctx.fillRect(rx+7*s, ry, 2*s, sz);
        ctx.fillStyle = COL.flagpoleShine; ctx.fillRect(rx+7*s, ry, s, sz);
        break;
      }
      case T.CASTLE_WALL: {
        ctx.fillStyle = COL.castleGray; ctx.fillRect(rx, ry, sz, sz);
        ctx.fillStyle = COL.castleDark;
        ctx.fillRect(rx, ry, sz, s);
        ctx.fillRect(rx, ry+8*s, sz, s);
        ctx.fillRect(rx+8*s, ry, s, 8*s);
        ctx.fillRect(rx+4*s, ry+8*s, s, 8*s);
        ctx.fillRect(rx+12*s, ry+8*s, s, 8*s);
        ctx.fillStyle = COL.castleLight;
        ctx.fillRect(rx+s, ry+s, 2*s, s);
        break;
      }
      case T.CASTLE_TOP: {
        ctx.fillStyle = COL.castleGray;
        ctx.fillRect(rx, ry+8*s, sz, 8*s);
        ctx.fillRect(rx, ry, 4*s, sz); ctx.fillRect(rx+12*s, ry, 4*s, sz);
        ctx.fillStyle = COL.castleDark;
        ctx.fillRect(rx, ry+7*s, 4*s, s); ctx.fillRect(rx+12*s, ry+7*s, 4*s, s);
        ctx.fillStyle = COL.castleLight;
        ctx.fillRect(rx+s, ry+s, 2*s, s); ctx.fillRect(rx+13*s, ry+s, 2*s, s);
        break;
      }
      case T.LAVA: {
        ctx.fillStyle = COL.lava; ctx.fillRect(rx, ry, sz, sz);
        ctx.fillStyle = COL.lavaGlow; ctx.fillRect(rx, ry, sz, 4*s);
        // Animated shimmer
        ctx.fillStyle = COL.lavaBright;
        const lavaOff = (animFrame * 2 + Math.floor(x / 16)) % 8;
        ctx.fillRect(rx + lavaOff * s, ry, 4*s, 2*s);
        break;
      }
      case T.COIN: {
        // 6-frame 3D spin illusion with subtle bob — closer to NES coin feel
        const cf = Math.floor(animFrame / 3) % 6;
        // Widths emulate perspective: wide face → edge → reverse wide → edge
        const widths = [9, 6, 2, 6, 9, 6];
        const cw = widths[cf];
        const bob = (Math.floor(animFrame / 2) % 4 === 0) ? -1 : 0;
        const cx = x + 4 + (8 - cw) / 2;
        const cy = 2 + bob;

        // Outer disc — darker rim on trailing edge for 3D rotation feel
        ctx.fillStyle = COL.coinDark;
        ctx.fillRect(Math.round(cx * s), Math.round((cy + 1) * s), Math.round(cw * s), 11 * s);
        // Main face
        ctx.fillStyle = COL.coin;
        ctx.fillRect(Math.round(cx * s), Math.round(cy * s), Math.round(cw * s), 11 * s);
        // Bright specular streak — shifts position with rotation frame
        if (cw >= 4) {
          const shineX = cx + Math.max(1, Math.floor(cw * 0.25));
          ctx.fillStyle = COL.coinShine;
          ctx.fillRect(Math.round(shineX * s), Math.round((cy + 1) * s), Math.max(s, Math.round((cw - 3) * s)), 2 * s);
          // Inner notch — cross/indent suggesting coin face detail
          if (cw >= 7) {
            ctx.fillStyle = COL.coinDark;
            ctx.fillRect(Math.round((cx + cw / 2 - 0.5) * s), Math.round((cy + 4) * s), s, 4 * s);
          }
        }
        // Shadow on ground beneath coin
        ctx.fillStyle = 'rgba(0,0,0,0.18)';
        ctx.fillRect(Math.round(cx * s), Math.round(14 * s), Math.round(cw * s), s);
        break;
      }
      case T.BRIDGE: {
        ctx.fillStyle = '#C84C0C'; ctx.fillRect(rx, ry+4*s, sz, 8*s);
        ctx.fillStyle = '#FC9838'; ctx.fillRect(rx, ry+4*s, sz, 2*s);
        ctx.fillStyle = '#A43400'; ctx.fillRect(rx, ry+10*s, sz, 2*s);
        break;
      }
      case T.AXE: {
        ctx.fillStyle = '#A0A0A0'; ctx.fillRect(rx+4*s, ry+2*s, 8*s, 4*s);
        ctx.fillStyle = '#D0D0D0'; ctx.fillRect(rx+5*s, ry+3*s, 4*s, 2*s);

        ctx.fillStyle = '#A06830'; ctx.fillRect(rx+7*s, ry+6*s, 2*s, 8*s);
        break;
      }
      case T.MUSHROOM_L: case T.MUSHROOM_M: case T.MUSHROOM_R: {
        // Platform mushroom — green platform surface
        ctx.fillStyle = '#00A800'; ctx.fillRect(rx, ry, sz, 6*s);

          ctx.fillStyle = '#C8A878'; ctx.fillRect(rx+5*s, ry+8*s, s, 8*s);
        }
        break;
      }
    }
  }

  static drawMushroom(ctx, x, y, s, isOneUp = false) {
    const P = (px,py,c) => { ctx.fillStyle=c; ctx.fillRect(Math.round((x+px)*s), Math.round((y+py)*s), s, s); };
    const cap = isOneUp ? '#00B800' : COL.marioRed;
    const capDark = isOneUp ? '#006800' : '#A01010';
    for (let i=4;i<=11;i++) P(i,2,cap);
    for (let i=3;i<=12;i++) P(i,3,cap);
    for (let i=2;i<=13;i++) P(i,4,cap);
    for (let i=2;i<=13;i++) P(i,5,cap);
    // Spots
    P(5,3,COL.white);P(6,3,COL.white);P(9,3,COL.white);P(10,3,COL.white);
    P(4,4,COL.white);P(5,4,COL.white);P(6,4,COL.white);
    P(9,4,COL.white);P(10,4,COL.white);P(11,4,COL.white);
    P(5,5,COL.white);P(6,5,COL.white);P(9,5,COL.white);P(10,5,COL.white);
    // Bottom highlight on cap
    P(2,5,capDark);P(13,5,capDark);
    // Face
    for (let i=3;i<=12;i++) P(i,6,COL.marioSkin);
    for (let i=3;i<=12;i++) P(i,7,COL.marioSkin);
    P(5,7,COL.black);P(10,7,COL.black);
    for (let i=4;i<=11;i++) P(i,8,COL.marioSkin);
    for (let i=5;i<=10;i++) P(i,9,COL.marioSkin);
  }

  static drawFireFlower(ctx, x, y, s, animFrame = 0) {
    const P = (px,py,c) => { ctx.fillStyle=c; ctx.fillRect(Math.round((x+px)*s), Math.round((y+py)*s), s, s); };
    const cs = animFrame%2===0 ? ['#FC7800','#FCA800',COL.white]:['#00A800','#80D010',COL.white];
    P(7,1,cs[0]);P(8,1,cs[0]);
    P(5,2,cs[0]);P(6,2,cs[1]);P(9,2,cs[1]);P(10,2,cs[0]);
    P(5,3,cs[0]);P(6,3,cs[2]);P(7,3,cs[1]);P(8,3,cs[1]);P(9,3,cs[2]);P(10,3,cs[0]);
    P(6,4,cs[1]);P(7,4,cs[0]);P(8,4,cs[0]);P(9,4,cs[1]);
    P(7,5,cs[0]);P(8,5,cs[0]);
    P(7,6,'#00A800');P(8,6,'#00A800');
    for (let r=7;r<=12;r++){P(7,r,'#00A800');P(8,r,'#00A800');}
    P(5,8,'#00A800');P(6,8,'#00A800');P(9,9,'#00A800');P(10,9,'#00A800');
  }

  static drawStar(ctx, x, y, s, animFrame = 0) {
    const colors = ['#FCA800','#FC7800',COL.coin,'#FCF8A8'];
    const c = colors[animFrame % 4];
    const P = (px,py,col) => { ctx.fillStyle=col||c; ctx.fillRect(Math.round((x+px)*s), Math.round((y+py)*s), s, s); };
    P(7,1);P(8,1);P(7,2);P(8,2);
    P(6,3);P(7,3);P(8,3);P(9,3);
    for(let i=3;i<=12;i++)P(i,4);
    for(let i=2;i<=13;i++)P(i,5);
    for(let i=3;i<=12;i++)P(i,6);
    for(let i=4;i<=11;i++)P(i,7);
    P(4,8);P(5,8);P(10,8);P(11,8);
    P(3,9);P(4,9);P(11,9);P(12,9);
    P(2,10);P(3,10);P(12,10);P(13,10);
    P(6,5,COL.black);P(9,5,COL.black);
  }

  static drawFireball(ctx, x, y, s, animFrame = 0) {
    const c1 = animFrame%2===0 ? '#FC7800' : '#FCA800';
    const c2 = animFrame%2===0 ? '#FCA800' : '#FCF800';
    ctx.fillStyle = c1;
    ctx.fillRect(Math.round((x+1)*s), Math.round((y+1)*s), 6*s, 6*s);
    ctx.fillStyle = c2;
    ctx.fillRect(Math.round((x+2)*s), Math.round((y+2)*s), 4*s, 4*s);
    ctx.fillStyle = '#FCF8FC';
    ctx.fillRect(Math.round((x+3)*s), Math.round((y+3)*s), 2*s, 2*s);
  }

  static drawFlag(ctx, x, y, s) {
    ctx.fillStyle = COL.flag;
    ctx.fillRect(Math.round(x*s), Math.round(y*s), 10*s, 10*s);
    ctx.fillStyle = COL.flagDark;
    ctx.fillRect(Math.round(x*s), Math.round((y+8)*s), 10*s, 2*s);
  }
