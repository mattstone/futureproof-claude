<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Super Meat Boy</title>
<style>
  html, body { margin:0; padding:0; background:#000; overflow:hidden; }
  body { display:flex; align-items:center; justify-content:center; min-height:100vh; font-family: 'Courier New', monospace; color:#fff; }
  #wrap { position:relative; width: 100vw; height: 100vh; display:flex; align-items:center; justify-content:center; }
  canvas {
    image-rendering: pixelated; image-rendering: crisp-edges;
    display:block; background:#000;
    width: min(100vw, calc(100vh * 16 / 9));
    height: min(100vh, calc(100vw * 9 / 16));
    box-shadow: 0 0 40px rgba(230,57,70,0.25);
  }
  #hint { position:absolute; left:12px; bottom:8px; font-size:11px; color:#aaa; pointer-events:none; text-shadow: 1px 1px 0 #000; z-index:2; }
</style>
</head>
<body>
<div id="wrap">
  <canvas id="c" width="480" height="270"></canvas>
  <div id="hint">ARROWS move &middot; SPACE/Z jump &middot; SHIFT sprint &middot; R restart</div>
</div>
<script>
'use strict';

// ============================================================================
// CONFIG (tune here)
// ============================================================================
const CFG = {
  W: 480, H: 270, SCALE: 3,

  runSpeed:       185,
  sprintSpeed:    290,
  accelGround:    1800,
  accelAir:       1000,
  frictionGround: 2200,
  frictionAir:     220,

  gravityUp:      1000,
  gravityDown:   1800,
  maxFall:        620,

  jumpVel:        -340,
  jumpCutMult:    0.42,
  coyoteMs:       110,
  jumpBufferMs:   140,

  wallSlideSpeed:  90,
  wallJumpVelX:   280,
  wallJumpVelY:  -330,
  wallJumpLockMs: 110,

  // Colors
  MEAT:       '#B8242B',
  MEAT_DARK:  '#7A1518',
  BLOOD:      '#E63946',
  BLOOD_DARK: '#6B0F12',
  TERRAIN:    '#3A2A2A',
  TERRAIN_HI: '#5C4444',
  TERRAIN_EDGE:'#241818',
  SPIKE:      '#1A1A1A',
  SPIKE_HI:   '#C9C9C9',
  BG_HOSPITAL:'#F5C8D0',
  BG_SALT:    '#5D3A3A',
  GIRL:       '#F2D5D0',
  GIRL_BOW:   '#E63946',
};

// ============================================================================
// CANVAS
// ============================================================================
const canvas = document.getElementById('c');
const X = canvas.getContext('2d');
canvas.style.width = (CFG.W * CFG.SCALE) + 'px';
canvas.style.height = (CFG.H * CFG.SCALE) + 'px';
X.imageSmoothingEnabled = false;

// Offscreen blood canvas — accumulates gore all level long, cleared only on level change
const bloodCanvas = document.createElement('canvas');
bloodCanvas.width = CFG.W; bloodCanvas.height = CFG.H;
const BX = bloodCanvas.getContext('2d');
BX.imageSmoothingEnabled = false;

// ============================================================================
// AUDIO (procedural, WebAudio)
// ============================================================================
let AC = null;
function initAudio() {
  if (AC) return;
  try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
}
function env(node, a, d, peak, tail) {
  if (!AC) return;
  const t = AC.currentTime;
  node.gain.cancelScheduledValues(t);
  node.gain.setValueAtTime(0, t);
  node.gain.linearRampToValueAtTime(peak, t + a);
  node.gain.exponentialRampToValueAtTime(0.0001, t + a + d + (tail||0));
}
function tone(type, f0, f1, dur, vol) {
  if (!AC) return;
  const t = AC.currentTime;
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.type = type;
  o.frequency.setValueAtTime(f0, t);
  if (f1 !== f0) o.frequency.exponentialRampToValueAtTime(Math.max(30,f1), t + dur);
  o.connect(g); g.connect(AC.destination);
  env(g, 0.005, dur, vol, 0);
  o.start(t); o.stop(t + dur + 0.05);
}
function noise(dur, vol, lowpass) {
  if (!AC) return;
  const t = AC.currentTime;
  const sr = AC.sampleRate;
  const n = AC.createBuffer(1, sr * dur, sr);
  const d = n.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1);
  const src = AC.createBufferSource();
  src.buffer = n;
  const bp = AC.createBiquadFilter();
  bp.type = 'lowpass';
  bp.frequency.value = lowpass || 1200;
  const g = AC.createGain();
  src.connect(bp); bp.connect(g); g.connect(AC.destination);
  env(g, 0.003, dur * 0.4, vol, dur * 0.4);
  src.start(t); src.stop(t + dur + 0.05);
}
const sfx = {
  jump()  { tone('square', 220, 440, 0.08, 0.14); },
  land()  { noise(0.04, 0.18, 400); },
  death() { noise(0.22, 0.32, 800); tone('sawtooth', 150, 40, 0.22, 0.18); },
  splat() { for (let i=0;i<6;i++) setTimeout(()=>noise(0.04, 0.14, 600), i*40); },
  win()   { [0,0.08,0.16,0.30].forEach((dt,i)=>setTimeout(()=>tone('square',[330,440,550,660][i],[440,550,660,880][i],0.12,0.18), dt*1000)); },
  step()  { if (Math.random()<0.5) noise(0.015, 0.04, 2000); },
};

// ============================================================================
// INPUT
// ============================================================================
const keys = {};
const keyPressed = {};   // edge-triggered (one frame)
let lastKeyTime = {};

addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Space'].includes(e.code)) e.preventDefault();
  if (!keys[e.code]) keyPressed[e.code] = true;
  keys[e.code] = true;
  lastKeyTime[e.code] = performance.now();
  initAudio();
  if (AC && AC.state === 'suspended') AC.resume();
});
addEventListener('keyup', e => { keys[e.code] = false; });
addEventListener('click', () => { initAudio(); if (AC && AC.state === 'suspended') AC.resume(); });

function btn(...codes) { return codes.some(c => keys[c]); }
function btnPressed(...codes) {
  for (const c of codes) if (keyPressed[c]) { return true; }
  return false;
}
function btnBuffered(ms, ...codes) {
  const now = performance.now();
  for (const c of codes) if (lastKeyTime[c] && now - lastKeyTime[c] < ms && keys[c] === true) return true;
  // Buffer even after release: if pressed within ms, honor
  for (const c of codes) if (lastKeyTime[c] && now - lastKeyTime[c] < ms) return true;
  return false;
}

// ============================================================================
// LEVELS  (single-screen, 480x270)
// Each level: { name, bg, rects: [x,y,w,h], spikes: [x,y,w,h,dir], saws: [x,y,r,ax,ay,bx,by,speed], crumbles: [x,y,w,h], start:[x,y], goal:[x,y] }
// spike dir: 'up' | 'down' | 'left' | 'right'
// saw path: oscillates between (ax,ay) and (bx,by)
// ============================================================================
const LEVELS = [
  // L1 — Intro flat
  {
    name: 'HOSPITAL 1-1', bg: 'hospital',
    rects: [ [0,240,480,30], [120,190,60,10], [260,160,60,10] ],
    spikes: [], saws: [], crumbles: [],
    start: [20, 220], goal: [440, 220],
  },
  // L2 — Spike pit
  {
    name: 'HOSPITAL 1-2', bg: 'hospital',
    rects: [ [0,240,180,30], [220,200,40,8], [320,240,160,30], [0,100,40,10], [440,100,40,10] ],
    spikes: [ [180,236,140,8,'up'] ],
    saws: [], crumbles: [],
    start: [20, 220], goal: [440, 220],
  },
  // L3 — Wall jump vertical shaft
  {
    name: 'HOSPITAL 1-3', bg: 'hospital',
    rects: [ [0,240,480,30], [80,0,16,200], [180,80,16,200], [80,0,400,16] ],
    spikes: [], saws: [], crumbles: [],
    start: [20, 220], goal: [440, 30],
  },
  // L4 — Saw rail
  {
    name: 'HOSPITAL 1-4', bg: 'hospital',
    rects: [ [0,240,480,30], [0,120,180,10], [300,120,180,10] ],
    spikes: [],
    saws: [ [240,150,14, 60,150, 420,150, 140] ],
    crumbles: [],
    start: [20, 220], goal: [440, 100],
  },
  // L5 — Salt zig-zag
  {
    name: 'SALT 2-1', bg: 'salt',
    rects: [ [0,240,480,30], [0,0,16,270], [464,0,16,270], [120,200,16,40], [344,140,16,100] ],
    spikes: [ [16,236,104,8,'up'], [136,236,208,8,'up'], [360,236,104,8,'up'] ],
    saws: [], crumbles: [],
    start: [30, 210], goal: [440, 210],
  },
  // L6 — Crumble chain
  {
    name: 'SALT 2-2', bg: 'salt',
    rects: [ [0,240,60,30], [420,240,60,30] ],
    spikes: [ [60,236,360,8,'up'] ],
    saws: [],
    crumbles: [ [100,200,40,8], [170,170,40,8], [240,150,40,8], [310,170,40,8], [380,200,40,8] ],
    start: [20, 220], goal: [450, 220],
  },
  // L7 — Combo
  {
    name: 'SALT 2-3', bg: 'salt',
    rects: [ [0,240,480,30], [0,0,16,270], [464,0,16,270], [120,140,50,10], [280,100,60,10] ],
    spikes: [ [16,236,448,8,'up'] ],
    saws: [
      [200,200,14, 30,200, 450,200, 180],
      [240,60,14,  240,40, 240,120, 90],
    ],
    crumbles: [ [360,140,40,8], [420,100,40,8] ],
    start: [30, 220], goal: [450, 80],
  },
  // L8 — Boss thread the needle
  {
    name: 'SALT BOSS', bg: 'salt',
    rects: [ [0,240,480,30], [0,0,16,270], [464,0,16,270], [0,0,480,16] ],
    spikes: [ [16,236,448,8,'up'] ],
    saws: [
      [80,100,16,  80,40, 80,180, 100],
      [170,160,16, 170,60, 170,220, 110],
      [260,100,16, 260,40, 260,180, 120],
      [350,160,16, 350,60, 350,220, 100],
    ],
    crumbles: [],
    start: [30, 220], goal: [440, 220],
  },
];

// ============================================================================
// GAME STATE
// ============================================================================
const player = {
  x: 0, y: 0, w: 14, h: 14,
  vx: 0, vy: 0,
  onGround: false, wallDir: 0,
  coyote: 0, jumpBuffer: 0, wallLock: 0, wallLockDir: 0,
  jumping: false,
  squash: 1, stretch: 1,
  facing: 1,
  walkPhase: 0,
  alive: true,
  sprinting: false,
};
const game = {
  state: 'TITLE',  // TITLE | PLAY | DEAD | WIN | COMPLETE
  level: 0,
  deaths: 0,
  levelDeaths: 0,
  elapsed: 0,
  bestTime: +localStorage.getItem('smb_best_time') || 0,
  totalDeaths: +localStorage.getItem('smb_deaths') || 0,
  shake: 0, freeze: 0,
  splatters: [],   // dynamic death particles
  ghostRecording: [],  // current-life frames
  ghostReplays: [],   // all past death recordings
  winCelebration: 0,
  flashText: null, flashTime: 0,
};

// ============================================================================
// LEVEL MANAGEMENT
// ============================================================================
function loadLevel(idx) {
  game.level = idx;
  const L = LEVELS[idx];
  player.x = L.start[0]; player.y = L.start[1];
  player.vx = 0; player.vy = 0;
  player.onGround = false; player.alive = true;
  player.squash = 1; player.stretch = 1;
  player.coyote = 0; player.jumpBuffer = 0; player.wallLock = 0;
  player.facing = 1;
  game.elapsed = 0;
  game.levelDeaths = 0;
  game.splatters.length = 0;
  game.ghostRecording = [];
  game.ghostReplays = [];
  game.winCelebration = 0;
  game.flashText = L.name; game.flashTime = 1.4;
  // clone crumbles so we can mark state
  L._crumbles = (L.crumbles || []).map(c => ({x:c[0], y:c[1], w:c[2], h:c[3], state:'idle', timer:0}));
  // reset blood canvas
  BX.clearRect(0,0,CFG.W,CFG.H);
}

function restartLevel() {
  const L = LEVELS[game.level];
  // Save ghost of attempt
  if (game.ghostRecording.length > 3) {
    game.ghostReplays.push(game.ghostRecording.slice());
    if (game.ghostReplays.length > 12) game.ghostReplays.shift();
  }
  player.x = L.start[0]; player.y = L.start[1];
  player.vx = 0; player.vy = 0;
  player.onGround = false; player.alive = true;
  player.squash = 1; player.stretch = 1;
  player.coyote = 0; player.jumpBuffer = 0; player.wallLock = 0;
  player.facing = 1;
  game.elapsed = 0;
  game.splatters.length = 0;
  game.ghostRecording = [];
  L._crumbles = (L.crumbles || []).map(c => ({x:c[0], y:c[1], w:c[2], h:c[3], state:'idle', timer:0}));
  game.state = 'PLAY';
}

function killPlayer() {
  if (!player.alive) return;
  player.alive = false;
  game.state = 'DEAD';
  game.deaths++;
  game.levelDeaths++;
  game.totalDeaths++;
  localStorage.setItem('smb_deaths', game.totalDeaths);
  game.shake = 180;
  game.freeze = 60;
  sfx.death();
  // Spawn splatter particles
  const cx = player.x + player.w/2, cy = player.y + player.h/2;
  for (let i = 0; i < 54; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 30 + Math.random() * 140;
    game.splatters.push({
      x: cx, y: cy,
      vx: Math.cos(a) * s,
      vy: Math.sin(a) * s - 50,
      size: 1 + Math.random() * 3,
      life: 0.6 + Math.random() * 0.6,
      spin: Math.random() * 10 - 5,
      rot: Math.random() * Math.PI * 2,
      landed: false,
    });
  }
  // Stamp immediate splatter at death position
  stampBlood(cx, cy, 5, 0.8);
  setTimeout(() => sfx.splat(), 80);
  setTimeout(() => {
    if (game.state === 'DEAD') restartLevel();
  }, 400);
}

function winLevel() {
  if (game.state !== 'PLAY') return;
  game.state = 'WIN';
  game.winCelebration = 0;
  sfx.win();
  if (game.ghostRecording.length > 3) {
    game.ghostReplays.push(game.ghostRecording.slice());
  }
  setTimeout(() => {
    if (game.level + 1 >= LEVELS.length) {
      game.state = 'COMPLETE';
      const t = game.elapsed;
      if (!game.bestTime || t < game.bestTime) {
        game.bestTime = t;
        localStorage.setItem('smb_best_time', t);
      }
    } else {
      loadLevel(game.level + 1);
      game.state = 'PLAY';
    }
  }, 2200);
}

// ============================================================================
// COLLISION
// ============================================================================
function aabb(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx+bw && ax+aw > bx && ay < by+bh && ay+ah > by;
}

function collideRects(rects, dt) {
  // Horizontal pass — velocity is px/sec, scale by dt
  player.x += player.vx * dt;
  player.wallDir = 0;
  for (const r of rects) {
    if (aabb(player.x, player.y, player.w, player.h, r[0], r[1], r[2], r[3])) {
      if (player.vx > 0) { player.x = r[0] - player.w; player.wallDir = 1; }
      else if (player.vx < 0) { player.x = r[0] + r[2]; player.wallDir = -1; }
      player.vx = 0;
    }
  }
  // Vertical pass
  player.y += player.vy * dt;
  let landedFromAir = false;
  const wasAirborne = !player.onGround;
  player.onGround = false;
  for (const r of rects) {
    if (aabb(player.x, player.y, player.w, player.h, r[0], r[1], r[2], r[3])) {
      if (player.vy > 0) {
        player.y = r[1] - player.h;
        if (wasAirborne && player.vy > 120) landedFromAir = true;
        player.vy = 0;
        player.onGround = true;
      } else if (player.vy < 0) {
        player.y = r[1] + r[3];
        player.vy = 0;
      }
    }
  }
  return landedFromAir;
}

// ============================================================================
// UPDATE
// ============================================================================
let lastT = performance.now();
function update(now) {
  const dtMs = Math.min(33, now - lastT);
  lastT = now;
  const dt = dtMs / 1000;

  // Freeze frame on death
  if (game.freeze > 0) {
    game.freeze -= dtMs;
  } else {
    if (game.state === 'TITLE') {
      if (btnPressed('Space','Enter','KeyZ')) {
        game.level = 0;
        loadLevel(0);
        game.state = 'PLAY';
        game.deaths = 0;
      }
    } else if (game.state === 'PLAY') {
      updatePlay(dt);
    } else if (game.state === 'DEAD') {
      updateSplatters(dt);
      if (btnPressed('KeyR')) restartLevel();
    } else if (game.state === 'WIN') {
      game.winCelebration += dt;
    } else if (game.state === 'COMPLETE') {
      if (btnPressed('Space','Enter','KeyR')) {
        game.level = 0;
        game.deaths = 0;
        loadLevel(0);
        game.state = 'PLAY';
      }
    }
  }

  if (btnPressed('KeyR') && game.state === 'PLAY') restartLevel();

  // Decay shake
  if (game.shake > 0) game.shake = Math.max(0, game.shake - dtMs);

  // Flash text fade
  if (game.flashTime > 0) game.flashTime -= dt;

  render();

  // Clear edge-triggered key map
  for (const k in keyPressed) keyPressed[k] = false;
  requestAnimationFrame(update);
}

function updatePlay(dt) {
  const L = LEVELS[game.level];
  game.elapsed += dt;

  // Timers
  player.coyote -= dt * 1000;
  player.jumpBuffer -= dt * 1000;
  player.wallLock -= dt * 1000;

  // Input
  const left = btn('ArrowLeft','KeyA');
  const right = btn('ArrowRight','KeyD');
  const jumpHeld = btn('Space','KeyZ','ArrowUp','KeyW');
  const sprinting = btn('ShiftLeft','ShiftRight');
  player.sprinting = sprinting;

  if (btnPressed('Space','KeyZ','ArrowUp','KeyW')) player.jumpBuffer = CFG.jumpBufferMs;

  // Horizontal input (respect wall-jump lock)
  const maxSpd = sprinting ? CFG.sprintSpeed : CFG.runSpeed;
  let inputX = 0;
  if (left) inputX -= 1;
  if (right) inputX += 1;
  if (player.wallLock > 0 && player.wallLockDir === inputX) inputX = 0;

  const accel = player.onGround ? CFG.accelGround : CFG.accelAir;
  const friction = player.onGround ? CFG.frictionGround : CFG.frictionAir;

  if (inputX !== 0) {
    player.vx += inputX * accel * dt;
    player.vx = Math.max(-maxSpd, Math.min(maxSpd, player.vx));
    player.facing = inputX;
  } else {
    if (player.vx > 0) player.vx = Math.max(0, player.vx - friction * dt);
    else if (player.vx < 0) player.vx = Math.min(0, player.vx + friction * dt);
  }

  // Jump — ground or coyote
  let justJumped = false;
  if (player.jumpBuffer > 0 && (player.onGround || player.coyote > 0)) {
    player.vy = CFG.jumpVel;
    player.onGround = false;
    player.coyote = 0;
    player.jumpBuffer = 0;
    player.stretch = 1.4; player.squash = 0.7;
    player.jumping = true;
    justJumped = true;
    sfx.jump();
  }
  // Wall jump
  else if (player.jumpBuffer > 0 && !player.onGround && player.wallDir !== 0) {
    player.vx = -player.wallDir * CFG.wallJumpVelX;
    player.vy = CFG.wallJumpVelY;
    player.wallLock = CFG.wallJumpLockMs;
    player.wallLockDir = player.wallDir;
    player.jumpBuffer = 0;
    player.stretch = 1.4; player.squash = 0.7;
    player.jumping = true;
    justJumped = true;
    sfx.jump();
  }

  // Variable jump — release cuts short (but never on the frame we jumped)
  if (!justJumped && player.jumping && !jumpHeld && player.vy < 0) {
    player.vy *= CFG.jumpCutMult;
    player.jumping = false;
  }
  if (player.vy >= 0) player.jumping = false;

  // Gravity (stronger on descent)
  const g = player.vy > 0 ? CFG.gravityDown : CFG.gravityUp;
  player.vy += g * dt;

  // Wall slide
  if (!player.onGround && player.wallDir !== 0 && ((player.wallDir > 0 && right) || (player.wallDir < 0 && left)) && player.vy > 0) {
    player.vy = Math.min(player.vy, CFG.wallSlideSpeed);
  }
  player.vy = Math.min(player.vy, CFG.maxFall);

  // Move and collide
  const wasOnGround = player.onGround;
  // Collect active rects (static + solid crumbles)
  const solidRects = L.rects.slice();
  for (const c of L._crumbles) if (c.state !== 'gone') solidRects.push([c.x,c.y,c.w,c.h]);

  const landed = collideRects(solidRects, dt);
  if (landed && !wasOnGround) {
    sfx.land();
    player.squash = 1.4; player.stretch = 0.6;
    puffDust(player.x + player.w/2, player.y + player.h, 6);
  }

  if (player.onGround) player.coyote = CFG.coyoteMs;

  // Crumble triggers
  for (const c of L._crumbles) {
    if (c.state === 'idle' && aabb(player.x, player.y+player.h-1, player.w, 2, c.x, c.y, c.w, c.h)) {
      c.state = 'shake'; c.timer = 0.35;
    }
    if (c.state === 'shake') {
      c.timer -= dt;
      if (c.timer <= 0) { c.state = 'gone'; c.timer = 2; }
    } else if (c.state === 'gone') {
      c.timer -= dt;
      if (c.timer <= 0) { c.state = 'idle'; }
    }
  }

  // Squash/stretch decay
  player.squash += (1 - player.squash) * Math.min(1, dt * 10);
  player.stretch += (1 - player.stretch) * Math.min(1, dt * 10);

  // Walk cycle advances with horizontal speed
  if (player.onGround) {
    player.walkPhase += Math.abs(player.vx) * dt * 0.05;
  } else {
    player.walkPhase = 0;
  }

  // Blood trail — whenever in contact with any surface
  if (player.onGround || player.wallDir !== 0) {
    stampBlood(player.x + player.w/2, player.y + player.h - 1, 2.5, 0.18);
    sfx.step();
  }

  // Record ghost
  if (game.ghostRecording.length < 3600) {
    game.ghostRecording.push({x: player.x, y: player.y, f: player.facing});
  }

  // Update saws
  for (const s of L.saws) {
    s._t = (s._t || 0) + dt * s[7] / 80;
    const pct = (Math.sin(s._t) + 1) / 2;
    s._x = s[3] + (s[5] - s[3]) * pct;
    s._y = s[4] + (s[6] - s[4]) * pct;
  }

  // Check hazard kills
  // Spikes
  for (const sp of L.spikes) {
    if (aabb(player.x+2, player.y+2, player.w-4, player.h-4, sp[0], sp[1], sp[2], sp[3])) {
      killPlayer(); return;
    }
  }
  // Saws (circular)
  for (const s of L.saws) {
    const dx = (player.x + player.w/2) - s._x;
    const dy = (player.y + player.h/2) - s._y;
    const r = s[2];
    if (dx*dx + dy*dy < (r+5) * (r+5)) {
      killPlayer(); return;
    }
  }
  // Fall off
  if (player.y > CFG.H + 20) { killPlayer(); return; }

  // Win check
  if (aabb(player.x, player.y, player.w, player.h, L.goal[0], L.goal[1], 16, 24)) {
    winLevel(); return;
  }
}

function updateSplatters(dt) {
  for (const p of game.splatters) {
    if (p.landed) continue;
    p.vy += 900 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.rot += p.spin * dt;
    p.life -= dt;
    // Simple floor/wall check — stamp onto blood canvas
    const L = LEVELS[game.level];
    for (const r of L.rects) {
      if (p.x > r[0] && p.x < r[0]+r[2] && p.y > r[1] && p.y < r[1]+r[3]) {
        stampBlood(p.x, p.y, 2 + p.size, 0.9);
        p.landed = true;
        break;
      }
    }
    if (p.life <= 0 || p.y > CFG.H) p.landed = true;
  }
}

function puffDust(x, y, n) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI - Math.PI;
    game.splatters.push({
      x, y,
      vx: Math.cos(a) * (30 + Math.random()*40),
      vy: -Math.random() * 60,
      size: 1,
      life: 0.25,
      spin: 0, rot: 0,
      landed: false, dust: true,
    });
  }
}

function stampBlood(x, y, r, alpha) {
  BX.globalAlpha = alpha;
  const grd = BX.createRadialGradient(x, y, 0, x, y, r);
  grd.addColorStop(0, CFG.BLOOD);
  grd.addColorStop(0.6, CFG.BLOOD_DARK);
  grd.addColorStop(1, 'rgba(107,15,18,0)');
  BX.fillStyle = grd;
  BX.beginPath();
  BX.arc(x, y, r, 0, Math.PI * 2);
  BX.fill();
  BX.globalAlpha = 1;
}

// ============================================================================
// RENDER
// ============================================================================
function render() {
  // Shake
  let sx = 0, sy = 0;
  if (game.shake > 0) {
    const amp = game.shake / 180 * 5;
    sx = (Math.random() - 0.5) * amp * 2;
    sy = (Math.random() - 0.5) * amp * 2;
  }
  X.save();
  X.translate(sx, sy);

  if (game.state === 'TITLE') {
    drawTitle();
  } else if (game.state === 'COMPLETE') {
    drawComplete();
  } else {
    const L = LEVELS[game.level];
    // Background
    X.fillStyle = L.bg === 'salt' ? CFG.BG_SALT : CFG.BG_HOSPITAL;
    X.fillRect(0, 0, CFG.W, CFG.H);
    drawBGPattern(L.bg);

    // Blood canvas
    X.drawImage(bloodCanvas, 0, 0);

    // Terrain
    for (const r of L.rects) drawTerrain(r[0], r[1], r[2], r[3]);

    // Crumbles
    for (const c of L._crumbles || []) {
      if (c.state === 'gone') continue;
      const shake = c.state === 'shake' ? (Math.random()-0.5)*2 : 0;
      drawTerrain(c.x + shake, c.y + shake, c.w, c.h, true);
    }

    // Spikes
    for (const sp of L.spikes) drawSpikes(sp[0], sp[1], sp[2], sp[3], sp[4]);

    // Goal (bandage girl)
    drawGirl(L.goal[0], L.goal[1]);

    // Saws
    for (const s of L.saws) drawSaw(s._x||s[3], s._y||s[4], s[2]);

    // Ghost replays
    for (const g of game.ghostReplays) {
      const idx = Math.min(g.length - 1, Math.floor(game.elapsed * 60));
      if (idx < g.length) {
        const pos = g[idx];
        drawMeat(pos.x, pos.y, 1, 1, pos.f, true);
      }
    }

    // Player
    if (player.alive) {
      drawMeat(player.x, player.y, player.squash, player.stretch, player.facing, false);
    }

    // Splatters
    for (const p of game.splatters) {
      if (p.landed) continue;
      X.fillStyle = p.dust ? 'rgba(255,200,200,0.5)' : CFG.BLOOD;
      X.beginPath();
      X.arc(p.x, p.y, p.size, 0, Math.PI*2);
      X.fill();
    }

    // HUD
    drawHUD(L);
  }

  X.restore();

  // Scan lines (very subtle)
  X.fillStyle = 'rgba(0,0,0,0.12)';
  for (let y = 0; y < CFG.H; y += 2) X.fillRect(0, y, CFG.W, 1);
}

function drawBGPattern(kind) {
  if (kind === 'hospital') {
    // Tiled wall pattern — off-white tiles with grout lines
    X.globalAlpha = 0.35;
    X.fillStyle = '#E9B4BD';
    for (let y = 0; y < CFG.H; y += 16) {
      for (let x = 0; x < CFG.W; x += 24) {
        const ox = (Math.floor(y/16) % 2) * 12;
        X.fillRect(x + ox, y, 22, 14);
      }
    }
    X.globalAlpha = 0.22;
    X.fillStyle = '#7A3F4A';
    for (let y = 15; y < CFG.H; y += 16) X.fillRect(0, y, CFG.W, 1);
    for (let y = 0; y < CFG.H; y += 16) {
      const ox = (Math.floor(y/16) % 2) * 12;
      for (let x = ox; x < CFG.W; x += 24) X.fillRect(x - 1, y, 1, 16);
    }
    // Pipe running along the right
    X.globalAlpha = 0.4;
    X.fillStyle = '#9A6F78';
    X.fillRect(CFG.W - 14, 0, 6, CFG.H);
    X.fillStyle = '#C48D96';
    X.fillRect(CFG.W - 13, 0, 2, CFG.H);
    X.globalAlpha = 1;
  } else {
    // Salt factory — brick + rust drips
    X.globalAlpha = 0.45;
    X.fillStyle = '#402525';
    for (let y = 0; y < CFG.H; y += 12) {
      for (let x = 0; x < CFG.W; x += 20) {
        const ox = (Math.floor(y/12) % 2) * 10;
        X.fillRect(x + ox, y, 18, 10);
      }
    }
    X.globalAlpha = 0.55;
    X.fillStyle = '#2A1414';
    for (let y = 11; y < CFG.H; y += 12) X.fillRect(0, y, CFG.W, 1);
    // Rust streaks
    X.globalAlpha = 0.25;
    X.fillStyle = '#8B3A1A';
    for (let i = 0; i < 6; i++) {
      const x = ((i*91 + 13) % CFG.W);
      const h = 30 + (i * 17) % 80;
      X.fillRect(x, 0, 2, h);
      X.fillRect(x-1, h, 4, 3);
    }
    X.globalAlpha = 1;
  }
}

function drawTerrain(x, y, w, h, crumble) {
  x = Math.round(x); y = Math.round(y); w = Math.round(w); h = Math.round(h);
  // Base
  X.fillStyle = crumble ? '#4E3232' : CFG.TERRAIN;
  X.fillRect(x, y, w, h);
  // Subtle dithered shading inside
  X.fillStyle = crumble ? '#3C2525' : '#2F2222';
  for (let iy = 2; iy < h - 1; iy += 2) {
    for (let ix = (iy % 4 === 0 ? 1 : 2); ix < w - 1; ix += 4) {
      X.fillRect(x + ix, y + iy, 1, 1);
    }
  }
  // Top highlight (2px)
  X.fillStyle = CFG.TERRAIN_HI;
  X.fillRect(x, y, w, 2);
  X.fillStyle = '#80625B';
  X.fillRect(x, y, w, 1);
  // Bottom dark shadow
  X.fillStyle = CFG.TERRAIN_EDGE;
  X.fillRect(x, y + h - 2, w, 2);
  // Vertical edges
  X.fillStyle = CFG.TERRAIN_EDGE;
  X.fillRect(x, y, 1, h);
  X.fillRect(x + w - 1, y, 1, h);
  // Inner gravel specks
  X.fillStyle = '#6A4949';
  for (let i = 0; i < Math.floor(w * h / 40); i++) {
    const gx = x + 2 + ((i * 37) % Math.max(1, w - 4));
    const gy = y + 3 + ((i * 19) % Math.max(1, h - 5));
    X.fillRect(gx, gy, 1, 1);
  }
  if (crumble) {
    // Crack pattern
    X.fillStyle = CFG.TERRAIN_EDGE;
    for (let i = 3; i < w; i += 5) X.fillRect(x + i, y + 2, 1, Math.min(3, h - 3));
  }
}

function drawSpikes(x, y, w, h, dir) {
  const tw = 6;
  const n = Math.floor(w / tw);
  for (let i = 0; i < n; i++) {
    const sx = x + i*tw;
    X.fillStyle = CFG.SPIKE;
    X.beginPath();
    X.moveTo(sx, y + h);
    X.lineTo(sx + tw/2, y);
    X.lineTo(sx + tw, y + h);
    X.closePath();
    X.fill();
    X.strokeStyle = CFG.SPIKE_HI;
    X.lineWidth = 1;
    X.beginPath();
    X.moveTo(sx + tw/2, y + 1);
    X.lineTo(sx + tw - 1, y + h - 1);
    X.stroke();
  }
}

function drawSaw(x, y, r) {
  const teeth = 12;
  const ang = (performance.now() / 1000) * 8;
  X.fillStyle = CFG.SPIKE;
  X.beginPath();
  for (let i = 0; i < teeth*2; i++) {
    const a = (i / (teeth*2)) * Math.PI*2 + ang;
    const rr = (i % 2 === 0) ? r : r*0.7;
    const px = x + Math.cos(a)*rr;
    const py = y + Math.sin(a)*rr;
    if (i === 0) X.moveTo(px,py); else X.lineTo(px,py);
  }
  X.closePath();
  X.fill();
  X.fillStyle = CFG.SPIKE_HI;
  X.beginPath();
  X.arc(x, y, r*0.45, 0, Math.PI*2);
  X.fill();
  X.fillStyle = CFG.SPIKE;
  X.beginPath();
  X.arc(x, y, r*0.18, 0, Math.PI*2);
  X.fill();
  // spark
  if (Math.random() < 0.3) {
    X.fillStyle = '#FFEE88';
    X.fillRect(x + Math.cos(ang*3)*r, y + Math.sin(ang*3)*r, 1, 1);
  }
}

function drawGirl(x, y) {
  const t = performance.now() / 250;
  const b = Math.sin(t) * 1;
  // body
  X.fillStyle = CFG.GIRL;
  X.fillRect(x, y + b, 12, 16);
  // bow
  X.fillStyle = CFG.GIRL_BOW;
  X.fillRect(x+3, y + b - 3, 6, 3);
  // eyes
  X.fillStyle = '#000';
  X.fillRect(x+3, y+4+b, 2, 2);
  X.fillRect(x+7, y+4+b, 2, 2);
  // sparkle
  X.fillStyle = '#FFEE88';
  if ((t|0) % 2) X.fillRect(x-3, y-4+b, 1, 1);
  else X.fillRect(x+14, y-2+b, 1, 1);
}

function drawMeat(x, y, squash, stretch, facing, ghost, phase) {
  const w = player.w * squash;
  const h = player.h * stretch;
  const dx = Math.round(x + (player.w - w) / 2);
  const dy = Math.round(y + (player.h - h));
  const W = Math.round(w), H = Math.round(h);
  const airborne = !player.onGround && !ghost;
  const p = phase !== undefined ? phase : player.walkPhase;

  if (ghost) X.globalAlpha = 0.16;

  // Shadow underneath (only when on ground and visible)
  if (!ghost && player.onGround) {
    X.fillStyle = 'rgba(0,0,0,0.25)';
    X.fillRect(dx - 1, dy + H, W + 2, 1);
  }

  // Feet (2-frame cycle). Small stub feet that poke out the bottom.
  if (!airborne) {
    const f1 = Math.floor(p) % 2;
    const footYOffset = f1 * -1;
    X.fillStyle = CFG.MEAT_DARK;
    X.fillRect(dx + 1, dy + H, 3, 2 + footYOffset);
    X.fillRect(dx + W - 4, dy + H, 3, 2 - footYOffset);
  } else {
    // Tucked feet in air
    X.fillStyle = CFG.MEAT_DARK;
    X.fillRect(dx + 2, dy + H, W - 4, 2);
  }

  // Body — rounded via corner erasure
  X.fillStyle = CFG.MEAT;
  X.fillRect(dx, dy, W, H);
  // Corner rounding
  X.clearRect(dx, dy, 1, 1);
  X.clearRect(dx + W - 1, dy, 1, 1);
  X.clearRect(dx, dy + H - 1, 1, 1);
  X.clearRect(dx + W - 1, dy + H - 1, 1, 1);

  // Re-fill corners with background tint (approx — just redraw meat at inset)
  // Skip: clear is fine for chunky silhouette
  // Top highlight
  X.fillStyle = '#D43A42';
  X.fillRect(dx + 1, dy + 1, W - 2, 1);
  X.fillRect(dx + 2, dy, W - 4, 1);
  // Bottom dark
  X.fillStyle = CFG.MEAT_DARK;
  X.fillRect(dx + 1, dy + H - 2, W - 2, 2);
  X.fillRect(dx, dy + H - 3, 1, 2);
  X.fillRect(dx + W - 1, dy + H - 3, 1, 2);

  // Eyes
  const eyeY = dy + 4;
  const eyeL = dx + (facing > 0 ? 4 : 2);
  const eyeR = dx + (facing > 0 ? W - 5 : W - 7);
  X.fillStyle = '#FFFFFF';
  X.fillRect(eyeL, eyeY, 3, 3);
  X.fillRect(eyeR, eyeY, 3, 3);
  // Pupils — follow facing
  X.fillStyle = '#000';
  X.fillRect(eyeL + (facing > 0 ? 1 : 0), eyeY + 1, 2, 2);
  X.fillRect(eyeR + (facing > 0 ? 1 : 0), eyeY + 1, 2, 2);

  // Angry brows
  X.fillStyle = CFG.MEAT_DARK;
  X.fillRect(eyeL - 1, eyeY - 1, 4, 1);
  X.fillRect(eyeR, eyeY - 1, 4, 1);
  if (facing > 0) {
    X.fillRect(eyeL + 2, eyeY - 2, 1, 1);
    X.fillRect(eyeR + 3, eyeY - 2, 1, 1);
  } else {
    X.fillRect(eyeL - 1, eyeY - 2, 1, 1);
    X.fillRect(eyeR, eyeY - 2, 1, 1);
  }

  // Frown — curved downward
  X.fillStyle = '#000';
  const mx = dx + Math.floor(W * 0.3);
  const my = dy + Math.floor(H * 0.72);
  X.fillRect(mx + 1, my, Math.max(2, Math.floor(W * 0.35)), 1);
  X.fillRect(mx, my + 1, 1, 1);
  X.fillRect(mx + Math.floor(W * 0.35) + 1, my + 1, 1, 1);

  // Cheek blush (soft)
  if (!ghost) {
    X.fillStyle = 'rgba(255,100,110,0.5)';
    X.fillRect(dx + 1, dy + 7, 1, 1);
    X.fillRect(dx + W - 2, dy + 7, 1, 1);
  }

  if (ghost) X.globalAlpha = 1;
}

function drawHUD(L) {
  // Top-left: level name + deaths
  textOutline(L.name, 6, 10, '#FFF', '#000');
  textOutline('DEATHS: ' + game.levelDeaths, 6, 22, '#FFF', '#000');
  // Top-right: time
  const m = Math.floor(game.elapsed / 60);
  const s = Math.floor(game.elapsed % 60);
  const ms = Math.floor((game.elapsed % 1) * 100);
  const time = `${m}:${s.toString().padStart(2,'0')}.${ms.toString().padStart(2,'0')}`;
  textOutline(time, CFG.W - 60, 10, '#FFF', '#000');
  textOutline('TOTAL: ' + game.totalDeaths, CFG.W - 70, 22, '#FFE', '#000');

  // Flash
  if (game.flashTime > 0) {
    const a = Math.min(1, game.flashTime);
    X.globalAlpha = a;
    textOutlineBig(L.name, CFG.W/2 - L.name.length*4, CFG.H/2 - 20, '#FFF', '#000');
    X.globalAlpha = 1;
  }

  // Win banner
  if (game.state === 'WIN') {
    X.fillStyle = 'rgba(0,0,0,0.6)';
    X.fillRect(0, CFG.H/2 - 30, CFG.W, 60);
    textOutlineBig('LEVEL CLEAR!', CFG.W/2 - 48, CFG.H/2 - 10, '#FFEE66', '#000');
  }

  // Dead flash
  if (game.state === 'DEAD') {
    textOutlineBig('DEATH #' + game.levelDeaths, CFG.W/2 - 40, CFG.H/2 - 8, '#E63946', '#000');
  }
}

function drawTitle() {
  X.fillStyle = CFG.BG_HOSPITAL;
  X.fillRect(0,0,CFG.W,CFG.H);
  drawBGPattern('hospital');
  // Big meaty title
  const t = performance.now() / 200;
  for (let i = 0; i < 3; i++) {
    X.fillStyle = i === 0 ? CFG.MEAT_DARK : (i === 1 ? CFG.MEAT : CFG.BLOOD);
    textBig('SUPER', 140 - i*2, 60 - i*2, X.fillStyle);
    textBig('MEAT BOY', 100 - i*2, 100 - i*2, X.fillStyle);
  }
  // Blood drip
  for (let i = 0; i < 8; i++) {
    const x = 100 + i * 35;
    const drop = (Math.sin(t + i) + 1) * 4;
    X.fillStyle = CFG.BLOOD;
    X.fillRect(x, 130 + drop, 2, 3 + drop);
  }
  textOutline('A SCUFFED TRIBUTE', CFG.W/2 - 58, 150, '#3A1818', '#F5C8D0');
  if ((t|0) % 2) textOutline('PRESS SPACE TO START', CFG.W/2 - 62, 180, '#FFF', '#000');
  textOutline('ARROWS to move  SPACE/Z jump  SHIFT sprint  R restart', 50, 220, '#222', '#F5C8D0');
  textOutline('Variable jump  Coyote time  Wall jump  Blood trails  Ghost replays', 30, 240, '#7A1518', '#F5C8D0');
  if (game.bestTime) textOutline('BEST TIME (L1): ' + game.bestTime.toFixed(1) + 's', 170, 260, '#3A1818', '#F5C8D0');
  // Meat boy waves
  drawMeat(40, 210, 1, 1, 1, false);
  drawGirl(CFG.W - 60, 210);
}

function drawComplete() {
  X.fillStyle = '#000';
  X.fillRect(0,0,CFG.W,CFG.H);
  for (let i = 0; i < 80; i++) {
    const x = (i*67) % CFG.W;
    const y = (i*131 + ((performance.now()/20)|0)) % CFG.H;
    X.fillStyle = CFG.BLOOD;
    X.fillRect(x, y, 2, 2);
  }
  textBig('GAME', 180, 60, CFG.BLOOD);
  textBig('CLEAR!', 160, 100, CFG.MEAT);
  textOutline('TOTAL DEATHS: ' + game.deaths, CFG.W/2 - 60, 150, '#FFF', '#000');
  const t = game.elapsed;
  textOutline('FINAL TIME: ' + t.toFixed(2) + 's', CFG.W/2 - 56, 170, '#FFF', '#000');
  if (game.bestTime) textOutline('BEST: ' + game.bestTime.toFixed(2) + 's', CFG.W/2 - 30, 190, '#FFEE66', '#000');
  textOutline('PRESS SPACE TO PLAY AGAIN', CFG.W/2 - 76, 230, '#FFF', '#000');
}

function textOutline(s, x, y, c, oc) {
  X.font = '8px "Courier New", monospace';
  X.textBaseline = 'top';
  X.fillStyle = oc;
  for (let dx=-1;dx<=1;dx++) for (let dy=-1;dy<=1;dy++) X.fillText(s, x+dx, y+dy);
  X.fillStyle = c;
  X.fillText(s, x, y);
}
function textOutlineBig(s, x, y, c, oc) {
  X.font = 'bold 14px "Courier New", monospace';
  X.textBaseline = 'top';
  X.fillStyle = oc;
  for (let dx=-2;dx<=2;dx++) for (let dy=-2;dy<=2;dy++) X.fillText(s, x+dx, y+dy);
  X.fillStyle = c;
  X.fillText(s, x, y);
}
function textBig(s, x, y, c) {
  X.font = 'bold 32px "Courier New", monospace';
  X.textBaseline = 'top';
  X.fillStyle = c;
  X.fillText(s, x, y);
}

// ============================================================================
// BOOT
// ============================================================================
loadLevel(0);
game.state = 'TITLE';
requestAnimationFrame(update);
</script>
