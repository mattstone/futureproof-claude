<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>SUPERSONIC — Genesis Feel</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Russo+One&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0; padding: 0; height: 100%;
    background:
      radial-gradient(ellipse at top, #1a2860 0%, #050610 80%),
      repeating-linear-gradient(45deg, transparent 0 6px, rgba(255,255,255,0.012) 6px 7px);
    color: #fff;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    overflow: hidden;
    user-select: none;
  }
  #stage {
    position: absolute; left: 0; top: 0; right: 0; bottom: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    padding: 20px;
    box-sizing: border-box;
  }
  #frame {
    position: relative;
    padding: 10px;
    border-radius: 14px;
    background: linear-gradient(180deg, #2a2230 0%, #100a14 100%);
    box-shadow:
      0 0 80px #2bb6ff55,
      0 20px 60px rgba(0,0,0,0.7),
      inset 0 0 0 2px #ffd24a44,
      inset 0 0 0 4px #1a1a1a;
    aspect-ratio: 800 / 540;
    max-width: min(100vw - 40px, calc((100vh - 100px) * 800 / 540));
    width: 100%;
  }
  #screen {
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #000;
    border-radius: 6px;
    width: 100%; height: 100%;
    display: block;
    cursor: pointer;
  }
  #screen:fullscreen { width: 100vw; height: 100vh; border-radius: 0; }
  #hint {
    margin-top: 14px;
    color: #8eb6ff;
    font-family: 'Press Start 2P', 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 1px;
    opacity: 0.75;
    text-shadow: 0 1px 0 #000;
    pointer-events: none;
  }
  #hint .key {
    display: inline-block;
    padding: 4px 7px;
    margin: 0 2px;
    border: 1px solid #ffd24a66;
    border-radius: 4px;
    background: rgba(255,210,74,0.06);
    color: #ffd24a;
  }
  #hint .sep { color: #446; margin: 0 6px; }
</style>
</head>
<body>
<div id="stage">
  <div id="frame">
    <canvas id="screen" width="800" height="540"></canvas>
  </div>
  <div id="hint">
    <span class="key">← →</span> MOVE
    <span class="sep">·</span>
    <span class="key">↓</span> ROLL
    <span class="sep">·</span>
    <span class="key">SPACE</span> JUMP
    <span class="sep">·</span>
    <span class="key">P</span> PAUSE
    <span class="sep">·</span>
    <span class="key">M</span> MUTE
    <span class="sep">·</span>
    <span class="key">R</span> RESTART
  </div>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════
//  SUPERSONIC — a Sonic-Genesis-inspired platformer
//  Single file. Vanilla canvas. Authentic-feel physics.
// ════════════════════════════════════════════════════════════════

const cv  = document.getElementById('screen');
const ctx = cv.getContext('2d');
const W = cv.width, H = cv.height;
ctx.imageSmoothingEnabled = false;

// ─── Asset loader ──────────────────────────────────────────────
const ASSET_BASE = '/sonic-assets/';
const imgs = {};
const imgFiles = {
  title: 'sonic.gif',
  ringSheet: 'sonic-3.png',
  sonicSheet: 'sonic-3-top-trans.png',   // 360x240 — sky-blue keyed to transparent
  sonicSheet2: 'sonic-3-bot-trans.png',  // 360x240 — sky-blue keyed to transparent
  enemies: 'enemies.png',
  robotnik: 'dr-robotnik.png',
  objects: 'objects.png',
};
let imgsLoaded = 0;
let imgsTotal = Object.keys(imgFiles).length;
let imgsReady = false;
for (const [k, f] of Object.entries(imgFiles)) {
  const im = new Image();
  im.onload  = () => { imgs[k] = im; if (++imgsLoaded >= imgsTotal) imgsReady = true; };
  im.onerror = () => { if (++imgsLoaded >= imgsTotal) imgsReady = true; };
  im.src = ASSET_BASE + f;
}

// ─── Audio (Web Audio synth) ───────────────────────────────────
let actx = null;
let masterGain = null;
function audio() {
  if (!actx) {
    actx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = actx.createGain();
    masterGain.gain.value = muted ? 0 : 1;
    masterGain.connect(actx.destination);
    startMusic();
  }
  // Browsers (esp. Safari) leave the context suspended until a user gesture
  // resumes it — we re-call resume() each invocation to be safe.
  if (actx && actx.state === 'suspended') actx.resume();
}
function tone(freq, dur, type='square', vol=0.07, ramp=null) {
  if (!actx) return;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, actx.currentTime);
  if (ramp) o.frequency.exponentialRampToValueAtTime(ramp, actx.currentTime + dur);
  g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  o.connect(g); g.connect(masterGain || actx.destination);
  o.start(); o.stop(actx.currentTime + dur);
}
const sfx = {
  jump:    () => tone(680, 0.14, 'square', 0.18, 1100),
  ring:    () => { tone(1175, 0.06, 'square', 0.14); setTimeout(() => tone(1568, 0.10, 'square', 0.14), 50); },
  spring:  () => tone(440, 0.16, 'sawtooth', 0.20, 1320),
  spindash:() => tone(220, 0.18, 'sawtooth', 0.16, 660),
  hurt:    () => tone(180, 0.45, 'square', 0.20, 80),
  death:   () => { tone(440, 0.20, 'square', 0.18, 220); setTimeout(()=>tone(220,0.30,'square',0.18,110),200); setTimeout(()=>tone(110,0.50,'square',0.18,55),500); },
  break:   () => tone(330, 0.20, 'sawtooth', 0.18, 90),
  goal:    () => { for (let i=0;i<6;i++) setTimeout(()=>tone(523*Math.pow(1.122,i),0.12,'square',0.14),i*80); },
  skid:    () => tone(140, 0.05, 'sawtooth', 0.10, 90),
  step:    () => tone(180 + Math.random() * 40, 0.04, 'square', 0.06, 90),
  land:    () => tone(140, 0.08, 'square', 0.10, 70),
};

// Adaptive music — a simple chiptune loop that ramps tempo with player speed.
let music = { osc: null, gain: null, step: 0, lastTick: 0, intensity: 1 };
const SCALE = [0, 2, 4, 7, 9, 12, 14, 16];           // C major pentatonic-ish
const BASS  = [48, 48, 55, 50, 48, 53, 55, 50];      // low bassline
const LEAD  = [72, 76, 79, 81, 79, 76, 84, 79];      // bright lead
function midiToFreq(m){ return 440 * Math.pow(2, (m-69)/12); }
function startMusic() {
  if (!actx) return;
  music.gain = actx.createGain();
  music.gain.gain.value = 0.85;   // music sub-bus level
  music.gain.connect(masterGain || actx.destination);
}
function tickMusic(now, speedRatio) {
  if (!actx || !music.gain) return;
  // Tempo: 130 BPM at rest → 200 BPM full sprint
  const bpm = 130 + speedRatio * 70;
  const stepMs = (60000 / bpm) / 4;
  if (now - music.lastTick < stepMs) return;
  music.lastTick = now;
  const i = music.step % 16;
  const playNote = (m, dur, vol=0.06, type='square') => {
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type = type;
    o.frequency.value = midiToFreq(m);
    g.gain.setValueAtTime(vol, actx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
    o.connect(g); g.connect(music.gain);
    o.start(); o.stop(actx.currentTime + dur);
  };
  // Bass on every 4th step (louder)
  if (i % 4 === 0) playNote(BASS[(music.step/4|0) % BASS.length] - 12, 0.22, 0.16, 'triangle');
  // Lead on off-beats (louder)
  if (i % 2 === 1) playNote(LEAD[(music.step/2|0) % LEAD.length], 0.12, 0.10, 'square');
  // Counter-melody every 8 steps for shape
  if (i === 6 || i === 14) playNote(LEAD[(music.step/2|0) % LEAD.length] + 7, 0.16, 0.07, 'triangle');
  // Hi-hat-ish click at higher intensity
  if (speedRatio > 0.4) playNote(96 + (i%2)*7, 0.02, 0.04, 'square');
  music.step++;
}

// ─── Input ─────────────────────────────────────────────────────
const keys = {};
addEventListener('keydown', e => {
  keys[e.code] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown','Space'].includes(e.code)) e.preventDefault();
  audio();
  if (e.code === 'KeyR') { restart(); return; }
  if (e.code === 'KeyM') { toggleMute(); return; }
  if ((e.code === 'KeyP' || e.code === 'Escape') && (state === 'play' || state === 'paused')) {
    state = (state === 'paused') ? 'play' : 'paused';
    return;
  }
  if (state === 'title' && (e.code === 'Space' || e.code === 'Enter')) {
    restart(); sfx.goal();
  } else if (state === 'gameover' && (e.code === 'Space' || e.code === 'Enter' || e.code === 'KeyR')) {
    restart();
  } else if (state === 'win' && (e.code === 'Space' || e.code === 'Enter' || e.code === 'KeyR')) {
    restart();
  } else if (state === 'intro' && (e.code === 'Space' || e.code === 'Enter')) {
    levelIntroTimer = Math.min(levelIntroTimer, 30);  // skip ahead
  }
});
addEventListener('keyup',   e => { keys[e.code] = false; });
cv.addEventListener('mousedown', e => {
  audio();
  handleCanvasClick(e);
  if (state === 'title') restart();
});

// ─── Level system — 3 zones, each with its own palette + geometry ──
//  Sonic walks on a continuous y(x) ground. Slope = derivative.
const GROUND_BASE = 410;

// Per-zone ground generators. Each takes x and returns world y.
// The first/last 200 px are held flat for spawn + goal platform.
function groundGreenHill(x, len) {
  if (x < 200) return GROUND_BASE;
  if (x > len - 280) return GROUND_BASE - 40;
  const a = Math.sin(x * 0.0042) * 38;
  const b = Math.sin(x * 0.0017 + 1.4) * 56;
  const c = Math.sin(x * 0.0091 + 0.6) * 14;
  let bump = 0;
  if (x > 1500 && x < 2100) bump = -40  * Math.sin((x - 1500)/600 * Math.PI);
  if (x > 3200 && x < 3900) bump = -110 * Math.sin((x - 3200)/700 * Math.PI);
  if (x > 4600 && x < 5000) bump =  80  * Math.sin((x - 4600)/400 * Math.PI);
  if (x > 6800 && x < 7600) bump = -90  * Math.sin((x - 6800)/800 * Math.PI);
  return GROUND_BASE + a + b + c + bump;
}
function groundDesert(x, len) {
  if (x < 200) return GROUND_BASE + 10;
  if (x > len - 280) return GROUND_BASE - 30;
  // Bigger dunes
  const a = Math.sin(x * 0.0028) * 70;
  const b = Math.sin(x * 0.0061 + 0.7) * 24;
  let bump = 0;
  if (x > 1300 && x < 2000) bump = -130 * Math.sin((x - 1300)/700 * Math.PI);
  if (x > 3700 && x < 4400) bump = -150 * Math.sin((x - 3700)/700 * Math.PI);
  if (x > 5300 && x < 5900) bump = 100  * Math.sin((x - 5300)/600 * Math.PI);
  if (x > 7600 && x < 8400) bump = -120 * Math.sin((x - 7600)/800 * Math.PI);
  return GROUND_BASE + 12 + a + b + bump;
}
function groundNeon(x, len) {
  if (x < 200) return GROUND_BASE - 20;
  if (x > len - 280) return GROUND_BASE - 60;
  // Sharper, more chaotic terrain
  const a = Math.sin(x * 0.0050) * 44;
  const b = Math.sin(x * 0.0023 + 1.9) * 60;
  const c = Math.sin(x * 0.0118 + 0.3) * 18;
  let bump = 0;
  if (x > 1100 && x < 1700) bump = -160 * Math.sin((x - 1100)/600 * Math.PI);
  if (x > 2900 && x < 3600) bump = 120  * Math.sin((x - 2900)/700 * Math.PI);
  if (x > 5000 && x < 5700) bump = -180 * Math.sin((x - 5000)/700 * Math.PI);
  if (x > 7400 && x < 8200) bump = -140 * Math.sin((x - 7400)/800 * Math.PI);
  if (x > 8800 && x < 9400) bump = -90  * Math.sin((x - 8800)/600 * Math.PI);
  return GROUND_BASE - 20 + a + b + c + bump;
}

// Each level: name, length, palette, ground fn, loops, ring/spring/enemy/spike specs.
// Loops are cinematic — entering with gsp ≥ 6 triggers a 1-revolution traversal that
// transports sonic forward + grants score/speed. Real layer-swap loop physics are a
// follow-up project; this gives the visual + arcade feel without the implementation cost.
const LEVELS = [
  {
    name: 'GREEN HILL',
    length: 8400,
    palette: { sky1:'#52d9ff', sky2:'#a9eeff', dirt:'#9c5e30', grass:'#3aa83a', grassHi:'#5fd95f', stripe:'#6c3f1b' },
    ground: groundGreenHill,
    loops: [{ cx: 5400, r: 90 }],
    rings: [
      ['line', 360, 800, 10],   ['line', 900, 1200, 7],
      ['arc',  1800, 60, 9],    ['line', 2300, 2600, 6],
      ['arc',  3550, 80, 11],   ['line', 4100, 4400, 6],
      ['line', 4900, 5300, 8],  ['arc',  5700, 50, 7],
      ['line', 6000, 6400, 8],  ['arc',  7200, 90, 9],
      ['line', 7700, 8000, 7],
    ],
    springs: [[1450, -16],[4500, -20],[6700, -22]],
    enemies: [1200, 2400, 3300, [4250,70], [5500,120], 6200, 7400],
    spikes:  [[2050,4],[4750,5],[6500,3]],
  },
  {
    name: 'DESERT VALLEY',
    length: 9200,
    palette: { sky1:'#ffb070', sky2:'#ffe6b8', dirt:'#c98344', grass:'#e8c574', grassHi:'#fff0b8', stripe:'#8a4f1d' },
    ground: groundDesert,
    loops: [{ cx: 3000, r: 100 }, { cx: 6500, r: 110 }],
    rings: [
      ['line', 360, 850, 10],   ['arc',  1500, 80, 9],
      ['line', 2200, 2600, 7],  ['arc',  3000, 110, 11],
      ['line', 3800, 4200, 7],  ['arc',  4600, 70, 9],
      ['line', 5400, 5800, 8],  ['arc',  6500, 120, 11],
      ['line', 7100, 7500, 7],  ['arc',  8000, 80, 9],
      ['line', 8400, 8800, 6],
    ],
    springs: [[1700, -18],[4300, -22],[7200, -24]],
    enemies: [1100, 2150, 2700, [3500,90], 4400, [5100,80], 5900, 6900, 7600, 8500],
    spikes:  [[1850,4],[4550,5],[5650,4],[7800,5]],
  },
  {
    name: 'NEON NIGHT',
    length: 9800,
    palette: { sky1:'#0d0a3d', sky2:'#3a1d6b', dirt:'#1f1f47', grass:'#ff3aff', grassHi:'#ff8aff', stripe:'#1b1b3a' },
    ground: groundNeon,
    loops: [{ cx: 2400, r: 100 }, { cx: 5500, r: 110 }, { cx: 8200, r: 95 }],
    rings: [
      ['line', 360, 900, 11],   ['arc',  1400, 90, 9],
      ['line', 1900, 2300, 7],  ['arc',  2400, 130, 11],
      ['line', 3100, 3500, 7],  ['arc',  4100, 70, 9],
      ['line', 4700, 5100, 8],  ['arc',  5500, 140, 11],
      ['line', 6100, 6500, 7],  ['arc',  7100, 80, 9],
      ['line', 7600, 8000, 7],  ['arc',  8200, 120, 11],
      ['line', 8800, 9300, 7],
    ],
    springs: [[1200, -20],[3700, -22],[6300, -24],[9100, -26]],
    enemies: [800, [1700,80], 2100, 3000, [3800,90], 4300, [5000,100], 6000, 6700, [7400,90], 8000, 8800, 9400],
    spikes:  [[1550,4],[3300,5],[5200,5],[6800,4],[8600,5]],
  },
];

let currentLevel = 0;
let levelTransitionTimer = 0;   // > 0 while showing "ZONE CLEARED" overlay
function activeLevel() { return LEVELS[currentLevel]; }
function levelLen() { return activeLevel().length; }

function groundY(x) {
  const lvl = activeLevel();
  return lvl.ground(x, lvl.length);
}
function groundSlope(x) {
  // Numerical derivative — angle in radians, positive = uphill going right (i.e., y decreasing)
  const h = 4;
  const dy = groundY(x + h) - groundY(x - h);
  return Math.atan2(dy, 2 * h); // returns angle of ground surface; positive = downhill to right
}

// ─── Player — Genesis-style physics ────────────────────────────
const SONIC_W = 28, SONIC_H = 38;
// Genesis values (px/frame at 60 fps, then scaled for our scale)
const ACC = 0.18;      // ground acceleration
const DEC = 0.78;      // deceleration when reversing
const FRC = 0.18;      // friction when no input
const TOP = 7.5;       // top horizontal speed
const ROLLFRC = 0.07;  // friction while rolling
const ROLLDEC = 0.20;  // deceleration while rolling
const TOPROLL = 16;    // max roll speed
const AIR = 0.24;      // air acceleration
const JMP = -10.5;     // jump impulse
const GRV = 0.45;      // gravity
const SLP = 0.18;      // slope walk influence
const SLPROLLUP   = 0.10;
const SLPROLLDOWN = 0.42;

const sonic = {
  x: 100, y: 410,
  vx: 0, vy: 0, gsp: 0,        // gsp = ground speed (signed, along ground)
  onGround: true,
  rolling: false,
  jumping: false,
  facing: 1,
  angle: 0,
  invuln: 0,
  rings: 0,
  spinCharge: 0,
  spinCharging: false,
  squash: 1, stretch: 1,        // for landing juice
  walkPhase: 0,
  state: 'idle',                // idle | walk | run | roll | jump | skid | hurt | dead
  ringSpill: false,
  alive: true,
};

// ─── Scene state ───────────────────────────────────────────────
let state = 'title';   // 'title' | 'intro' | 'play' | 'paused' | 'gameover' | 'win'
let prevState = 'title';
let cameraX = 0, cameraY = 0;
let frame = 0;
let score = 0;
let lives = 3;
let shake = 0;          // screen shake intensity
let startTime = 0;      // performance.now() at level start, for HUD timer
let elapsedMs = 0;
let levelIntroTimer = 0;     // > 0 while showing READY/GO! card on level start
let respawnFade = 0;         // > 0 → black overlay during respawn fade-in
let muted = false;
try { muted = localStorage.getItem('sonic.muted') === '1'; } catch (e) {}
let overlayFade = 0;          // alpha 0..0.55 ramp for win/gameover/zone-clear
let titleEnter = 0;            // ramp 0..1 for title-screen fade-in
const particles = [];   // dust, ring sparkle, etc.
const rings = [];       // ring objects in the level
const looseRings = [];  // rings spilled when hit
const enemies = [];     // badniks
const springs = [];     // bouncy springs
const spikes = [];      // hazards

function placeWorldObjects() {
  rings.length = 0;
  enemies.length = 0;
  springs.length = 0;
  spikes.length = 0;

  const lvl = activeLevel();

  for (const spec of lvl.rings) {
    if (spec[0] === 'line') {
      const [, sx, ex, count] = spec;
      for (let i = 0; i < count; i++) {
        const t = i / (count - 1);
        const x = sx + (ex - sx) * t;
        rings.push({ x, y: groundY(x) - 30, collected: false, t: Math.random() * 6.28 });
      }
    } else if (spec[0] === 'arc') {
      const [, cx, h, count] = spec;
      for (let i = 0; i < count; i++) {
        const t = i / (count - 1);
        const x = cx + (t - 0.5) * 200;
        const y = groundY(x) - h - 60 * Math.sin(t * Math.PI);
        rings.push({ x, y, collected: false, t: Math.random() * 6.28 });
      }
    }
  }

  for (const [x, vy] of lvl.springs) {
    springs.push({ x, y: groundY(x), vy, used: 0 });
  }

  for (const spec of lvl.enemies) {
    const x     = Array.isArray(spec) ? spec[0] : spec;
    const range = Array.isArray(spec) ? spec[1] : 90;
    enemies.push({ x, y: groundY(x), dir: -1, range, anchor: x, alive: true, t: 0 });
  }

  for (const [x, n] of lvl.spikes) {
    for (let i = 0; i < n; i++) {
      const sx = x + i * 16;
      spikes.push({ x: sx, y: groundY(sx) });
    }
  }
}

function restart() {
  currentLevel = 0;
  levelTransitionTimer = 0;
  score = 0; lives = 3; shake = 0;
  sonic.rings = 0;
  sonic.alive = true;
  startLevel(0);
  startTime = performance.now();
  state = 'intro';
  levelIntroTimer = 180;
}

function startLevel(idx) {
  currentLevel = idx;
  sonic.x = 100;
  sonic.y = groundY(100);
  sonic.vx = 0; sonic.vy = 0; sonic.gsp = 0;
  sonic.onGround = true; sonic.rolling = false; sonic.jumping = false;
  sonic.facing = 1; sonic.angle = 0; sonic.invuln = 0;
  sonic.spinCharge = 0; sonic.spinCharging = false;
  sonic.squash = 1; sonic.stretch = 1; sonic.walkPhase = 0;
  sonic.state = 'idle';
  sonic.inLoop = null; sonic.loopAngle = 0; sonic.loopDir = 1; sonic.loopEntryAngle = 0;
  cameraX = 0; cameraY = 0;
  particles.length = 0; looseRings.length = 0;
  placeWorldObjects();
}
placeWorldObjects();

// ─── Physics ───────────────────────────────────────────────────
function updateSonic() {
  if (!sonic.alive) {
    // Death fall
    sonic.vy += GRV;
    sonic.y += sonic.vy;
    if (sonic.y > 700) {
      lives--;
      if (lives <= 0) { state = 'gameover'; }
      else {
        sonic.alive = true;
        sonic.x = Math.max(100, sonic.x - 200);
        sonic.y = groundY(sonic.x);
        sonic.vy = 0; sonic.vx = 0; sonic.gsp = 0;
        sonic.onGround = true;
        sonic.invuln = 120; sonic.state = 'idle';
        respawnFade = 60;
      }
    }
    return;
  }

  const left  = keys['ArrowLeft'];
  const right = keys['ArrowRight'];
  const down  = keys['ArrowDown'];
  const jump  = keys['Space'] || keys['ArrowUp'];

  // ── On the ground ──
  if (sonic.onGround) {
    const slope = groundSlope(sonic.x);
    const slopeSin = Math.sin(slope);

    // Slope influence on ground speed
    if (sonic.rolling) {
      const downhill = (slopeSin > 0 && sonic.gsp > 0) || (slopeSin < 0 && sonic.gsp < 0);
      sonic.gsp -= slopeSin * (downhill ? SLPROLLDOWN : SLPROLLUP);
    } else if (Math.abs(sonic.gsp) > 0.05 || Math.abs(slopeSin) > 0.04) {
      sonic.gsp -= slopeSin * SLP;
    }

    // Spindash charge (down + jump while standing)
    if (down && Math.abs(sonic.gsp) < 0.2) {
      if (jump && !sonic._spinLatch) {
        sonic.spinCharge = Math.min(8, sonic.spinCharge + 2);
        sonic._spinLatch = true;
        sfx.spindash();
        sonic.spinCharging = true;
      } else if (!jump) {
        sonic._spinLatch = false;
      }
      sonic.spinCharge *= 0.96;
    } else if (sonic.spinCharging) {
      // Release
      sonic.gsp = sonic.facing * (8 + sonic.spinCharge);
      sonic.rolling = true;
      sonic.spinCharge = 0;
      sonic.spinCharging = false;
      // Dust burst
      for (let i = 0; i < 14; i++) {
        particles.push({
          x: sonic.x, y: sonic.y - 4, vx: -sonic.facing * (1 + Math.random() * 4), vy: -1 - Math.random() * 2,
          life: 22, max: 22, kind: 'dust',
        });
      }
    }

    // Acceleration / deceleration
    let skidding = false;
    if (!sonic.rolling) {
      if (left) {
        if (sonic.gsp > 0) {
          sonic.gsp -= DEC;
          if (sonic.gsp > 4) { skidding = true; if (frame % 6 === 0) sfx.skid(); puff(sonic.x, sonic.y, 'skid', 1); }
          else sonic.facing = -1;
        } else {
          sonic.facing = -1;
          sonic.gsp = Math.max(sonic.gsp - ACC, -TOP);
        }
      } else if (right) {
        if (sonic.gsp < 0) {
          sonic.gsp += DEC;
          if (sonic.gsp < -4) { skidding = true; if (frame % 6 === 0) sfx.skid(); puff(sonic.x, sonic.y, 'skid', 1); }
          else sonic.facing = 1;
        } else {
          sonic.facing = 1;
          sonic.gsp = Math.min(sonic.gsp + ACC, TOP);
        }
      } else {
        // Friction
        if (Math.abs(sonic.gsp) < FRC) sonic.gsp = 0;
        else sonic.gsp -= Math.sign(sonic.gsp) * FRC;
      }

      // Roll input (down while moving)
      if (down && Math.abs(sonic.gsp) > 1.0) {
        sonic.rolling = true;
        puff(sonic.x, sonic.y, 'dust', 3);
      }
    } else {
      // Rolling
      if (Math.abs(sonic.gsp) < ROLLFRC) {
        sonic.gsp = 0;
        sonic.rolling = false;
      } else {
        sonic.gsp -= Math.sign(sonic.gsp) * ROLLFRC;
      }
      // Rolling deceleration if pushing opposite
      if (left && sonic.gsp > 0) sonic.gsp -= ROLLDEC;
      if (right && sonic.gsp < 0) sonic.gsp += ROLLDEC;
      // Roll speed cap
      if (sonic.gsp > TOPROLL) sonic.gsp = TOPROLL;
      if (sonic.gsp < -TOPROLL) sonic.gsp = -TOPROLL;
    }

    // Jump
    if (jump && !sonic._jumpLatch && !sonic.spinCharging) {
      const cs = Math.cos(slope), ss = Math.sin(slope);
      sonic.vx = sonic.gsp * cs - JMP * ss;
      sonic.vy = sonic.gsp * ss + JMP * cs;
      sonic.onGround = false;
      sonic.jumping = true;
      sonic.rolling = true; // ball form during jump
      sonic._jumpLatch = true;
      sfx.jump();
      // Stretch
      sonic.stretch = 1.25; sonic.squash = 0.85;
    } else if (!jump) {
      sonic._jumpLatch = false;
    }

    // Project ground motion to vx/vy (so we slide along slope)
    if (sonic.onGround) {
      sonic.vx = sonic.gsp * Math.cos(slope);
      sonic.vy = sonic.gsp * Math.sin(slope);
    }

    sonic.x += sonic.vx;
    sonic.y += sonic.vy;

    // Snap to ground while on ground
    if (sonic.onGround) {
      sonic.y = groundY(sonic.x);
      sonic.angle = slope;
    }

    // Lose-grip check (if too slow on a steep slope, slip)
    if (sonic.onGround && Math.abs(sonic.gsp) < 2.5 && Math.abs(slopeSin) > 0.6) {
      sonic.gsp -= slopeSin * 0.5;
    }

    // Walking-state classification
    if (sonic.rolling) sonic.state = 'roll';
    else if (skidding) sonic.state = 'skid';
    else if (Math.abs(sonic.gsp) < 0.1) sonic.state = 'idle';
    else if (Math.abs(sonic.gsp) > 5) sonic.state = 'run';
    else sonic.state = 'walk';

    // Footstep dust + sound at run / walk pace
    if (sonic.state === 'run' && frame % 5 === 0) {
      puff(sonic.x - sonic.facing * 8, sonic.y - 2, 'dust', 1);
      sfx.step();
    }
    if (sonic.state === 'walk' && frame % 12 === 0) {
      sfx.step();
    }

  } else {
    // ── In the air ──
    if (left)  sonic.vx -= AIR;
    if (right) sonic.vx += AIR;
    sonic.vx = Math.max(-TOP, Math.min(TOP, sonic.vx));
    // Variable jump height — release jump cuts upward velocity
    if (sonic.jumping && !jump && sonic.vy < -4) sonic.vy = -4;
    sonic.vy += GRV;
    if (sonic.vy > 16) sonic.vy = 16;

    sonic.x += sonic.vx;
    sonic.y += sonic.vy;

    // Land?
    const gy = groundY(sonic.x);
    if (sonic.y >= gy && sonic.vy >= 0) {
      sonic.y = gy;
      sonic.onGround = true;
      sonic.jumping = false;
      const slope = groundSlope(sonic.x);
      // Restore ground speed from velocity
      sonic.gsp = sonic.vx * Math.cos(slope) + sonic.vy * Math.sin(slope);
      // Land squash + thump
      sonic.squash = 1.25; sonic.stretch = 0.8;
      if (Math.abs(sonic.vy) > 5) { puff(sonic.x, sonic.y, 'dust', 5); sfx.land(); }
      // Stop rolling when landing if no down held
      if (!down) sonic.rolling = false;
      sonic.state = sonic.rolling ? 'roll' : 'idle';
    } else {
      sonic.state = sonic.jumping ? 'jump' : 'fall';
    }
  }

  // Bounds
  if (sonic.x < 20) { sonic.x = 20; if (sonic.gsp < 0) sonic.gsp = 0; if (sonic.vx < 0) sonic.vx = 0; }
  if (sonic.x > levelLen() - 20) { sonic.x = levelLen() - 20; if (sonic.gsp > 0) sonic.gsp = 0; }

  // Squash/stretch ease back
  sonic.squash  += (1 - sonic.squash)  * 0.18;
  sonic.stretch += (1 - sonic.stretch) * 0.18;

  // Walk-cycle phase tied to ground speed
  sonic.walkPhase += Math.abs(sonic.gsp) * 0.25 + (sonic.rolling ? 1.6 : 0);

  // Invuln countdown
  if (sonic.invuln > 0) sonic.invuln--;
}

// ─── Interactions: rings, springs, enemies, spikes, goal ───────
function checkRings() {
  const fast = Math.abs(sonic.gsp) > 4;
  const sy = sonic.y - 18;
  for (const r of rings) {
    if (r.collected) continue;
    const dx = sonic.x - r.x, dy = sy - r.y;
    if (Math.abs(dx) < 22 && Math.abs(dy) < 22) {
      r.collected = true;
      sonic.rings++;
      score += 10;
      sfx.ring();
      for (let i = 0; i < 6; i++) particles.push({
        x: r.x, y: r.y, vx: (Math.random()-0.5)*4, vy: (Math.random()-0.5)*4,
        life: 18, max: 18, kind: 'spark',
      });
    } else if (fast && Math.abs(dx) < 60 && Math.abs(dy) < 50) {
      // Ring magnet at speed — pull toward Sonic
      const d = Math.max(8, Math.hypot(dx, dy));
      r.x += (dx / d) * 4;
      r.y += (dy / d) * 4;
    }
  }
}

function checkSprings() {
  for (const s of springs) {
    if (Math.abs(sonic.x - s.x) < 24 && Math.abs(sonic.y - s.y) < 18 && sonic.vy >= -1) {
      sonic.vy = s.vy;
      sonic.onGround = false;
      sonic.jumping = false;
      sonic.rolling = false;
      s.used = 8;
      sfx.spring();
    }
    if (s.used > 0) s.used--;
  }
}

function checkEnemies() {
  for (const e of enemies) {
    if (!e.alive) continue;
    e.t++;
    e.x += e.dir * 1.0;
    if (e.x < e.anchor - e.range) e.dir = 1;
    if (e.x > e.anchor + e.range) e.dir = -1;
    e.y = groundY(e.x);
    // Collision with Sonic
    if (Math.abs(sonic.x - e.x) < 18 && Math.abs((sonic.y - 16) - (e.y - 12)) < 22) {
      // Stomp if Sonic is rolling/jumping & moving down
      if ((sonic.rolling || sonic.jumping) && sonic.vy > 0) {
        e.alive = false;
        sonic.vy = -7;
        score += 100;
        sfx.break();
        // Burst
        for (let i = 0; i < 10; i++) particles.push({
          x: e.x, y: e.y - 12, vx: (Math.random()-0.5)*5, vy: -2 - Math.random()*3,
          life: 26, max: 26, kind: 'spark',
        });
      } else {
        hurt();
      }
    }
  }
}

function checkSpikes() {
  for (const s of spikes) {
    if (Math.abs(sonic.x - s.x) < 18 && sonic.y - s.y > -22 && sonic.y - s.y < 8) {
      hurt();
      return;
    }
  }
}

function hurt() {
  if (sonic.invuln > 0 || !sonic.alive) return;
  if (sonic.rings > 0) {
    // Spill rings
    const n = Math.min(sonic.rings, 30);
    for (let i = 0; i < n; i++) {
      const ang = (i / n) * Math.PI * 2;
      looseRings.push({
        x: sonic.x, y: sonic.y - 18,
        vx: Math.cos(ang) * (2 + Math.random() * 2),
        vy: Math.sin(ang) * (2 + Math.random() * 2) - 3,
        life: 180,
      });
    }
    sonic.rings = 0;
    sonic.invuln = 90;
    sonic.vy = -5;
    sonic.vx = -sonic.facing * 3;
    sonic.gsp = -sonic.facing * 3;
    sonic.onGround = false;
    sfx.hurt();
    shake = 14;
  } else {
    // Death
    sonic.alive = false;
    sonic.vy = -10;
    sonic.onGround = false;
    sfx.death();
    shake = 18;
    sonic.state = 'dead';
  }
}

function checkGoal() {
  if (levelTransitionTimer > 0) return;
  if (sonic.x > levelLen() - 60) {
    score += 1000 + sonic.rings * 100;
    sfx.goal();
    shake = 6;
    if (currentLevel >= LEVELS.length - 1) {
      state = 'win';
    } else {
      levelTransitionTimer = 150;   // ~2.5s "ZONE CLEARED" overlay
    }
  }
}

function tickLevelTransition() {
  if (levelTransitionTimer <= 0) return;
  levelTransitionTimer--;
  if (levelTransitionTimer === 0) {
    startLevel(currentLevel + 1);
    state = 'intro';
    levelIntroTimer = 180;
  }
}

function updateLooseRings() {
  for (let i = looseRings.length - 1; i >= 0; i--) {
    const r = looseRings[i];
    r.life--;
    r.vy += 0.35;
    r.x += r.vx; r.y += r.vy;
    const gy = groundY(r.x);
    if (r.y > gy - 6 && r.vy > 0) {
      r.y = gy - 6;
      r.vy = -r.vy * 0.55;
      r.vx *= 0.8;
      if (Math.abs(r.vy) < 1) r.vy = 0;
    }
    // Re-collect once the brief post-hit grace passes
    if (sonic.invuln <= 60 && Math.abs(sonic.x - r.x) < 26 && Math.abs((sonic.y - 18) - r.y) < 26) {
      sonic.rings++; score += 10; sfx.ring();
      looseRings.splice(i, 1); continue;
    }
    if (r.life <= 0) looseRings.splice(i, 1);
  }
}

function puff(x, y, kind, n) {
  for (let i = 0; i < n; i++) {
    particles.push({
      x: x + (Math.random()-0.5)*8, y: y - 2 - Math.random()*4,
      vx: (Math.random()-0.5) * (kind === 'skid' ? 3 : 1.4),
      vy: -0.5 - Math.random() * 1.2,
      life: 22, max: 22, kind: kind === 'skid' ? 'skid' : 'dust',
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life--;
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.06;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function updateCamera() {
  const leadX = sonic.vx * 14;
  const leadY = Math.max(-120, Math.min(120, sonic.vy * 4));
  const targetX = sonic.x + leadX - W / 2;
  // While in a loop, follow the loop centre vertically — keeps the whole arc visible.
  const targetY = sonic.inLoop
    ? (groundY(sonic.inLoop.cx) - sonic.inLoop.r - H * 0.5)
    : (sonic.y + leadY - H * 0.55);
  cameraX += (targetX - cameraX) * 0.10;
  cameraY += (targetY - cameraY) * (sonic.inLoop ? 0.12 : 0.08);
  cameraX = Math.max(0, Math.min(levelLen() - W, cameraX));
  cameraY = Math.max(-260, Math.min(80, cameraY));
}

// ─── Render ────────────────────────────────────────────────────
function drawBackground() {
  const lvl = activeLevel();
  const pal = lvl.palette;
  const len = lvl.length;
  const isNeon = currentLevel === 2;

  // Sky gradient
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, pal.sky1);
  g.addColorStop(0.65, pal.sky2);
  g.addColorStop(1, isNeon ? '#1a1248' : '#fcd9a8');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  if (isNeon) {
    // Stars
    for (let i = 0; i < 80; i++) {
      const x = (i * 53 + (frame*0.05|0)) % W;
      const y = (i * 91) % 300;
      ctx.fillStyle = (i + (frame/8|0)) % 9 === 0 ? '#fff' : '#88c0ff';
      ctx.fillRect(x, y, 2, 2);
    }
    // Moon
    ctx.fillStyle = '#f0f0ff';
    ctx.beginPath(); ctx.arc(W * 0.78, 90, 36, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a1248';
    ctx.beginPath(); ctx.arc(W * 0.78 - 10, 84, 28, 0, Math.PI*2); ctx.fill();
  } else {
    // Sun
    ctx.fillStyle = '#fff8c8';
    ctx.beginPath(); ctx.arc(W * 0.78, 90, 40, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,180,0.4)';
    ctx.beginPath(); ctx.arc(W * 0.78, 90, 64, 0, Math.PI*2); ctx.fill();
  }

  // Clouds (parallax 0.15)
  const cx = -cameraX * 0.15;
  ctx.fillStyle = isNeon ? 'rgba(180,140,255,0.4)' : 'rgba(255,255,255,0.85)';
  for (let i = 0; i < 12; i++) {
    const x = ((i * 320 + cx) % (len * 0.4) + len * 0.4) % (len * 0.4) - 200;
    const y = 50 + (i * 23) % 120;
    drawCloud(x, y, 70 + (i*7)%30);
  }

  // Distant mountains (parallax 0.35) — palette-tinted
  const mx = -cameraX * 0.35;
  const mountFar  = currentLevel === 0 ? '#5a8e5a' : currentLevel === 1 ? '#b08050' : '#3a2070';
  const mountHi   = currentLevel === 0 ? '#7bb87b' : currentLevel === 1 ? '#d8a070' : '#6040a8';
  ctx.fillStyle = mountFar;
  for (let i = 0; i < 24; i++) {
    const x = i * 220 + mx;
    const w = 240, h = 110 + (i % 3) * 30;
    ctx.beginPath();
    ctx.moveTo(x, 360);
    ctx.lineTo(x + w/2, 360 - h);
    ctx.lineTo(x + w, 360);
    ctx.closePath();
    ctx.fill();
  }
  ctx.fillStyle = mountHi;
  for (let i = 0; i < 24; i++) {
    const x = i * 220 + mx;
    const w = 240, h = 110 + (i % 3) * 30;
    ctx.beginPath();
    ctx.moveTo(x + w/2, 360 - h);
    ctx.lineTo(x + w/2 - 20, 360 - h + 50);
    ctx.lineTo(x + w/2 - 30, 360 - h + 30);
    ctx.closePath();
    ctx.fill();
  }

  // Mid hills (parallax 0.6)
  const hx = -cameraX * 0.6;
  const midHill = currentLevel === 0 ? '#3d7a3d' : currentLevel === 1 ? '#9a5a30' : '#28184a';
  ctx.fillStyle = midHill;
  for (let i = 0; i < 30; i++) {
    const x = i * 160 + hx;
    ctx.beginPath();
    ctx.moveTo(x - 20, 410);
    ctx.quadraticCurveTo(x + 80, 320, x + 180, 410);
    ctx.lineTo(x + 180, 540);
    ctx.lineTo(x - 20, 540);
    ctx.closePath();
    ctx.fill();
  }
}

function drawCloud(x, y, r) {
  ctx.beginPath();
  ctx.arc(x, y, r * 0.4, 0, Math.PI*2);
  ctx.arc(x + r*0.35, y - r*0.1, r * 0.45, 0, Math.PI*2);
  ctx.arc(x + r*0.7, y, r * 0.4, 0, Math.PI*2);
  ctx.arc(x + r*0.4, y + r*0.15, r * 0.4, 0, Math.PI*2);
  ctx.fill();
}

function drawGround(camX, camY) {
  const pal = activeLevel().palette;
  const len = levelLen();
  const startX = Math.max(0, Math.floor(camX) - 20);
  const endX   = Math.min(len, Math.ceil(camX + W) + 20);
  ctx.fillStyle = pal.dirt;
  ctx.beginPath();
  ctx.moveTo(startX - camX, H + 40);
  for (let x = startX; x <= endX; x += 4) {
    ctx.lineTo(x - camX, groundY(x) - camY);
  }
  ctx.lineTo(endX - camX, H + 40);
  ctx.closePath();
  ctx.fill();
  // Grass top
  ctx.strokeStyle = pal.grass;
  ctx.lineWidth = 5;
  ctx.beginPath();
  for (let x = startX; x <= endX; x += 3) {
    const y = groundY(x) - camY;
    if (x === startX) ctx.moveTo(x - camX, y);
    else ctx.lineTo(x - camX, y);
  }
  ctx.stroke();
  // Highlights
  ctx.fillStyle = pal.grassHi;
  for (let x = startX; x <= endX; x += 18) {
    const y = groundY(x) - camY - 2;
    ctx.fillRect(x - camX, y - 3, 2, 4);
    ctx.fillRect(x - camX + 6, y - 2, 2, 3);
  }
  // Stripes in the dirt
  ctx.strokeStyle = pal.stripe;
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = startX; x <= endX; x += 6) {
    const y = groundY(x) - camY + 18;
    if (x === startX) ctx.moveTo(x - camX, y);
    else ctx.lineTo(x - camX, y);
  }
  ctx.stroke();
}

// Sprite frames extracted from sonic-3.png ring strip (bottom-right area).
// We sample horizontally across animated ring frames.
const RING_FRAMES = [
  // Sampled from sonic-3.png around (262, 80) — 4 ring frames each ~22 wide
  { sx: 250, sy: 76, sw: 22, sh: 22 },
  { sx: 274, sy: 76, sw: 22, sh: 22 },
  { sx: 298, sy: 76, sw: 22, sh: 22 },
  { sx: 322, sy: 76, sw: 22, sh: 22 },
];

function drawRing(x, y, t) {
  // Procedural ring (always works) plus a slight glow
  ctx.save();
  ctx.translate(x, y);
  const phase = (Math.sin(t) + 1) * 0.5;     // 0..1 squash
  const sx = 0.4 + phase * 0.6;
  ctx.scale(sx, 1);
  ctx.lineWidth = 4;
  ctx.strokeStyle = '#ffd24a';
  ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI * 2); ctx.stroke();
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#fff8b0';
  ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
  // Sparkle
  if (Math.sin(t * 2) > 0.94) {
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(x - 1, y - 12, 2, 4);
    ctx.fillRect(x - 12, y - 1, 4, 2);
    ctx.fillRect(x + 8, y - 1, 4, 2);
  }
}

function drawSpring(x, y, used) {
  ctx.save();
  ctx.translate(x, y);
  const compression = used > 0 ? 0.7 : 1;
  ctx.scale(1, compression);
  // Base
  ctx.fillStyle = '#ffd24a';
  ctx.fillRect(-18, -6, 36, 6);
  // Coils
  ctx.fillStyle = '#ee2a2a';
  ctx.fillRect(-16, -14, 32, 6);
  ctx.fillRect(-18, -22, 36, 6);
  // Top plate
  ctx.fillStyle = '#ffd24a';
  ctx.fillRect(-20, -28, 40, 6);
  ctx.restore();
}

function drawSpike(x, y) {
  // Triangle spikes
  ctx.fillStyle = '#9aa3b3';
  ctx.beginPath();
  ctx.moveTo(x - 7, y);
  ctx.lineTo(x, y - 16);
  ctx.lineTo(x + 7, y);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#5e6877';
  ctx.lineWidth = 1.2;
  ctx.stroke();
}

function drawEnemy(e) {
  // Procedural Motobug-style: red shell, wheels, eye
  ctx.save();
  ctx.translate(e.x, e.y - 10);
  if (e.dir > 0) ctx.scale(-1, 1);
  // Wheels
  ctx.fillStyle = '#222';
  ctx.beginPath(); ctx.arc(-8, 8, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 8, 8, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#aaa';
  ctx.beginPath(); ctx.arc(-8, 8, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc( 8, 8, 2, 0, Math.PI*2); ctx.fill();
  // Body (red)
  ctx.fillStyle = '#d92a2a';
  ctx.beginPath();
  ctx.ellipse(0, -2, 14, 9, 0, 0, Math.PI*2);
  ctx.fill();
  // Stripe
  ctx.fillStyle = '#ffd24a';
  ctx.fillRect(-12, -3, 24, 2);
  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(8, -4, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(9, -4, 1.6, 0, Math.PI*2); ctx.fill();
  // Antenna
  ctx.strokeStyle = '#222';
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(-6, -10); ctx.lineTo(-10, -16); ctx.stroke();
  ctx.fillStyle = '#ffd24a';
  ctx.beginPath(); ctx.arc(-10, -17, 2, 0, Math.PI*2); ctx.fill();
  // Exhaust puff
  if ((e.t/4 | 0) % 2 === 0) {
    ctx.fillStyle = 'rgba(120,120,120,0.5)';
    ctx.beginPath(); ctx.arc(-16, 2, 3, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawSonic() {
  const x = sonic.x, y = sonic.y;
  const flicker = sonic.invuln > 0 && (frame % 8 < 4);
  if (flicker) return;

  ctx.save();

  // Death pose: knocked back, flies upward
  if (sonic.state === 'dead') {
    ctx.translate(x, y - 16);
    ctx.scale(sonic.facing, 1);
    drawSonicDead();
    ctx.restore();
    return;
  }

  const isBall = sonic.state === 'roll' || sonic.state === 'jump' || sonic.state === 'fall' || sonic.spinCharging;
  // Anchor offsets — feet plant flush on sonic.y in upright states,
  // ball sits flush in roll/jump.
  const standOffset = 16;
  const ballOffset  = 12;
  ctx.translate(x, y - (isBall ? ballOffset : standOffset));
  if (sonic.onGround && !isBall) ctx.rotate(sonic.angle);
  ctx.scale(sonic.facing * sonic.stretch, sonic.squash);

  if (sonic.spinCharging) drawSonicBall(sonic.walkPhase * 2 + frame);
  else if (isBall)        drawSonicBall(sonic.walkPhase);
  else if (sonic.state === 'skid') drawSonicSkid();
  else if (sonic.state === 'run')  drawSonicRun(sonic.walkPhase);
  else if (sonic.state === 'walk') drawSonicWalk(sonic.walkPhase);
  else                              drawSonicIdle();

  ctx.restore();
}

// ── Procedural Sonic — body parts ──
function drawSonicBody(cx, cy, headTilt = 0) {
  // Body (blue ovoid)
  ctx.fillStyle = '#1d4eff';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 4, 10, 12, 0, 0, Math.PI*2);
  ctx.fill();
  // Belly (peach)
  ctx.fillStyle = '#ffc99a';
  ctx.beginPath();
  ctx.ellipse(cx + 2, cy + 6, 5, 8, 0, 0, Math.PI*2);
  ctx.fill();
}
function drawSonicHead(cx, cy, ang = 0) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(ang);
  // Head (blue circle)
  ctx.fillStyle = '#1d4eff';
  ctx.beginPath(); ctx.arc(0, 0, 9, 0, Math.PI*2); ctx.fill();
  // Spikes (3 back spikes)
  ctx.beginPath();
  ctx.moveTo(-3, -6); ctx.lineTo(-14, -2); ctx.lineTo(-3, 0); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-3, 1); ctx.lineTo(-15, 4); ctx.lineTo(-3, 6); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-2, 6); ctx.lineTo(-12, 10); ctx.lineTo(-2, 9); ctx.closePath(); ctx.fill();
  // Face mask (peach)
  ctx.fillStyle = '#ffc99a';
  ctx.beginPath();
  ctx.ellipse(4, 2, 6, 5, 0, 0, Math.PI*2);
  ctx.fill();
  // Muzzle
  ctx.beginPath();
  ctx.ellipse(7, 4, 3, 2, 0, 0, Math.PI*2);
  ctx.fill();
  // Eye (oval)
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.ellipse(3, -1, 3, 4, 0, 0, Math.PI*2);
  ctx.fill();
  // Pupil
  ctx.fillStyle = '#003a8e';
  ctx.beginPath();
  ctx.ellipse(4.2, 0, 1.6, 2.4, 0, 0, Math.PI*2);
  ctx.fill();
  // Nose
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(9, 4, 1.4, 0, Math.PI*2);
  ctx.fill();
  // Ear
  ctx.fillStyle = '#1d4eff';
  ctx.beginPath();
  ctx.moveTo(-2, -8); ctx.lineTo(0, -12); ctx.lineTo(2, -8); ctx.closePath();
  ctx.fill();
  ctx.restore();
}
function drawShoe(cx, cy, ang) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(ang);
  // Shoe (red)
  ctx.fillStyle = '#e72525';
  ctx.beginPath();
  ctx.ellipse(2, 0, 6, 3.4, 0, 0, Math.PI*2);
  ctx.fill();
  // White stripe
  ctx.fillStyle = '#fff';
  ctx.fillRect(-2, -1, 8, 1.6);
  // Buckle
  ctx.fillStyle = '#ffd24a';
  ctx.fillRect(0, -2, 2, 1.5);
  // Sole
  ctx.fillStyle = '#aaa';
  ctx.fillRect(-3, 1.6, 9, 1.4);
  ctx.restore();
}

function drawSonicIdle() {
  // Tap-foot every 2.5 sec, classic Sonic 1 idle-impatience tap
  const blink = (frame % 90) < 4;
  const tap = (frame % 32) < 4 ? 1 : 0;
  drawSonicBody(0, 0);
  drawSonicHead(2, -10);
  drawShoe(-3, 13 - tap * 2, -tap * 0.2);
  drawShoe( 5, 13, 0);
  if (blink) {
    ctx.fillStyle = '#1d4eff';
    ctx.fillRect(4, -10, 4, 1);
  }
}

function drawSonicWalk(phase) {
  // Six discrete walk frames so the change is visibly read as animation
  // (continuous sin made the cycle too subtle at low gsp).
  const FRAMES = 6;
  const f = Math.floor(phase * 0.6) % FRAMES;
  // Per-frame leg offsets: pairs [aLift, aShift, bLift, bShift]
  const tab = [
    [0,  -3, 0,   5],   // contact L
    [3,  -1, 1,   4],   // recoil
    [5,   2, 0,   3],   // pass under
    [0,   3, 0,  -3],   // contact R (legs swap)
    [1,   4, 3,  -1],   // recoil
    [0,   3, 5,   2],   // pass under
  ];
  const [aLift, aShift, bLift, bShift] = tab[f];
  // Tiny bob — body lifts when both feet are mid-air
  const bob = (aLift + bLift) > 4 ? -1 : 0;
  drawSonicBody(0, bob);
  drawSonicHead(2, -10 + bob, 0.05 * Math.sin(phase * 0.6));
  drawShoe(aShift, 13 - aLift, aLift * 0.08);
  drawShoe(bShift, 13 - bLift, bLift * 0.08);
}

function drawSonicRun(phase) {
  // Classic Sonic running "figure-8 leg ball" — render the legs as a
  // rotating wheel of red shoe-arcs so the animation cycles visibly.
  const p = phase * 0.45;
  // White motion-blur ellipse beneath body
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  ctx.beginPath();
  ctx.ellipse(0, 11, 11, 4, 0, 0, Math.PI*2);
  ctx.fill();
  // Spinning shoe wheel (4 wedges)
  for (let i = 0; i < 4; i++) {
    const a = p + i * (Math.PI / 2);
    const sx = Math.cos(a) * 5;
    const sy = 11 + Math.sin(a) * 2.2;
    ctx.fillStyle = '#e72525';
    ctx.beginPath();
    ctx.ellipse(sx, sy, 5, 2.4, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(sx - 2, sy - 0.5, 4, 1);
  }
  // Body & head, leaning forward
  drawSonicBody(0, 0);
  drawSonicHead(3, -10, 0.22);
  // Speed lines
  ctx.strokeStyle = 'rgba(255,255,255,0.6)';
  ctx.lineWidth = 1.4;
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(-12 - i*4, 6 + i*2);
    ctx.lineTo(-26 - i*6, 6 + i*2);
    ctx.stroke();
  }
}

function drawSonicBall(phase) {
  // Spinning ball
  const r = 12;
  ctx.fillStyle = '#1d4eff';
  ctx.beginPath();
  ctx.arc(0, 0, r, 0, Math.PI*2);
  ctx.fill();
  // Spike radial pattern indicating rotation
  ctx.fillStyle = '#0f2eb6';
  for (let i = 0; i < 6; i++) {
    const a = phase * 0.4 + i * (Math.PI / 3);
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, r, a, a + 0.35);
    ctx.closePath();
    ctx.fill();
  }
  // Highlight
  ctx.fillStyle = 'rgba(140,180,255,0.6)';
  ctx.beginPath(); ctx.arc(-3, -4, 4, 0, Math.PI*2); ctx.fill();
  // Shoe glimpses
  ctx.fillStyle = '#e72525';
  ctx.beginPath();
  ctx.ellipse(0, 4, 8, 3, phase * 0.4, 0, Math.PI*2);
  ctx.fill();
}

function drawSonicSkid() {
  // Lean back hard, front foot forward, back foot scraping — alternates
  // between two poses so the skid reads as motion, not a still frame.
  const alt = (frame >> 1) & 1;
  drawSonicBody(0, 0);
  drawSonicHead(-2, -10, -0.35);
  if (alt) {
    drawShoe(-7, 13,  0.5);   // back foot dragging
    drawShoe( 7, 12, -0.3);   // front foot raised
  } else {
    drawShoe(-5, 13,  0.3);
    drawShoe( 8, 13, -0.2);
  }
  // Trailing skid puff (multiple to suggest motion)
  ctx.fillStyle = 'rgba(255,255,255,0.75)';
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(-12 - i * 5, 13 - (i & 1), 3.5 - i * 0.4, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawSonicDead() {
  // Classic Sonic 1 death: face up, body limp, eyes shut/X'd, occasional
  // limb twitch. Game has already given vy = -10 so he flies upward; this
  // pose stays pinned to him as he sails off screen.
  ctx.save();
  // Body slumped, slight side-tilt that wobbles
  const wob = Math.sin(frame * 0.25) * 0.08;
  ctx.rotate(wob);
  // Body
  ctx.fillStyle = '#1d4eff';
  ctx.beginPath();
  ctx.ellipse(0, 4, 11, 11, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#ffc99a';
  ctx.beginPath();
  ctx.ellipse(2, 6, 5, 7, 0, 0, Math.PI*2);
  ctx.fill();
  // Head pointed up — spikes splayed skywards
  ctx.fillStyle = '#1d4eff';
  ctx.beginPath(); ctx.arc(0, -8, 9, 0, Math.PI*2); ctx.fill();
  // Three spikes pointing UP (face is upward)
  ctx.beginPath();
  ctx.moveTo(-4, -10); ctx.lineTo(-1, -20); ctx.lineTo( 2, -10); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo( 0, -10); ctx.lineTo( 4, -22); ctx.lineTo( 6, -10); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo( 5, -10); ctx.lineTo( 9, -19); ctx.lineTo(10, -10); ctx.closePath(); ctx.fill();
  // Face mask (peach), eyes X'd
  ctx.fillStyle = '#ffc99a';
  ctx.beginPath(); ctx.ellipse(2, -6, 6, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1.6;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(-2, -8); ctx.lineTo( 2, -4);
  ctx.moveTo( 2, -8); ctx.lineTo(-2, -4);
  ctx.moveTo( 4, -8); ctx.lineTo( 8, -4);
  ctx.moveTo( 8, -8); ctx.lineTo( 4, -4);
  ctx.stroke();
  ctx.lineCap = 'butt';
  // Limp arms / legs splayed
  ctx.fillStyle = '#1d4eff';
  ctx.beginPath(); ctx.ellipse(-9, 2, 4, 2.2, -0.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse( 9, 2, 4, 2.2,  0.4, 0, Math.PI*2); ctx.fill();
  // Limp shoes dangling
  drawShoe(-7, 12, -0.6);
  drawShoe( 7, 12,  0.6);
  ctx.restore();
}

// ─── HUD ───────────────────────────────────────────────────────
const FONT_HUD   = "'Press Start 2P', 'Courier New', monospace";
const FONT_TITLE = "'Russo One', 'Impact', 'Arial Black', sans-serif";

function roundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y,     x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x,     y + h, r);
  ctx.arcTo(x,     y + h, x,     y,     r);
  ctx.arcTo(x,     y,     x + w, y,     r);
  ctx.closePath();
}

function drawPanel(x, y, w, h, opts = {}) {
  const r    = opts.r    !== undefined ? opts.r    : 8;
  const fill = opts.fill || 'rgba(8,12,28,0.72)';
  const stroke = opts.stroke || '#ffd24a';
  ctx.save();
  roundedRect(x, y, w, h, r);
  ctx.fillStyle = fill;
  ctx.fill();
  ctx.lineWidth = 2;
  ctx.strokeStyle = stroke;
  ctx.stroke();
  ctx.restore();
}

function drawSonicHeadIcon(x, y, s = 1) {
  ctx.save();
  ctx.translate(x, y); ctx.scale(s, s);
  ctx.fillStyle = '#1d4eff';
  ctx.beginPath(); ctx.arc(0, 0, 6, 0, Math.PI*2); ctx.fill();
  // Spikes back
  ctx.beginPath();
  ctx.moveTo(-2, -2); ctx.lineTo(-9, -4); ctx.lineTo(-2, 1); ctx.closePath(); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-2,  1); ctx.lineTo(-9,  3); ctx.lineTo(-1, 4); ctx.closePath(); ctx.fill();
  // Face mask
  ctx.fillStyle = '#ffc99a';
  ctx.beginPath(); ctx.ellipse(2, 1, 3, 4, 0, 0, Math.PI*2); ctx.fill();
  // Eye
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.ellipse(1, -1, 1.4, 2, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(1, -0.5, 0.7, 0, Math.PI*2); ctx.fill();
  ctx.restore();
}

// Click-target buttons (state recorded so click handler can hit-test)
const HUD_BUTTONS = [];
function hudButton(id, x, y, size, draw) {
  const hot = HUD_BUTTONS.findIndex(b => b.id === id);
  const rec = { id, x, y, w: size, h: size };
  if (hot >= 0) HUD_BUTTONS[hot] = rec; else HUD_BUTTONS.push(rec);
  drawPanel(x, y, size, size, { r: 6, fill: 'rgba(8,12,28,0.85)', stroke: '#ffd24a' });
  ctx.save(); ctx.translate(x + size/2, y + size/2); draw(); ctx.restore();
}

function drawHUD() {
  HUD_BUTTONS.length = 0;

  // ── STATS PANEL (top-left) ──
  const sx = 14, sy = 14, sw = 200, sh = 90;
  drawPanel(sx, sy, sw, sh, { r: 10 });

  ctx.font = '10px ' + FONT_HUD;
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';

  // Score
  ctx.fillStyle = '#ffd24a';
  ctx.fillText('SCORE', sx + 14, sy + 22);
  ctx.fillStyle = '#fff';
  ctx.font = '14px ' + FONT_HUD;
  ctx.fillText(score.toString().padStart(6, '0'), sx + 14, sy + 40);

  // Rings (with animated icon)
  ctx.save();
  ctx.translate(sx + 22, sy + 60);
  drawRing(0, 0, frame * 0.2);
  ctx.restore();
  ctx.font = '12px ' + FONT_HUD;
  ctx.fillStyle = (sonic.rings === 0) ? '#ff5252' : '#ffd24a';
  ctx.fillText(sonic.rings.toString().padStart(3, '0'), sx + 38, sy + 64);

  // Lives — Sonic-head icons
  for (let i = 0; i < Math.min(lives, 4); i++) {
    drawSonicHeadIcon(sx + 100 + i * 18, sy + 60, 1.0);
  }
  if (lives > 4) {
    ctx.fillStyle = '#fff';
    ctx.font = '10px ' + FONT_HUD;
    ctx.fillText('×' + lives, sx + 178, sy + 64);
  }

  // Time
  if (state === 'play') elapsedMs = performance.now() - startTime;
  const totalSec = Math.floor(elapsedMs / 1000);
  const mm = String(Math.floor(totalSec / 60)).padStart(2, '0');
  const ss = String(totalSec % 60).padStart(2, '0');
  ctx.fillStyle = '#aac8ff';
  ctx.font = '8px ' + FONT_HUD;
  ctx.fillText('TIME', sx + 14, sy + 80);
  ctx.fillStyle = '#fff';
  ctx.font = '11px ' + FONT_HUD;
  ctx.fillText(mm + ':' + ss, sx + 50, sy + 80);

  // ── ZONE RIBBON (top-centre) ──
  const rw = 320, rh = 30;
  const rx = (W - rw) / 2, ry = 14;
  drawPanel(rx, ry, rw, rh, { r: 8 });
  ctx.font = '9px ' + FONT_HUD;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#ffd24a';
  ctx.fillText(`ZONE ${currentLevel + 1}/${LEVELS.length}  ·  ${activeLevel().name}`, rx + rw/2, ry + 12);
  // Progress bar inside the panel
  const bw = rw - 24, bh = 8, bx = rx + 12, by = ry + 18;
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  roundedRect(bx, by, bw, bh, 4); ctx.fill();
  // Checker stripes
  const t = Math.min(1, sonic.x / levelLen());
  const fillW = bw * t;
  ctx.save();
  roundedRect(bx, by, bw, bh, 4); ctx.clip();
  for (let i = 0; i < bw; i += 8) {
    ctx.fillStyle = ((i / 8) | 0) % 2 ? '#ffd24a' : '#e6a614';
    if (i < fillW) ctx.fillRect(bx + i, by, Math.min(8, fillW - i), bh);
  }
  ctx.restore();
  // Chevron at progress point
  ctx.fillStyle = '#1d4eff';
  ctx.beginPath();
  ctx.moveTo(bx + fillW, by - 2);
  ctx.lineTo(bx + fillW + 5, by + bh / 2);
  ctx.lineTo(bx + fillW, by + bh + 2);
  ctx.lineTo(bx + fillW - 5, by + bh / 2);
  ctx.closePath(); ctx.fill();
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';

  // ── CONTROL BUTTONS (top-right) ──
  const btnSize = 32, gap = 6;
  const btnY = 14;
  const totalBtnW = 3 * btnSize + 2 * gap;
  const baseX = W - totalBtnW - 14;
  hudButton('pause', baseX, btnY, btnSize, () => {
    ctx.fillStyle = '#ffd24a';
    if (state === 'paused') {
      // Play triangle
      ctx.beginPath();
      ctx.moveTo(-4, -7); ctx.lineTo(7, 0); ctx.lineTo(-4, 7); ctx.closePath();
      ctx.fill();
    } else {
      // Pause bars
      ctx.fillRect(-6, -7, 4, 14);
      ctx.fillRect( 2, -7, 4, 14);
    }
  });
  hudButton('mute', baseX + (btnSize + gap), btnY, btnSize, () => {
    ctx.fillStyle = '#ffd24a';
    // Speaker body
    ctx.beginPath();
    ctx.moveTo(-7, -3); ctx.lineTo(-3, -3); ctx.lineTo(2, -8);
    ctx.lineTo(2, 8); ctx.lineTo(-3, 3); ctx.lineTo(-7, 3); ctx.closePath();
    ctx.fill();
    if (muted) {
      ctx.strokeStyle = '#ff5252'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(-9, -9); ctx.lineTo(9, 9); ctx.stroke();
    } else {
      ctx.strokeStyle = '#ffd24a'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.arc(0, 0, 6, -0.6, 0.6); ctx.stroke();
      ctx.beginPath(); ctx.arc(0, 0, 9, -0.6, 0.6); ctx.stroke();
    }
  });
  hudButton('fullscreen', baseX + 2 * (btnSize + gap), btnY, btnSize, () => {
    ctx.strokeStyle = '#ffd24a';
    ctx.lineWidth = 2;
    // Corner brackets
    ctx.beginPath();
    ctx.moveTo(-8, -4); ctx.lineTo(-8, -8); ctx.lineTo(-4, -8);
    ctx.moveTo( 4, -8); ctx.lineTo( 8, -8); ctx.lineTo( 8, -4);
    ctx.moveTo( 8,  4); ctx.lineTo( 8,  8); ctx.lineTo( 4,  8);
    ctx.moveTo(-4,  8); ctx.lineTo(-8,  8); ctx.lineTo(-8,  4);
    ctx.stroke();
  });
}

function toggleMute() {
  muted = !muted;
  try { localStorage.setItem('sonic.muted', muted ? '1' : '0'); } catch (e) {}
  if (masterGain) masterGain.gain.value = muted ? 0 : 1;
}

function handleCanvasClick(e) {
  const rect = cv.getBoundingClientRect();
  const px = (e.clientX - rect.left) * (W / rect.width);
  const py = (e.clientY - rect.top)  * (H / rect.height);
  for (const b of HUD_BUTTONS) {
    if (px >= b.x && px <= b.x + b.w && py >= b.y && py <= b.y + b.h) {
      e.preventDefault?.();
      if (b.id === 'pause') {
        if (state === 'play') state = 'paused';
        else if (state === 'paused') state = 'play';
      } else if (b.id === 'mute') {
        toggleMute();
      } else if (b.id === 'fullscreen') {
        toggleFullscreen();
      }
      return true;
    }
  }
  return false;
}

function toggleFullscreen() {
  const el = document.getElementById('frame');
  if (!document.fullscreenElement) el.requestFullscreen?.();
  else document.exitFullscreen?.();
}

// ─── Title screen ──────────────────────────────────────────────
function drawTitle() {
  ctx.fillStyle = '#040618';
  ctx.fillRect(0, 0, W, H);

  // Three parallax star layers
  const drawStars = (count, scroll, size, brightness) => {
    for (let i = 0; i < count; i++) {
      const x = ((i * 73 + frame * scroll) % (W + 40) + W + 40) % (W + 40) - 20;
      const y = (i * 137) % H;
      const tw = (i + (frame >> 4)) % 13 === 0 ? brightness : brightness * 0.5;
      ctx.fillStyle = `rgba(170,200,255,${tw})`;
      ctx.fillRect(x, y, size, size);
    }
  };
  drawStars(60, 0.05, 1, 0.4);
  drawStars(40, 0.15, 2, 0.7);
  drawStars(20, 0.35, 2, 1.0);

  // Faint horizon glow
  const g = ctx.createRadialGradient(W/2, H + 60, 20, W/2, H + 60, H);
  g.addColorStop(0, 'rgba(80, 130, 255, 0.45)');
  g.addColorStop(1, 'rgba(0, 0, 0, 0)');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Title with float + gold gradient + outline
  const float = Math.sin(frame / 60) * 4;
  const logoY = 150 + float;
  ctx.save();
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (imgs.title) {
    const tw = 280, th = 240;
    ctx.drawImage(imgs.title, 0, 0, 376, 323, W/2 - tw/2, logoY - 40, tw, th);
  }
  ctx.font = 'bold 72px ' + FONT_TITLE;
  ctx.fillStyle = 'rgba(0,0,30,0.8)';
  ctx.fillText('SUPERSONIC', W/2 + 4, logoY + 180 + 4);
  const lg = ctx.createLinearGradient(0, logoY + 150, 0, logoY + 220);
  lg.addColorStop(0, '#fff8a0');
  lg.addColorStop(0.5, '#ffd24a');
  lg.addColorStop(1, '#e8740c');
  ctx.fillStyle = lg;
  ctx.fillText('SUPERSONIC', W/2, logoY + 180);
  ctx.strokeStyle = '#001b66';
  ctx.lineWidth = 3;
  ctx.strokeText('SUPERSONIC', W/2, logoY + 180);
  ctx.restore();

  ctx.font = '12px ' + FONT_HUD;
  ctx.fillStyle = '#aac8ff';
  ctx.textAlign = 'center';
  ctx.fillText('A GENESIS-FEEL PLATFORMER', W/2, logoY + 220);

  const pulse = 0.5 + 0.5 * Math.sin(frame / 18);
  ctx.font = '16px ' + FONT_HUD;
  ctx.fillStyle = `rgba(255,210,74,${0.4 + 0.6 * pulse})`;
  ctx.fillText('PRESS  SPACE  TO  START', W/2, H - 110);

  ctx.font = '9px ' + FONT_HUD;
  ctx.fillStyle = '#778ab8';
  ctx.fillText('← → MOVE   ·   ↓ ROLL   ·   SPACE JUMP   ·   P PAUSE   ·   M MUTE', W/2, H - 70);
  ctx.fillStyle = '#445';
  ctx.fillText('CLICK OR PRESS A KEY TO ENABLE SOUND', W/2, H - 44);

  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

// ─── Shared overlay card ───────────────────────────────────────
function drawOverlayCard(opts) {
  const a   = opts.alpha !== undefined ? opts.alpha : 0.55;
  const cw  = opts.width  || 420;
  const ch  = opts.height || 220;
  const cx  = (W - cw) / 2, cy = (H - ch) / 2;

  ctx.fillStyle = `rgba(4,8,28,${a})`;
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.7)';
  ctx.shadowBlur = 30;
  ctx.shadowOffsetY = 12;
  const cardGrad = ctx.createLinearGradient(0, cy, 0, cy + ch);
  cardGrad.addColorStop(0, '#1a1230');
  cardGrad.addColorStop(1, '#0a0818');
  ctx.fillStyle = cardGrad;
  roundedRect(cx, cy, cw, ch, 14);
  ctx.fill();
  ctx.restore();

  ctx.strokeStyle = '#ffd24a';
  ctx.lineWidth = 3;
  roundedRect(cx, cy, cw, ch, 14);
  ctx.stroke();
  ctx.strokeStyle = '#e8740c';
  ctx.lineWidth = 1;
  roundedRect(cx + 4, cy + 4, cw - 8, ch - 8, 11);
  ctx.stroke();

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (opts.title) {
    ctx.font = 'bold 40px ' + FONT_TITLE;
    ctx.fillStyle = opts.titleColor || '#ffd24a';
    ctx.fillText(opts.title, W/2, cy + 56);
  }
  if (opts.subtitle) {
    ctx.font = '14px ' + FONT_HUD;
    ctx.fillStyle = '#aac8ff';
    ctx.fillText(opts.subtitle, W/2, cy + 92);
  }
  if (opts.body) {
    ctx.font = '12px ' + FONT_HUD;
    ctx.fillStyle = '#fff';
    const lines = Array.isArray(opts.body) ? opts.body : [opts.body];
    lines.forEach((l, i) => ctx.fillText(l, W/2, cy + 124 + i * 22));
  }
  if (opts.hint) {
    const pulse = 0.5 + 0.5 * Math.sin(frame / 18);
    ctx.font = '10px ' + FONT_HUD;
    ctx.fillStyle = `rgba(255,210,74,${0.35 + 0.65 * pulse})`;
    ctx.fillText(opts.hint, W/2, cy + ch - 26);
  }
  ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
}

function formatTime(ms) {
  const totalSec = Math.max(0, Math.floor(ms / 1000));
  const mm = String(Math.floor(totalSec / 60)).padStart(2, '0');
  const ss = String(totalSec % 60).padStart(2, '0');
  return mm + ':' + ss;
}

function drawWin() {
  drawBackground();
  drawOverlayCard({
    alpha: 0.65,
    title: 'GOAL!',
    subtitle: 'ALL ZONES CLEARED',
    body: ['SCORE   ' + score.toString().padStart(6, '0'),
           'RINGS   ' + sonic.rings.toString().padStart(3, '0'),
           'TIME    ' + formatTime(elapsedMs)],
    hint:  'PRESS  SPACE  OR  R  TO  PLAY  AGAIN',
  });
}

function drawGameOver() {
  drawBackground();
  drawOverlayCard({
    alpha: 0.7,
    title: 'GAME OVER',
    titleColor: '#ff5252',
    subtitle: ' ',
    body: ['SCORE   ' + score.toString().padStart(6, '0'),
           'TIME    ' + formatTime(elapsedMs)],
    hint:  'PRESS  SPACE  OR  R  TO  TRY  AGAIN',
  });
}

function drawIntroCard() {
  const slideIn  = Math.min(1, (180 - levelIntroTimer) / 30);
  const slideOut = Math.max(0, Math.min(1, levelIntroTimer / 20));
  const fade = Math.min(slideIn, slideOut);
  ctx.save();
  ctx.globalAlpha = fade;
  drawOverlayCard({
    alpha: 0.55,
    title: 'ZONE  ' + (currentLevel + 1),
    subtitle: activeLevel().name + '  ·  ACT 1',
    body: ' ',
  });
  ctx.restore();

  if (levelIntroTimer < 90) {
    const showGo = levelIntroTimer < 50;
    const phase = showGo ? (50 - levelIntroTimer) : (90 - levelIntroTimer);
    const punch = 1 + Math.exp(-phase / 8) * 0.6;
    ctx.save();
    ctx.translate(W/2, H/2 + 80);
    ctx.scale(punch, punch);
    ctx.font = 'bold 56px ' + FONT_TITLE;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillText(showGo ? 'GO!' : 'READY', 3, 3);
    ctx.fillStyle = showGo ? '#52ff7a' : '#ffd24a';
    ctx.fillText(showGo ? 'GO!' : 'READY', 0, 0);
    ctx.strokeStyle = '#001b66';
    ctx.lineWidth = 3;
    ctx.strokeText(showGo ? 'GO!' : 'READY', 0, 0);
    ctx.restore();
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';
  }
}

function drawPausedOverlay() {
  drawOverlayCard({
    alpha: 0.55,
    title: 'PAUSED',
    subtitle: ' ',
    body: ' ',
    hint: 'PRESS  P  TO  RESUME',
  });
}

// ─── Loop-de-loops ─────────────────────────────────────────────
// Cinematic: enter at gsp ≥ 6 within capture zone, traverse circle
// once over ~36 frames, exit boosted. Visual flair + arcade feel
// without rewriting the ground-collision system to handle topology.
function checkLoops() {
  if (!sonic.alive || sonic.inLoop) return;
  const lvl = activeLevel();
  for (const lp of lvl.loops) {
    if (Math.abs(sonic.x - lp.cx) < 30 && Math.abs(sonic.gsp) >= 6 && sonic.onGround) {
      sonic.inLoop = lp;
      sonic.loopT = 0;
      sonic._loopDir = Math.sign(sonic.gsp) || 1;
      sonic.rolling = true;
      break;
    }
  }
  if (sonic.inLoop) {
    const lp = sonic.inLoop;
    sonic.loopT += 1 / 36;
    const phase = sonic._loopDir > 0 ? sonic.loopT : (1 - sonic.loopT);
    const a = -Math.PI/2 + phase * Math.PI * 2;
    const baseY = groundY(lp.cx);
    sonic.x = lp.cx + Math.cos(a) * lp.r;
    sonic.y = baseY - lp.r + Math.sin(a) * lp.r;
    sonic.angle = a + Math.PI/2;
    sonic.onGround = true;
    sonic.state = 'roll';
    if (sonic.loopT >= 1) {
      sonic.inLoop = null;
      sonic.loopT = 0;
      sonic.angle = 0;
      sonic.gsp = sonic._loopDir * Math.max(Math.abs(sonic.gsp), 12);
      sonic.x = lp.cx + sonic._loopDir * 40;
      sonic.y = groundY(sonic.x);
      score += 100;
    }
  }
}

function drawLoops(camX) {
  const lvl = activeLevel();
  for (const lp of lvl.loops) {
    if (lp.cx + lp.r + 80 < camX || lp.cx - lp.r - 80 > camX + W) continue;
    const baseY = groundY(lp.cx);
    const cy = baseY - lp.r;
    // Outer ring (loop track)
    ctx.lineWidth = 16;
    ctx.strokeStyle = activeLevel().palette.dirt;
    ctx.beginPath(); ctx.arc(lp.cx, cy, lp.r, 0, Math.PI*2); ctx.stroke();
    // Track edge
    ctx.lineWidth = 4;
    ctx.strokeStyle = activeLevel().palette.grass;
    ctx.beginPath(); ctx.arc(lp.cx, cy, lp.r + 8, 0, Math.PI*2); ctx.stroke();
    ctx.beginPath(); ctx.arc(lp.cx, cy, lp.r - 8, 0, Math.PI*2); ctx.stroke();
    // Checker stripes around the rim
    ctx.fillStyle = activeLevel().palette.stripe;
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2;
      const ix = lp.cx + Math.cos(a) * lp.r;
      const iy = cy + Math.sin(a) * lp.r;
      ctx.beginPath(); ctx.arc(ix, iy, 3, 0, Math.PI*2); ctx.fill();
    }
    // Support pillars
    ctx.fillStyle = activeLevel().palette.dirt;
    ctx.fillRect(lp.cx - lp.r - 10, baseY - 6, 18, 30);
    ctx.fillRect(lp.cx + lp.r - 8,  baseY - 6, 18, 30);
  }
}

function drawLevelClearOverlay() {
  ctx.fillStyle = 'rgba(0,0,40,0.55)';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#ffd24a';
  ctx.font = 'bold 48px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText('ZONE CLEARED', W/2, H/2 - 30);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 22px Courier New';
  ctx.fillText(activeLevel().name, W/2, H/2 + 6);
  if (currentLevel < LEVELS.length - 1) {
    ctx.font = '16px Courier New';
    ctx.fillText('NEXT: ' + LEVELS[currentLevel + 1].name, W/2, H/2 + 40);
  }
  ctx.font = '14px Courier New';
  ctx.fillStyle = '#aac8ff';
  ctx.fillText('SCORE  ' + score + '   RINGS  ' + sonic.rings, W/2, H/2 + 72);
}

// ─── Main loop ─────────────────────────────────────────────────
function tick(now) {
  frame++;

  if (state === 'intro') {
    if (levelIntroTimer > 0) {
      levelIntroTimer--;
      if (levelIntroTimer === 0) { state = 'play'; startTime = performance.now(); }
    }
    updateCamera();
  } else if (state === 'play') {
    if (levelTransitionTimer > 0) {
      tickLevelTransition();
    } else {
      updateSonic();
      checkLoops();
      if (sonic.alive) {
        checkRings();
        checkSprings();
        checkEnemies();
        checkSpikes();
        checkGoal();
      }
    }
    updateLooseRings();
    updateParticles();
    updateCamera();
    if (shake > 0) shake *= 0.84;
    if (respawnFade > 0) respawnFade--;
  }
  // Pause: no updates, but camera and ambient music still tick (gain ramps in tickMusic)

  if (actx) {
    const muteScale = (state === 'paused') ? 0.05 : 1.0;
    if (music.gain) music.gain.gain.value = 0.85 * muteScale;
    const speedRatio = Math.min(1, Math.abs(sonic.gsp) / TOPROLL);
    if (state !== 'paused') tickMusic(now, speedRatio);
  }
  draw();
  requestAnimationFrame(tick);
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  if (state === 'title') { drawTitle(); return; }
  if (state === 'gameover') { drawGameOver(); drawHUD(); return; }
  if (state === 'win') { drawWin(); drawHUD(); return; }

  // Camera shake
  const shx = (Math.random() - 0.5) * shake;
  const shy = (Math.random() - 0.5) * shake;
  const camX = cameraX + shx;
  const camY = cameraY + shy;

  drawBackground();

  ctx.save();
  ctx.translate(-camX, -camY);
  drawGround(camX, camY);

  // Loop-de-loops (drawn over ground, behind objects)
  drawLoops(camX);

  // Rings
  for (const r of rings) {
    if (r.collected) continue;
    if (r.x + 40 < camX || r.x - 40 > camX + W) continue;
    drawRing(r.x, r.y, frame * 0.18 + r.t);
  }
  // Loose rings
  for (const r of looseRings) {
    if (r.x + 40 < camX || r.x - 40 > camX + W) continue;
    const blink = r.life < 60 && (r.life % 6 < 3);
    if (!blink) drawRing(r.x, r.y, frame * 0.4);
  }
  // Springs
  for (const s of springs) drawSpring(s.x, s.y, s.used);
  // Spikes
  for (const s of spikes) drawSpike(s.x, s.y);
  // Enemies
  for (const e of enemies) if (e.alive) drawEnemy(e);

  // Goal sign — classic Sonic signpost (rotating board)
  const gx = levelLen() - 60;
  const gy = groundY(gx);
  ctx.fillStyle = '#fff';
  ctx.fillRect(gx - 3, gy - 80, 6, 80);
  // Top knob
  ctx.fillStyle = '#ffd24a';
  ctx.beginPath(); ctx.arc(gx, gy - 86, 8, 0, Math.PI*2); ctx.fill();
  // Sign board — rotates in 3D-ish y-scale to suggest spinning
  const spin = Math.cos(frame * 0.06);
  const w = 60 * Math.abs(spin);
  ctx.save();
  ctx.translate(gx, gy - 60);
  ctx.fillStyle = spin > 0 ? '#1d4eff' : '#e72525';
  ctx.fillRect(-w/2, -18, w, 36);
  ctx.strokeStyle = '#000'; ctx.lineWidth = 2;
  ctx.strokeRect(-w/2, -18, w, 36);
  if (Math.abs(spin) > 0.4) {
    ctx.fillStyle = '#ffd24a';
    ctx.font = 'bold 14px Courier New';
    ctx.textAlign = 'center';
    ctx.fillText(spin > 0 ? 'GOAL' : 'WIN!', 0, 5);
  }
  ctx.restore();

  // Bushes along the ground for visual interest (cheap procedural)
  for (let bx = (Math.floor(camX / 220) * 220) - 220; bx < camX + W + 220; bx += 220) {
    if (bx < 100 || bx > levelLen() - 200) continue;
    const by = groundY(bx) - 6;
    // Bush
    ctx.fillStyle = '#3aa83a';
    ctx.beginPath();
    ctx.arc(bx,      by, 12, 0, Math.PI*2);
    ctx.arc(bx + 12, by, 14, 0, Math.PI*2);
    ctx.arc(bx + 24, by, 12, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#5fd95f';
    ctx.beginPath();
    ctx.arc(bx + 6,  by - 4, 5, 0, Math.PI*2);
    ctx.arc(bx + 18, by - 4, 5, 0, Math.PI*2);
    ctx.fill();
    // Flower
    if ((bx / 220 | 0) % 3 === 0) {
      const fx = bx + 36, fy = groundY(fx) - 4;
      ctx.strokeStyle = '#3aa83a'; ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(fx, fy); ctx.lineTo(fx, fy - 12); ctx.stroke();
      ctx.fillStyle = '#ff5252';
      ctx.beginPath(); ctx.arc(fx, fy - 14, 4, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#fff8c8';
      ctx.beginPath(); ctx.arc(fx, fy - 14, 1.5, 0, Math.PI*2); ctx.fill();
    }
  }

  // Sonic
  drawSonic();

  // Particles
  for (const p of particles) {
    const a = p.life / p.max;
    if (p.kind === 'spark') {
      ctx.fillStyle = `rgba(255,236,160,${a})`;
      ctx.fillRect(p.x - 1, p.y - 1, 3, 3);
    } else {
      ctx.fillStyle = `rgba(255,240,220,${a * 0.7})`;
      ctx.beginPath(); ctx.arc(p.x, p.y, 3 * a + 1, 0, Math.PI*2); ctx.fill();
    }
  }

  ctx.restore();

  // Respawn fade
  if (respawnFade > 0) {
    ctx.fillStyle = `rgba(0,0,0,${respawnFade / 60})`;
    ctx.fillRect(0, 0, W, H);
  }

  drawHUD();

  if (levelTransitionTimer > 0) drawLevelClearOverlay();
  if (state === 'intro' && levelIntroTimer > 0) drawIntroCard();
  if (state === 'paused') drawPausedOverlay();
}

requestAnimationFrame(tick);
</script>
</body>
</html>
