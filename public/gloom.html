    ctx.fillRect(rx(11) + legOff, ry(60) + dBob, rs(14), rs(3));
    ctx.fillRect(rx(38) - legOff, ry(60) + dBob, rs(14), rs(3));
    ctx.fillStyle = '#4a2025';
    ctx.fillRect(rx(17) + legOff, ry(60) + dBob, rs(1), rs(3));
    ctx.fillRect(rx(44) - legOff, ry(60) + dBob, rs(1), rs(3));
    // Massive body
    ctx.fillStyle = '#c06080';
    ctx.fillRect(rx(10), ry(26) + dBob, rs(44), rs(24));
    ctx.fillStyle = '#a04060';
    ctx.fillRect(rx(10), ry(40) + dBob, rs(44), rs(10));
    ctx.fillStyle = '#d878a0';
    ctx.fillRect(rx(10), ry(26) + dBob, rs(44), rs(3));
    // Muscle striations
    ctx.fillStyle = '#8a3050';
    for (let i = 0; i < 5; i++) ctx.fillRect(rx(14 + i * 7), ry(32) + dBob, rs(2), rs(12));
    // Belly scars
    ctx.fillStyle = '#5a1020';
    ctx.fillRect(rx(22), ry(42) + dBob, rs(12), rs(1));
    ctx.fillRect(rx(30), ry(46) + dBob, rs(14), rs(1));
    // Spine ridges (bony protrusions)
    ctx.fillStyle = '#e8b080';
    for (let i = 0; i < 5; i++) {
      ctx.beginPath(); ctx.moveTo(rx(16 + i * 7), ry(26) + dBob); ctx.lineTo(rx(19 + i * 7), ry(20) + dBob); ctx.lineTo(rx(22 + i * 7), ry(26) + dBob); ctx.fill();
    }
    // Arms
    ctx.fillStyle = '#a04060';
    ctx.fillRect(rx(6) + legOff * 0.3, ry(34) + dBob, rs(9), rs(18));
    ctx.fillRect(rx(49) - legOff * 0.3, ry(34) + dBob, rs(9), rs(18));
    // Claws
    ctx.fillStyle = '#e8b080';
    for (let c = 0; c < 3; c++) {
      ctx.beginPath(); ctx.moveTo(rx(6 - c) + legOff * 0.3, ry(52) + dBob); ctx.lineTo(rx(4 - c) + legOff * 0.3, ry(57) + dBob); ctx.lineTo(rx(8 - c) + legOff * 0.3, ry(52) + dBob); ctx.fill();
      ctx.beginPath(); ctx.moveTo(rx(56 + c) - legOff * 0.3, ry(52) + dBob); ctx.lineTo(rx(58 + c) - legOff * 0.3, ry(57) + dBob); ctx.lineTo(rx(54 + c) - legOff * 0.3, ry(52) + dBob); ctx.fill();
    }
    // Head — massive jaw
    ctx.fillStyle = '#c06080';
    ctx.beginPath(); ctx.arc(rx(32), ry(20) + dBob, rs(16), 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#a04060';
    ctx.beginPath(); ctx.arc(rx(32), ry(24) + dBob, rs(16), 0.2, Math.PI - 0.2); ctx.fill();
    // Horns — bull-like
    ctx.fillStyle = '#e8b080';
    ctx.beginPath(); ctx.moveTo(rx(18), ry(12) + dBob); ctx.lineTo(rx(12), ry(2) + dBob); ctx.lineTo(rx(22), ry(14) + dBob); ctx.fill();
    ctx.beginPath(); ctx.moveTo(rx(46), ry(12) + dBob); ctx.lineTo(rx(52), ry(2) + dBob); ctx.lineTo(rx(42), ry(14) + dBob); ctx.fill();
    ctx.fillStyle = '#c08050';
    ctx.beginPath(); ctx.moveTo(rx(18), ry(12) + dBob); ctx.lineTo(rx(14), ry(6) + dBob); ctx.lineTo(rx(20), ry(13) + dBob); ctx.fill();
    // Eyes — small red beads
    ctx.fillStyle = state === ES.PAIN ? '#fff' : '#ff2020';
    ctx.fillRect(rx(24), ry(16) + dBob, rs(5), rs(4));
    ctx.fillRect(rx(35), ry(16) + dBob, rs(5), rs(4));
    ctx.fillStyle = state === ES.PAIN ? '#fff' : '#ff8040';
    ctx.fillRect(rx(25), ry(17) + dBob, rs(2), rs(1));
    ctx.fillRect(rx(36), ry(17) + dBob, rs(2), rs(1));
    ctx.fillStyle = '#100';
    ctx.fillRect(rx(26), ry(17) + dBob, rs(1), rs(2));
    ctx.fillRect(rx(37), ry(17) + dBob, rs(1), rs(2));
    // Snarling mouth (huge jaw)
    ctx.fillStyle = '#3a0a0a';
    ctx.fillRect(rx(18), ry(24) + dBob, rs(28), rs(10));
    // Rows of teeth
    ctx.fillStyle = '#ede0c0';
    for (let i = 0; i < 7; i++) {
      ctx.beginPath(); ctx.moveTo(rx(19 + i * 4), ry(24) + dBob); ctx.lineTo(rx(21 + i * 4), ry(30) + dBob); ctx.lineTo(rx(23 + i * 4), ry(24) + dBob); ctx.fill();
      ctx.beginPath(); ctx.moveTo(rx(19 + i * 4), ry(34) + dBob); ctx.lineTo(rx(21 + i * 4), ry(28) + dBob); ctx.lineTo(rx(23 + i * 4), ry(34) + dBob); ctx.fill();
    }
    // Drool
    if (state === ES.ATTACK) {
      ctx.fillStyle = 'rgba(200,220,200,0.7)';
      ctx.fillRect(rx(26), ry(34) + dBob, rs(2), rs(6));
      ctx.fillRect(rx(36), ry(34) + dBob, rs(2), rs(8));
    }

  } else if (type === 'caco') {
    const floatY = Math.sin(anim * 2) * 3 * s;
    const grad = ctx.createRadialGradient(rx(28), ry(24) + floatY, rs(3), rx(32), ry(30) + floatY, rs(22));
    grad.addColorStop(0, '#e84848');
    grad.addColorStop(0.5, '#c03030');
    grad.addColorStop(1, '#601010');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(rx(32), ry(30) + floatY, rs(22), 0, Math.PI * 2); ctx.fill();
    // Surface detail bumps
    ctx.fillStyle = 'rgba(180,40,40,0.4)';
    ctx.beginPath(); ctx.arc(rx(20), ry(35) + floatY, rs(4), 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(rx(44), ry(28) + floatY, rs(3), 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#a02828';
    ctx.beginPath(); ctx.moveTo(rx(18), ry(12) + floatY); ctx.lineTo(rx(14), ry(0) + floatY); ctx.lineTo(rx(22), ry(14) + floatY); ctx.fill();
    ctx.beginPath(); ctx.moveTo(rx(42), ry(12) + floatY); ctx.lineTo(rx(50), ry(0) + floatY); ctx.lineTo(rx(46), ry(14) + floatY); ctx.fill();
    // Third horn
    ctx.beginPath(); ctx.moveTo(rx(30), ry(9) + floatY); ctx.lineTo(rx(32), ry(-2) + floatY); ctx.lineTo(rx(34), ry(9) + floatY); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(rx(32), ry(24) + floatY, rs(8), 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#0c0';
    ctx.beginPath(); ctx.arc(rx(32), ry(24) + floatY, rs(5), 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(rx(32), ry(24) + floatY, rs(3), 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(rx(30), ry(22) + floatY, rs(1.5), 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#400';
    ctx.beginPath(); ctx.arc(rx(32), ry(40) + floatY, rs(10), 0.1, Math.PI - 0.1); ctx.fill();
    ctx.fillStyle = '#ddd';
    for (let i = 0; i < 4; i++) ctx.fillRect(rx(24 + i * 5), ry(39) + floatY, rs(2), rs(4));
    if (state === ES.ATTACK) {
      ctx.fillStyle = 'rgba(255, 100, 50, 0.7)';
      ctx.beginPath(); ctx.arc(rx(32), ry(50) + floatY, rs(6), 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = 'rgba(255, 200, 100, 0.5)';
      ctx.beginPath(); ctx.arc(rx(32), ry(50) + floatY, rs(3), 0, Math.PI * 2); ctx.fill();
    }
  }

  // Hit flash: bright white overlay
  if (e.hitFlash > 0 && state !== ES.DEAD) {
    ctx.fillStyle = `rgba(255, 255, 255, ${Math.min(0.6, e.hitFlash * 5)})`;
    ctx.fillRect(rx(8), ry(0), rs(48), rs(64));
  }

  // Pain red tint
  if (state === ES.PAIN) {
    ctx.fillStyle = 'rgba(255, 0, 0, 0.25)';
    ctx.fillRect(rx(8), ry(0), rs(48), rs(64));
  }

  if (state === ES.DEAD) ctx.restore();
  ctx.globalAlpha = 1;
}

// ============================================================================
// SECTION 17: PICKUP & PROJECTILE SPRITES
// ============================================================================
function drawPickupSprite(ctx, p, cx, cy, size, shade) {
  const s = size / 64;
  const bob = Math.sin(p.bobTime * 3) * 3 * s;
  ctx.globalAlpha = shade;

  if (p.type === 'health') {
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx - 8 * s, cy - 8 * s + bob, 16 * s, 16 * s);
    ctx.fillStyle = '#e22';
    ctx.fillRect(cx - 2 * s, cy - 7 * s + bob, 4 * s, 14 * s);
    ctx.fillRect(cx - 7 * s, cy - 2 * s + bob, 14 * s, 4 * s);
  } else if (p.type === 'ammo') {
    ctx.fillStyle = '#cc8800';
    ctx.fillRect(cx - 7 * s, cy - 5 * s + bob, 14 * s, 12 * s);
    ctx.fillStyle = '#ffaa00';
    ctx.fillRect(cx - 6 * s, cy - 4 * s + bob, 12 * s, 2 * s);
    // Bullet shapes
    ctx.fillStyle = '#886600';
    for (let i = 0; i < 3; i++) {
      ctx.fillRect(cx - 4 * s + i * 4 * s, cy + bob, 2 * s, 4 * s);
      ctx.fillStyle = '#cc9900';
      ctx.beginPath(); ctx.arc(cx - 3 * s + i * 4 * s, cy + bob, s, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#886600';
    }
  } else if (p.type === 'armor') {
    ctx.fillStyle = '#2266cc';
    ctx.beginPath();
    ctx.moveTo(cx, cy - 10 * s + bob); ctx.lineTo(cx + 9 * s, cy - 4 * s + bob);
    ctx.lineTo(cx + 7 * s, cy + 8 * s + bob); ctx.lineTo(cx, cy + 12 * s + bob);
    ctx.lineTo(cx - 7 * s, cy + 8 * s + bob); ctx.lineTo(cx - 9 * s, cy - 4 * s + bob);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = '#44aaff';
    ctx.beginPath();
    ctx.moveTo(cx, cy - 6 * s + bob); ctx.lineTo(cx + 5 * s, cy - 2 * s + bob);
    ctx.lineTo(cx, cy + 6 * s + bob); ctx.lineTo(cx - 5 * s, cy - 2 * s + bob);
    ctx.closePath(); ctx.fill();
  } else if (p.type === 'shotgun') {
    ctx.fillStyle = '#8B5A2B';
    ctx.fillRect(cx - 12 * s, cy - 2 * s + bob, 24 * s, 4 * s);
    ctx.fillStyle = '#555';
    ctx.fillRect(cx + 8 * s, cy - 3 * s + bob, 6 * s, 6 * s);
    ctx.fillStyle = '#6B4A1B';
    ctx.fillRect(cx - 4 * s, cy + 2 * s + bob, 8 * s, 5 * s);
  } else if (p.type === 'chaingun') {
    ctx.fillStyle = '#666';
    ctx.fillRect(cx - 14 * s, cy - 2 * s + bob, 28 * s, 4 * s);
    ctx.fillStyle = '#888';
    ctx.fillRect(cx - 14 * s, cy - 4 * s + bob, 28 * s, 2 * s);
    ctx.fillRect(cx - 14 * s, cy + 2 * s + bob, 28 * s, 2 * s);
    ctx.fillStyle = '#555';
    ctx.fillRect(cx + 10 * s, cy - 5 * s + bob, 6 * s, 10 * s);
  } else if (p.type === 'soulsphere') {
    const pulse = 0.8 + Math.sin(p.bobTime * 5) * 0.2;
    const rad = 13 * s * pulse;
    const grad = ctx.createRadialGradient(cx, cy + bob, 0, cx, cy + bob, rad);
    grad.addColorStop(0, 'rgba(200,240,255,0.98)');
    grad.addColorStop(0.3, 'rgba(80,160,255,0.85)');
    grad.addColorStop(0.7, 'rgba(40,80,200,0.5)');
    grad.addColorStop(1, 'rgba(0,20,80,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(cx, cy + bob, rad, 0, Math.PI * 2); ctx.fill();
    // Inner face silhouette
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.arc(cx - 2 * s, cy - 2 * s + bob, 2 * s, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 2 * s, cy - 2 * s + bob, 2 * s, 0, Math.PI * 2); ctx.fill();
  } else if (p.type === 'exit') {
    const pulse = 0.7 + Math.sin(p.bobTime * 4) * 0.3;
    ctx.fillStyle = game.kills >= game.totalEnemies
      ? `rgba(0, 255, 100, ${pulse * shade})`
      : `rgba(255, 50, 50, ${pulse * shade * 0.5})`;
    ctx.fillRect(cx - 10 * s, cy - 8 * s, 20 * s, 16 * s);
    ctx.fillStyle = '#000';
    ctx.font = `bold ${10 * s | 0}px monospace`;
    ctx.textAlign = 'center';
    ctx.fillText('EXIT', cx, cy + 4 * s);
  }
  ctx.globalAlpha = 1;
}

function drawTeleporterSprite(ctx, cx, cy, size, shade) {
  const s = size / 64;
  const t = performance.now() / 1000;
  ctx.globalAlpha = shade;
  // Floor ring on ground plane
  const padY = cy + 20 * s;
  for (let i = 0; i < 3; i++) {
    const ringPhase = (t * 1.5 + i / 3) % 1;
    const rw = 22 * s * ringPhase;
    const rh = 6 * s * ringPhase;
    const a = (1 - ringPhase) * 0.7;
    ctx.strokeStyle = `rgba(100,200,255,${a})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.ellipse(cx, padY, rw, rh, 0, 0, Math.PI * 2); ctx.stroke();
  }
  // Upward beam particles
  for (let i = 0; i < 4; i++) {
    const py = padY - ((t * 40 + i * 12) % 40) * s;
    const alpha = 1 - ((t * 40 + i * 12) % 40) / 40;
    ctx.fillStyle = `rgba(120,220,255,${alpha * 0.8})`;
    const px = cx + Math.sin(t * 3 + i) * 5 * s;
    ctx.fillRect(px - 1, py, 2, 2 * s);
  }
  // Glowing core
  const grad = ctx.createRadialGradient(cx, padY, 0, cx, padY, 14 * s);
  grad.addColorStop(0, 'rgba(200,240,255,0.6)');
  grad.addColorStop(1, 'rgba(60,120,255,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.ellipse(cx, padY, 14 * s, 5 * s, 0, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
}

function drawProjectileSprite(ctx, cx, cy, size, shade) {
  const s = size / 64;
  ctx.globalAlpha = shade;
  const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 8 * s);
  grad.addColorStop(0, '#fff');
  grad.addColorStop(0.3, '#ff8800');
  grad.addColorStop(0.7, '#ff2200');
  grad.addColorStop(1, 'rgba(100,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(cx, cy, 8 * s, 0, Math.PI * 2); ctx.fill();
  ctx.globalAlpha = 1;
}

// ============================================================================
// SECTION 18: HUD RENDERING
// ============================================================================
function renderHUD() {
  const ctx = X;
  const hudY = H - HUD_H;

  // Darker, more Doom-like HUD background
  ctx.fillStyle = '#1a1a1a';
  ctx.fillRect(0, hudY, W, HUD_H);
  // Top border bevels
  ctx.fillStyle = '#444';
  ctx.fillRect(0, hudY, W, 1);
  ctx.fillStyle = '#333';
  ctx.fillRect(0, hudY + 1, W, 1);

  const secW = W / 5;

  // AMMO
  ctx.fillStyle = '#777';
  ctx.font = '6px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('AMMO', secW * 0.5, hudY + 10);
  ctx.fillStyle = '#ff0';
  ctx.font = 'bold 16px monospace';
  ctx.fillText('' + player.ammo[player.weapon], secW * 0.5, hudY + 28);

  // HEALTH
  ctx.fillStyle = '#777';
  ctx.font = '6px monospace';
  ctx.fillText('HEALTH', secW * 1.5, hudY + 10);
  ctx.fillStyle = player.health > 50 ? '#0f0' : player.health > 25 ? '#ff0' : '#f00';
  ctx.font = 'bold 16px monospace';
  ctx.fillText(player.health + '%', secW * 1.5, hudY + 28);

  // FACE
  drawFace(ctx, W / 2, hudY + HUD_H / 2 + 1);

  // ARMOR
  ctx.fillStyle = '#777';
  ctx.font = '6px monospace';
  ctx.textAlign = 'center';
  ctx.fillText('ARMOR', secW * 3.5, hudY + 10);
  ctx.fillStyle = '#48f';
  ctx.font = 'bold 16px monospace';
  ctx.fillText(player.armor + '%', secW * 3.5, hudY + 28);

  // KILLS
  ctx.fillStyle = '#777';
  ctx.font = '6px monospace';
  ctx.fillText('KILLS', secW * 4.5, hudY + 10);
  ctx.fillStyle = game.kills >= game.totalEnemies ? '#0f0' : '#f88';
  ctx.font = 'bold 16px monospace';
  ctx.fillText(game.kills + '/' + game.totalEnemies, secW * 4.5, hudY + 28);

  // Weapon name
  ctx.fillStyle = '#555';
  ctx.font = '6px monospace';
  ctx.textAlign = 'left';
  ctx.fillText(WEAPONS[player.weapon].name.toUpperCase(), 4, hudY - 3);
}

function drawFace(ctx, cx, cy) {
  const healthPct = player.health / player.maxHealth;
  const r = 13;
  ctx.fillStyle = '#d4a574';
  ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
  // Darker edge
  ctx.strokeStyle = '#8a6a44';
  ctx.lineWidth = 0.5;
  ctx.stroke();
  if (healthPct < 0.5) {
    ctx.fillStyle = '#a22';
    ctx.beginPath(); ctx.arc(cx + 5, cy + 3, 2 + (1 - healthPct) * 3, 0, Math.PI * 2); ctx.fill();
  }
  if (healthPct < 0.25) {
    ctx.fillStyle = '#800';
    ctx.beginPath(); ctx.arc(cx - 4, cy - 2, 2, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx + 3, cy + 5, 3, 0, Math.PI * 2); ctx.fill();
  }
  const eyeY = cy - 3;
  const eyeSize = game.faceState === 'pain' ? 1 : 2;
  ctx.fillStyle = '#fff';
  ctx.fillRect(cx - 5 - eyeSize, eyeY - eyeSize, eyeSize * 2, eyeSize * 2);
  ctx.fillRect(cx + 5 - eyeSize, eyeY - eyeSize, eyeSize * 2, eyeSize * 2);
  if (game.faceState !== 'pain') {
    ctx.fillStyle = '#000';
    ctx.fillRect(cx - 5, eyeY - 1, 2, 2);
    ctx.fillRect(cx + 4, eyeY - 1, 2, 2);
  }
  if (game.faceState === 'pain') {
    ctx.fillStyle = '#311';
    ctx.beginPath(); ctx.arc(cx, cy + 5, 3, 0, Math.PI * 2); ctx.fill();
  } else if (game.faceState === 'grin') {
    ctx.strokeStyle = '#311'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, cy + 2, 5, 0.2, Math.PI - 0.2); ctx.stroke();
  } else if (healthPct > 0.4) {
    ctx.strokeStyle = '#311'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx, cy + 3, 4, 0.3, Math.PI - 0.3); ctx.stroke();
  } else {
    ctx.strokeStyle = '#311'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx, cy + 9, 4, Math.PI + 0.3, -0.3); ctx.stroke();
  }
}

// ============================================================================
// SECTION 19: WEAPON DISPLAY
// ============================================================================
function renderWeapon() {
  const ctx = X;
  const bobX = Math.sin(player.weaponBob) * 7;
  const bobY = Math.abs(Math.cos(player.weaponBob)) * 5;
  const baseX = W / 2 + bobX;
  const baseY = H - HUD_H + bobY + 6;
  const firing = player.weaponFrame > 0;

  // Full-screen light bloom from muzzle flash
  if (player.muzzleFlash > 0) {
    const bloomAlpha = player.muzzleFlash * 0.28;
    ctx.fillStyle = `rgba(255, 200, 80, ${bloomAlpha})`;
    ctx.fillRect(0, 0, W, H - HUD_H);
    const flashSize = 34 + Math.random() * 18;
    const flashY = baseY - 74;
    const grad = ctx.createRadialGradient(baseX, flashY, 0, baseX, flashY, flashSize);
    grad.addColorStop(0, 'rgba(255,255,240,0.98)');
    grad.addColorStop(0.15, 'rgba(255,230,120,0.85)');
    grad.addColorStop(0.4, 'rgba(255,170,40,0.5)');
    grad.addColorStop(0.75, 'rgba(240,90,10,0.2)');
    grad.addColorStop(1, 'rgba(200,50,0,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(baseX - flashSize, flashY - flashSize, flashSize * 2, flashSize * 2);
    // Cross-shaped lens glints
    const gl = player.muzzleFlash;
    ctx.fillStyle = `rgba(255,240,180,${gl * 0.9})`;
    ctx.fillRect(baseX - flashSize * 1.4, flashY - 1, flashSize * 2.8, 2);
    ctx.fillRect(baseX - 1, flashY - flashSize, 2, flashSize * 2);
  }

  const recoil = firing ? -12 : 0;

  if (player.weapon === 0) {
    // PISTOL — bigger, more detail
    ctx.fillStyle = '#5a3e17'; // wood grip back
    ctx.fillRect(baseX - 9, baseY - 30 + recoil, 18, 34);
    ctx.fillStyle = '#74541f'; // wood grip front
    ctx.fillRect(baseX - 7, baseY - 28 + recoil, 14, 30);
    // Grip checkering
    ctx.fillStyle = '#3a2a10';
    for (let gy = 0; gy < 6; gy++)
      for (let gx = 0; gx < 4; gx++)
        ctx.fillRect(baseX - 5 + gx * 3, baseY - 22 + recoil + gy * 4, 1, 1);
    // Trigger guard
    ctx.fillStyle = '#333';
    ctx.fillRect(baseX - 7, baseY - 36 + recoil, 14, 8);
    ctx.fillStyle = '#222';
    ctx.fillRect(baseX - 5, baseY - 34 + recoil, 10, 4);
    // Slide / upper receiver
    ctx.fillStyle = '#6a6a6e';
    ctx.fillRect(baseX - 10, baseY - 50 + recoil, 20, 18);
    ctx.fillStyle = '#545458';
    ctx.fillRect(baseX - 10, baseY - 38 + recoil, 20, 3);
    ctx.fillStyle = '#858588';
    ctx.fillRect(baseX - 10, baseY - 51 + recoil, 20, 2); // top highlight
    // Slide serrations
    ctx.fillStyle = '#3a3a3c';
    for (let i = 0; i < 5; i++) ctx.fillRect(baseX - 8 + i * 2, baseY - 48 + recoil, 1, 11);
    // Barrel
    ctx.fillStyle = '#3a3a3c';
    ctx.fillRect(baseX - 5, baseY - 68 + recoil, 10, 18);
    ctx.fillStyle = '#555';
    ctx.fillRect(baseX - 4, baseY - 68 + recoil, 8, 18);
    // Muzzle
    ctx.fillStyle = '#1a1a1c';
    ctx.fillRect(baseX - 3, baseY - 70 + recoil, 6, 4);
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(baseX - 2, baseY - 69 + recoil, 4, 2);
    // Front sight
    ctx.fillStyle = '#222';
    ctx.fillRect(baseX - 1, baseY - 72 + recoil, 2, 3);
  } else if (player.weapon === 1) {
    // SHOTGUN — pump-action, heftier
    ctx.fillStyle = '#4a3210';
    ctx.fillRect(baseX - 8, baseY - 20 + recoil, 16, 30);
    ctx.fillStyle = '#6a4a18';
    ctx.fillRect(baseX - 6, baseY - 18 + recoil, 12, 28);
    // Receiver
    ctx.fillStyle = '#555';
    ctx.fillRect(baseX - 12, baseY - 46 + recoil, 24, 26);
    ctx.fillStyle = '#6a6a6c';
    ctx.fillRect(baseX - 12, baseY - 46 + recoil, 24, 3);
    ctx.fillStyle = '#3c3c3e';
    ctx.fillRect(baseX - 12, baseY - 24 + recoil, 24, 4);
    // Side panel
    ctx.fillStyle = '#44444a';
    ctx.fillRect(baseX - 11, baseY - 42 + recoil, 22, 18);
    // Ejection port
    ctx.fillStyle = '#1a1a1a';
    ctx.fillRect(baseX + 2, baseY - 38 + recoil, 8, 6);
    // Pump slide
    const pumpOff = firing ? 6 : 0;
    ctx.fillStyle = '#5a3e15';
    ctx.fillRect(baseX - 10, baseY - 52 + recoil + pumpOff, 20, 8);
    ctx.fillStyle = '#7a5a25';
    ctx.fillRect(baseX - 9, baseY - 50 + recoil + pumpOff, 18, 4);
    ctx.fillStyle = '#3a2a10';
    for (let i = 0; i < 6; i++) ctx.fillRect(baseX - 8 + i * 3, baseY - 50 + recoil + pumpOff, 1, 4);
    // Twin barrels
    ctx.fillStyle = '#2a2a2c';
    ctx.fillRect(baseX - 8, baseY - 86 + recoil, 7, 36);
    ctx.fillRect(baseX + 1, baseY - 86 + recoil, 7, 36);
    ctx.fillStyle = '#444';
    ctx.fillRect(baseX - 7, baseY - 86 + recoil, 5, 36);
    ctx.fillRect(baseX + 2, baseY - 86 + recoil, 5, 36);
    // Barrel highlights
    ctx.fillStyle = '#6a6a6a';
    ctx.fillRect(baseX - 7, baseY - 86 + recoil, 1, 36);
    ctx.fillRect(baseX + 2, baseY - 86 + recoil, 1, 36);
    // Muzzles
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(baseX - 7, baseY - 88 + recoil, 5, 3);
    ctx.fillRect(baseX + 2, baseY - 88 + recoil, 5, 3);
  } else if (player.weapon === 2) {
    // CHAINGUN — rotating barrels, bulkier
    const spin = firing ? game.time * 28 : game.time * 4;
    // Receiver block
    ctx.fillStyle = '#3a3a3c';
    ctx.fillRect(baseX - 14, baseY - 46 + recoil, 28, 32);
    ctx.fillStyle = '#55555a';
    ctx.fillRect(baseX - 14, baseY - 46 + recoil, 28, 4);
    ctx.fillStyle = '#6a6a6e';
    ctx.fillRect(baseX - 13, baseY - 44 + recoil, 26, 2);
    // Vent slots
    ctx.fillStyle = '#1a1a1c';
    for (let i = 0; i < 5; i++) ctx.fillRect(baseX - 10 + i * 4, baseY - 38 + recoil, 3, 14);
    // Ammo feed
    ctx.fillStyle = '#6a5020';
    ctx.fillRect(baseX + 10, baseY - 30 + recoil, 6, 18);
    ctx.fillStyle = '#8a6a30';
    for (let i = 0; i < 4; i++) ctx.fillRect(baseX + 11, baseY - 28 + recoil + i * 4, 4, 2);
    // Rotating barrel cluster (6 barrels)
    ctx.fillStyle = '#3a3a3c';
    ctx.beginPath(); ctx.arc(baseX, baseY - 46 + recoil, 10, 0, Math.PI * 2); ctx.fill();
    for (let i = 0; i < 6; i++) {
      const a = spin + i * Math.PI / 3;
      const bx = Math.cos(a) * 6, by = Math.sin(a) * 6;
      ctx.fillStyle = '#555';
      ctx.fillRect(baseX + bx - 2, baseY - 82 + recoil + by, 4, 36);
      ctx.fillStyle = '#777';
      ctx.fillRect(baseX + bx - 2, baseY - 82 + recoil + by, 1, 36);
    }
    // Central hub
    ctx.fillStyle = '#6a6a6e';
    ctx.beginPath(); ctx.arc(baseX, baseY - 46 + recoil, 4, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#1a1a1a';
    ctx.beginPath(); ctx.arc(baseX, baseY - 46 + recoil, 2, 0, Math.PI * 2); ctx.fill();
    // Grip
    ctx.fillStyle = '#5a3e15';
    ctx.fillRect(baseX - 6, baseY - 14 + recoil, 12, 22);
    ctx.fillStyle = '#6a4a18';
    ctx.fillRect(baseX - 4, baseY - 12 + recoil, 8, 20);
  }

  // Gloved hand
  ctx.fillStyle = '#4a3828';
  ctx.fillRect(baseX - 12, baseY + 1, 24, 14);
  ctx.fillStyle = '#6a5038';
  ctx.fillRect(baseX - 12, baseY + 1, 24, 3);
  // Fingers
  ctx.fillStyle = '#3a2818';
  for (let i = 0; i < 5; i++) ctx.fillRect(baseX - 10 + i * 5, baseY + 8, 3, 7);
  ctx.fillStyle = '#6a5038';
  for (let i = 0; i < 5; i++) ctx.fillRect(baseX - 10 + i * 5, baseY + 8, 1, 2);
}

// ============================================================================
// SECTION 20: MINIMAP
// ============================================================================
function renderMinimap() {
  const ctx = X;
  const mapSize = 48;
  const scale = mapSize / MW;
  const ox = W - mapSize - 4, oy = 4;

  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(ox - 1, oy - 1, mapSize + 2, mapSize + 2);

  const colors = ['', '#666', '#844', '#568', '#844', '#653', '#3a5'];
  for (let y = 0; y < MH; y++) {
    for (let x = 0; x < MW; x++) {
      if (MAP[y][x] > 0) {
        ctx.fillStyle = colors[MAP[y][x]] || '#666';
        ctx.fillRect(ox + x * scale, oy + y * scale, Math.ceil(scale), Math.ceil(scale));
      }
    }
  }

  for (const e of enemies) {
    if (e.state === ES.DEAD || !e.active) continue;
    ctx.fillStyle = '#f44';
    ctx.fillRect(ox + e.x * scale - 0.5, oy + e.y * scale - 0.5, 2, 2);
  }

  const px = ox + player.x * scale;
  const py = oy + player.y * scale;
  ctx.fillStyle = '#0f0';
  ctx.beginPath();
  ctx.moveTo(px + player.dirX * 3, py + player.dirY * 3);
  ctx.lineTo(px - player.dirX * 1.5 + player.dirY * 1.5, py - player.dirY * 1.5 - player.dirX * 1.5);
  ctx.lineTo(px - player.dirX * 1.5 - player.dirY * 1.5, py - player.dirY * 1.5 + player.dirX * 1.5);
  ctx.fill();
}

// ============================================================================
// SECTION 21: GAME UPDATE
// ============================================================================
function updateGame(dt) {
  if (game.state !== ST.PLAY) return;
  game.time += dt;

  // Screen shake decay
  if (game.shakeIntensity > 0) {
    game.shakeX = (Math.random() - 0.5) * game.shakeIntensity;
    game.shakeY = (Math.random() - 0.5) * game.shakeIntensity;
    game.shakeIntensity *= 0.85;
    if (game.shakeIntensity < 0.2) game.shakeIntensity = 0;
  } else {
    game.shakeX = 0; game.shakeY = 0;
  }

  if (game.hitMarker > 0) game.hitMarker -= dt;

  // Mouse look
  if (mouseDX !== 0) {
    rotatePlayer(mouseDX * MSENS);
    mouseDX = 0;
  }

  if (keys['ArrowLeft']) rotatePlayer(ROT_SPD * dt);
  if (keys['ArrowRight']) rotatePlayer(-ROT_SPD * dt);

  let moving = false;
  if (keys['KeyW'] || keys['ArrowUp']) {
    movePlayer(player.dirX * MOVE_SPD, player.dirY * MOVE_SPD, dt);
    moving = true;
  }
  if (keys['KeyS'] || keys['ArrowDown']) {
    movePlayer(-player.dirX * MOVE_SPD * 0.7, -player.dirY * MOVE_SPD * 0.7, dt);
    moving = true;
  }
  if (keys['KeyA'] || keys['KeyQ']) {
    // Strafe LEFT — move along negative plane vector
    movePlayer(-player.planeX * STRAFE_SPD, -player.planeY * STRAFE_SPD, dt);
    moving = true;
  }
  if (keys['KeyD'] || keys['KeyE']) {
    // Strafe RIGHT — move along positive plane vector
    movePlayer(player.planeX * STRAFE_SPD, player.planeY * STRAFE_SPD, dt);
    moving = true;
  }

  if (moving) {
    player.weaponBob += dt * 9;
    footstep();
  } else {
    player.weaponBob *= 0.88;
  }

  if (player.fireCooldown > 0) player.fireCooldown -= dt;
  if (player.weaponFrame > 0) { player.weaponFrame -= dt * 10; if (player.weaponFrame < 0) player.weaponFrame = 0; }
  if (player.muzzleFlash > 0) player.muzzleFlash -= dt;

  // Auto-fire: chaingun with mouse held or space
  if (WEAPONS[player.weapon].auto && (keys['Space']) && player.fireCooldown <= 0) {
    fireWeapon();
  }

  if (keys['Digit1'] && player.hasWeapon[0]) player.weapon = 0;
  if (keys['Digit2'] && player.hasWeapon[1]) player.weapon = 1;
  if (keys['Digit3'] && player.hasWeapon[2]) player.weapon = 2;
  if (keys['BracketRight']) { switchWeapon(1); keys['BracketRight'] = false; }
  if (keys['BracketLeft']) { switchWeapon(-1); keys['BracketLeft'] = false; }

  if (keys['Space'] && player.fireCooldown <= 0 && !WEAPONS[player.weapon].auto) {
    fireWeapon();
    keys['Space'] = false;
  }

  for (const e of enemies) updateEnemy(e, dt);

  for (const pr of projectiles) {
    if (!pr.active) continue;
    pr.x += pr.vx * dt; pr.y += pr.vy * dt;
    pr.life -= dt;
    if (pr.life <= 0) { pr.active = false; continue; }
    if (MAP[Math.floor(pr.y)] && MAP[Math.floor(pr.y)][Math.floor(pr.x)] > 0) { pr.active = false; continue; }
    const dx = pr.x - player.x, dy = pr.y - player.y;
    if (dx * dx + dy * dy < PR * PR * 4) {
      playerTakeDamage(pr.dmg * (0.7 + Math.random() * 0.6) | 0);
      pr.active = false;
    }
  }

  for (const p of pickups) {
    if (!p.active) continue;
    p.bobTime += dt;
    const dx = p.x - player.x, dy = p.y - player.y;
    if (dx * dx + dy * dy < 0.6) {
      let picked = false;
      if (p.type === 'health' && player.health < player.maxHealth) {
        player.health = Math.min(player.maxHealth, player.health + 30);
        picked = true;
      } else if (p.type === 'ammo') {
        player.ammo[0] += 25; player.ammo[1] += 10; player.ammo[2] += 40;
        picked = true;
      } else if (p.type === 'armor' && player.armor < 100) {
        player.armor = Math.min(100, player.armor + 50);
        picked = true;
      } else if (p.type === 'shotgun') {
        player.hasWeapon[1] = true; player.ammo[1] += 10; player.weapon = 1;
        picked = true;
      } else if (p.type === 'chaingun') {
        player.hasWeapon[2] = true; player.ammo[2] += 60; player.weapon = 2;
        picked = true;
      } else if (p.type === 'soulsphere') {
        player.maxHealth = Math.max(player.maxHealth, 250);
        player.health = Math.min(player.maxHealth, player.health + 100);
        picked = true;
      } else if (p.type === 'exit') {
        if (game.kills >= game.totalEnemies) { game.state = ST.WIN; snd('pickup'); }
      }
      if (picked) {
        p.active = false; snd('pickup');
        game.faceState = 'grin'; game.faceTimer = 0.5;
      }
    }
  }

  // Teleporter pads (cooldown prevents ping-pong between paired pads)
  if (game.teleportCooldown > 0) game.teleportCooldown -= dt;
  if (game.teleportCooldown <= 0) {
    const px = player.x, py = player.y;
    for (const t of teleporters) {
      const ddx = px - (t.x + 0.5), ddy = py - (t.y + 0.5);
      if (ddx * ddx + ddy * ddy < 0.35) {
        player.x = t.tx + 0.5;
        player.y = t.ty + 0.5;
        game.shakeIntensity = Math.max(game.shakeIntensity, 4);
        game.pickupFlash = 0.4;
        game.teleportCooldown = 1.2;   // must step off destination pad first
        snd('pickup');
        break;
      }
    }
  }

  if (game.faceTimer > 0) { game.faceTimer -= dt; if (game.faceTimer <= 0) game.faceState = 'normal'; }
  if (game.damageFlash > 0) game.damageFlash -= dt;

  // Heartbeat at low health — faster as HP drops
  if (player.health < 40 && player.health > 0) {
    heartbeatTimer -= dt;
    if (heartbeatTimer <= 0) {
      heartbeat();
      // 1.2s at 40hp, ramps to 0.5s at 0hp
      heartbeatTimer = 0.5 + (player.health / 40) * 0.7;
    }
  } else {
    heartbeatTimer = 0;
  }

  updateParticles(dt);
}

// Persistent embers for the title screen
const titleEmbers = [];
for (let i = 0; i < 40; i++) {
  titleEmbers.push({
    x: Math.random() * W,
    y: Math.random() * H,
    vy: -0.2 - Math.random() * 0.5,
    vx: (Math.random() - 0.5) * 0.2,
    life: Math.random(),
    size: Math.random() < 0.3 ? 2 : 1,
  });
}

let titleLightning = 0;

function renderTitle() {
  const t = performance.now() / 1000;

  // === Dark gradient backdrop (deep red/black) ===
  const bg = X.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#080004');
  bg.addColorStop(0.5, '#200408');
  bg.addColorStop(1, '#400808');
  X.fillStyle = bg;
  X.fillRect(0, 0, W, H);

  // === Random lightning flash ===
  if (Math.random() < 0.008) titleLightning = 0.6;
  if (titleLightning > 0) {
    X.fillStyle = `rgba(255, 220, 200, ${titleLightning * 0.5})`;
    X.fillRect(0, 0, W, H);
    titleLightning -= 0.04;
  }

  // === Pentagram behind title ===
  X.save();
  X.translate(W / 2, 58);
  const pentR = 50 + Math.sin(t * 2) * 2;
  X.strokeStyle = `rgba(180, 20, 20, ${0.25 + Math.sin(t * 1.5) * 0.1})`;
  X.lineWidth = 1.2;
  X.beginPath();
  for (let i = 0; i < 5; i++) {
    const a1 = (-Math.PI / 2) + (i * 2) * (Math.PI * 2 / 5);
    const a2 = (-Math.PI / 2) + ((i * 2 + 2) % 5) * (Math.PI * 2 / 5);
    if (i === 0) X.moveTo(Math.cos(a1) * pentR, Math.sin(a1) * pentR);
    X.lineTo(Math.cos(a2) * pentR, Math.sin(a2) * pentR);
  }
  X.closePath(); X.stroke();
  // Circle around it
  X.beginPath();
  X.arc(0, 0, pentR + 4, 0, Math.PI * 2);
  X.stroke();
  X.restore();

  // === Towering fire at the bottom ===
  for (let x = 0; x < W; x++) {
    const h = 40 + Math.sin(x * 0.08 + t * 3) * 16 + Math.sin(x * 0.21 + t * 5) * 9 + Math.sin(x * 0.05 + t * 1.5) * 12;
    const y0 = H - h;
    for (let y = y0; y < H; y++) {
      const i = (y - y0) / h;
      const n = (Math.sin(x * 0.3 + t * 8 + y * 0.2) + 1) * 0.5;
      const flick = 0.7 + n * 0.4;
      const r = Math.min(255, 255 * i * flick);
      const g = Math.min(255, 180 * i * i * flick);
      const b = Math.min(255, 40 * i * i * i);
      X.fillStyle = `rgb(${r | 0},${g | 0},${b | 0})`;
      X.fillRect(x, y, 1, 1);
    }
  }

  // === Floating embers ===
  for (const e of titleEmbers) {
    e.y += e.vy; e.x += e.vx; e.life -= 0.008;
    if (e.y < 0 || e.life <= 0) {
      e.x = Math.random() * W; e.y = H - 10 - Math.random() * 30;
      e.vy = -0.3 - Math.random() * 0.6; e.life = 1;
    }
    const a = Math.min(1, e.life * 1.5);
    X.fillStyle = `rgba(255, ${120 + Math.random() * 80 | 0}, ${30 + Math.random() * 40 | 0}, ${a})`;
    X.fillRect(e.x | 0, e.y | 0, e.size, e.size);
  }

  // === Looming horned silhouette behind title ===
  const silAlpha = 0.35 + Math.sin(t * 0.8) * 0.12;
  X.fillStyle = `rgba(20, 0, 0, ${silAlpha})`;
  X.save();
  X.translate(W / 2, 80);
  // Horns
  X.beginPath();
  X.moveTo(-28, -30); X.lineTo(-42, -60); X.lineTo(-22, -38); X.closePath(); X.fill();
  X.beginPath();
  X.moveTo(28, -30); X.lineTo(42, -60); X.lineTo(22, -38); X.closePath(); X.fill();
  // Head
  X.beginPath(); X.arc(0, -20, 28, 0, Math.PI * 2); X.fill();
  // Shoulders
  X.beginPath();
  X.moveTo(-55, 30); X.lineTo(-40, 0); X.lineTo(40, 0); X.lineTo(55, 30); X.closePath(); X.fill();
  // Glowing eyes on silhouette
  const eyePulse = 0.6 + Math.sin(t * 3) * 0.4;
  X.fillStyle = `rgba(255, 40, 20, ${eyePulse})`;
  X.fillRect(-11, -22, 5, 3);
  X.fillRect(7, -22, 5, 3);
  X.restore();

  // === Title text — layered with drip and flicker ===
  X.textAlign = 'center';
  const flicker = 1 + Math.sin(t * 30) * 0.04 + Math.sin(t * 17) * 0.03;
  // Deep shadow
  X.fillStyle = '#100';
  X.font = 'bold 52px monospace';
  X.fillText('GLOOM', W / 2 + 4, 62);
  // Mid shadow
  X.fillStyle = `rgba(80, 0, 0, 0.9)`;
  X.font = 'bold 50px monospace';
  X.fillText('GLOOM', W / 2 + 2, 60);
  // Main
  X.fillStyle = `rgb(${220 * flicker | 0}, ${30 * flicker | 0}, ${20 * flicker | 0})`;
  X.font = 'bold 48px monospace';
  X.fillText('GLOOM', W / 2, 58);
  // Highlight
  X.fillStyle = `rgba(255, ${180 + Math.sin(t * 4) * 20 | 0}, 100, 0.6)`;
  X.font = 'bold 44px monospace';
  X.fillText('GLOOM', W / 2, 56);

  // Blood drip from G
  const dripLen = (Math.sin(t * 0.5) * 0.5 + 0.5) * 18;
  X.fillStyle = '#8a0808';
  X.fillRect(W / 2 - 54, 60, 2, dripLen);
  X.fillStyle = '#c01010';
  X.fillRect(W / 2 - 54, 60 + dripLen - 2, 2, 2);
  // Second drip from M
  const drip2 = ((t * 0.7 + 0.3) % 1) * 22;
  X.fillStyle = '#8a0808';
  X.fillRect(W / 2 + 42, 60, 2, drip2);

  // Subtitle
  X.fillStyle = '#c88';
  X.font = 'bold 9px monospace';
  X.fillText('HALLS OF THE DAMNED', W / 2, 76);
  X.fillStyle = `rgba(255, 200, 160, ${0.4 + Math.sin(t * 2) * 0.2})`;
  X.font = '9px monospace';
  X.fillText('HALLS OF THE DAMNED', W / 2, 76);

  // === Skulls flanking with glowing eyes ===
  drawTitleSkull(X, W / 2 - 100, 52, 14, t);
  drawTitleSkull(X, W / 2 + 100, 52, 14, t);

  // === Difficulty selection — boxed ===
  X.fillStyle = 'rgba(0, 0, 0, 0.65)';
  X.fillRect(W / 2 - 70, 94, 140, 54);
  X.strokeStyle = 'rgba(150, 30, 30, 0.9)';
  X.lineWidth = 1;
  X.strokeRect(W / 2 - 70, 94, 140, 54);
  // Inner corner ticks
  X.fillStyle = '#822';
  X.fillRect(W / 2 - 70, 94, 4, 1); X.fillRect(W / 2 - 70, 94, 1, 4);
  X.fillRect(W / 2 + 66, 94, 4, 1); X.fillRect(W / 2 + 69, 94, 1, 4);
  X.fillRect(W / 2 - 70, 147, 4, 1); X.fillRect(W / 2 - 70, 144, 1, 4);
  X.fillRect(W / 2 + 66, 147, 4, 1); X.fillRect(W / 2 + 69, 144, 1, 4);

  X.fillStyle = '#c44';
  X.font = 'bold 8px monospace';
  X.fillText('- SELECT YOUR DOOM -', W / 2, 104);

  const labels = ['I - BRING IT', 'II - TASTE MY BLADE', 'III - NIGHTMARE'];
  const colors = ['#4f4', '#fc4', '#f44'];
  for (let i = 0; i < 3; i++) {
    const selected = i === game.difficulty;
    const ty = 118 + i * 10;
    if (selected) {
      // Arrow indicators
      X.fillStyle = colors[i];
      X.font = 'bold 9px monospace';
      X.fillText('>  ' + labels[i] + '  <', W / 2, ty);
    } else {
      X.fillStyle = '#555';
      X.font = '8px monospace';
      X.fillText(labels[i], W / 2, ty);
    }
  }

  // === Controls panel ===
  X.fillStyle = '#866';
  X.font = '6px monospace';
  X.fillText('W/S . MOVE    A/D or Q/E . STRAFE    ARROWS . TURN', W / 2, 158);
  X.fillText('MOUSE . AIM    CLICK / SPACE . FIRE    1-3 . WEAPONS', W / 2, 168);

  // === PRESS START prompt ===
  if (Math.sin(t * 5) > -0.3) {
    // Glow box
    X.fillStyle = `rgba(100, 0, 0, ${0.3 + Math.sin(t * 5) * 0.15})`;
    X.fillRect(W / 2 - 90, 178, 180, 14);
    X.fillStyle = '#ff0';
    X.font = 'bold 9px monospace';
    X.fillText('>>> CLICK OR PRESS SPACE TO ENTER <<<', W / 2, 188);
  }

  // === Vignette for mood ===
  const vg = X.createRadialGradient(W / 2, H / 2, W * 0.25, W / 2, H / 2, W * 0.7);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  X.fillStyle = vg;
  X.fillRect(0, 0, W, H);

  // Scanlines
  X.fillStyle = 'rgba(0, 0, 0, 0.15)';
  for (let y = 0; y < H; y += 2) X.fillRect(0, y, W, 1);
}

function drawTitleSkull(ctx, cx, cy, size, t) {
  const s = size / 12;
  // Shadow
  ctx.fillStyle = '#100';
  ctx.beginPath(); ctx.arc(cx + 1, cy + 1, 8 * s, 0, Math.PI * 2); ctx.fill();
  // Skull
  ctx.fillStyle = '#cbcbbc';
  ctx.beginPath(); ctx.arc(cx, cy, 8 * s, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#a8a898';
  ctx.beginPath(); ctx.arc(cx, cy + 2 * s, 7 * s, 0.1, Math.PI - 0.1); ctx.fill();
  // Jaw
  ctx.fillStyle = '#b8b8a8';
  ctx.beginPath(); ctx.arc(cx, cy + 4 * s, 6 * s, 0, Math.PI); ctx.fill();
  // Cracks
  ctx.strokeStyle = '#332';
  ctx.lineWidth = 0.5;
  ctx.beginPath();
  ctx.moveTo(cx - 4 * s, cy - 7 * s); ctx.lineTo(cx - 2 * s, cy - 3 * s);
  ctx.lineTo(cx - 4 * s, cy + 1 * s); ctx.stroke();
  // Eye sockets — pulsing red glow
  const eyeGlow = 0.6 + Math.sin(t * 2 + cx) * 0.4;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(cx - 3 * s, cy - 1 * s, 2.8 * s, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 3 * s, cy - 1 * s, 2.8 * s, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = `rgba(255, 40, 20, ${eyeGlow})`;
  ctx.beginPath(); ctx.arc(cx - 3 * s, cy - 1 * s, 1.5 * s, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 3 * s, cy - 1 * s, 1.5 * s, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = `rgba(255, 200, 180, ${eyeGlow})`;
  ctx.fillRect(cx - 3 * s - 0.5, cy - 1 * s - 0.5, 1, 1);
  ctx.fillRect(cx + 3 * s - 0.5, cy - 1 * s - 0.5, 1, 1);
  // Nose cavity
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.moveTo(cx, cy + 1 * s); ctx.lineTo(cx - 1.5 * s, cy + 4 * s); ctx.lineTo(cx + 1.5 * s, cy + 4 * s); ctx.fill();
  // Teeth
  ctx.fillStyle = '#d8d8c0';
  ctx.fillRect(cx - 4 * s, cy + 5 * s, 8 * s, 2.5 * s);
  ctx.fillStyle = '#000';
  for (let i = 0; i < 5; i++) ctx.fillRect(cx - 3.5 * s + i * 1.8 * s, cy + 5 * s, 0.6 * s, 2.5 * s);
}

function drawSkull(ctx, cx, cy, size) {
  const s = size / 12;
  ctx.fillStyle = '#bbb';
  ctx.beginPath(); ctx.arc(cx, cy, 8 * s, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx, cy + 4 * s, 6 * s, 0, Math.PI); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(cx - 3 * s, cy - 1 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 3 * s, cy - 1 * s, 2.5 * s, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#f00';
  ctx.beginPath(); ctx.arc(cx - 3 * s, cy - 1 * s, 1 * s, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(cx + 3 * s, cy - 1 * s, 1 * s, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.moveTo(cx, cy + 1 * s); ctx.lineTo(cx - 1.5 * s, cy + 4 * s); ctx.lineTo(cx + 1.5 * s, cy + 4 * s); ctx.fill();
  ctx.fillStyle = '#bbb';
  ctx.fillRect(cx - 4 * s, cy + 5 * s, 8 * s, 2 * s);
  ctx.fillStyle = '#000';
  for (let i = 0; i < 4; i++) ctx.fillRect(cx - 3.5 * s + i * 2.2 * s, cy + 5 * s, 0.7 * s, 2 * s);
}

// ============================================================================
// SECTION 23: GAME OVER / WIN
// ============================================================================
function renderDead() {
  X.fillStyle = 'rgba(80, 0, 0, 0.75)';
  X.fillRect(0, 0, W, H);
  X.textAlign = 'center';
  X.fillStyle = '#f00';
  X.font = 'bold 28px monospace';
  X.fillText('YOU DIED', W / 2, H / 2 - 10);
  X.fillStyle = '#a00';
  X.font = '9px monospace';
  X.fillText('KILLS: ' + game.kills + '/' + game.totalEnemies, W / 2, H / 2 + 10);
  if (Math.sin(performance.now() / 300) > 0) {
    X.fillStyle = '#888'; X.font = '8px monospace';
    X.fillText('PRESS SPACE TO CONTINUE', W / 2, H / 2 + 30);
  }
}

function renderWin() {
  X.fillStyle = 'rgba(0, 40, 0, 0.75)';
  X.fillRect(0, 0, W, H);
  X.textAlign = 'center';
  X.fillStyle = '#0f0';
  X.font = 'bold 22px monospace';
  X.fillText('LEVEL COMPLETE!', W / 2, H / 2 - 20);
  X.fillStyle = '#8f8';
  X.font = '9px monospace';
  X.fillText('ALL ENEMIES ELIMINATED', W / 2, H / 2);
  X.fillText('KILLS: ' + game.kills + '/' + game.totalEnemies, W / 2, H / 2 + 14);
  X.fillStyle = '#ff0';
  X.fillText('DIFFICULTY: ' + ['EASY', 'MEDIUM', 'HARD'][game.difficulty], W / 2, H / 2 + 28);
  if (Math.sin(performance.now() / 300) > 0) {
    X.fillStyle = '#888'; X.font = '8px monospace';
    X.fillText('PRESS SPACE TO CONTINUE', W / 2, H / 2 + 48);
  }
}

// ============================================================================
// SECTION 24: POST-PROCESSING (scanlines, vignette)
// ============================================================================
function postProcess() {
  // Scanlines — stronger for CRT vibe
  X.fillStyle = 'rgba(0, 0, 0, 0.18)';
  for (let y = 0; y < H; y += 2) X.fillRect(0, y, W, 1);
  // RGB column tint (subtle CRT shadow mask)
  X.globalAlpha = 0.06;
  for (let x = 0; x < W; x += 3) {
    X.fillStyle = '#f00'; X.fillRect(x, 0, 1, H);
    X.fillStyle = '#0f0'; X.fillRect(x + 1, 0, 1, H);
    X.fillStyle = '#00f'; X.fillRect(x + 2, 0, 1, H);
  }
  X.globalAlpha = 1;

  // Base vignette
  const vg = X.createRadialGradient(W / 2, H / 2, W * 0.3, W / 2, H / 2, W * 0.8);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  X.fillStyle = vg;
  X.fillRect(0, 0, W, H);

  // Low-HP red pulse vignette
  if (player.health > 0 && player.health < 40) {
    const t = performance.now() / 1000;
    const pulseRate = 1.5 + (1 - player.health / 40) * 2.5;
    const pulse = (Math.sin(t * pulseRate * Math.PI) * 0.5 + 0.5);
    const alpha = (1 - player.health / 40) * 0.35 * (0.5 + pulse * 0.5);
    const rg = X.createRadialGradient(W / 2, H / 2, W * 0.2, W / 2, H / 2, W * 0.7);
    rg.addColorStop(0, 'rgba(120,0,0,0)');
    rg.addColorStop(1, `rgba(200,0,0,${alpha})`);
    X.fillStyle = rg;
    X.fillRect(0, 0, W, H);
  }
}

// ============================================================================
// SECTION 25: MAIN RENDER
// ============================================================================
function render() {
  if (game.state === ST.TITLE) {
    renderTitle();
    return;
  }

  // Apply screen shake
  X.save();
  if (game.shakeIntensity > 0) {
    X.translate(game.shakeX | 0, game.shakeY | 0);
  }

  renderWalls();
  renderSprites();

  // Damage flash overlay
  if (game.damageFlash > 0) {
    X.fillStyle = `rgba(180, 0, 0, ${game.damageFlash * 0.6})`;
    X.fillRect(-5, -5, W + 10, H + 10);
  }

  // Crosshair
  const chSize = game.hitMarker > 0 ? 5 : 4;
  const chColor = game.hitMarker > 0 ? '#f44' : '#ddd';
  X.fillStyle = chColor;
  X.globalAlpha = game.hitMarker > 0 ? 0.9 : 0.5;
  X.fillRect(W / 2 - chSize, H / 2 - HUD_H / 2, chSize * 2, 1);
  X.fillRect(W / 2, H / 2 - chSize - HUD_H / 2, 1, chSize * 2);
  if (game.hitMarker > 0) {
    // X-shaped hit marker
    X.fillRect(W / 2 - 3, H / 2 - 3 - HUD_H / 2, 2, 2);
    X.fillRect(W / 2 + 2, H / 2 - 3 - HUD_H / 2, 2, 2);
    X.fillRect(W / 2 - 3, H / 2 + 2 - HUD_H / 2, 2, 2);
    X.fillRect(W / 2 + 2, H / 2 + 2 - HUD_H / 2, 2, 2);
  }
  X.globalAlpha = 1;

  // Particles (screen-space blood & muzzle flash)
  renderParticles();

  // Weapon
  renderWeapon();

  X.restore(); // End screen shake

  // HUD (outside shake transform)
  renderHUD();

  // Minimap (outside shake)
  renderMinimap();

  // Post-processing
  postProcess();

  // Pointer lock message
  if (!pointerLocked && game.state === ST.PLAY) {
    X.fillStyle = 'rgba(0,0,0,0.6)';
    X.fillRect(W / 2 - 75, 4, 150, 14);
    X.fillStyle = '#ff0';
    X.font = '7px monospace';
    X.textAlign = 'center';
    X.fillText('CLICK TO ENABLE MOUSE LOOK', W / 2, 14);
  }

  if (game.state === ST.DEAD) renderDead();
  if (game.state === ST.WIN) renderWin();
}

// ============================================================================
// SECTION 26: GAME LOOP
// ============================================================================
let lastTime = 0;

function gameLoop(timestamp) {
  const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
  lastTime = timestamp;
  updateGame(dt);
  render();
  requestAnimationFrame(gameLoop);
}

// ============================================================================
// SECTION 27: INIT
// ============================================================================
function startGame() {
  if (!audioCtx) initAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  startAmbient();

  generateMap();
  resetPlayer();
  placeEntities();

  game.state = ST.PLAY;
  game.time = 0;
  game.kills = 0;
  game.damageFlash = 0;
  game.shakeIntensity = 0;
  game.hitMarker = 0;
  game.faceState = 'normal';
  game.faceTimer = 0;
}

C.addEventListener('wheel', e => {
  if (game.state !== ST.PLAY) return;
  switchWeapon(e.deltaY > 0 ? 1 : -1);
  e.preventDefault();
}, { passive: false });

genTextures();
requestAnimationFrame(gameLoop);

</script>
</body>
